      a.className = 'nav-item';
      a.dataset.idx = i;
      a.innerHTML = `${c.title}<span class="count">${c.no}</span>`;
      a.onclick = () => jumpTo(i);
      navList.appendChild(a);
    });
  } else {
    groupByChapter().forEach(g => {
      const a = document.createElement('a');
      a.className = 'nav-item';
      a.dataset.idx = g.items[0].idx;
      a.dataset.chapter = g.name;
      a.innerHTML = `${g.name}<span class="count">${g.items.length}</span>`;
      a.onclick = () => jumpTo(g.items[0].idx);
      navList.appendChild(a);
    });
  }
}

function updateNavActive(){
  const card = cardsData[currentIdx];
  const items = document.querySelectorAll('.nav-item');
  items.forEach(item => {
    let on;
    if(NAV_BY_CARD){ on = Number(item.dataset.idx) === currentIdx; }
    else { on = item.dataset.chapter === card.chapter; }
    item.classList.toggle('active', on);
    if(on) item.scrollIntoView({block:'nearest'});
  });
}

function renderCard(){
  const card = cardsData[currentIdx];
  document.getElementById('chapter-title').textContent = '📂 ' + (card.chapter || '');
  document.getElementById('q-title').innerHTML = '📌 ' + card.title;
  document.getElementById('q-meta').textContent = '卡片 ' + card.no;
  document.getElementById('q-body').innerHTML = card.question;
  document.getElementById('q-tags').innerHTML = (card.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
  let aHtml = card.answer;
  if(card.images && card.images.length){ aHtml += '<br><b>📷 图示：</b>' + buildGalleryHTML(card.images); }
  document.getElementById('a-body').innerHTML = aHtml;
  const tipEl = document.getElementById('a-tip');
  if(card.tip && card.tip.trim()){ tipEl.innerHTML = card.tip; tipEl.style.display = 'block'; }
  else { tipEl.style.display = 'none'; }
  document.getElementById('a-tags').innerHTML = (card.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('answer-section').classList.toggle('show', showingAnswer);
  document.getElementById('cur-index').textContent = currentIdx + 1;
  document.getElementById('progress').style.width = ((currentIdx+1)/cardsData.length*100) + '%';
  updateNavActive();
}

function showAnswer(){
  if(showingAnswer) return;
  showingAnswer = true;
  const ans = document.getElementById('answer-section'); if(ans) ans.classList.add('show');
  const b = document.getElementById('btn-flip'); if(b) b.textContent = '隐藏答案';
}
function showQuestion(){
  if(!showingAnswer) return;
  showingAnswer = false;
  const ans = document.getElementById('answer-section'); if(ans) ans.classList.remove('show');
  const b = document.getElementById('btn-flip'); if(b) b.textContent = '显示答案';
}
function flipCard(){ if(showingAnswer) showQuestion(); else showAnswer(); }
document.getElementById('anki-card').addEventListener('click', e => {
  // 复制支持: 鼠标点击时若已有选中文本,不触发翻面/返回
  try{ const sel = window.getSelection && window.getSelection().toString().trim(); if(sel && sel.length > 0) return; }catch(_){ }
  // 图片/链接/按钮由各自处理
  if(e.target.closest('a, button')) return;
  // 答案区内部单击 → 返回题目; 否则 → 显示答案
  if(showingAnswer && e.target.closest('#answer-section')){ showQuestion(); return; }
  if(!showingAnswer) showAnswer();
});
// 禁止选中文本后再点击触发 ghost click 导致整段取消选择:click 后立即清选区不影响已复制
document.addEventListener('selectionchange', () => { /* no-op, 留位以备扩展 */ });
function prevCard(){ if(currentIdx>0){ currentIdx--; showingAnswer=false; renderCard(); window.scrollTo({top:0,behavior:'smooth'}); } }
function nextCard(){ if(currentIdx<cardsData.length-1){ currentIdx++; showingAnswer=false; renderCard(); window.scrollTo({top:0,behavior:'smooth'}); } }
function jumpTo(idx){ currentIdx=idx; showingAnswer=false; switchMode('qa'); renderCard(); window.scrollTo({top:0,behavior:'smooth'}); }

document.addEventListener('keydown', e => {
  if(e.key === ' ' || e.key === 'Enter'){ e.preventDefault(); showAnswer(); }
  else if(e.key === 'Backspace'){ e.preventDefault(); showQuestion(); }
  else if(e.key === 'ArrowRight') nextCard();
  else if(e.key === 'ArrowLeft') prevCard();
  else if(e.key === 'Escape') closeLightbox();
});

function openLightbox(src, cap){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-cap').textContent = cap;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('show'); }

function switchMode(mode){
  document.getElementById('mode-qa').classList.toggle('active', mode==='qa');
  document.getElementById('mode-list').classList.toggle('active', mode==='list');
  document.getElementById('single-view').style.display = mode==='qa' ? 'block' : 'none';
  document.getElementById('list-view').style.display = mode==='list' ? 'block' : 'none';
  if(mode==='list') renderList();
}

function renderList(){
  const view = document.getElementById('list-view');
  view.innerHTML = '';
  groupByChapter().forEach(g => {
    const sec = document.createElement('div');
    sec.className = 'list-section';
    sec.innerHTML = `<div class="list-section-header">📂 ${g.name} · ${g.items.length} 张</div><div class="list-section-body"></div>`;
    const body = sec.querySelector('.list-section-body');
    g.items.forEach(({card, idx}) => {
      const div = document.createElement('div');
      div.className = 'list-card';
      const imgsHtml = card.images && card.images.length
        ? buildGalleryHTML(card.images)
        : '<div style="color:#94a3b8; font-size:12px; padding:6px;">（本卡无配图）</div>';
      div.innerHTML =
        `<div class="q-title">📌 ${card.title} <span style="font-size:12px; color:#64748b; font-weight:normal;">(${card.no})</span></div>`
        + `<div class="q-body">${card.question}</div>`
        + imgsHtml
        + `<details><summary>▸ 查看文字答案</summary><div class="answer" style="margin-top:8px;">${card.answer}</div>`
        + (card.tip ? `<div class="tip" style="margin-top:8px;">${card.tip}</div>` : '')
        + `</details>`
        + `<div style="margin-top:8px;">${(card.tags||[]).map(t => `<span class="tag">${t}</span>`).join('')}</div>`
        + `<div style="margin-top:6px;"><a href="javascript:void(0)" class="list-jump" onclick="jumpTo(${idx})">→ 进入问答模式学这张</a></div>`;
      body.appendChild(div);
    });
    view.appendChild(sec);
  });
}

// 统计
document.getElementById('total-count').textContent = cardsData.length;
document.getElementById('img-count').textContent = cardsData.filter(c => c.images && c.images.length).length;
renderNav();
renderCard();

// 主题切换（默认 经典蓝）
function setTheme(theme){
  document.body.className = 'theme-' + theme;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
  try{ localStorage.setItem('wgyz_theme', theme); }catch(e){}
}
(function(){ let s='lvbo'; try{ const v=localStorage.getItem('wgyz_theme'); if(['lvbo','shanlan','jurumen','taigu','luoqing','medie'].includes(v)) s=v; }catch(e){} setTheme(s); })();

// 时钟
const weekMap=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
function updateClock(){
  const d=new Date(); const p=n=>String(n).padStart(2,'0');
  const de=document.getElementById('clock-date'), te=document.getElementById('clock-time');
  if(de) de.textContent=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${weekMap[d.getDay()]}`;
  if(te) te.textContent=`${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
updateClock(); setInterval(updateClock, 1000);
</script>
