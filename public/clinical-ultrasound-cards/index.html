td><td>下壁及后间隔基底-中间段</td></tr></table><br><b>临床意义：</b><br>• 识别冠状动脉供血区域有助于节段性室壁运动异常时定位罪犯血管<br>• 心电图定位与超声定位结合可提高心肌梗死诊断准确性", "tip": "LAD 闭塞易致前壁及心尖心肌梗死；LCX 闭塞易致侧后壁梗死。", "tags": ["解剖", "心脏"], "images": [["img_in_image_box_217_360_1014_736.jpg", "图4-7 胚胎期血液循环 (含冠状动脉循环)"]], "chapter": "第4章 · 二维心脏切面"}, {"no": "17-6", "title": "心尖四腔切面", "question": "心尖四腔切面的标准切面和临床意义是什么？", "answer": "<b>标准切面与扫查：</b><br>• 探头置于心尖搏动处，标志指向 2~3 点<br>• 显示：左右心房、左右心室、房室瓣、房间隔、室间隔<br><br><b>要点：</b><br>• 三尖瓣隔叶附着点较二尖瓣前叶附着点略靠近心尖，<span class='highlight'>正常相距 5～10 mm</span><br>• 房间隔：四周最厚约 6 mm，中心部位逐渐变薄，卵圆窝部位明显变薄约 2 mm<br>• 是测量右心功能（TAPSE）、左心室 Tei 指数、二尖瓣及三尖瓣血流频谱的主要切面", "tip": "心尖四腔切面是测量右心功能、二尖瓣/三尖瓣血流的主要切面。", "tags": ["测量", "心脏", "二维切面"], "images": [["img_in_image_box_305_353_847_827.jpg", "图4-12 心尖四腔切面"], ["img_in_image_box_152_733_566_1009.jpg", "图4-39 EDV、ESV、LVEF 的测量 (C. 心尖四腔舒张末)"], ["img_in_image_box_586_732_1002_1010.jpg", "图4-39 EDV、ESV、LVEF 的测量 (D. 心尖四腔收缩末)"]], "chapter": "第4章 · 二维心脏切面"}, {"no": "17-7", "title": "胸骨上窝主动脉弓短轴切面", "question": "胸骨上窝主动脉弓短轴切面的扫查和上腔静脉正常值是什么？", "answer": "<b>标准切面与扫查：</b><br>• 探头置于胸骨上窝，标志指向 3 点方向<br>• 显示由头臂静脉汇合成的上腔静脉<br><br><b>正常值：</b><br>SVC（上腔静脉内径）：<br>• 吸气末 6.48～11.70 mm<br>• 呼气末 10.30～14.30 mm<br><br><b>要点：</b><br>• 用于评估上腔静脉、右上腔静脉畸形（如永存左上腔静脉）<br>• 评估中心静脉压状态", "tip": "SVC 直径随呼吸变化是评估中心静脉压的参考。", "tags": ["测量", "心脏", "二维切面"], "images": [], "chapter": "第4章 · 二维心脏切面"}, {"no": "18-1", "title": "腱索水平波群", "question": "M 型腱索水平波群的扫查方法和正常值是什么？", "answer": "<b>标准切面与扫查：</b><br>• 探头位置：胸骨左缘第 4 肋间<br>• 在左心室长轴切面经二尖瓣腱索水平选择 M 型取样线<br>• 自前向后：胸壁 → 右心室前壁 → 右心室腔 → 室间隔 → 左心室（及其内腱索）→ 左心室后壁<br>• 测量时相：舒张末期（心电图 R 波顶点）、收缩末期（T 波终末点）<br><br><b>正常值（mm）：</b><br><table><tr><th>项目</th><th>正常值</th></tr><tr><td>IVS 舒张末厚度</td><td>6.47～9.50</td></tr><tr><td>IVS 收缩末厚度</td><td>9.87～14.5</td></tr><tr><td>IVS 收缩幅度</td><td>5.86～9.42</td></tr><tr><td>LV 舒张末内径（男）</td><td>45.8～49.3</td></tr><tr><td>LV 舒张末内径（女）</td><td>43.7～46.4</td></tr><tr><td>LV 收缩末内径（男）</td><td>28.5～31.8</td></tr><tr><td>LVPW 舒张末厚度</td><td>6.72～9.18</td></tr><tr><td>LVPW 收缩末厚度</td><td>11.2～15.0</td></tr><tr><td>LVPW 收缩幅度</td><td>8.02～11.4</td></tr><tr><td>EPSS</td><td>4.51～6.99</td></tr></table><br><b>要点：</b><br>• EPSS：舒张末二尖瓣前叶距室间隔的距离<br>• FS =（Dd-Ds）/ Dd × 100%，正常 34% ± 5%<br>• 室间隔与左心室后壁呈异向运动", "tip": "M 型测量 EF 适用于无节段性室壁运动异常者。", "tags": ["测量", "心脏", "M型"], "images": [["img_in_image_box_151_868_564_1168.jpg", "图4-21 腱索水平波群 (A. 标准切面)"], ["img_in_image_box_587_862_1002_1171.jpg", "图4-21 腱索水平波群 (B. 测量方法)"]], "chapter": "第4章 · M型超声心动图"}, {"no": "18-2", "title": "常用计算公式", "question": "心搏量、射血分数、短轴缩短率和左心房射血力的公式是什么？", "answer": "<b>心搏量与射血分数：</b><br>• SV（心搏量）= EDV - ESV<br>• EF（射血分数）= SV / EDV × 100%<br>• FS（短轴缩短率）=（Dd - Ds）/ Dd × 100%<br><br><b>左心房射血力：</b><br>• LAF（左心房射血力）= <b>0.5 × 1.06 × MVA × PAV²</b><br>• 0.5 为常数，1.06 为血液密度常数<br>• MVA 为二尖瓣口面积，PAV 为心房收缩 A 波速度<br><br><b>二维 Simpson 法测 LVEF：</b><br>• 适用于节段性室壁运动异常者<br>• 应用 2DE 分别记录收缩末、舒张末的心尖四腔和两腔图<br>• 人工描绘心内膜轮廓 → 计算机软件自动得出 EDV、ESV 及 LVEF<br><br><b>要点：</b><br>• LVEF 正常 ≥ 55%，50%~55% 为临界，< 50% 为减低<br>• 二维 Simpson 法是当前推荐的标准方法", "tip": "二维 Simpson 法在节段性室壁运动异常或左心室变形时比 M 型 Teichholz 法更准确。", "tags": ["公式", "心脏"], "images": [["img_in_image_box_152_447_566_711.jpg", "图4-39 EDV、ESV、LVEF 的测量 (A. 心尖两腔收缩末)"], ["img_in_image_box_586_446_1000_711.jpg", "图4-39 EDV、ESV、LVEF 的测量 (B. 心尖两腔舒张末)"], ["img_in_image_box_152_733_566_1009.jpg", "图4-39 EDV、ESV、LVEF 的测量 (C. 心尖四腔舒张末)"], ["img_in_image_box_586_732_1002_1010.jpg", "图4-39 EDV、ESV、LVEF 的测量 (D. 心尖四腔收缩末)"]], "chapter": "第4章 · M型超声心动图"}, {"no": "19-1", "title": "多普勒频移公式与角度", "question": "多普勒频移公式和角度与速度的关系是什么？", "answer": "<b>多普勒频移公式：</b><br>• 多普勒频移（f_D）= <b>2 f₀ V cosθ / c</b><br>• θ：血流方向与声束方向的夹角<br>• f₀：发射频率；V：血流速度；c：声速<br><br><b>角度与速度的关系：</b><br>• θ = 0° 时，cosθ = 1，f_D 最大<br>• 当 θ 增大时，f_D 随 cosθ 减小而减小<br>• 多普勒角度 < 60° 时，1° 角度误差所致速度误差较小<br>• <span class='highlight'>临床测量中角度应 < 60°</span><br><br><b>频谱多普勒测量原则：</b><br>• 应尽量使声束与血流平行，亦可使用仪器角度校正功能<br>• 同一血流在不同的二维切面内所测得的流速可能不一致<br>• 应从多个位置扫查，选择流速测量值最高的切面<br>• 测量应至少 3~5 个连续频谱取平均值", "tip": "角度 < 60° 才能保证流速测量准确。", "tags": ["多普勒", "公式"], "images": [["img_in_chart_box_397_236_833_642.jpg", "图4-35 流速测量的误差与多普勒角度的关系"]], "chapter": "第4章 · 多普勒超声心动图"}, {"no": "19-2", "title": "PW 与 CW 的选择", "question": "脉冲多普勒（PW）和连续多普勒（CW）的特点和选择是什么？", "answer": "<b>脉冲多普勒（PW）：</b><br>• 定位准确<br>• 最大探测速度较小，一般 < 2 m/s<br>• 临床上多用于探测静脉、房室瓣、半月瓣口血流频谱<br>• 存在尼奎斯特频率极限<br><br><b>连续多普勒（CW）：</b><br>• 能测定高速血流<br>• 无法准确定位<br>• 临床上用于测定瓣膜狭窄或反流、心内分流的速度和压差<br>• 无尼奎斯特频率极限<br><br><b>彩色多普勒血流显像（CDFI）：</b><br>• 通常以\"迎红背蓝\"判断血流方向<br>• 流速越快越红，蓝色越鲜亮<br>• 当血流经过狭窄处流入一宽阔空腔时，形成\"五彩镶嵌\"的血流图像<br><br><b>多普勒伪像：</b><br>• 镜面伪像：出现在基线另一侧，与真实多普勒频谱相对称，信号强度较弱<br>• 降低功率输出、调整多普勒声束与血流方向尽可能平行可减少其发生", "tip": "PW 用于定位，CW 用于测高速血流。", "tags": ["多普勒"], "images": [], "chapter": "第4章 · 多普勒超声心动图"}, {"no": "19-3", "title": "各瓣膜血流频谱特征", "question": "各瓣膜和肺静脉的血流频谱特征是什么？", "answer": "<b>二尖瓣：</b>舒张期血流频谱为正向双峰窄带波形（E 峰、A 峰）<br><br><b>三尖瓣：</b>舒张期血流频谱呈正向双峰，速度低于二尖瓣<br><br><b>左心室流出道及主动脉：</b>前向收缩期血流频谱均呈负向窄带单峰<br><br><b>肺动脉瓣：</b>收缩期血流频谱呈负向窄带波形，与基线间留有空窗<br><br><b>肺静脉：</b>频谱呈三相波：<br>• 收缩期正向波（S 峰）<br>• 舒张早期正向波（D 峰）<br>• 舒张晚期小负向波（A 峰）<br>• A 峰形成：心房收缩 → 肺静脉血流短暂倒流<br>• S 峰形成：二尖瓣环向下运动<br>• D 峰形成：二尖瓣环开放", "tip": "肺静脉呈三相波（S/D/A），记忆\"收缩-舒张-心房\"。", "tags": ["多普勒", "频谱"], "images": [["img_in_image_box_369_361_782_596.jpg", "图4-34 肺静脉频谱多普勒 (三相波 S/D/A)"]], "chapter": "第4章 · 多普勒超声心动图"}, {"no": "19-4", "title": "肺静脉频谱多普勒", "question": "肺静脉频谱的标准切面和正常值是什么？", "answer": "<b>标准切面与扫查：</b><br>• 取心尖四腔心切面，观察左心房血流<br>• 将取样容积置于右上肺静脉入口内 1~2 mm 处<br><br><b>正常值：</b><br><table><tr><th>项目</th><th>正常值</th></tr><tr><td>S 峰峰值</td><td>50～65 cm/s</td></tr><tr><td>D 峰峰值</td><td>41～67 cm/s</td></tr><tr><td>A 峰峰值</td><td>23～33 cm/s</td></tr><tr><td>A 峰时间</td><td>79.5～121.1 ms</td></tr></table><br><b>要点：</b><br>• S/D 比值反映左心室舒张功能：<br>  - S/D > 1：舒张功能正常或松弛异常早期<br>  - S/D < 1：提示左心室舒张功能减低（限制型充盈障碍）<br>• PVa（肺静脉逆向 A 波）> 35 cm/s 提示左心室舒张末期压力增高<br>• 频谱多普勒可观察：频移时间、频移大小、频移方向、频谱辉度、频率离散度", "tip": "PVa > 35 cm/s 是评估左心室舒张末期压力增高的关键。", "tags": ["多普勒", "肺静脉"], "images": [["img_in_image_box_369_361_782_596.jpg", "图4-34 肺静脉频谱多普勒"]], "chapter": "第4章 · 多普勒超声心动图"}, {"no": "20-1", "title": "左心室收缩功能", "question": "左心室收缩功能的正常值和评价方法是什么？", "answer": "<b>正常值：</b><br><table><tr><th>项目</th><th>正常值</th></tr><tr><td>LVESV（左心室收缩末容积）</td><td><b>24 ± 10 ml/m²</b></td></tr><tr><td>LVEDV（左心室舒张末容积）</td><td><b>70 ± 20 ml/m²</b></td></tr><tr><td>SV（每搏量）</td><td>60～120 ml</td></tr><tr><td>EF（射血分数）</td><td><span class='highlight'>67% ± 8%</span></td></tr><tr><td>FS（短轴缩短率）</td><td>34% ± 5%</td></tr></table><br><b>要点：</b><br>• LVEF 评价方法选择：<br>  - M 型（Teichholz 法）：适用于无节段性室壁运动异常者<br>  - <b>二维 Simpson 法</b>：适用于节段性室壁运动异常者（推荐方法）<br>• <span class='highlight'>LVEF < 50% 为收缩功能减低</span><br>• LVEF < 40% 为收缩功能明显减低", "tip": "有节段性室壁运动异常应采用 Simpson 法。", "tags": ["测量", "心功能", "左心"], "images": [["img_in_image_box_151_868_564_1168.jpg", "图4-21 腱索水平波群 (A. 标准切面) - 用于 M 型 Teichholz 法测 LVEF"], ["img_in_image_box_587_862_1002_1171.jpg", "图4-21 腱索水平波群 (B. 测量方法) - M 型测量 EF/FS"], ["img_in_image_box_152_447_566_711.jpg", "图4-39 EDV、ESV、LVEF 的测量 (A. 心尖两腔收缩末)"], ["img_in_image_box_586_446_1000_711.jpg", "图4-39 EDV、ESV、LVEF 的测量 (B. 心尖两腔舒张末)"]], "chapter": "第4章 · 心功能评估"}, {"no": "20-2", "title": "左心室舒张功能综合评价", "question": "左心室舒张功能综合评价的指标和分级是什么？", "answer": "<table><tr><th>项目</th><th>正常（1级）</th><th>松弛异常（2级）</th><th>假正常化（3级）</th><th>限制型（4级）</th></tr><tr><td>E/A</td><td>> 1</td><td>< 1</td><td>> 1</td><td>> 2</td></tr><tr><td>EDT</td><td>160～240 ms</td><td>≥ 240 ms</td><td>160～240 ms</td><td>≤ 160 ms</td></tr><tr><td>肺静脉 S/D</td><td>> 1</td><td>> 1</td><td>< 1</td><td>< 1</td></tr><tr><td>PVa</td><td>< 35 cm/s</td><td>< 35 cm/s</td><td>> 35 cm/s</td><td>> 35 cm/s 且 > MVa</td></tr><tr><td>TDI Ea/Aa</td><td>> 1</td><td>> 1</td><td>< 1</td><td>< 1</td></tr><tr><td>E/Ea</td><td>< 8</td><td>8～15</td><td>8～15</td><td>> 15</td></tr></table><br><b>缩写：</b>EDT：E 峰减速时间；PVa：肺静脉逆向 a 波；E/Ea：二尖瓣口 E 峰与间隔处二尖瓣环舒张早期峰值速度比值<br><br><b>要点：</b>舒张功能评价目前没有一项独立可靠的指标，必须多个指标联合应用<br>• 左心室松弛性减退：IRT↑，EV↓，EDT↑，AV↑，EV/AV < 1，AR 轻度↑<br>• 左心室僵硬度增高：IRT↓，EV↑，EDT↓，AV↓，EV/AV > 2，AR 轻度↑<br>• <b>假正常化（3 级）需结合肺静脉频谱、TDI 等方法鉴别</b>", "tip": "舒张功能评价需多项指标联合应用，单一指标不可靠。", "tags": ["测量", "心功能", "左心", "舒张"], "images": [["img_in_image_box_369_361_782_596.jpg", "图4-34 肺静脉频谱多普勒 (用于评价 S/D、PVa)"]], "chapter": "第4章 · 心功能评估"}, {"no": "20-3", "title": "Tei 指数（左心整体功能）", "question": "Tei 指数的正常值、测量方法和临床意义是什么？", "answer": "<b>正常值：</b><br>• 左心室 Tei 指数：<span class='highlight'>0.39 ± 0.10</span><br><br><b>测量方法：</b><br>• Tei 指数 = (IRT + ICT) / ET = (a - b) / b<br>• IRT：等容舒张期时间；ICT：等容收缩期时间；ET：射血时间<br>• a：二尖瓣关闭至二尖瓣开放的时间（MCO）<br>• b：射血时间（ET）<br><br><b>获取方法：</b><br>• 方法一（组织多普勒）：取样容积置于二尖瓣环<br>• 方法二（频谱多普勒）：心尖五腔心切面<br><br><b>要点：</b><br>• Tei 指数即心肌做功指数，是评价心脏整体功能的新指标<br>• Tei 指数从出生后至 3 岁有所下降，3 岁至成年人阶段保持相对稳定<br>• 心功能下降时 Tei 指数增加<br>• 同时反映收缩和舒张功能，是评价整体心功能的敏感指标", "tip": "Tei 指数是评价整体心功能的敏感指标。", "tags": ["测量", "心功能", "Tei指数"], "images": [["img_in_image_box_191_557_605_800.jpg", "图 4-38 Tei 指数测量 (A. 组织多普勒图)"], ["img_in_image_box_628_558_1040_799.jpg", "图 4-38 Tei 指数测量 (B. 频谱多普勒图)"]], "chapter": "第4章 · 心功能评估"}, {"no": "20-4", "title": "右心室收缩功能", "question": "右心室收缩功能的正常值和评估方法是什么？", "answer": "<b>正常值：</b><br><table><tr><th>指标</th><th>正常值</th></tr><tr><td><b>TAPSE</b>（三尖瓣环收缩运动位移）</td><td><span class='highlight'>> 15 mm</span></td></tr><tr><td><b>Sa</b>（三尖瓣环收缩期最大速度）</td><td><span class='highlight'>> 12 cm/s</span></td></tr></table><br><b>要点：</b><br>• TAPSE：M 型在心尖四腔切面测量三尖瓣侧壁瓣环从舒张末到收缩末的最大位移<br>• Sa：组织多普勒测量三尖瓣环收缩期峰值速度<br>• 三尖瓣侧壁瓣环收缩最大位移是早期比较常用指标<br>• 收缩期三尖瓣环最大运动速度是独立评价右心射血分数敏感指标", "tip": "TAPSE > 15 mm 和 Sa > 12 cm/s 是评估右心收缩功能的核心指标。", "tags": ["测量", "心功能", "右心"], "images": [["img_in_image_box_305_353_847_827.jpg", "图4-12 心尖四腔切面 (TAPSE/三尖瓣环测量切面)"]], "chapter": "第4章 · 心功能评估"}, {"no": "20-5", "title": "右心室舒张功能与 Tei 指数", "question": "右心室舒张功能与 Tei 指数的正常值是什么？", "answer": "<b>右心室舒张功能正常值：</b><br><table><tr><th>指标</th><th>正常值</th></tr><tr><td>EV（三尖瓣血流舒张早期最大流速）</td><td>46～79 cm/s</td></tr><tr><td>AV（三尖瓣血流舒张晚期最大流速）</td><td>34～50 cm/s</td></tr><tr><td>EV/AV（E/A）</td><td>> 1</td></tr><tr><td>IRT（等容舒张时间）</td><td>40～90 ms</td></tr></table><br><b>右心室 Tei 指数正常值：</b><br>• 右心室 Tei 指数：<span class='highlight'>0.32 ± 0.03</span><br><br><b>要点：</b><br>• 右心室心肌松弛型减低时：IRT↑，EV↓，EV/AV < 1<br>• EV/AV 受年龄、心率等影响，诊断时应予以考虑", "tip": "右心室 Tei 指数 0.32 比左心室略低。", "tags": ["测量", "心功能", "右心", "舒张"], "images": [["img_in_image_box_191_557_605_800.jpg", "图 4-38 Tei 指数测量 (A. 组织多普勒图)"], ["img_in_image_box_628_558_1040_799.jpg", "图 4-38 Tei 指数测量 (B. 频谱多普勒图)"]], "chapter": "第4章 · 心功能评估"}, {"no": "20-6", "title": "左心室质量测定", "question": "左心室质量测定的临床意义是什么？", "answer": "<b>要点：</b><br>• 超声心动图（UCG）是临床上最早用于测定左心室质量的影像学方法之一<br>• 可由多个公式和算法测定<br>• 在所有心脏病的预后判断中发挥重要作用", "tip": "LV 质量评估在心脏病预后判断中具有重要作用。", "tags": ["心功能", "左心"], "images": [], "chapter": "第4章 · 心功能评估"}, {"no": "21-1", "title": "肺动脉压正常值（海平面静息状态）", "question": "肺动脉收缩压、舒张压和平均压的正常值是什么？", "answer": "<table><tr><th>指标</th><th>正常值（mmHg）</th></tr><tr><td>PASP（肺动脉收缩压）</td><td>15～30</td></tr><tr><td>PADP（肺动脉舒张压）</td><td>5～10</td></tr><tr><td>PAMP（肺动脉平均压）</td><td>10～20</td></tr></table><br><b>公式：</b><br>• PAMP =（PASP + 2 × PADP）/ 3<br>• 一般所说的肺动脉压是指 PASP", "tip": "PASP 35~40 mmHg 以上提示肺动脉高压。", "tags": ["测量", "肺动脉压"], "images": [], "chapter": "第4章 · 肺动脉压估测"}, {"no": "21-2", "title": "根据三尖瓣反流估测 PASP", "question": "根据三尖瓣反流估测 PASP 的公式是什么？", "answer": "<b>估算公式：</b><br>• 简化的 Bernoulli 方程：ΔP = 4 × V_TR² = RVSP - RAP<br>• 无肺动脉及右心室流出道狭窄时：<b>PASP = RVSP = ΔP + RAP</b><br>• 有肺动脉及右心室流出道狭窄时：PASP = RVSP - ΔP² = ΔP + RAP - ΔP²<br><br><b>缩写说明：</b><br>• ΔP：右心房、右心室间的压差<br>• RVSP：右心室收缩压<br>• ΔP²：收缩期右心室、肺动脉间的压差<br><br><b>要点：</b><br>• 根据三尖瓣反流频谱峰值速度常高估肺动脉收缩压<br>• <span class='highlight'>当估测的压力 > 40 mmHg 才认为存在肺动脉高压</span><br>• UCG 不能直接测定肺动脉压，但根据超声心动图及多普勒血流信号的改变可以估测肺动脉压", "tip": "三尖瓣反流速度频谱估算 PASP 简便实用。", "tags": ["公式", "肺动脉压"], "images": [], "chapter": "第4章 · 肺动脉压估测"}, {"no": "21-3", "title": "根据心内分流估测 PASP", "question": "VSD、PDA 估测 PASP 的公式是什么？", "answer": "<b>室间隔缺损（VSD）：</b><br>• 左向右分流：<b>PASP ≈ RVSP = SBP - ΔP，ΔP = 4 × V_VSD² = LVSP - RVSP</b><br>• 右向左分流：PASP ≈ RVSP = SBP + ΔP，ΔP = 4 × V_VSD² = RVSP - LVSP<br>• 因 LVSP ≈ AOSP ≈ SBP（肱动脉收缩压）<br><br><b>动脉导管未闭（PDA）：</b><br>• 大动脉水平左向右分流：<b>PASP = SBP - 4 × V_PDA²</b><br>• 大动脉水平右向左分流：PASP = SBP + 4 × V_PDA²<br><br><b>缩写说明：</b><br>• V_TR：三尖瓣反流峰值流速<br>• V_VSD：室间隔缺损收缩期分流峰值流速<br>• V_PDA：动脉导管未闭收缩期分流峰值流速<br>• RAP：右房压<br>• SBP：肱动脉收缩压", "tip": "左向右分流时 PASP = SBP - ΔP；右向左分流时 PASP = SBP + ΔP。", "tags": ["公式", "肺动脉压", "VSD", "PDA"], "images": [], "chapter": "第4章 · 肺动脉压估测"}, {"no": "21-4", "title": "根据肺动脉瓣反流估测 PADP 和 PAMP", "question": "肺动脉瓣反流如何估测 PADP 和 PAMP？", "answer": "<b>肺动脉舒张压（PADP）：</b><br>• <b>PADP = 4 × V_PAED² + RAP</b><br>• ΔP = 4 × V_PAED² = PADP - RVDP<br>• 舒张末期无三尖瓣狭窄时 RVDP = RAP，故 PADP = RAP + ΔP<br>• V_PAED：肺动脉瓣反流舒张末流速<br><br><b>肺动脉平均压（PAMP）：</b><br>• PAMP ≈ 4 × V_PAED_ear²<br>• Masuyama 等发现肺动脉舒张早期压力差与心导管测得的 PAMP 相关<br>• 将取样点放在肺动脉瓣下测量肺动脉舒张早期压力差", "tip": "PADP 4 × V_PAED² + RAP 是无创估测肺动脉舒张压的常用公式。", "tags": ["公式", "肺动脉压"], "images": [], "chapter": "第4章 · 肺动脉压估测"}, {"no": "21-5", "title": "RAP（右房压）的估测", "question": "右房压（RAP）的估测方法是什么？", "answer": "<table><tr><th>右心房大小</th><th>三尖瓣反流</th><th>RAP（mmHg）</th></tr><tr><td>正常</td><td>轻度</td><td>约 5</td></tr><tr><td>轻度增大</td><td>中度</td><td>约 10</td></tr><tr><td>明显增大</td><td>重度</td><td>约 15</td></tr></table><br><b>要点：</b><br>• RAP 的准确估测对肺动脉压的准确计算至关重要<br>• 下腔静脉内径及呼吸变异度可作为辅助估测 RAP 的方法", "tip": "RAP 估测是准确计算 PASP 的前提。", "tags": ["测量", "肺动脉压"], "images": [], "chapter": "第4章 · 肺动脉压估测"}, {"no": "21-6", "title": "心血管压力正常参考值", "question": "心血管各部位压力的正常参考值是什么？", "answer": "<table><tr><th>结构</th><th>收缩压 (mmHg)</th><th>舒张压 (mmHg)</th><th>平均压 (mmHg)</th></tr><tr><td>RA（右心房）</td><td>4～6</td><td>-2 ± 2</td><td>2～4</td></tr><tr><td>RV（右心室）</td><td>15～30</td><td>2～5</td><td>—</td></tr><tr><td>LA（左心房）</td><td>—</td><td>—</td><td>5～10</td></tr><tr><td>LV（左心室）</td><td>80～130</td><td>5～10</td><td>70～95</td></tr><tr><td>AO（主动脉）</td><td>80～130</td><td>60～90</td><td>70～95</td></tr><tr><td>SVC（上腔静脉）</td><td>—</td><td>—</td><td>3～6</td></tr><tr><td>IVC（下腔静脉）</td><td>—</td><td>—</td><td>5～7</td></tr></table><br><b>要点：</b><br>• 心血管压力指标是评价心脏血流动力学的客观依据<br>• 正常情况下左、右心系统压力有明显差异，病理情况下可发生改变<br>• 超声估测的压力值需结合临床表现综合判断", "tip": "左右心系统压力有明显差异，反映其各自的功能特点。", "tags": ["测量", "心脏", "压力"], "images": [], "chapter": "第4章 · 肺动脉压估测"}, {"no": "22-1", "title": "超声心动图常用缩写表", "question": "超声心动图常用英文缩写及其含义是什么？", "answer": "<b>超声心动图常用缩写：</b><br><table><tr><th>缩写</th><th>英文</th><th>中文</th></tr><tr><td>AAO</td><td>ascending aorta</td><td>升主动脉</td></tr><tr><td>AO</td><td>aorta</td><td>主动脉</td></tr><tr><td>AML</td><td>anterior mitral leaflet</td><td>二尖瓣前叶</td></tr><tr><td>ASD</td><td>atrial septal defect</td><td>房间隔缺损</td></tr><tr><td>AV</td><td>aortic valve</td><td>主动脉瓣</td></tr><tr><td>AVA</td><td>aortic valve area</td><td>主动脉瓣瓣口面积</td></tr><tr><td>CS</td><td>coronary sinus</td><td>冠状静脉窦</td></tr><tr><td>CW</td><td>continuous wave Doppler</td><td>连续多普勒</td></tr><tr><td>DAO</td><td>descending aorta</td><td>降主动脉横断面</td></tr><tr><td>Dd</td><td>left ventricular diastolic dimension</td><td>左心室舒张末内径</td></tr><tr><td>Ds</td><td>left ventricular systolic dimension</td><td>左心室收缩末内径</td></tr><tr><td>EDV</td><td>end-diastolic volume</td><td>舒张末容积</td></tr><tr><td>EF</td><td>ejection fraction</td><td>射血分数</td></tr><tr><td>EPSS</td><td>E-point septal separation</td><td>舒张末二尖瓣前叶距室间隔距离</td></tr><tr><td>ESV</td><td>end-systolic volume</td><td>收缩末容积</td></tr><tr><td>ET</td><td>ejection time</td><td>射血时间</td></tr><tr><td>FS</td><td>fractional shortening</td><td>短轴缩短率</td></tr><tr><td>ICT</td><td>isovolumetric contraction time</td><td>等容收缩期时间</td></tr><tr><td>IRT</td><td>isovolumetric relaxation time</td><td>等容舒张期时间</td></tr><tr><td>IVC</td><td>inferior vena cava</td><td>下腔静脉内径</td></tr><tr><td>IVS</td><td>interventricular septum</td><td>室间隔</td></tr><tr><td>LA</td><td>left atrium</td><td>左心房</td></tr><tr><td>LCA</td><td>left coronary artery</td><td>左冠状动脉</td></tr><tr><td>LPA</td><td>left pulmonary artery</td><td>左肺动脉</td></tr><tr><td>LV</td><td>left ventricle</td><td>左心室</td></tr><tr><td>LVOT</td><td>left ventricular outflow tract</td><td>左心室流出道</td></tr><tr><td>LVPW</td><td>left ventricular posterior wall</td><td>左心室后壁</td></tr><tr><td>MCO</td><td>mitral closure to opening time</td><td>二尖瓣关闭至开放时间</td></tr><tr><td>MV</td><td>mitral valve</td><td>二尖瓣</td></tr><tr><td>MVA</td><td>mitral valve area</td><td>二尖瓣瓣口面积</td></tr><tr><td>PA</td><td>pulmonary artery</td><td>肺动脉</td></tr><tr><td>PADP</td><td>pulmonary artery diastolic pressure</td><td>肺动脉舒张压</td></tr><tr><td>PAMP</td><td>pulmonary artery mean pressure</td><td>肺动脉平均压</td></tr><tr><td>PASP</td><td>pulmonary artery systolic pressure</td><td>肺动脉收缩压</td></tr><tr><td>PDA</td><td>patent ductus arteriosus</td><td>动脉导管未闭</td></tr><tr><td>PHT</td><td>pressure half-time</td><td>压差减半时间法</td></tr><tr><td>PML</td><td>posterior mitral leaflet</td><td>二尖瓣后叶</td></tr><tr><td>PW</td><td>pulsed wave Doppler</td><td>脉冲多普勒</td></tr><tr><td>RA</td><td>right atrium</td><td>右心房</td></tr><tr><td>RAP</td><td>right atrial pressure</td><td>右心房压</td></tr><tr><td>RCA</td><td>right coronary artery</td><td>右冠状动脉</td></tr><tr><td>RPA</td><td>right pulmonary artery</td><td>右肺动脉</td></tr><tr><td>RV</td><td>right ventricle</td><td>右心室</td></tr><tr><td>RVAW</td><td>right ventricular anterior wall</td><td>右心室前壁</td></tr><tr><td>RVOT</td><td>right ventricular outflow tract</td><td>右心室流出道</td></tr><tr><td>SV</td><td>stroke volume</td><td>每搏量</td></tr><tr><td>SVC</td><td>superior vena cava</td><td>上腔静脉内径</td></tr><tr><td>TDI</td><td>tissue Doppler imaging</td><td>组织多普勒显像</td></tr><tr><td>VSD</td><td>ventricular septal defect</td><td>室间隔缺损</td></tr></table>", "tip": "超声报告及病例讨论中常混合使用中英文缩写。", "tags": ["缩写", "参考"], "images": [], "chapter": "第4章 · 常用缩写速查"}, {"no": "22-2", "title": "儿童超声心动图正常值", "question": "儿童超声心动图各年龄段的正常值是多少？", "answer": "<b>儿童超声心动图各年龄组正常值（mm）：</b><br><table><tr><th>年龄</th><th>LV 舒张末内径</th><th>LVPW 厚度</th><th>IVS 厚度</th><th>AO 内径</th><th>LA 内径</th></tr><tr><td>新生儿</td><td>19～24</td><td>2～4</td><td>2～4</td><td>8～11</td><td>7～13</td></tr><tr><td>1岁</td><td>26～32</td><td>3～5</td><td>3～5</td><td>11～15</td><td>11～17</td></tr><tr><td>3岁</td><td>30～36</td><td>4～5</td><td>4～5</td><td>13～17</td><td>14～20</td></tr><tr><td>5岁</td><td>33～39</td><td>4～6</td><td>4～6</td><td>14～19</td><td>16～22</td></tr><tr><td>8岁</td><td>36～42</td><td>5～6</td><td>5～7</td><td>16～21</td><td>17～24</td></tr><tr><td>12岁</td><td>40～46</td><td>5～7</td><td>6～8</td><td>18～23</td><td>19～27</td></tr><tr><td>17-18 岁</td><td>42～49</td><td>6～8</td><td>7～9</td><td>20～26</td><td>21～30</td></tr></table><br><b>要点：</b><br>• 儿童心脏超声正常值随年龄变化较大，必须按年龄组对照<br>• Tei 指数从出生后至 3 岁有所下降，3 岁至成年阶段保持相对稳定<br>• 儿童超声心动图检查时应常规报告与同龄正常值的对比", "tip": "儿童正常值必须按年龄组对应参考。", "tags": ["测量", "小儿", "心脏"], "images": [], "chapter": "第4章 · 常用缩写速查"}, {"no": "23-1", "title": "腹主动脉超声", "question": "腹主动脉的标准扫查切面、正常频谱和解剖分段是什么？", "answer": "<b>扫查参数：</b><br>• 2.5～5.0 MHz 凸阵探头<br>• 多普勒声束夹角 <span class='highlight'>&lt; 60°</span>，取样容积 1.5～2.0 mm，壁滤波 100～200 Hz<br>• 检查前禁食 8～12 h<br>• 探头置于剑突下偏左 1 cm，横切+纵切观察全程及主要分支<br><br><b>远段频谱（三相血流）：</b><br>• 收缩期：高速窄带状，上升/下降支快，有空窗<br>• 舒张早期：反向血流<br>• 舒张中晚期：基线上低速血流<br><br><b>解剖：</b><br>• 全长 14～15 cm，从 T₁₂ 下缘至 L₄ 分出髂总动脉<br>• 分 3 段：上段（胸骨下端～肠系膜上动脉起始）、中段（肠系膜上动脉～肾动脉水平）、下段（肾动脉～分叉）<br><br><b>要点：</b><br>• 近心段为混合型频谱，远心段为高阻力型<br>• 内径从上至下规律递减", "tip": "腹主动脉三层管壁结构显示不如颈动脉清晰（探头频率低、肠道气体干扰、位置深）。", "tags": ["腹部血管", "腹主动脉"], "images": [["img_in_image_box_369_722_781_1018.jpg", "图 5-1 腹主动脉"], ["img_in_image_box_309_1151_837_1500.jpg", "图 5-2 腹主动脉正常值"]], "chapter": "第5章 · 腹部大血管"}, {"no": "23-2", "title": "腹腔干超声", "question": "腹腔干的正常值、频谱特征和分支是什么？", "answer": "<b>正常值：</b><br><table><tr><th>项目</th><th>正常值</th></tr><tr><td>内径</td><td>0.8～0.9 cm</td></tr><tr><td>血流速度</td><td>98.0～105.0 cm/s</td></tr><tr><td>RI</td><td><span class='highlight'>0.5～0.7</span></td></tr></table><br><b>频谱特征（单相血流）：</b><br>• 收缩期：上升/下降支对称、峰较窄、频带较宽、有空窗<br>• 舒张期：斜坡状、流速较快、频谱充填<br><br><b>扫查要点：</b><br>• 剑突下横切：腹腔干发出肝总动脉和脾动脉呈 <span class='highlight'>\"T\"征（\"海鸥\"征）</span><br>• 左翼为脾动脉，右翼为肝总动脉<br>• 禁食 > 12 h<br><br><b>解剖：</b><br>• 腹腔动脉（腹腔干）：腹主动脉第 1 支不成对脏支<br>• 于 T₁₂ 高度起自主动脉前壁，长 1.2～2.5 cm<br>• 分支：胃左动脉、肝总动脉、脾动脉<br><br><b>变异：</b>分支从腹主动脉或肠系膜上动脉发出、腹腔干与肠系膜上动脉共干", "tip": "腹腔干闭塞时，可通过胰十二指肠动脉弓建立侧支循环。", "tags": ["腹部血管", "腹腔干"], "images": [["img_in_image_box_409_583_823_901.jpg", "图 5-3 腹腔干"], ["img_in_image_box_151_309_566_601.jpg", "图 5-4 \"T\"征（腹腔干与肝总动脉、脾动脉）"], ["img_in_image_box_586_307_1000_602.jpg", "图 5-5 腹腔干纵切面扫查"], ["img_in_image_box_153_919_592_1375.jpg", "图 5-6 腹腔干分支"]], "chapter": "第5章 · 腹部大血管"}, {"no": "23-3", "title": "肠系膜上动脉", "question": "肠系膜上动脉禁食/进食后正常值和频谱变化是什么？", "answer": "<b>正常值（表 5-1）：</b><br><table><tr><th>状态</th><th>内径 (cm)</th><th>平均流速 (cm/s)</th></tr><tr><td>禁食时</td><td>0.60±0.09</td><td>22.2±7.5</td></tr><tr><td>进食后 15 min</td><td>0.64±0.09</td><td>51.0±16.3</td></tr><tr><td>进食后 45 min</td><td>0.67±0.09</td><td><span class='highlight'>57.0±17.3</span></td></tr><tr><td>进食后 90 min</td><td>0.64±0.09</td><td>35.1±9.0</td></tr></table><br><b>禁食时频谱（高阻型，RI > 0.8）：</b><br>• 快速双相血流，收缩期峰高尖<br>• 舒张早期基线下反向小峰<br>• 舒张中晚期近基线较宽频带<br><br><b>进食后频谱（中等阻力型，RI < 0.8）：</b><br>• 单相频谱，收缩期峰下降支斜缓<br>• 舒张早期反向小峰消失，变为正向血流<br>• 全舒张期呈斜坡状<br><br><b>扫查：</b>禁食 > 12 h，腹正中线偏左 1 cm 纵切，腹腔干下方 1 cm<br><br><b>解剖：</b>约平 L₁ 高度起始于腹主动脉前壁，与腹主动脉夹角 30°，距腹腔干根部约 1.25 cm<br><br><b>要点：</b>粥样硬化易发生在腹腔干、肠系膜上/下动脉开口处", "tip": "肠系膜上动脉频谱于进食后 45 min 达到高峰。", "tags": ["腹部血管", "肠系膜上动脉"], "images": [["img_in_image_box_409_578_823_899.jpg", "图 5-7 肠系膜上动脉"], ["img_in_image_box_250_359_901_522.jpg", "图 5-8 肠系膜上动脉禁食时频谱特征"], ["img_in_image_box_252_876_901_1045.jpg", "图 5-9 肠系膜上动脉进食后频谱特征"], ["img_in_image_box_605_226_1012_957.jpg", "图 5-10 肠系膜上动脉分支"]], "chapter": "第5章 · 腹部大血管"}, {"no": "23-4", "title": "肾动脉", "question": "肾动脉的正常值、扫查方法和解剖要点是什么？", "answer": "<b>正常值：</b><br><table><tr><th>项目</th><th>正常值</th></tr><tr><td>内径</td><td>0.5～0.7 cm（起始部稍粗）</td></tr><tr><td>PSV</td><td>&lt; <span class='highlight'>100 cm/s</span></td></tr><tr><td>RI</td><td>&lt; 0.7</td></tr><tr><td>收缩期加速时间</td><td>&lt; 0.07 s</td></tr></table><br><b>各级分支 PSV/EDV（表 5-2，cm/s）：</b><br>• 小叶间动脉：PSV 10～15，EDV 3～7<br>• 弓形动脉：PSV 20～30，EDV 8～17<br>• 大叶间动脉：PSV 30～40，EDV 12～15<br>• 段动脉：PSV 40～50，EDV 15～25<br><br><b>频谱特征（低阻血流）：</b><br>• 收缩期上升支较快、下降支较缓<br>• 舒张期平缓斜坡状、流速较快<br>• 收缩/舒张期频谱均呈填充型<br><br><b>扫查：</b><br>• 2～5 MHz 凸阵探头，禁食 > 12 h<br>• 右肾动脉：下腔静脉后方找短轴，再旋转 90° 显示长轴<br>• 左肾动脉：右侧卧位左后斜位扫查（\"剥香蕉皮\"征）<br><br><b>解剖：</b>平 L₁₋₂ 高度起自腹主动脉侧面，距肠系膜上动脉 1.5 cm，距分叉 10 cm<br>• 右肾动脉起于前侧方（10～11 点位）<br>• 左肾动脉起于侧/后侧方（3～4 点位）<br><br><b>要点：</b><br>• 老年动脉粥样硬化→肾动脉起始处和近心段<br>• 年轻患者→整个肾动脉（易患纤维肌发育不良）<br>• 加速时间（AT）= 收缩起始至第一个收缩峰顶点<br>• 成年人静息时每分钟 1200 ml 血流过肾，占心排血量 20%～25%<br>• 变异：上/下极副肾动脉、双主肾动脉", "tip": "95% 的主肾动脉可充分显示，但肠气、肥胖、角度均会影响显示率。", "tags": ["腹部血管", "肾动脉"], "images": [["img_in_image_box_151_708_484_1093.jpg", "图 5-11A 肾动脉彩色多普勒图"], ["img_in_image_box_507_708_1002_1092.jpg", "图 5-11B 肾动脉频谱多普勒图"], ["img_in_image_box_409_1093_822_1367.jpg", "图 5-12 左、右肾动脉起始处（剥香蕉皮征）"], ["img_in_image_box_267_525_886_841.jpg", "图 5-13 加速时间（AT）测量"], ["img_in_image_box_352_1097_803_1460.jpg", "图 5-14 肾动脉解剖"]], "chapter": "第5章 · 腹部大血管"}, {"no": "23-5", "title": "血管测量通用原则", "question": "血管超声测量的检查顺序和通用原则是什么？", "answer": "<b>检查顺序：</b><br>灰阶超声 → 彩色多普勒 → 频谱多普勒<br><br><b>测量原则：</b><br>1. 测量内径时尽量使声束与血管长轴垂直，必要时可放大图像测量<br>2. 调节增益使血管内腔清晰，管壁内缘明确<br>3. 应用 CDFI 测量血管内径或面积时，适当调节仪器彩色和血流速度标尺，使血流信号在血管壁外刚好消失<br>4. PW 检查时尽量显示较长的血管，并使血流-声束夹角 <span class='highlight'>&lt; 60°</span><br>5. 为减少误差，应测量最少 3～5 个连续频谱，取平均值", "tip": "血管超声检查顺序固定：灰阶→彩色→频谱，三步缺一不可。", "tags": ["血管", "通用原则"], "images": [["img_in_image_box_309_1151_837_1500.jpg", "图 5-2 腹主动脉正常值（测量原则示例）"]], "chapter": "第5章 · 腹部大血管"}, {"no": "24-1", "title": "下腔静脉", "question": "下腔静脉的正常值、解剖分段和频谱特征是什么？", "answer": "<b>正常值（表 5-3，cm）：</b><br><table><tr><th>下腔静脉</th><th>左右径</th><th>前后径</th></tr><tr><td>肝后段</td><td>2.0～2.4</td><td>1.0～1.3</td></tr><tr><td>中段（肾动脉水平）</td><td>1.8～2.1</td><td>0.9～1.2</td></tr><tr><td>下段</td><td>1.7～1.9</td><td>0.9～1.1</td></tr></table><br><b>扫查：</b>空腹 4～8 h，2.5～5.0 MHz 凸阵，探头剑突下偏右 2 cm<br><br><b>解剖：</b><br>• 长度约 20 cm，由左、右髂总静脉汇合而成<br>• 沿脊柱右前方、腹主动脉右侧上行，穿腔静脉孔入右心房<br>• 分 3 段：上段（肝静脉开口以上至右心房）、中段（肾静脉～肝静脉）、下段（肾静脉以下至髂总静脉汇合处）<br>• 腹腔段无瓣膜<br><br><b>要点：</b><br>• 正常内径 ≤ 2.5 cm，呈椭圆形，前后径 &lt; 横径<br>• 影响因素：呼吸、心动周期、右心房压力（胸腔积液/心衰时内径增宽）<br>• 远心段：连续前向血流；近心段：三相型或多相型<br>• 变异：肝后段缺如、双下腔静脉、左下腔静脉", "tip": "下腔静脉滤器应放于肾静脉平面下方，用于预防肺栓塞。", "tags": ["静脉", "下腔静脉"], "images": [["img_in_image_box_369_1196_782_1486.jpg", "图 5-16 下腔静脉"], ["img_in_image_box_586_783_1032_1469.jpg", "图 5-17 下腔静脉解剖"], ["img_in_image_box_153_925_622_1491.jpg", "图 5-18 左下腔静脉"]], "chapter": "第5章 · 静脉系统"}, {"no": "24-2", "title": "下腔静脉多相型频谱", "question": "下腔静脉近心段多相型频谱各波形（s/v/d/a/c 波）的形成机制是什么？", "answer": "<b>各波形形成机制：</b><br>• <b>s 波</b>：紧随心电图 QRS 波之后（心室收缩期）<br>&nbsp;&nbsp;心脏射血→右心房容积↑→压力↓→下腔静脉回心血量↑、速度↑<br>• <b>v 波</b>：心电图 T 波后立即发生（等容舒张期）<br>&nbsp;&nbsp;三尖瓣关闭→右心房血流量↑→房内压力↑→血液反流→v 波<br>• <b>d 波</b>：T 波之后不久（三尖瓣开放）<br>&nbsp;&nbsp;血液由右心房进入右心室→右心房压力↓→下腔静脉较多血液流入右心房<br>• <b>a 波</b>：P 波之后即发生（心房收缩）<br>&nbsp;&nbsp;心房收缩期→房内压↑→下腔静脉短暂逆流<br>• <b>c 波</b>：a 波之后偶尔可见的小 c 波<br>&nbsp;&nbsp;心室收缩→推顶关闭房室瓣→三尖瓣向心房侧凸出→右心房压力轻度↑<br><br><b>临床意义：</b><br>• 下腔静脉滤器用于预防下肢/盆腔静脉血栓脱落引起肺栓塞<br>• 应放于肾静脉平面下方<br>• 置入前后超声可评估位置、有无血栓、穿孔、周围血肿", "tip": "下腔静脉近心段波形形成与心动周期密切相关，是评估右心功能的重要指标。", "tags": ["静脉", "下腔静脉", "频谱"], "images": [["img_in_image_box_291_814_939_957.jpg", "图 5-19 下腔静脉近心段多相型血流频谱（s/v/d/a/c 波）"]], "chapter": "第5章 · 静脉系统"}, {"no": "24-3", "title": "肝静脉", "question": "肝静脉的正常值、解剖分组和频谱特征是什么？", "answer": "<b>正常值：</b><br><table><tr><th>项目</th><th>正常值</th></tr><tr><td>肝左静脉内径</td><td>0.5～0.9 cm</td></tr><tr><td>肝中静脉内径</td><td>0.5～0.9 cm</td></tr><tr><td>肝右静脉内径</td><td>0.4～0.9 cm</td></tr><tr><td>S 波峰值流速</td><td>22～39 cm/s（平均 29 cm/s）</td></tr><tr><td>V 波峰值流速</td><td>0～-8 cm/s（平均 -1.1 cm/s）</td></tr><tr><td>D 波峰值流速</td><td>13～35 cm/s（平均 22 cm/s）</td></tr><tr><td>A 波峰值流速</td><td>0～-38 cm/s（平均 -18 cm/s）</td></tr><tr><td>S/D 比值</td><td>1.0～2.8（平均 1.4）</td></tr></table><br><b>扫查：</b>2.5～5.0 MHz 扇扫或凸阵<br>• 剑突下横断（声束指向第二肝门）<br>• 剑突下纵断（肝左/中静脉）<br>• 右肋缘下斜断（肝右/中静脉）<br>• 右肋间冠状面（肝右静脉）<br><br><b>解剖：</b><br>• 上组（第二肝门）：肝右/中/左静脉→下腔静脉<br>• 下组（第三肝门）：肝短静脉（4～8 支）→下腔静脉<br><br><b>要点：</b><br>• 频谱两相或三相，两个反向谷点（S 谷、D 谷）+ 1 个反流峰（A 峰）；S 与 D 之间为 V 点<br>• Valsalva 时 S/D 下降，但 &gt; 0.6<br>• 肝静脉管壁薄，超声不易显示管壁回声<br>• 变异：肝中/左静脉合干、两条肝左静脉、肝右静脉缺如最常见", "tip": "三支肝静脉常不在同一平面，不易同时显示三支主干。", "tags": ["静脉", "肝静脉"], "images": [["img_in_image_box_152_235_564_506.jpg", "图 5-20A 肝静脉标准切面"], ["img_in_image_box_588_236_999_505.jpg", "图 5-20B 肝静脉频谱多普勒图"], ["img_in_image_box_351_398_892_949.jpg", "图 5-21 肝静脉解剖"], ["img_in_image_box_369_848_783_1003.jpg", "图 5-22 肝静脉频谱（S谷、D谷、A峰、V点）"]], "chapter": "第5章 · 静脉系统"}, {"no": "24-4", "title": "肝门静脉系统", "question": "肝门静脉系统的正常值、与肝静脉的鉴别要点是什么？", "answer": "<b>正常值（表 5-4）：</b><br><table><tr><th>部位</th><th>内径 (mm)</th><th>频谱形态</th><th>最大流速 (cm/s)</th></tr><tr><td>肝门静脉主干</td><td>&lt; 13（呼气末 &lt; 16）</td><td>连续进肝，随呼吸波动</td><td>12 &lt; V &lt; 40</td></tr><tr><td>脾静脉</td><td>&lt; 8</td><td>连续</td><td>吸气时流速增快</td></tr><tr><td>肠系膜上静脉</td><td>&lt; 10</td><td>连续</td><td>进食后流速增快</td></tr><tr><td>胃左静脉</td><td>&lt; 5</td><td>—</td><td>—</td></tr></table><br><b>扫查：</b>禁食 4 h 以上，下腔静脉前方距第一肝门 1～2 cm 处测量；流速设置 14～26 cm/s，取样容积 2～4 mm，声束-血流夹角 &lt; 60°<br><br><b>解剖：</b>由脾静脉+肠系膜上静脉于胰颈后方汇合而成，长 7～8 cm；左支分横部、角部、矢状部、囊部（\"工\"字结构）；基本无静脉瓣<br><br><b>要点：</b><br>• 进食后内径增加 1 mm，流速增快；深吸气直径增加 &gt; 20%<br>• 禁食期间 16.29±3.68 cm/s，进食后 22.72±4.88 cm/s<br>• 影响因素：呼吸（吸气→血流速度降低）、运动（明显下降）、体位（坐位/站立位下降）、进食（肝门静脉和肠系膜上静脉血流增加）<br><br><b>肝静脉 vs 肝门静脉鉴别：</b><br><table><tr><th>鉴别点</th><th>肝静脉</th><th>肝门静脉</th></tr><tr><td>走行</td><td>纵向</td><td>横向</td></tr><tr><td>汇合</td><td>汇入下腔静脉</td><td>分为左/右支</td></tr><tr><td>管径变化</td><td>近膈肌处增宽</td><td>近肝门处相对增宽</td></tr><tr><td>边界</td><td>周围无包绕物</td><td>周围包绕厚纤维组织鞘</td></tr></table><br><b>流量公式：</b>Q = A × B × π/4 × 0.57 Vmax/cosθ × 60（ml/min）或 Q = (D/2)² × π × V × 60（ml/min）", "tip": "肝门静脉频谱为连续性低速带状，可受心动周期影响，并随呼吸轻度变化。", "tags": ["静脉", "肝门静脉"], "images": [["img_in_image_box_193_226_1039_505.jpg", "图 5-23 肝门静脉（彩色多普勒+频谱多普勒）"], ["img_in_image_box_308_615_837_1063.jpg", "图 5-24 肝门静脉解剖（工字结构）"]], "chapter": "第5章 · 静脉系统"}, {"no": "25-1", "title": "颈动脉内径正常值", "question": "颈动脉不同年龄段的内径正常值是多少？", "answer": "<b>颈动脉内径正常值（表 5-6，mm）：</b><br><table><tr><th>年龄组（岁）</th><th>颈总动脉</th><th>颈内动脉</th><th>颈外动脉</th></tr><tr><td>20～40</td><td>6.6±0.4</td><td>5.4±0.5</td><td>4.3±0.4</td></tr><tr><td>41～50</td><td>6.7±0.5</td><td>5.6±0.5</td><td>4.6±0.5</td></tr><tr><td>51～60</td><td>6.9±0.5</td><td>5.4±0.6</td><td>4.4±0.6</td></tr><tr><td>&gt; 61</td><td><span class='highlight'>7.5±0.9</span></td><td>6.0±0.8</td><td>4.7±0.4</td></tr></table><br><b>要点：</b><br>• 颈动脉内径随年龄增长而增大<br>• 内中膜厚度（IMT）&lt; 1.0 mm 为正常<br>• 颈内动脉内径 &gt; 颈外动脉（颈内较粗）", "tip": "颈动脉内径随年龄递增，> 60 岁明显增宽。", "tags": ["颈部血管", "颈动脉"], "images": [["img_in_image_box_152_1175_565_1450.jpg", "图 5-25A 颈总动脉标准切面"], ["img_in_image_box_588_1175_1000_1450.jpg", "图 5-25B 颈总动脉频谱多普勒"]], "chapter": "第5章 · 颈部血管"}, {"no": "25-2", "title": "颈动脉血流参数", "question": "颈总、颈内、颈外动脉的血流参数正常值和流速排序是什么？", "answer": "<b>颈动脉血流参数正常值（表 5-7）：</b><br><table><tr><th>血管</th><th>PSV (cm/s)</th><th>EDV (cm/s)</th><th>RI</th></tr><tr><td>颈总动脉（CCA）</td><td>91.3±20.7</td><td>27.1±6.4</td><td>0.70±0.05</td></tr><tr><td>颈内动脉（ICA）</td><td>67.6±14.3</td><td>27.3±6.4</td><td>0.59±0.06</td></tr><tr><td>颈外动脉（ECA）</td><td>70.9±16.1</td><td>18.1±5.1</td><td>0.74±0.09</td></tr></table><br>• IMT &lt; 1.0 mm 为正常<br><br><b>流速排序：</b><br>• PSV：<span class='highlight'>CCA &gt; ECA &gt; ICA</span><br>• EDV：ICA &gt; CCA &gt; ECA<br>• RI：ECA &gt; CCA &gt; ICA", "tip": "PSV、EDV、RI 在 CCA、ICA、ECA 三者间排序不同，需记牢。", "tags": ["颈部血管", "颈动脉", "血流参数"], "images": [["img_in_image_box_588_1175_1000_1450.jpg", "图 5-25B 颈总动脉频谱（PSV/EDV/RI 测量示例）"], ["img_in_image_box_194_281_1041_575.jpg", "图 5-26 颈内动脉（频谱多普勒）"], ["img_in_image_box_193_770_1041_1053.jpg", "图 5-27 颈外动脉（频谱多普勒）"]], "chapter": "第5章 · 颈部血管"}, {"no": "25-3", "title": "颈动脉频谱特征", "question": "颈总、颈内、颈外动脉的频谱特征和鉴别要点是什么？", "answer": "<b>颈总动脉（CCA）：</b><br>• 收缩期双峰，舒张期持续、正向血流<br>• 阻力指数介于颈内与颈外之间<br>• 颈总动脉血流 <span class='highlight'>70% 入颈内动脉，30% 入颈外动脉</span><br><br><b>颈内动脉（ICA）：</b><br>• 收缩期双峰，舒张期持续、高速、正向血流<br>• 频带较宽，频窗存在<br>• 低阻力型频谱（颅内动脉有丰富的动脉吻合支，血流阻力小）<br><br><b>颈外动脉（ECA）：</b><br>• 收缩期双峰，舒张末期速度接近零或等于零<br>• 频带较窄，频窗清晰<br>• 高阻力型频谱（供应颜面、颈部、头皮，分支多，循环阻力大）", "tip": "ICA 频谱特征：低阻、双峰、宽频带、舒张期持续正向高速血流。", "tags": ["颈部血管", "颈动脉", "频谱"], "images": [["img_in_image_box_588_1175_1000_1450.jpg", "图 5-25B 颈总动脉频谱多普勒"], ["img_in_image_box_194_281_1041_575.jpg", "图 5-26 颈内动脉（低阻力型频谱）"], ["img_in_image_box_193_770_1041_1053.jpg", "图 5-27 颈外动脉（高阻力型频谱）"]], "chapter": "第5章 · 颈部血管"}, {"no": "25-4", "title": "颈动脉扫查方法", "question": "颈动脉的扫查方法和 IMT 测量要点是什么？", "answer": "<b>标准扫查：</b><br>• 高频线阵探头<br>• 甲状腺横切向外侧平移可探到颈总动脉横断面<br>• 向下移至颈总动脉起始处，从下向上连续观察<br>• 一般颈内动脉位于后外侧，颈外动脉位于前内侧<br>• 颈内动脉远端检查：头部转向对侧，探头置于胸锁乳突肌后方，指向内前方<br>• 如线阵效果差，可使用 5～7 MHz 凸阵探头<br><br><b>注意事项：</b><br>• 多普勒声束角度 ≤ 60°<br>• 取样容积：远离血管壁、置于中央、尽可能小（通常 1.5 mm）<br>• 壁滤波适宜：过大滤掉低速血流，过小收到噪音<br>• 速度范围：调至正常管段内不出现混叠为宜<br>• CCA 流速测量应在距分叉下方 <span class='highlight'>4 cm</span> 处<br><br><b>IMT 测量：</b><br>• 颈动脉长轴切面，测量内膜内表面至中膜外表面的垂直距离<br>• IMT &lt; 1.0 mm 为正常", "tip": "IMT 测量应在长轴切面测量内膜内表面至中膜外表面的垂直距离。", "tags": ["颈部血管", "颈动脉", "扫查"], "images": [["img_in_image_box_409_278_822_539.jpg", "图 5-28 颈动脉内中膜（IMT 测量）"], ["img_in_image_box_152_1175_565_1450.jpg", "图 5-25A 颈总动脉标准切面（扫查方法示例）"]], "chapter": "第5章 · 颈部血管"}, {"no": "25-5", "title": "颈内、外动脉鉴别", "question": "颈内动脉和颈外动脉的鉴别要点和颞浅动脉叩击试验是什么？", "answer": "<b>鉴别要点（表 5-8）：</b><br><table><tr><th>鉴别点</th><th>颈内动脉</th><th>颈外动脉</th></tr><tr><td>内径</td><td>较粗</td><td>较细</td></tr><tr><td>解剖特征</td><td>无分支</td><td>多个分支</td></tr><tr><td>检测位置</td><td>后外侧</td><td>前内侧</td></tr><tr><td>频谱形态</td><td>低阻力型</td><td>高阻力型</td></tr><tr><td>颞浅动脉叩击试验</td><td>无变化</td><td>传导震颤性血流波形</td></tr></table><br><b>颞浅动脉叩击试验：</b><br>• 在耳前触及颞浅动脉，用指尖轻叩，同时观察多普勒特征<br>• ECA 频谱呈锯齿样改变，ICA 无此特征", "tip": "颞浅动脉叩击试验是鉴别颈内/颈外动脉的简便可靠方法。", "tags": ["颈部血管", "颈动脉", "鉴别"], "images": [["img_in_image_box_194_281_1041_575.jpg", "图 5-26 颈内动脉（无分支、低阻型频谱）"], ["img_in_image_box_193_770_1041_1053.jpg", "图 5-27 颈外动脉（多分支、高阻型频谱）"], ["img_in_image_box_252_593_899_788.jpg", "图 5-37 颞浅动脉叩击试验（ECA 锯齿样改变）"]], "chapter": "第5章 · 颈部血管"}, {"no": "25-6", "title": "颈动脉解剖", "question": "颈总动脉的解剖位置、颈动脉窦、颈动脉体和动脉管壁三层结构是什么？", "answer": "<b>颈总动脉：</b><br>• 外侧为颈内静脉，后方为迷走神经，三者包于颈动脉鞘内<br>• 颈总动脉分叉处有两个重要结构：<br>1. <b>颈动脉窦</b>：颈总动脉末端和颈内动脉起始段的膨大部分，壁内有特殊感觉神经末梢，为<span class='highlight'>压力感受器</span>，反射性调节血压<br>2. <b>颈动脉体</b>：位于颈内/颈外动脉分叉处后方，借结缔组织连于动脉壁上，属<span class='highlight'>化学感受器</span>，血氧分压降低时反射性引起呼吸加深加快、心跳加快、血压升高<br><br><b>动脉管壁三层结构：</b><br>• 内膜：最内层，动脉上皮细胞附着层<br>• 中膜：中间层，肌肉组织为主，是动脉弹性和硬度的基础<br>• 外膜：最外层，由疏松结缔组织构成", "tip": "颈动脉窦为压力感受器，颈动脉体为化学感受器，二者解剖位置和功能不同。", "tags": ["颈部血管", "颈动脉", "解剖"], "images": [["img_in_image_box_328_702_913_1022.jpg", "图 5-29 颈部血管分支"], ["img_in_image_box_348_1100_881_1465.jpg", "图 5-30 颈部血管分支"]], "chapter": "第5章 · 颈部血管"}, {"no": "25-7", "title": "颈动脉血流测量注意点", "question": "颈动脉血流测量的常见误差和注意点是什么？", "answer": "<b>假性高速血流原因：</b><br>• 颈内动脉血流速度测量点距分叉处位置过近<br>• 颈内动脉流速增高但与 CCA 和邻近血管相比无明显升高，可能本身流速高而非狭窄<br>• 多普勒声束角度调节不当<br>• 颈动脉对侧血管病变时健侧可代偿性增高<br>• 血管内膜剥脱术后<br><br><b>流速测量出现偏差原因：</b><br>• 多普勒声束角度调节不当<br>• 非层流情况下不能正确判断血流具体方向<br>• 颈动脉走行纤曲时，纤曲严重段会出现测量误差<br><br><b>CCA 收缩期峰值流速：</b><br>• CCA PSV &gt; 100 cm/s 时通常有异常<br>• 从颈动脉分叉处向颈总动脉近心端方向（朝向主动脉弓），血流速度不断增高<br>• <span class='highlight'>每远离分叉处 1 cm 血流速度平均增高 9 cm/s</span>", "tip": "CCA 流速随距分叉处距离增加而递增，测量位置应远离分叉处。", "tags": ["颈部血管", "颈动脉", "测量"], "images": [["img_in_image_box_252_593_899_788.jpg", "图 5-37 颞浅动脉叩击试验（影响流速测量的因素）"]], "chapter": "第5章 · 颈部血管"}, {"no": "25-8", "title": "频谱多普勒波形分析", "question": "频谱多普勒的组成和正常动脉频谱形态如何分析？", "answer": "<b>频谱组成：</b><br>• 纵轴：频谱（速度）；横轴：时间<br>• 基线：频移为\"0\"时的基准线<br>&nbsp;&nbsp;基线上方：血流朝向探头；基线下方：血流背离探头<br>• 频窗：基线与频谱线之间未被填充的部分<br>• 频宽：频移在垂直方向上的范围<br>&nbsp;&nbsp;红细胞速度梯度小 → 频带窄；速度梯度大 → 频带宽<br>• 频谱灰阶值：代表取样容积内速度相同的红细胞数量<br><br><b>正常动脉频谱形态：</b><br>• u 点：舒张末期<br>• P 波：收缩早期冲击波波峰（左心室收缩）<br>• u-P：快速射血期<br>• T 波（潮汐波）：缓冲射血期（健康青年人 P &gt; T，老年人 T 常高于 P）<br>• DN（重搏波切迹）：主动脉瓣关闭所致<br>• DW（重搏波/舒张波）：主动脉瓣关闭后心室内血液反冲<br>• u-DN：相当于左心室射血时间（LVET）<br><br><b>动脉波型分类：</b><br>1. <b>三相波动脉波</b>（四肢血管）：u-P 陡直，无 T 波，重搏波切迹越过基线形成小反向波<br>2. <b>低阻型动脉波</b>（实质脏器动脉）：u-P 陡直，缓慢下降，T 波不明显，DW-u 维持较高水平<br>3. <b>高阻型动脉波</b>（空腔脏器动脉）：u-P 陡直，快速下降，T 波明显，重搏波切迹显著<br>4. <b>介于低阻-高阻型动脉波</b>（颈总动脉）", "tip": "随年龄增长，T 波逐渐升高，老年人 T 波常高于 P 波。", "tags": ["颈部血管", "频谱分析"], "images": [["img_in_image_box_252_860_900_1092.jpg", "图 5-31 动脉频谱多普勒波形组成"], ["img_in_image_box_410_315_821_595.jpg", "图 5-32 动脉正常频谱形态（u/P/T/DN/DW）"], ["img_in_image_box_291_1156_939_1358.jpg", "图 5-33 三相波动脉波（四肢血管）"], ["img_in_image_box_252_235_899_438.jpg", "图 5-34 低阻型动脉波（实质脏器动脉）"], ["img_in_image_box_251_662_901_866.jpg", "图 5-35 高阻型动脉波（空腔脏器动脉）"], ["img_in_image_box_251_1081_899_1283.jpg", "图 5-36 介于低阻-高阻型动脉波（颈总动脉）"]], "chapter": "第5章 · 颈部血管"}, {"no": "25-9", "title": "椎动脉", "question": "椎动脉的正常值、频谱特征和解剖分段是什么？", "answer": "<b>正常值（表 5-9）：</b><br><table><tr><th>项目</th><th>正常值</th></tr><tr><td>内径 D</td><td>3.7±0.45 mm</td></tr><tr><td>PSV</td><td>52.1±14.0 cm/s</td></tr><tr><td>EDV</td><td>19.2±5.8 cm/s</td></tr><tr><td>PI</td><td>0.97±0.30</td></tr><tr><td>RI</td><td>0.62±0.05</td></tr></table><br><b>频谱特征：</b>看似颈内动脉缩小版（两者都直接供给低阻力颅内血管床）；收缩期双峰，舒张期持续正向血流；宽频带<br><br><b>扫查：</b>只采用纵切面<br>• 椎间段：第 3～5 颈椎水平，颈总动脉中段纵切稍向外摆即可看到<br>• 起始段：向近心端追踪至锁骨上窝，探头指向锁骨下动脉<br><br><b>解剖：</b><br>• 锁骨下动脉最大一支，沿前斜角肌内缘上行，穿第 6～第 1 颈椎横突孔，经枕骨大孔入颅后窝<br>• 在脑桥延髓交界处左、右汇合成基底动脉<br>• 4 段：椎前部、横突部、寰椎部、颅内部<br><br><b>要点：</b><br>• 大多数血流动力学意义的病变出现在起始部<br>• <span class='highlight'>1/3～1/2 患者一侧椎动脉较粗（优势型），多见于左侧</span><br>• 优势型椎动脉流速高，非优势型阻力高<br>• 因椎体横突遮挡，超声只能显示椎间隙椎动脉纵断面<br>• 流速增高原因：优势型、颈内/颈总/锁骨下动脉或对侧椎动脉狭窄闭塞代偿、椎动脉中段高速湍流<br>• 流速降低原因：椎动脉近心段闭塞、颅内远段/基底动脉闭塞、心排血量低、双侧椎动脉发育不全", "tip": "椎动脉优势型多见于左侧，优势型流速高、非优势型阻力高。", "tags": ["颈部血管", "椎动脉"], "images": [["img_in_image_box_369_316_784_605.jpg", "图 5-38 椎动脉"], ["img_in_image_box_369_1183_784_1449.jpg", "图 5-39 椎动脉频谱特征"], ["img_in_image_box_253_234_899_518.jpg", "图 5-40A 左侧优势型椎动脉（流速高、阻力低）"], ["img_in_image_box_252_544_901_826.jpg", "图 5-40B 右侧非优势型椎动脉（流速低、阻力高）"], ["img_in_image_box_151_941_566_1208.jpg", "图 5-41A 颈椎横突对彩色多普勒血流成像的影响（调整前）"], ["img_in_image_box_587_940_1002_1208.jpg", "图 5-41B 颈椎横突对彩色多普勒血流成像的影响（调整后）"]], "chapter": "第5章 · 颈部血管"}, {"no": "25-10", "title": "颈内静脉", "question": "颈内静脉的正常值、频谱特征和解剖是什么？", "answer": "<b>正常值：</b><br>• 内径：12.8±0.40 mm（成年男性）；12.3±0.40 mm（成年女性）<br><br><b>频谱特征：</b><br>• 向心方向双峰型，近心端可呈三峰型<br>• 心脏收缩期及舒张早、中期静脉 → 两个向心波峰<br>• 舒张晚期右心房收缩，血液逆流出现反向血流 → 第三峰<br><br><b>扫查：</b><br>• 平静休息 3～5 min，头部略仰，转向非检侧<br>• 7.0～11.0 MHz 高频线阵探头<br>• 探头轻置于胸锁乳突肌前缘（避免受检静脉受压）<br><br><b>解剖：</b><br>• 颈静脉分深、浅静脉：<br>&nbsp;&nbsp;深静脉：颈内静脉及其颅内、外属支→头臂静脉→上腔静脉<br>&nbsp;&nbsp;浅静脉：颈外静脉及其属支→锁骨下静脉<br>• 颈内静脉为颈部最宽的静脉干，平均宽度约 13 mm<br>• 起初位于颈内动脉背侧，沿颈总动脉外侧走行于颈动脉鞘内<br>• 体表投影：耳后乳突至胸锁关节内侧连线<br><br><b>颈内静脉 vs 颈总动脉鉴别（表 5-10）：</b><br><table><tr><th>鉴别点</th><th>颈内静脉</th><th>颈总动脉</th></tr><tr><td>管腔</td><td>随呼吸变化，加压可闭合</td><td>不随呼吸变化，加压不闭合</td></tr><tr><td>管壁</td><td>薄，无内膜回声，一层清晰强回声带</td><td>厚，有内膜回声，两条平行带状回声</td></tr><tr><td>血流方向</td><td>流向近心端</td><td>流向远心端（头侧）</td></tr><tr><td>频谱特点</td><td>非搏动性</td><td>搏动性</td></tr></table><br><b>影响静脉回流因素：</b>体循环平均充盈压、心肌收缩舒张、右心房压、体位和呼吸运动", "tip": "颈内静脉探头加压可闭合，而颈总动脉加压不闭合，是鉴别要点。", "tags": ["颈部血管", "颈内静脉"], "images": [["img_in_image_box_410_559_821_825.jpg", "图 5-42 颈内静脉"], ["img_in_image_box_292_1251_940_1432.jpg", "图 5-43 颈内静脉频谱（双峰/三峰型）"], ["img_in_image_box_251_386_901_774.jpg", "图 5-44 仰卧位静息状态时颈部静脉频谱（吸气/呼气）"], ["img_in_image_box_286_384_942_730.jpg", "图 5-45 颈内静脉解剖结构"]], "chapter": "第5章 · 颈部血管"}, {"no": "25-11", "title": "颈动脉超声新技术与影像对比", "question": "颈动脉超声的新技术和其他影像学检查方法如何选择？", "answer": "<b>超声新技术：</b><br>• 组织谐波成像技术（NTHI）<br>• 能量多普勒超声（CDE）<br>• 灰阶血流成像技术<br>• 超声造影<br>• 三维超声<br><br><b>其他影像学方法：</b><br>• <b>数字减影血管造影（DSA）</b>：评价颈动脉狭窄的\"金标准\"<br>• <b>增强磁共振造影血管成像（CE-MRA）</b>：可完成自颈总动脉主干至上矢状窦或主动脉弓至 Willis 环的一次成像<br>• <b>螺旋 CT 血管造影（SCTA）</b>：可直观、立体显示血管<br><br><b>临床路径：</b><br>1. 超声为一线检查方法<br>2. CTA 检查是一种很好的补充<br>3. 如仍不能明确诊断 → 二线检查：MRA 和 DSA", "tip": "DSA 是颈动脉狭窄评价的金标准，超声是首选一线检查。", "tags": ["颈部血管", "新技术", "影像对比"], "images": [["img_in_image_box_194_281_1041_575.jpg", "图 5-26 颈内动脉（颈动脉超声新技术应用对象）"]], "chapter": "第5章 · 颈部血管"}, {"no": "26-1", "title": "上肢动脉正常值", "question": "上肢动脉各段（锁骨下/腋/肱/桡）的内径和血流速度正常值是什么？", "answer": "<b>上肢动脉平均内径（表 5-11，mm）：</b><br><table><tr><th>上肢动脉</th><th>平均内径</th></tr><tr><td>锁骨下动脉</td><td>5.6（4.8～7.5）</td></tr><tr><td>腋动脉</td><td>4.6（3.9～6.1）</td></tr><tr><td>肱动脉</td><td>3.4（2.9～4.0）</td></tr></table><br><b>上肢动脉血流速度（表 5-12，cm/s）：</b><br><table><tr><th>动脉</th><th>收缩期流速峰值</th><th>舒张期反向流速峰值</th></tr><tr><td>锁骨下动脉</td><td>66～131</td><td>30～50</td></tr><tr><td>腋动脉</td><td>54～125</td><td>25～45</td></tr><tr><td>肱动脉</td><td>53～109</td><td>20～40</td></tr><tr><td>桡动脉</td><td>38～67</td><td>—</td></tr></table><br><b>胸廓内动脉正常值：</b><br>• 长约 20 cm，平均直径 0.3 cm<br>• 收缩期流速 50～80 cm/s，舒张期流速 10～25 cm/s（左侧较右侧略高）", "tip": "上肢动脉内径从近端到远端逐渐变细（锁骨下 > 腋 > 肱 > 桡）。", "tags": ["四肢血管", "上肢动脉"], "images": [["img_in_image_box_175_767_982_1039.jpg", "图 5-46 锁骨下动脉"], ["img_in_image_box_174_1188_982_1449.jpg", "图 5-47 腋动脉"], ["img_in_image_box_194_264_1042_541.jpg", "图 5-48 肱动脉"], ["img_in_image_box_195_719_1040_996.jpg", "图 5-49 桡动脉"], ["img_in_image_box_195_1176_1041_1452.jpg", "图 5-50 尺动脉"]], "chapter": "第5章 · 四肢血管"}, {"no": "26-2", "title": "上肢动脉频谱与解剖", "question": "上肢动脉的频谱特征、扫查方法和解剖变异是什么？", "answer": "<b>频谱特征：</b><br>• 收缩期主峰加速度高，上升支陡<br>• 舒张早期形成谷切迹，可抵达零基线或形成短而尖小负谷<br>• 舒张晚期低流速上升波<br>• 频窗清晰<br><br><b>标准扫查：</b><br>• 5～10 MHz 线阵探头<br>• 平卧位，被检肢体外展、外旋、掌心向上<br>• 锁骨下动脉：胸锁关节附近锁骨上窝，朝向后下方<br>• 腋动脉：肩部前方或经腋窝<br>• 肱动脉：上段→上臂内侧；远心段→肘窝及前臂上段前方<br><br><b>解剖：</b><br>• 左、右侧锁骨下动脉分别起于主动脉弓和头臂干<br>• 颈部主要分支：椎动脉、胸廓内动脉（内乳动脉）、甲状颈干<br>• 锁骨下动脉穿过锁骨和第一肋之间→腋动脉<br>• 腋动脉越过大小圆肌外下缘→肱动脉（主要分支为肱深动脉）<br>• 肱动脉在肘部分为桡动脉和尺动脉<br><br><b>上肢动脉解剖变异（表 5-13）：</b><br><table><tr><th>变异动脉</th><th>解剖变异</th></tr><tr><td>肱动脉</td><td>高位分叉</td></tr><tr><td>桡动脉</td><td>发自腋动脉</td></tr><tr><td>尺动脉</td><td>发自腋动脉</td></tr></table><br><b>临床要点：</b><br>• 锁骨下动脉粥样硬化斑块及狭窄多发生于起始段，左侧多见<br>• 起自锁骨下动脉的胸廓内动脉常用于冠状动脉旁路移植术<br>• 正常人群中上肢动脉走行有 1.2% 变异", "tip": "胸廓内动脉（内乳动脉）常用于冠状动脉旁路移植术。", "tags": ["四肢血管", "上肢动脉", "频谱"], "images": [["img_in_image_box_351_378_869_1023.jpg", "图 5-51 上肢动脉解剖结构"], ["img_in_image_box_194_264_1042_541.jpg", "图 5-48 肱动脉（频谱特征示例）"]], "chapter": "第5章 · 四肢血管"}, {"no": "26-3", "title": "正常肢体动脉彩色多普勒", "question": "正常肢体动脉的彩色多普勒和频谱特点是什么？", "answer": "<b>彩色多普勒特征：</b><br>• 腔内可见充盈良好的色彩，通常为红色和蓝色<br>• 直行段内血流呈层流，管腔中央流速较快（色彩浅亮）；边缘流速较慢（色彩较暗）<br>• 腔内血流具有搏动性，显示红蓝相间的血流变化：<br>&nbsp;&nbsp;红色 → 收缩期前进血流<br>&nbsp;&nbsp;蓝色 → 舒张期短暂反流<br>• 正常动脉呈弧形时，近动脉外侧壁（弧形较大一侧）管腔内流速较快<br>• 动脉分叉部位，分支起始部近管壁处可出现反向血流<br><br><b>频谱特点：</b><br>• 肢体动脉属高阻循环系统，典型脉冲多普勒频谱为<span class='highlight'>三相型</span><br>• 老年人或心脏排血功能较差者，可呈双向型甚至单向型<br>• 肢体运动、感染或温度升高时，血管扩张→外周阻力下降→舒张早期反向血流消失→频谱呈双相型<br>• 有时腕部正常尺动脉、桡动脉频谱也可呈双相型<br><br><b>血流速度：</b>肢体动脉的血流速度从近端到远端逐渐下降", "tip": "典型肢体动脉频谱为三相型，舒张早期反向血流是关键特征。", "tags": ["四肢血管", "彩色多普勒", "频谱"], "images": [["img_in_image_box_175_767_982_1039.jpg", "图 5-46 锁骨下动脉（肢体动脉彩色多普勒示例）"], ["img_in_image_box_291_1156_939_1358.jpg", "图 5-33 三相波动脉波（典型肢体动脉频谱）"]], "chapter": "第5章 · 四肢血管"}, {"no": "26-4", "title": "上肢静脉频谱与扫查", "question": "上肢静脉的频谱特征和扫查方法是什么？", "answer": "<b>频谱特征：</b><br>1. <b>自发性</b>：受检者肢体休息或活动时，大、中静脉内存在血流信号，小静脉内可缺乏自发血流信号<br>2. <b>期相性</b>：正常四肢静脉血流速度和血流量随呼吸运动而发生变化<br>3. <b>乏氏反应</b>：深吸气后憋气，四肢大/中等静脉内径明显增宽，血流信号减少、短暂消失甚至短暂反流<br>4. 挤压远端肢体时血流信号增强<br>5. <b>单向回心血流</b><br><br><b>标准扫查：</b><br>• 超声频率 5～15 MHz<br>• 间断加压静脉是肢体静脉超声检查的基本方法<br>• 短轴切面：用探头按压静脉使其压瘪；放松探头→沿静脉移动 2～3 cm→再次按压<br>• 沿静脉全程重复此操作<br><br><b>不同静脉的扫查：</b><br>• <b>腋静脉和肱静脉</b>：短轴显示+间断按压，辅以长轴彩色多普勒；注意同时检查两条肱静脉<br>• <b>贵要静脉</b>：找到贵要静脉和肱静脉汇合处，短轴按压追踪至肘部<br>• <b>头静脉</b>：找到前臂头静脉，短轴显像+短轴按压，辅以长轴彩色多普勒显示与锁骨下静脉汇合处<br>• <b>前臂静脉</b>：短轴间断按压追踪桡、尺、贵要、头静脉直至腕部", "tip": "间断加压静脉是肢体静脉超声检查的基本方法。", "tags": ["四肢血管", "上肢静脉", "扫查"], "images": [["img_in_image_box_192_1001_1040_1276.jpg", "图 5-52 锁骨下静脉"], ["img_in_image_box_151_278_567_553.jpg", "图 5-53A 腋静脉标准切面"], ["img_in_image_box_587_276_1002_552.jpg", "图 5-53B 腋静脉频谱多普勒图"], ["img_in_image_box_156_721_999_1000.jpg", "图 5-54 肱静脉"], ["img_in_image_box_152_1182_1002_1456.jpg", "图 5-55 桡静脉"], ["img_in_image_box_194_282_1042_557.jpg", "图 5-56 尺静脉"]], "chapter": "第5章 · 四肢血管"}, {"no": "26-5", "title": "上肢静脉解剖与要点", "question": "上肢静脉的解剖分类和临床要点是什么？", "answer": "<b>解剖：</b><br>• 上肢静脉分深、浅两类：<br>• <b>深静脉</b>：走行于深筋膜深面并与同名动脉伴行，包括桡静脉、尺静脉、肱静脉、腋静脉<br>• <b>浅静脉</b>：走行于皮下组织内，无动脉伴行，包括头静脉、贵要静脉、肘正中静脉、前臂正中静脉<br>• 深浅静脉间常通过穿静脉相互交通<br>• 深、浅静脉都有静脉瓣，深静脉瓣更为丰富<br>• 上肢静脉的近心端至远心端，静脉瓣分布的密度增大<br><br><b>临床要点：</b><br>• 四肢静脉管壁薄，易被探头压瘪，故静脉内径不作常规测量<br>• 上肢深静脉与同名动脉伴行，常以伴行的同名动脉作为静脉寻找和鉴别的标志<br>• 如静脉旁无动脉显示，可能探及到的是侧支静脉<br>• 上肢静脉成对很常见，可见于锁骨下静脉、肱静脉、尺静脉、桡静脉<br>• 部分上肢静脉位置表浅，探头轻压为宜", "tip": "上肢深静脉与同名动脉伴行，伴行动脉是静脉寻找和鉴别的标志。", "tags": ["四肢血管", "上肢静脉", "解剖"], "images": [["img_in_image_box_166_253_524_916.jpg", "图 5-57 上肢静脉（深浅静脉解剖）"]], "chapter": "第5章 · 四肢血管"}, {"no": "26-6", "title": "下肢动脉正常值", "question": "下肢动脉各段（股总/股浅/腘）的内径和血流速度正常值是什么？", "answer": "<b>下肢动脉各段内径（表 5-15，mm）：</b><br><table><tr><th>下肢动脉</th><th>正常值</th></tr><tr><td>股总动脉</td><td>8.2±1.4</td></tr><tr><td>股浅动脉上段</td><td>6.0±1.2</td></tr><tr><td>股浅动脉远心段</td><td>5.4±1.1</td></tr><tr><td>腘动脉</td><td>5.2±1.1</td></tr></table><br><b>下肢动脉各段血流速度（表 5-16，cm/s）：</b><br><table><tr><th>动脉</th><th>收缩期流速峰值</th><th>舒张期反向流速峰值</th></tr><tr><td>股总动脉</td><td>90～140</td><td>30～50</td></tr><tr><td>股浅动脉</td><td>70～110</td><td>25～45</td></tr><tr><td>腘动脉</td><td>50～80</td><td>20～40</td></tr></table><br><b>频谱特征：</b><br>• 收缩期快速上升正向尖峰曲线<br>• 舒张早期快速下降反向曲线<br>• 舒张晚期低速前向小波<br>• 频带较窄，频窗清晰", "tip": "下肢动脉内径和流速均从近端到远端递减（股总 > 股浅 > 腘）。", "tags": ["四肢血管", "下肢动脉"], "images": [["img_in_image_box_191_501_607_774.jpg", "图 5-58A 股总动脉标准切面"], ["img_in_image_box_628_501_1041_776.jpg", "图 5-58B 股总动脉频谱多普勒图"], ["img_in_image_box_193_955_1041_1233.jpg", "图 5-59 股浅动脉"], ["img_in_image_box_154_273_1000_551.jpg", "图 5-60 腘动脉"], ["img_in_image_box_154_735_1002_1012.jpg", "图 5-61 胫前动脉"], ["img_in_image_box_156_1182_1002_1459.jpg", "图 5-62 胫后动脉"], ["img_in_image_box_190_281_607_558.jpg", "图 5-63A 足背动脉标准切面"], ["img_in_image_box_627_283_1042_560.jpg", "图 5-63B 足背动脉频谱多普勒图"]], "chapter": "第5章 · 四肢血管"}, {"no": "26-7", "title": "下肢动脉扫查与解剖", "question": "下肢动脉的扫查方法、解剖和解剖变异是什么？", "answer": "<b>标准扫查：</b><br>• 5～7 MHz 线阵探头（股浅动脉远段和胫腓干可用 3～5 MHz 凸阵；胫前动脉远段和足背动脉可用 7～10 MHz 线阵）<br>• 平卧位，备检肢体略外展、外旋，膝关节略弯曲（\"蛙腿位\"）<br>• 扫描股总、股浅、腘、胫前起始部、胫后及腓动脉<br>• 备检肢体伸直，必要时略内旋，从小腿前外侧扫查胫前动脉或小腿后外侧扫查腓动脉<br>• 胫动脉、腓动脉显示困难时，可采用彩色和能量多普勒观察<br><br><b>解剖：</b><br>• <b>股总动脉</b>：腹股沟韧带水平续于髂外动脉，在腹股沟分叉成股深、股浅动脉<br>• <b>股深动脉</b>：位于股浅动脉外侧，较深，分支为大腿肌肉供血<br>• <b>股浅动脉</b>：走行于大腿内侧，向下进入腘窝成为腘动脉，大腿段无重要分支<br>• <b>腘动脉</b>：经膝关节后方下行，发出膝上内/外、膝下内/外动脉<br>• <b>胫前动脉</b>：膝下从腘动脉分出，向前外穿过骨间膜沿小腿前外侧下行至足背→足背动脉<br>• <b>胫腓干</b>：腘动脉分出胫前动脉后成为胫腓干，分叉为胫后和腓动脉<br><br><b>下肢动脉解剖变异（表 5-17）：</b><br><table><tr><th>动脉</th><th>解剖变异</th></tr><tr><td>股总动脉分叉</td><td>高位分叉</td></tr><tr><td>股深动脉</td><td>上段走行于股浅动脉内后方</td></tr><tr><td>胫前动脉</td><td>在膝关节或以上水平从腘动脉发出</td></tr><tr><td>腓动脉</td><td>发自胫前动脉</td></tr></table><br><b>频谱采集标准部位：</b>髂总/髂内/髂外、股总/股深、股浅近中远、腘、胫腓起始部及踝水平", "tip": "下肢动脉扫查常用蛙腿位（外展、外旋、膝关节略弯曲）。", "tags": ["四肢血管", "下肢动脉", "解剖"], "images": [["img_in_image_box_152_628_595_1499.jpg", "图 5-64 下肢动脉解剖结构"], ["img_in_image_box_193_955_1041_1233.jpg", "图 5-59 股浅动脉（扫查频谱采集示例）"]], "chapter": "第5章 · 四肢血管"}, {"no": "26-8", "title": "下肢静脉扫查与解剖", "question": "下肢静脉的扫查方法和解剖分类是什么？", "answer": "<b>标准扫查：</b><br>• 5～7 MHz 线阵探头；肢体粗大或位置较深静脉使用 3.5 MHz 凸阵；浅表静脉可使用 10 MHz 以上探头<br>• 站立位、卧位（头高足低）或坐位扫查<br>• <b>髂静脉</b>：于腹股沟处显示髂外静脉，用长轴向头侧追踪，探查髂静脉分叉处<br>• <b>股静脉</b>：于髂外静脉向远心端追踪至股总静脉，注意观察大隐静脉汇入处<br>• <b>腘静脉</b>：自股浅静脉向远心端探查腘静脉，直至胫静脉干<br>• <b>小腿静脉</b>：短轴按压和长轴彩色多普勒相结合<br>• <b>大隐静脉</b>：应用长轴切面观察大隐静脉近段是否通畅<br><br><b>解剖：</b><br>• 下肢静脉分深静脉、浅静脉、穿静脉<br>• <b>深静脉</b>：与同名动脉伴行<br>• <b>浅静脉</b>：如大隐静脉、小隐静脉<br>• <b>穿静脉</b>：连接深浅静脉", "tip": "下肢静脉分深、浅、穿三类，深静脉与同名动脉伴行。", "tags": ["四肢血管", "下肢静脉", "扫查"], "images": [["img_in_image_box_151_333_567_598.jpg", "图 5-65A 股总静脉标准切面"], ["img_in_image_box_587_339_1001_597.jpg", "图 5-65B 股总静脉频谱多普勒图"], ["img_in_image_box_150_747_565_1022.jpg", "图 5-66A 股浅静脉标准切面"], ["img_in_image_box_586_748_1000_1022.jpg", "图 5-66B 股浅静脉频谱多普勒图"], ["img_in_image_box_153_1172_1003_1439.jpg", "图 5-67 腘静脉"], ["img_in_image_box_193_280_1041_555.jpg", "图 5-68 大隐静脉"], ["img_in_image_box_193_223_494_890.jpg", "图 5-69 下肢静脉解剖结构"], ["img_in_image_box_610_1003_1003_1494.jpg", "图 5-70 下肢浅静脉（大隐/小隐）"], ["img_in_image_box_417_227_815_806.jpg", "图 5-71 下肢穿静脉"]], "chapter": "第5章 · 四肢血管"}, {"no": "26-9", "title": "肢体静脉通用要点", "question": "肢体静脉频谱特征和通用临床要点是什么？", "answer": "<b>频谱特征：</b><br>1. <b>自发性</b>：受检者肢体休息或活动时，大、中静脉内存在血流信号，小静脉内可缺乏自发血流信号<br>2. <b>期相性</b>：正常四肢静脉血流速度和血流量随呼吸运动而发生变化<br>3. <b>乏氏反应</b>：深吸气后憋气，四肢大/中等静脉内径明显增宽，血流信号减少、短暂消失甚至短暂反流<br>4. 挤压远端肢体时血流信号增强<br>5. <b>单向回心血流</b><br><br><b>临床要点：</b><br>• 静脉管腔扩张不能作为独立指标诊断静脉血栓：<br>&nbsp;&nbsp;- 上臂和大腿主要静脉管径比相伴动脉大<br>&nbsp;&nbsp;- 充血性心力衰竭、近心端静脉梗阻、静脉反流时静脉管腔可增大<br>&nbsp;&nbsp;- 小腿比目鱼肌静脉和腓肠肌静脉正常情况下管腔也较大<br>• 静脉管腔小可能由既往血栓形成引起，但管腔小不能作为独立指标诊断静脉异常：<br>&nbsp;&nbsp;- 脱水状态或严重血管收缩时静脉管腔可小于正常<br>&nbsp;&nbsp;- 小腿和前臂的成对静脉可很细，无任何原因<br><br><b>重要鉴别点：</b><br>• 上肢深静脉与同名动脉伴行，常以伴行的同名动脉作为静脉寻找和鉴别的标志<br>• 如静脉旁无动脉显示，可能探及到的是侧支静脉<br>• 上肢静脉成对很常见，可见于锁骨下、肱、尺、桡静脉", "tip": "乏氏反应是肢体静脉特征性表现，深吸气后憋气时大/中静脉内径明显增宽。", "tags": ["四肢血管", "静脉", "通用要点"], "images": [["img_in_image_box_166_253_524_916.jpg", "图 5-57 上肢静脉解剖"], ["img_in_image_box_193_223_494_890.jpg", "图 5-69 下肢静脉解剖"]], "chapter": "第5章 · 四肢血管"}, {"no": "27-1", "title": "乳腺超声", "question": "乳腺的正常值、标准切面、不同生理时期表现是什么？", "answer": "<b>正常值：</b><br>• 皮肤层厚 2～3 mm<br>• 乳腺腺体层厚 1.0～1.5 cm（老年人可萎缩至 0.5 cm）<br><br><b>标准切面与扫查：</b><br>• 7.5～12 MHz 探头；5 MHz 探头对于乳腺较大占位、硅胶充填物等可较好显示全貌<br>• 仰卧位，双臂上举或外展<br>• 乳房松弛、较大、病变位于外侧者取侧卧位<br><br><b>扫查方法：</b><br>• 纵切法：腋中线/腋前线腋尾区至胸骨旁<br>• 横切法：乳房上象限外周至下皱褶<br>• 放射状扫查法：沿乳晕连续放射状切面，显示导管<br>• 旋转扫查法：发现可疑异常时旋转扫查<br>• 斜切扫查：用于检查乳头和乳头后方病变<br><br><b>解剖：</b><br>• 腺叶结构：10～15 个腺泡组成小叶→若干小叶组成腺叶→15～20 个腺叶组成腺体<br>• 每个腺叶有一根导管，接近乳头部形成输乳管窦<br>• Cooper 韧带：支持与固定乳房；乳腺癌累及时缩短→皮肤凹陷呈\"酒窝\"征<br>• 血液供应：胸廓内动脉、胸廓动脉、肋间动脉<br>• 淋巴回流：腋下→锁骨下→锁骨上；胸骨旁→锁骨上；皮下→对侧腋下；深部→肝<br><br><b>要点：</b><br>• 正常腺体内血流信号稀少<br>• 通过探头加压-放松可动态观察肿物受压后形态改变及活动度<br><br><b>不同生理时期表现：</b><br>• 青春期和青年未生育期：腺体层为主，脂肪层菲薄<br>• 已生育期：腺体回声增强，强弱相间<br>• 妊娠期和哺乳期：腺体层明显增厚，哺乳期可见导管扩张<br>• 绝经期及老年期：皮下脂肪明显增厚，腺体层萎缩变薄<br>• 男性乳腺：只含少量乳腺导管，正常厚度 &lt; 3 mm<br><br><b>副乳：</b>最常见的先天性乳腺畸形之一；腋窝多见；有单独导管，成放射状分布", "tip": "Cooper 韧带缩短导致乳腺癌\"酒窝\"征，是经典临床表现。", "tags": ["浅表器官", "乳腺"], "images": [["img_in_image_box_369_705_783_1026.jpg", "图 5-72 正常乳腺"], ["img_in_image_box_410_518_823_850.jpg", "图 5-73 乳腺切面重要解剖结构（皮肤、脂肪层、Cooper 韧带、腺体层）"], ["img_in_image_box_323_263_826_860.jpg", "图 5-74 乳房腺体结构"]], "chapter": "第5章 · 浅表器官"}, {"no": "27-2", "title": "乳腺 BI-RADS 分类", "question": "乳腺超声 BI-RADS 分类标准（2013 版）和弹性成像评分是什么？", "answer": "<b>BI-RADS 分类（2013 版）：</b><br><table><tr><th>分级</th><th>标准</th><th>处理</th><th>恶性概率</th></tr><tr><td>0 级</td><td>未完成评价</td><td>需另外影像评估</td><td>N/A</td></tr><tr><td>1 级</td><td>未见异常</td><td>常规筛查</td><td>基本为 0%</td></tr><tr><td>2 级</td><td>良性</td><td>常规筛查</td><td>基本为 0%</td></tr><tr><td>3 级</td><td>良性可能</td><td>短期（6 个月）随访</td><td>&lt; 2%</td></tr><tr><td>4 级</td><td>可疑恶性</td><td>组织活检</td><td>2%～95%</td></tr><tr><td>4A</td><td>低度可疑恶性</td><td>—</td><td>&gt; 2%～10%</td></tr><tr><td>4B</td><td>中度可疑恶性</td><td>—</td><td>&gt; 10%～50%</td></tr><tr><td>4C</td><td>高度可疑恶性</td><td>—</td><td>&gt; 50%～&lt; 95%</td></tr><tr><td>5 级</td><td>高度提示恶性</td><td>组织活检</td><td>&gt; 95%</td></tr><tr><td>6 级</td><td>活检已证实恶性</td><td>外科切除</td><td>N/A</td></tr></table><br><b>临床要点：</b><br>• 乳腺 X 线+超声检查是最佳组合<br>• MRI 和 CT 检查可作为重要补充<br>• 乳腺超声弹性成像技术逐步在临床开展<br><br><b>压迫性弹性成像评分标准：</b><br><table><tr><th>评分</th><th>标准</th><th>弹性成像表现</th></tr><tr><td>1 分</td><td>病变区明显变形</td><td>整体为绿色</td></tr><tr><td>2 分</td><td>部分扭曲变形</td><td>蓝绿相间，绿色为主</td></tr><tr><td>3 分</td><td>边缘扭曲变形</td><td>以蓝色为主，周边见部分绿色</td></tr><tr><td>4 分</td><td>整个病变区没有明显变形</td><td>整体为蓝色</td></tr><tr><td>5 分</td><td>病变区及其周边没有明显变形</td><td>整体为蓝色，且超出二维病灶范围</td></tr></table><br>• 弹性 1～3 分作为良性病变表现<br>• 弹性 4～5 分被认为是恶性病变表现", "tip": "BI-RADS 4 级需活检；弹性 4～5 分提示恶性。", "tags": ["浅表器官", "乳腺", "BI-RADS"], "images": [["img_in_image_box_369_705_783_1026.jpg", "图 5-72 正常乳腺（BI-RADS 1-2 级基础）"]], "chapter": "第5章 · 浅表器官"}, {"no": "27-3", "title": "甲状腺", "question": "甲状腺的正常值、测量方法、解剖和血供是什么？", "answer": "<b>正常值：</b><br>• 长（a）：4～6 cm<br>• 宽（b）：2～2.5 cm<br>• 厚（c）：1.5～2.0 cm<br>• 峡部厚度：&lt; 0.3 cm<br>• 甲状腺上动脉：内径 &lt; 0.2 cm<br>• 甲状腺上动脉 PSV：20～40 cm/s<br>• 甲状腺上动脉 RI：0.5～0.6<br><br><b>标准扫查：</b><br>• 7～12 MHz 高频线阵探头<br>• 肥胖、短颈或甲状腺位于胸骨后/锁骨后患者可用 5 MHz<br>• 探头置于颈前部气管旁，在甲状软骨和胸骨上窝之间从上到下横切<br>• 转动 90° 纵切观察两侧叶<br>• 纵切面测长径，横切面测左右径、前后径、峡部厚度<br><br><b>测量方法：</b><br>• 上下径：左/右侧叶最大矢状切面，腺体最上缘至最下缘<br>• 左右径：左/右侧叶最大横切面，左右径最宽处<br>• 前后径：左/右侧叶最大横切面，前后径最大处<br>• 峡部厚度：峡部最厚处横切面，气管前方峡部正中<br>• 必要时结合吞咽动作，估计锁骨下部或纵隔上甲状腺<br><br><b>解剖：</b><br>• 位于约第 5 颈椎和第 1 胸椎水平，分左右两叶<br>• 峡部位于第 2～3 气管软骨环水平<br>• 约 2/3 人群由峡部向上伸出一个锥体叶<br>• 由内层固有膜、外层假被膜两层被膜包裹<br>• 两侧被膜间间隙内有 4 个甲状旁腺<br><br><b>血供：</b><br>• 甲状腺上动脉：颈外动脉的第 1 分支<br>• 甲状腺下动脉：多起自锁骨下动脉的甲状颈干<br>• 甲状腺最下动脉：约 10% 人存在，自主动脉弓发出<br>• 共有 3 对静脉：甲状腺上/中/下静脉<br><br><b>要点：</b><br>• 厚径测量意义最大，是判断肿大的重要指标<br>• 平均 1.5 cm，&gt; 2.0 cm 为可疑肿大，<span class='highlight'>&gt; 2.5 cm 明确为甲状腺肿大</span><br>• 正常腺体回声高于肌肉回声；与颌下腺回声相似<br>• 结节回声分级：极低回声、低回声、等回声、高回声<br>• 极低回声：低于颈前肌群；低回声：低于甲状腺实质<br>• 正常腺体内血流较少，呈散在点状分布", "tip": "甲状腺厚径意义最大：> 2.5 cm 明确为甲状腺肿大。", "tags": ["浅表器官", "甲状腺"], "images": [["img_in_image_box_192_1203_605_1457.jpg", "图 5-75A 甲状腺长轴切面（左叶）"], ["img_in_image_box_627_1202_1040_1457.jpg", "图 5-75B 甲状腺长径测量方法"], ["img_in_image_box_151_281_565_538.jpg", "图 5-76A 甲状腺横切面标准切面"], ["img_in_image_box_587_281_1001_539.jpg", "图 5-76B 甲状腺宽径、厚径测量方法"], ["img_in_image_box_409_338_823_624.jpg", "图 5-77 甲状腺横切面重要解剖结构"], ["img_in_image_box_410_380_822_662.jpg", "图 5-78 甲状腺上动脉频谱"]], "chapter": "第5章 · 浅表器官"}, {"no": "27-4", "title": "涎腺", "question": "涎腺（腮腺、下颌下腺、舌下腺）的正常值、解剖和扫查要点是什么？", "answer": "<b>正常值：</b><br><table><tr><th>涎腺</th><th>正常值</th></tr><tr><td>腮腺</td><td>长约 6 cm，宽 3～4 cm，厚 1～1.5 cm</td></tr><tr><td>腮腺导管</td><td>长 5～7 cm，内径 0.1～0.3 cm</td></tr><tr><td>下颌下腺</td><td>长约 3 cm，厚约 1.5 cm</td></tr><tr><td>舌下腺</td><td>约 1.7 cm × 0.6 cm</td></tr></table><br><b>标准扫查：</b><br>• 采用 10 MHz 以上线阵探头<br>• 仰卧位，颈后垫枕，头转向健侧使颈伸展<br>• 腮腺：上自咬肌前缘至胸锁乳突肌后缘，下至下颌下腺区<br>• 下颌下腺：在下颌下部做相应的纵横斜切面扫查<br>• 患侧应与健侧对比扫查<br><br><b>解剖：</b><br>• 涎腺主要有 3 对：腮腺、下颌下腺、舌下腺<br>• 腮腺呈倒立的锥体形，尖向下，底朝上；分浅、深两部<br>• 腮腺内主要血管：颈外动脉及其终支颞浅动脉和上颌动脉，下颌后静脉及其属支<br>• 下颌下腺呈三角形或类圆形，大部分位于颌下三角内<br>• 舌下腺呈枣核状，位于口底黏膜深方、下颌下腺和下颌舌骨肌深面的上方<br><br><b>要点：</b><br>• 正常腮腺声像图为均质细密的中低回声，<span class='highlight'>稍强于正常甲状腺回声</span><br>• 高频超声可见腮腺实质内多条与皮肤平行的回声线，为正常腺导管回声<br>• 正常腮腺管超声不易显示<br>• 正常腮腺实质除可显示几条大血管及其分支外，一般无血流信号<br>• 下颌下腺扫查时不测量横径（容易造成斜切）<br>• 舌下腺纵切时可见舌静脉通过；腺体内无或仅有很少血流信号", "tip": "正常腮腺回声稍强于甲状腺，是涎腺超声的重要鉴别点。", "tags": ["浅表器官", "涎腺"], "images": [["img_in_image_box_191_1103_606_1381.jpg", "图 5-79 正常腮腺"], ["img_in_image_box_628_1103_1042_1382.jpg", "图 5-80 正常下颌下腺"], ["img_in_image_box_368_282_784_565.jpg", "图 5-81 正常舌下腺"], ["img_in_image_box_410_230_822_522.jpg", "图 5-82 腮腺重要解剖结构（皮肤、脂肪层、深筋膜、腺实质）"], ["img_in_image_box_369_421_783_721.jpg", "图 5-83 舌下腺切面解剖结构"]], "chapter": "第5章 · 浅表器官"}, {"no": "27-5", "title": "浅表淋巴结", "question": "浅表淋巴结的正常值、颈部 7 分区和良恶性鉴别要点是什么？", "answer": "<b>正常值：</b><br>• L（纵径）/T（横径）≥ 2<br>• 95% 的正常淋巴结短径 &lt; 0.5 cm<br>• 正常下颌下腺及腮腺淋巴结趋圆形，L/T &lt; 2<br><br><b>扫查：</b><br>• 7.5 MHz 以上线阵探头<br>• 部位：颈部、腋窝、腹股沟<br>• 头颈部扫查：颈部平直<br>• 腋窝扫查：上肢上举<br>• 腹股沟扫查：双下肢伸直，双脚外展<br><br><b>解剖：</b><br>• 正常人全身 300～400 个浅表淋巴结<br>• 淋巴结呈扁圆形，似\"小肾\"，一侧常有凹陷（淋巴门）<br>• 淋巴结实质分为皮质和髓质<br><br><b>颈部淋巴结 7 分区（AJCC）：</b><br><table><tr><th>区</th><th>范围</th></tr><tr><td>Ⅰ区</td><td>颏下和下颌下淋巴结</td></tr><tr><td>Ⅱ区</td><td>颈内静脉上组</td></tr><tr><td>Ⅲ区</td><td>颈内静脉中组</td></tr><tr><td>Ⅳ区</td><td>颈内静脉下组</td></tr><tr><td>Ⅴ区</td><td>颈后三角淋巴结</td></tr><tr><td>Ⅵ区</td><td>颈前区淋巴结（喉前、气管前、气管旁）</td></tr><tr><td>Ⅶ区</td><td>上纵隔淋巴结（胸骨上切迹下方）</td></tr></table><br><b>要点：</b><br>• 淋巴结的横径较纵径有价值<br>• 二腹肌区域淋巴结横径 &gt; 0.7 cm，颈部其他部位 &gt; 0.8 cm 应考虑异常<br>• 疑有鼻咽喉肿瘤，多发淋巴结横径 &gt; 1.0 cm 应考虑淋巴瘤<br>• 边界鉴别：<br>&nbsp;&nbsp;- 转移性淋巴结和淋巴瘤趋向于清晰边界<br>&nbsp;&nbsp;- 结核性淋巴结边界不清（周围软组织水肿和感染）<br>• 血流：正常 PI &lt; 1.6，RI &lt; 0.8<br>• 反应性淋巴结 RI 高阻型；恶性淋巴结 RI 常为低阻型（较高舒张期流速）<br>• 颈部非特异性感染一般累及同一解剖区域；特异性感染（结核）及恶性淋巴瘤多累及整个解剖区域及相邻区域", "tip": "淋巴结横径比纵径更有价值；恶性淋巴结常呈低阻型血流。", "tags": ["浅表器官", "淋巴结"], "images": [["img_in_image_box_409_745_822_1027.jpg", "图 5-84 正常淋巴结（小肾征、淋巴门）"], ["img_in_image_box_152_626_484_977.jpg", "图 5-85 颈部淋巴结 7 分区（AJCC）"]], "chapter": "第5章 · 浅表器官"}, {"no": "27-6", "title": "眼球超声", "question": "眼球测量正常值、血流参数和频谱特征是什么？", "answer": "<b>眼球测量正常值（表 5-20，mm）：</b><br><table><tr><th>部位</th><th>参考值</th></tr><tr><td>眼轴长度</td><td>23～24</td></tr><tr><td>角膜厚度</td><td>0.5～1.0</td></tr><tr><td>前房深度</td><td>2.0～3.0</td></tr><tr><td>晶状体厚度</td><td>3.5～5.0</td></tr><tr><td>玻璃体长度</td><td>16～17</td></tr><tr><td>球壁厚度</td><td>2.0～2.2</td></tr></table><br><b>眼球血流参数正常值（表 5-21，PSV cm/s）：</b><br>• 眼动脉（OA）：30～43<br>• 视网膜中央动脉（CRA）：10～14<br>• 睫状后短动脉（PCA）：11～15<br><br><b>频谱特征：</b><br>• 所有眼局部动脉频谱与颈内动脉形态类似，为三峰双切迹<br>• 区别：眼局部动脉血流为湍流，无频窗，与心动周期完全一致<br><br><b>扫查方法：</b><br>• 10 MHz 以上宽频线阵探头<br>• 横切：探头标记指向鼻侧，与角巩膜缘平行；12/6 点处为水平横切，3/9 点处为垂直横切<br>• 纵切：将横切扫查法探头方向旋转 90°<br>• 轴位：探头置于角膜中央，声束经晶状体中央穿过<br><br><b>取样点：</b><br>• <b>视网膜中央动脉</b>：眼球后视神经无回声区距眼球后壁 1～2 mm，取样容积 1.5 mm<br>• <b>眼动脉</b>：眼球后 15～25 mm 处，视神经两侧寻找类似英文字母\"S\"的粗大血管<br>• <b>睫状后短动脉</b>：眼球壁后 5～8 mm 处<br><br><b>要点：</b><br>• 超声仅能对后部巩膜进行检查，眼球前部的角膜和巩膜仅能通过超高频超声 UBM 成像显示<br>• 眼球为娇嫩器官，手法应轻柔，不宜用力加压<br>• 因眼部血管流速较低，应将壁滤波调整至最小", "tip": "眼动脉取样点在眼球后 15～25 mm，视神经两侧寻找 S 形粗大血管。", "tags": ["浅表器官", "眼球"], "images": [["img_in_image_box_368_1183_781_1456.jpg", "图 5-86 眼球水平切面"], ["img_in_image_box_251_232_900_435.jpg", "图 5-87A 眼动脉频谱"], ["img_in_image_box_293_1071_939_1497.jpg", "图 5-87B 眼局部动脉频谱（OA/CRA/PCA）"], ["img_in_image_box_254_987_902_1274.jpg", "图 5-88 横切扫查法（水平/垂直/斜行横切）"], ["img_in_image_box_303_251_936_541.jpg", "图 5-89 纵切扫查法"], ["img_in_image_box_368_223_785_450.jpg", "图 5-90 眼球水平切面重要解剖结构（眼睑、前房、晶状体、玻璃体、眼球壁、视神经）"], ["img_in_image_box_290_710_856_1092.jpg", "图 5-91 眼球解剖结构"], ["img_in_image_box_319_230_906_690.jpg", "图 5-92 眼球水平切面示意图"], ["img_in_image_box_609_866_1020_1268.jpg", "图 5-93 眼眶主要血管走行及超声取样点（OA/CRA/PCA）"]], "chapter": "第5章 · 浅表器官"}, {"no": "27-7", "title": "眼外肌", "question": "眼外肌的正常厚度、扫查方法和临床要点是什么？", "answer": "<b>正常眼外肌厚度（表 5-22，mm）：</b><br><table><tr><th>肌肉</th><th>正常值</th></tr><tr><td>上直肌/提上睑肌复合体</td><td>3.9～6.8</td></tr><tr><td>外直肌</td><td>2.2～3.8</td></tr><tr><td>下直肌</td><td>1.6～3.6</td></tr><tr><td>内直肌</td><td>2.3～4.7</td></tr><tr><td>全部肌肉</td><td>11.9～16.9</td></tr></table><br><b>扫查方法：</b><br>• 采用沿肌肉走行的纵向扫描<br>• 探头置于被检查肌肉的对侧，探头标指向角膜中央和被检查的肌肉，垂直于角膜缘前后来回扫查<br>• 肌肉的长轴切面表现为起自眼球周边向球后延续的带状低回声<br>• 测量点选择<span class='highlight'>肌腹后 1/3 处</span>进行厚度测量<br><br><b>要点：</b><br>• 超声测量眼外肌重复性及测量准确性都不十分理想<br>• 临床一般不推荐此方法<br>• 通过测量眼外肌的厚度诊断相关疾病，<span class='highlight'>MRI 优于超声</span>，将更直接、更可靠", "tip": "眼外肌测量点为肌腹后 1/3 处，MRI 测量眼外肌厚度优于超声。", "tags": ["浅表器官", "眼外肌"], "images": [["img_in_image_box_368_365_783_706.jpg", "图 5-94 眼外肌长轴切面"], ["img_in_image_box_368_1183_781_1456.jpg", "图 5-86 眼球水平切面（眼外肌走行参照）"]], "chapter": "第5章 · 浅表器官"}, {"no": "28-1", "title": "肩关节超声扫查基础", "question": "肩关节解剖、肩袖构成和肱二头肌长头腱的特点是什么？", "answer": "<b>肩关节解剖：</b><br>• 肩关节：又称盂肱关节，由肩胛骨关节盂与肱骨头构成<br>• <b>肩袖结构</b>：由肩胛下肌、冈上肌、冈下肌、小圆肌的四个肌腱组成<br>• 起于肩胛骨，附着于肱骨头前、上、后面，形成\"袖套\"样结构<br>• 肱二头肌长头腱：起于盂上结节和上盂唇，在关节内下行，经结节间沟出关节腔<br>• <span class='highlight'>人体唯一在关节内行走的肌腱</span><br><br><b>肩袖肌肉止点：</b><br><table><tr><th>肌肉</th><th>止点</th></tr><tr><td>肩胛下肌腱</td><td>肱骨小结节</td></tr><tr><td>冈上肌腱</td><td>肱骨大结节上部</td></tr><tr><td>冈下肌腱</td><td>肱骨大结节后外部</td></tr><tr><td>小圆肌</td><td>肱骨大结节下部</td></tr></table><br><b>肩袖肌肉作用：</b><br>• 肩胛下肌：内收，旋内<br>• 冈上肌：外展<br>• 冈下肌和小圆肌：旋外", "tip": "肱二头肌长头腱是人体唯一在关节内行走的肌腱。", "tags": ["肌肉骨骼", "肩关节"], "images": [["img_in_image_box_154_788_485_1233.jpg", "图6-1 肩胛下肌腱扫查体位及长轴切面"], ["img_in_image_box_508_789_1002_1231.jpg", "图6-1 肩胛下肌腱扫查体位及长轴切面"], ["img_in_image_box_262_716_885_1173.jpg", "图6-7 肩袖结构（肩关节侧方）"]], "chapter": "第6章 · 肩关节"}, {"no": "28-2", "title": "肩袖扫查方法", "question": "肩袖扫查要点和侧方附着点钟点位分布是什么？", "answer": "<b>扫查要点：</b><br>• 肩袖扫查时要特别注意患者体位调整<br>• 不同的肌腱扫查时需对应相应的体位<br>• 各个体位的核心是将所扫查肌腱充分拉伸<br>• 运动系统超声扫查过程中，应以骨质强回声为声像图靶点进行寻找<br>• 对于肩袖结构，要抓住肱骨小结节和肱骨大结节两个骨性突起<br>• 肱二头肌长头腱走行于肱骨结节间沟<br>• 扫查过程中，应注意随时调整探头扫查角度，避免各向异性伪像<br><br><b>肩袖侧方附着点位置（钟点位）：</b><br><table><tr><th>钟点位</th><th>肩袖结构</th></tr><tr><td>9～11 点位</td><td>肩胛下肌腱（<b>前袖</b>）</td></tr><tr><td>11～1 点位</td><td>冈上肌腱（<b>袖顶位置</b>）</td></tr><tr><td>1～3 点位</td><td>冈下肌腱和小圆肌的联合肌腱（<b>后袖</b>）</td></tr></table><br>• 11 点位（喙突位置）和 1 点位（肩峰位置）相当于袖顶（冈上肌腱）的前后界", "tip": "11 点位（喙突）和 1 点位（肩峰）是袖顶（冈上肌腱）的前后界。", "tags": ["肌肉骨骼", "肩关节", "扫查"], "images": [["img_in_image_box_154_788_485_1233.jpg", "图6-1 肩胛下肌腱扫查体位及长轴切面"], ["img_in_image_box_193_284_539_713.jpg", "图6-2 冈上肌腱扫查体位及长轴切面"], ["img_in_image_box_190_888_635_1284.jpg", "图 6-3 冈下肌腱扫查体位及长轴切面"], ["img_in_image_box_262_716_885_1173.jpg", "图6-7 肩袖结构（肩关节侧方）"]], "chapter": "第6章 · 肩关节"}, {"no": "28-3", "title": "肩袖正常值与厚度", "question": "肩袖正常厚度和冈上肌腱与冈下肌腱超声鉴别方法是什么？", "answer": "<b>肌腱厚度：</b><br>• 正常肩袖结构前部较厚，向后逐渐变薄<br>• 肌腱厚度范围：0.5～1.2 cm<br>• 双侧对比差异在 0.2 cm 之内<br><br><b>临床要点：</b><br>• 多数肩袖病变发生在肌腱远端 1.5 cm 范围内<br>• <span class='highlight'>冈上肌腱是肩袖病变最易累及的肌腱</span><br>• 冈上肌腱肌腱病常合并肩峰下-三角肌下滑囊增厚或积液<br>• 冈上肌前部肌腹横断面面积大于后部肌腹，而其肌腱的横断面积小于后部肌腱<br>• 所以肩袖撕裂通常从冈上肌前部开始<br><br><b>冈上肌腱与冈下肌腱超声鉴别：</b><br>• 方法：横断面，冈上肌腱邻近肱二头肌长头腱处为冈上肌腱前缘<br>• 自此向后测量 <span class='highlight'>1.5～2.0 cm</span>，即为冈上肌腱与冈下肌腱的分界处<br>• 意义：判断冈上肌腱撕裂是否累及冈下肌腱", "tip": "冈上肌腱是肩袖病变最易累及的肌腱，撕裂多从前部开始。", "tags": ["肌肉骨骼", "肩关节", "肌腱厚度"], "images": [["img_in_image_box_192_605_537_1041.jpg", "图 6-8 冈上肌腱横断面扫查体位及声像图"], ["img_in_image_box_559_607_1040_1037.jpg", "图 6-8 冈上肌腱横断面扫查体位及声像图"]], "chapter": "第6章 · 肩关节"}, {"no": "28-4", "title": "结节间沟与肱二头肌长头腱", "question": "结节间沟解剖、肱二头肌长头腱固定结构和腱鞘积液的意义是什么？", "answer": "<b>结节间沟：</b><br>• 肱骨大结节和小结节之间的骨性凹陷<br>• 容有肱二头肌长头腱和脂肪组织，由致密的滑液鞘包被<br>• 肱骨大结节：圆隆，朝向前方<br>• 肱骨小结节：尖而突出，朝向外侧<br>• <span class='highlight'>结节间沟深度 &lt; 3 mm 则认为较浅，易导致肱二头肌长头腱脱位</span><br>• 结节间沟为超声鉴别肩胛下肌腱与冈上肌腱的标志性结构，内侧为肩胛下肌腱，外侧为冈上肌腱<br><br><b>肱二头肌长头肌腱固定结构（头侧至尾侧）：</b><br>1. 喙肱韧带<br>2. 盂肱上韧带<br>3. 肱横韧带和胸大肌韧带<br><br><b>临床要点：</b><br>• 肱二头肌长头腱的腱鞘与盂肱关节腔相通<br>• 故长头肌腱腱鞘内积液常提示盂肱关节内病变<br>• 正常肱二头肌长头肌腱腱鞘内可有少量液体<br>• <span class='highlight'>分布于肌腱内侧即小结节一侧视为正常</span><br>• 分布于大结节一侧或围绕长头腱时，则为病理性", "tip": "结节间沟深度 < 3 mm 易致肱二头肌长头腱脱位；腱鞘积液内侧分布视为正常。", "tags": ["肌肉骨骼", "肩关节", "肱二头肌长头腱"], "images": [["img_in_image_box_152_349_499_813.jpg", "图 6-4 肱二头肌长头腱扫查体位及长轴切面"], ["img_in_image_box_521_352_1002_811.jpg", "图 6-4 肱二头肌长头腱扫查体位及长轴切面"], ["img_in_image_box_564_227_1042_622.jpg", "图 6-5 结节间沟解剖结构"]], "chapter": "第6章 · 肩关节"}, {"no": "28-5", "title": "肩峰下三角肌下滑囊", "question": "肩峰下三角肌下滑囊的解剖、正常值和积液分布是什么？", "answer": "<b>解剖：</b><br>• 内衬大面积滑膜结构，<span class='highlight'>是人体最大的滑囊</span><br>• 上方：肩峰和喙肩韧带<br>• 底部：冈上肌腱与关节囊上部的愈合部<br>• 内侧：至喙突<br>• 前方：覆盖肱骨结节间沟<br><br><b>正常值：</b><br>• 正常肩峰下三角肌下滑囊厚度 &lt; 2 mm<br><br><b>积液分布：</b><br>• 肩峰下三角肌下滑囊出现积液时，多积聚于以下三部位之一：<br>1. 紧邻冈上肌腱止点的远侧<br>2. 上臂外旋时肩胛下肌腱的前方<br>3. 肱骨结节间沟的前方<br><br><b>名词解释：</b><br>• <b>肌腱</b>：将肌肉和骨相连的纤维状组织束<br>• <b>韧带</b>：由致密结缔组织构成，附着于骨骼的可活动部分<br>• <b>滑囊</b>：运动关节周围的结缔组织扁囊，有利于肌肉骨骼运动，减少肌肉和骨面的摩擦", "tip": "肩峰下三角肌下滑囊是人体最大的滑囊，正常厚度 < 2 mm。", "tags": ["肌肉骨骼", "肩关节", "滑囊"], "images": [["img_in_image_box_279_1019_939_1321.jpg", "图6-6 肩峰下滑囊解剖结构（图中显示为剖开的囊样结构）"]], "chapter": "第6章 · 肩关节"}, {"no": "29-1", "title": "肘关节解剖基础", "question": "肘关节构成、肘部骨性标志和伸肌/屈肌总腱的解剖是什么？", "answer": "<b>肘关节构成：</b><br>• 肱骨下端与尺、桡骨上端构成的复合关节<br>• 关节囊内包含三个关节：<br>1. <b>肱尺关节</b>：由肱骨滑车和尺骨滑车切迹构成<br>2. <b>肱桡关节</b>：由肱骨小头和桡骨头关节凹构成<br>3. <b>桡尺近侧关节</b>：由桡骨头环状关节面与尺骨桡切迹构成<br><br><b>肘部骨性标志：</b><br>• 尺骨鹰嘴：明显的中线突起（肘的\"隆起\"）<br>• 肱骨内上髁：肱骨下端内侧突起<br>• 肱骨外上髁：肱骨下端外侧突起<br><br><b>肘外侧 - 伸肌总腱：</b><br>• 前臂后群部分肌肉，包括桡侧腕长伸肌、桡侧腕短伸肌、指伸肌、小指伸肌、尺侧腕伸肌和旋后肌<br>• 均以伸肌总腱起自肱骨外上髁<br><br><b>肘内侧 - 屈肌总腱：</b><br>• 前臂前群部分肌肉，包括旋前圆肌、桡侧腕屈肌、掌长肌、尺侧腕屈肌和指浅屈肌<br>• 均以屈肌总腱起自肱骨内上髁", "tip": "肘关节囊内含肱尺、肱桡、桡尺近侧三个关节。", "tags": ["肌肉骨骼", "肘关节"], "images": [["img_in_image_box_153_1083_1002_1384.jpg", "图6-9 肘关节伸肌总腱扫查体位及长轴切面"], ["img_in_image_box_192_241_1039_561.jpg", "图 6-10 肘关节屈肌总腱扫查体位及长轴切面"], ["img_in_image_box_288_694_943_1052.jpg", "图 6-13 尺骨鹰嘴解剖结构"]], "chapter": "第6章 · 肘关节"}, {"no": "29-2", "title": "尺侧副韧带", "question": "尺侧副韧带解剖、功能和扫查要点是什么？", "answer": "<b>解剖：</b><br>• 位于肱骨内上髁、尺骨冠突及鹰嘴之间，由 3 条相互延续的带状结构组成：<br>1. <b>前束</b>：较强壮，起于内上髁，附着于冠突的内侧面，<span class='highlight'>伸肘时紧张</span><br>2. <b>后束</b>：起于内上髁后面，止于鹰嘴内缘，<span class='highlight'>屈肘时紧张</span><br>3. <b>斜束</b>：较薄弱，位于前束、后束尺骨附着部位之间<br><br><b>功能：</b><br>• <b>前束的功能：限制肘部过度外翻</b><br>• 肘部伸直位时对关节的稳定性起重要作用<br>• 前束也有人认为是由指浅屈肌蜕化而成<br><br><b>扫查要点：</b><br>• 与屈肌总腱相比，二者均附着区肱骨内上髁<br>• 尺侧副韧带附着点较前者低，韧带远端置于尺骨冠状突<br>• 位置偏于背侧，所以扫查时探头平面应较屈肌总腱平面向后偏转<br>• 尺侧副韧带前方为屈肌总腱<br>• 尺侧副韧带前束受各向异性伪像的影响，较屈肌总腱回声低<br>• <span class='highlight'>超声重点显示尺侧副韧带前束</span>，后束和斜束显示困难<br><br><b>临床要点：</b><br>• 任何使肘关节被动外翻、过伸动作都可造成尺侧副韧带损伤<br>• 屈肌总腱对尺侧副韧带提供动态支持，以抵抗外展张力", "tip": "尺侧副韧带前束伸肘时紧张，超声重点显示前束。", "tags": ["肌肉骨骼", "肘关节", "韧带"], "images": [["img_in_image_box_410_691_822_995.jpg", "图6-11 肘关节尺侧副韧带长轴切面"], ["img_in_image_box_288_1077_879_1481.jpg", "图 6-12 尺侧副韧带解剖结构"]], "chapter": "第6章 · 肘关节"}, {"no": "29-3", "title": "肘关节扫查与临床要点", "question": "肘关节超声扫查要点、神经支配和常见疾病是什么？", "answer": "<b>扫查要点：</b><br>• 超声主要关注的是伸肌总腱和屈肌总腱<br>• 这两条肌腱分别是前臂伸腕肌和屈腕肌的复合肌腱<br>• 抓住肱骨外上髁和内上髁两个骨性标志<br><br><b>肘关节的神经支配：</b><br>• <b>肌皮神经</b>：肱肌、肱二头肌<br>• <b>正中神经</b>：旋前圆肌<br>• <b>桡神经</b>：肱桡肌、肱三头肌<br>• <b>尺神经</b>：尺侧腕屈肌等<br>• <span class='highlight'>如桡神经损伤，屈肘将受到影响，患者前臂下垂，屈肘时手无法接近口部</span><br><br><b>肘部骨性标志位置变化：</b><br>• 伸展位时：肱骨内、外上髁与尺骨鹰嘴在同一条横线上<br>• 屈曲位时：三者组成一个等边三角形，内、外上髁连线为底，鹰嘴为顶<br><br><b>常见疾病：</b><br>• <b>肱骨外上髁炎（网球肘）</b>：伸肌总腱肌腱病<br>&nbsp;&nbsp;- 多由于伸肌总腱被频繁过度牵拉，导致部分腱纤维断裂<br>&nbsp;&nbsp;- 指伸肌腱及桡侧腕短伸肌腱是伸肌总腱的相对重要组成部分<br>&nbsp;&nbsp;- 指伸肌腱构成伸肌总腱浅层结构<br>&nbsp;&nbsp;- 桡侧腕短伸肌腱构成伸肌总腱深层结构<br>• <b>肱骨内上髁炎（高尔夫球肘）</b>：屈肌总腱腱病<br>&nbsp;&nbsp;- 发病机制与网球肘相似<br>&nbsp;&nbsp;- 为屈肌总腱止点处反复牵拉所致", "tip": "网球肘 = 肱骨外上髁炎（伸肌总腱）；高尔夫球肘 = 肱骨内上髁炎（屈肌总腱）。", "tags": ["肌肉骨骼", "肘关节", "临床"], "images": [["img_in_image_box_153_1083_1002_1384.jpg", "图6-9 肘关节伸肌总腱扫查体位及长轴切面"], ["img_in_image_box_192_241_1039_561.jpg", "图 6-10 肘关节屈肌总腱扫查体位及长轴切面"], ["img_in_image_box_288_694_943_1052.jpg", "图 6-13 尺骨鹰嘴解剖结构"]], "chapter": "第6章 · 肘关节"}, {"no": "29-4", "title": "正中神经与旋前圆肌", "question": "正中神经与旋前圆肌的解剖关系和旋前圆肌综合征是什么？", "answer": "<b>解剖：</b><br>• 正中神经从旋前圆肌的两个肌腹间穿过<br>• 旋前圆肌尺侧头将正中神经与尺动脉分开<br><br><b>临床要点：</b><br>• 旋前圆肌肥大或其中的腱束较粗大，可能造成正中神经卡压<br>• 又称<span class='highlight'>旋前圆肌综合征</span>", "tip": "旋前圆肌综合征 = 正中神经在旋前圆肌两个肌腹间受压。", "tags": ["肌肉骨骼", "肘关节", "神经卡压"], "images": [["img_in_image_box_192_241_1039_561.jpg", "图 6-10 肘关节屈肌总腱扫查体位及长轴切面"]], "chapter": "第6章 · 肘关节"}, {"no": "30-1", "title": "腕关节解剖基础", "question": "腕关节的定义和 8 块腕骨的分列是什么？", "answer": "<b>腕关节定义：</b><br>• 腕关节即桡腕关节，是指桡骨下端与第一排腕骨间的关节<br>• 由椭圆形窝及球面两部分组成：<br>&nbsp;&nbsp;- 窝：桡骨下端的关节面及关节盘的远侧面<br>&nbsp;&nbsp;- 球面：手舟骨、月骨和三角骨的近侧关节面共同组成<br><br><b>腕骨（共 8 块，排成两列）：</b><br>• <b>近侧列</b>：手舟骨、月骨、三角骨、豌豆骨<br>• <b>远侧列</b>：大多角骨、小多角骨、头状骨、钩骨", "tip": "腕骨 8 块分两列：近侧列手月三角豌，远侧列大小头钩。", "tags": ["肌肉骨骼", "腕关节", "解剖"], "images": [["img_in_image_box_151_1001_420_1304.jpg", "图 6-14 腕管扫查体位及横切面"], ["img_in_image_box_440_1001_1002_1308.jpg", "图 6-14 腕管扫查体位及横切面"]], "chapter": "第6章 · 腕关节及手部"}, {"no": "30-2", "title": "腕管解剖", "question": "腕管结构和内容物的识别标志是什么？", "answer": "<b>腕管结构：</b><br>• 腕掌侧的骨纤维管道，由屈肌支持带和腕骨共同构成<br>• 后壁近侧：手舟骨结节（桡侧）、豌豆骨（尺侧）<br>• 远侧：大多角骨（桡侧）、钩骨钩（尺侧）<br>• 前壁：屈肌支持带（腕横韧带）<br>• 腕管内容物：拇指和第 2～5 指屈肌腱、正中神经<br><br><b>腕管内结构识别：</b><br>• FCR：桡侧腕屈肌腱<br>• S：舟状骨<br>• MN：正中神经<br>• UA：尺动脉<br>• UN：尺神经<br>• P：豌豆骨<br>• FPL：拇长屈肌腱<br>• FDST：指浅屈肌腱<br>• FDPT：指深屈肌腱<br>• LU：月骨<br>• T：三角骨<br>• ↓：腕横韧带", "tip": "腕管内包含 9 条屈肌腱和正中神经。", "tags": ["肌肉骨骼", "腕关节", "腕管"], "images": [["img_in_image_box_151_1001_420_1304.jpg", "图 6-14 腕管扫查体位及横切面"], ["img_in_image_box_440_1001_1002_1308.jpg", "图 6-14 腕管扫查体位及横切面"], ["img_in_image_box_285_337_861_693.jpg", "图 6-16 腕管解剖结构"]], "chapter": "第6章 · 腕关节及手部"}, {"no": "30-3", "title": "伸肌管解剖", "question": "伸肌管的分组、Lister 结节定位和临床要点是什么？", "answer": "<b>伸肌管：</b><br>• 腕背部浅侧的伸肌支持带（腕背侧韧带）下有 9 个肌腱<br>• 均裹以滑膜鞘，经 6 个骨纤维管道达于手背<br>• 自外向内分别为：<br>1. <b>第 1 组</b>：位于桡骨远端外侧，内含拇长展肌腱和拇短伸肌腱<br>2. <b>第 2 组</b>：位于 Lister 桡侧，内含桡侧腕长、短伸肌腱<br>3. <b>第 3 组</b>：位于 Lister 尺侧，内含拇长伸肌腱及其腱鞘<br>4. <b>第 4 组</b>：内含第 2～5 指伸肌腱和示指伸肌腱<br>5. <b>第 5 组</b>：位于桡尺远侧关节处，内含小指伸肌腱及其腱鞘<br>6. <b>第 6 组</b>：位于尺骨茎突底部的附近骨沟内，内含尺侧腕伸肌腱及其腱鞘<br><br><b>Lister 结节：</b><br>• 伸肌管第 2 和第 3 管之间的一个骨性突起<br>• 是超声定位的有用标志<br>• 桡侧为第 2 组伸肌管，尺侧为第 3 组伸肌管<br>• Lister 结节有时可为沟槽形，此时拇长伸肌腱位于沟槽内，而不是其尺侧<br><br><b>临床要点：</b><br>• 第 4 管内伸肌支持带最厚，超声呈带状低回声<br>• <span class='highlight'>第 6 管内尺侧腕伸肌腱在类风湿关节炎中首先受累</span>", "tip": "Lister 结节是超声定位伸肌管的标志；第 6 管尺侧腕伸肌腱在类风湿中首先受累。", "tags": ["肌肉骨骼", "腕关节", "伸肌管"], "images": [["img_in_image_box_192_237_1040_577.jpg", "图 6-15 手背侧伸肌管扫查体位及横断面"], ["img_in_image_box_220_223_1004_1004.jpg", "图 6-17 伸肌管解剖结构"]], "chapter": "第6章 · 腕关节及手部"}, {"no": "30-4", "title": "腕管综合征", "question": "腕管综合征的定义、症状、超声表现和病因是什么？", "answer": "<b>定义：</b><br>• 腕管体积的减小或内容物的增加导致正中神经受压<br><br><b>典型症状：</b><br>• 正中神经支配区感觉障碍<br>• 患手桡侧 3 个半手指感觉异常，麻木刺痛<br>• 病程较长者，可见大鱼际肌萎缩<br><br><b>超声表现：</b><br>• 远侧腕管内正中神经受压变扁<br>• 近侧腕管内正中神经增粗（<span class='highlight'>&gt; 10 mm²</span>）<br>• 局部腕横韧带向掌侧隆起或增厚<br><br><b>病因：</b><br>• <b>腕管容积减小因素</b>：腕骨变异、腕横韧带增厚<br>• <b>腕管内容物增多因素</b>：腕部骨折、腕骨脱位、创伤性关节炎（骨赘形成）、肌肉变异、局部软组织肿物、滑膜增生、局部血肿等<br><br><b>流行病学：</b><br>• 腕管综合征多见于中年女性，约为男性的 5 倍", "tip": "腕管综合征正中神经截面积 > 10 mm² 是超声诊断关键指标。", "tags": ["肌肉骨骼", "腕关节", "腕管综合征"], "images": [["img_in_image_box_151_1001_420_1304.jpg", "图 6-14 腕管扫查体位及横切面"], ["img_in_image_box_285_337_861_693.jpg", "图 6-16 腕管解剖结构"]], "chapter": "第6章 · 腕关节及手部"}, {"no": "30-5", "title": "腕部其他重要结构", "question": "腕部掌侧肌腱、鼻烟窝和桡骨茎突狭窄性腱鞘炎是什么？", "answer": "<b>腕部掌侧肌腱：</b><br>• 强力握拳并屈曲桡腕关节时显示明显<br>• 桡动脉外侧：肱桡肌腱<br>• 桡动脉内侧（由外向内）：桡侧腕屈肌腱、掌长肌腱、指浅屈肌腱、尺侧腕屈肌腱<br><br><b>解剖学鼻烟窝：</b><br>• 外侧缘：拇长展肌腱和拇短展肌腱<br>• 内侧缘：拇长伸肌腱<br>• 底部：桡骨茎突尖、手舟骨、大多角骨及拇指掌骨底部<br>• 桡动脉由腕前经解剖学鼻烟窝至第 1 掌骨骨间隙<br><br><b>桡骨茎突狭窄性腱鞘炎（妈妈腕）：</b><br>• 拇长展肌腱和拇短伸肌腱总腱鞘（第 1 管）是手腕部发生腱鞘炎最多见部位<br>• 因常见于抱婴儿的患者，临床亦称\"<span class='highlight'>妈妈腕</span>\"<br>• 典型症状：握重物时腕关节疼痛加剧<br>• 超声表现：拇长展肌腱和拇短伸肌腱增粗，腱鞘增厚，增厚的腱鞘内可见血流信号", "tip": "妈妈腕 = 桡骨茎突狭窄性腱鞘炎（第 1 管拇长展+拇短伸总腱鞘）。", "tags": ["肌肉骨骼", "腕关节", "鼻烟窝"], "images": [["img_in_image_box_524_220_1000_651.jpg", "图 6-18 腕部掌侧肌腱"], ["img_in_image_box_245_805_901_1041.jpg", "图 6-19 鼻烟窝结构"]], "chapter": "第6章 · 腕关节及手部"}, {"no": "30-6", "title": "神经定位与临床要点", "question": "腕部神经走行、屈肌支持带和扫查要点是什么？", "answer": "<b>神经走行：</b><br>• 正中神经位于桡侧腕屈肌腱与掌长肌腱之间或掌长肌腱深方<br>• 尺神经及尺动脉位于指浅屈肌腱与尺侧腕屈肌腱之间，神经偏内侧<br><br><b>神经支配：</b><br>• 所有腕关节背伸肌均受桡神经支配<br>• 因此<span class='highlight'>桡神经损伤后，必然发生\"垂腕症\"</span><br><br><b>屈肌支持带：</b><br>• 由前臂深筋膜增厚而形成<br>• 从钩骨和豌豆骨延伸至舟骨和大多角骨<br>• 可保护腕弓，为指屈肌腱的重要支持带滑车，起保护正中神经的作用<br><br><b>扫查要点：</b><br>• 测量腕部及手指肌腱、滑膜和神经厚度时，声束应尽量垂直于检查结构，并进行双侧对比<br>• 腕管扫查时，探头声束平面应随时调整，确保声束与深方肌腱垂直，避免误认为腱鞘炎", "tip": "桡神经支配所有腕关节背伸肌，损伤后出现垂腕症。", "tags": ["肌肉骨骼", "腕关节", "神经"], "images": [["img_in_image_box_151_1001_420_1304.jpg", "图 6-14 腕管扫查体位及横切面"], ["img_in_image_box_220_223_1004_1004.jpg", "图 6-17 伸肌管解剖结构"]], "chapter": "第6章 · 腕关节及手部"}, {"no": "31-1", "title": "髋关节超声", "question": "髋关节解剖、前隐窝扫查和积液诊断标准是什么？", "answer": "<b>髋关节解剖：</b><br>• 髋关节：由髋臼和股骨头构成，髋臼周缘附有纤维软骨构成的髋臼唇<br>• 股骨大转子：股骨颈根部向外突出的粗糙隆起<br>• 股骨小转子：股骨颈根部向后内突出的隆起<br><br><b>髋前区：</b><br>• 关节前隐窝：位于髋关节囊与股骨颈之间，是显示髋关节积液的部位<br>• 前面的纤维层较后面纤维层厚，局部强化为髂股韧带<br><br><b>扫查方法：</b><br>• 髋关节前隐窝一般采用长轴切面<br>• 探头方向平行于股骨颈，相对人体长轴而言为斜矢状断面<br>• 髋关节相对位置深在，特别是关节前隐窝深达股骨颈水平<br>• 高频线阵探头往往不能满足穿透力要求<br>• 采用中频线阵探头或凸阵探头多能获得良好显像<br>• 凸阵探头虽然局部结构分辨力较差，但可以显示髋关节前方整体图像，<span class='highlight'>在引导关节前隐窝药物注射时最为有效</span><br><br><b>髋关节积液诊断标准：</b><br>• 关节前隐窝增厚 <span class='highlight'>≥ 7 mm</span> 提示髋关节积液<br>• 隐窝不对称扩张 ≥ 2 mm 提示髋关节积液<br>• 双侧对比扫查<br>• 超声所见前隐窝扩张并不能完全确诊为髋关节积液<br>• 增生的滑膜也可使前隐窝扩张而表现为低回声<br>• 可借助彩色和能量多普勒加以鉴别", "tip": "髋关节前隐窝 ≥ 7 mm 提示积液，凸阵探头最适合引导药物注射。", "tags": ["肌肉骨骼", "髋关节"], "images": [["img_in_image_box_191_509_531_925.jpg", "图6-20 髋关节前面扫查体位及长轴切面"], ["img_in_image_box_552_510_1042_925.jpg", "图6-20 髋关节前面扫查体位及长轴切面"], ["img_in_image_box_409_1066_823_1383.jpg", "图6-21 髋关节位置相对深在，改用凸阵探头显示关节前面整体"]], "chapter": "第6章 · 髋关节与膝关节"}, {"no": "31-2", "title": "髋外侧区（大转子与臀肌肌腱）", "question": "髋外侧大转子周围肌腱附着、臀肌结构和髋袖撕裂是什么？", "answer": "<b>大转子周围肌腱：</b><br>• <b>臀小肌肌腱</b>：大转子前部<br>• <b>臀中肌肌腱</b>：大转子外侧骨面、大转子后上骨面<br>• <b>臀大肌肌腱（髂胫束）</b>：大转子浅方<br><br><b>扫查方法：</b><br>• 髋关节外侧的臀肌肌腱附着于股骨大转子<br>• 超声扫查时采用横断面图像<br>• 识别大转子表面的骨性结构特征是超声显像的关键<br>• 大转子横断面图像呈屋脊样改变<br>• <span class='highlight'>屋脊的前坡附着于臀小肌肌腱，屋脊的后坡附着于臀中肌肌腱</span><br>• 二者的浅方为厚韧的髂胫束<br><br><b>臀肌结构（由浅入深）：</b><br>• <b>臀大肌</b>：起自髂嵴和坐骨背面，止于髂胫束和臀肌粗隆<br>• <b>臀中肌</b>：位于臀大肌深方，肌腱附着于股骨大转子外下和后上部<br>• <b>臀小肌</b>：位于臀中肌深方，肌腱附着于股骨大转子前侧<br>• 臀小肌最小，位置最深且靠前<br>• 臀中肌位于臀小肌外后方<br>• 臀大肌最大且最为表浅，位置最靠后<br><br><b>功能：</b><br>• 臀大肌：伸肌功能<br>• 臀中肌和臀小肌：外展肌功能<br>• 臀中肌和臀小肌肌腱合称为<span class='highlight'>髋部外展肌腱袖</span>，宛如肩部的肩袖肌肌腱<br><br><b>临床要点：</b><br>• 超声是评价臀中肌、臀小肌肌腱病理改变（\"髋袖撕裂\"）的有效方法<br>• 臀中肌前部肌腱病变最常见，臀小肌的病变最少见<br>• 扫查时应避免误将各向异性伪像和局灶性肌腱病、部分撕裂相混淆，应进行双侧对比扫查<br><br><b>大转子周围滑囊：</b><br>• <b>臀大肌转子囊</b>：大转子外侧臀大肌深面和臀中肌肌腱之间<br>• <b>臀中肌转子囊</b>：大转子外侧的前上部和臀中肌肌腱之间<br>• <b>臀小肌转子囊</b>：大转子前骨面与臀小肌肌腱之间", "tip": "臀中肌+臀小肌 = 髋部外展肌腱袖（髋袖），类似肩袖。", "tags": ["肌肉骨骼", "髋关节", "大转子"], "images": [["img_in_image_box_152_228_491_597.jpg", "图 6-22 髋关节外侧大转子区域扫查体位及横断面"], ["img_in_image_box_515_229_1001_598.jpg", "图 6-22 髋关节外侧大转子区域扫查体位及横断面"]], "chapter": "第6章 · 髋关节与膝关节"}, {"no": "31-3", "title": "梨状肌上下孔", "question": "梨状肌上孔和梨状肌下孔的内容物是什么？", "answer": "<b>梨状肌上孔：</b><br>• 梨状肌上缘与坐骨大孔之间空隙<br>• 由外向内依次有：<b>臀上神经、臀上动脉和静脉</b><br><br><b>梨状肌下孔：</b><br>• 梨状肌下缘与坐骨大孔之间空隙<br>• 由外向内依次有：<b>坐骨神经、股后皮神经、臀下神经、臀下动脉和静脉、阴部内动静脉及阴部神经</b>", "tip": "坐骨神经从梨状肌下孔穿出，是下肢最重要的神经通路。", "tags": ["肌肉骨骼", "髋关节", "解剖"], "images": [["img_in_image_box_191_509_531_925.jpg", "图6-20 髋关节前面扫查体位及长轴切面"]], "chapter": "第6章 · 髋关节与膝关节"}, {"no": "31-4", "title": "膝关节解剖", "question": "膝关节构成、股四头肌腱止点分层、髌腱和内侧副韧带是什么？", "answer": "<b>膝关节构成：</b><br>• 由股骨远端的内外侧髁、胫骨近端的内外侧平台、髌骨及关节内外的韧带组成<br>• 是人体活动范围最大、运动最复杂的负重关节<br><br><b>膝前侧：</b><br>• <b>股四头肌肌腱</b>：由股直肌、股内侧肌、股外侧肌和股中间肌的肌腱汇合而成<br>• 止于髌骨上缘，止点分为 3 层：<br>1. 浅层：股直肌肌腱<br>2. 中间层：股内、外侧肌肌腱<br>3. 深层：股中间肌肌腱<br>• <b>髌腱（髌韧带）</b>：为股四头肌肌腱的延续<br>&nbsp;&nbsp;- 上起自髌尖及其后方的粗面<br>&nbsp;&nbsp;- 下止于胫骨结节<br>&nbsp;&nbsp;- 中部为关节平面<br>&nbsp;&nbsp;- <span class='highlight'>髌腱厚度一般 &lt; 4 mm，宽度约 20 mm</span><br>&nbsp;&nbsp;- 从解剖学角度看，髌腱应被看作一个韧带（髌韧带）而不是肌腱<br><br><b>膝内侧：</b><br>• <b>内侧副韧带</b>：起自股骨内上髁，向下附着于内侧半月板、胫骨内侧髁<br>• 与关节囊及内侧半月板紧密结合<br>• 分两层：<br>1. <b>浅层</b>：较长，起于股骨内上髁顶部的收肌结节附近，止于胫骨上端内面，距胫骨关节面 7～10 cm<br>2. <b>深层</b>：较短，构成关节囊的一部分，即内侧关节囊韧带", "tip": "股四头肌腱止点分 3 层（直肌-内外侧肌-中间肌）；髌腱厚 < 4 mm。", "tags": ["肌肉骨骼", "膝关节", "解剖"], "images": [["img_in_image_box_152_449_405_853.jpg", "图 6-23 股四头肌肌腱扫查体位及长轴切面"], ["img_in_image_box_425_454_1002_853.jpg", "图 6-23 股四头肌肌腱扫查体位及长轴切面"], ["img_in_image_box_151_1001_358_1380.jpg", "图 6-24 髌腱扫查体位及长轴切面"], ["img_in_image_box_381_1002_1001_1380.jpg", "图 6-24 髌腱扫查体位及长轴切面"], ["img_in_image_box_192_225_1040_561.jpg", "图 6-25 内侧副韧带扫查体位及长轴切面"], ["img_in_image_box_366_277_783_823.jpg", "图 6-26 股四头肌解剖结构"]], "chapter": "第6章 · 髋关节与膝关节"}, {"no": "31-5", "title": "膝后侧（腘窝）", "question": "腘窝的边界、内容物和腘窝囊肿（Baker 囊肿）的特点是什么？", "answer": "<b>腘窝：</b><br>• 肌围成的菱形间隙，位于股骨远端及膝关节后方<br>• 内上界：半膜肌<br>• 外上界：股二头肌<br>• 内下、外下界：腓肠肌内、外侧头<br>• 顶部：皮肤及阔筋膜<br>• 底部：股骨腘面、膝关节囊及腘肌<br><br><b>腘窝内容物（由浅入深）：</b><br>1. 小隐静脉<br>2. 胫神经<br>3. 腓总神经<br>4. 腘静脉<br>5. 腘动脉<br>6. 淋巴结<br><br><b>腓肠肌：</b><br>• 腓肠肌为腘窝下界，有两头<br>• 内侧头：起自股骨内上髁<br>• 外侧头：起自股骨外上髁，在腘肌腱及外侧副韧带上方<br><br><b>腘窝囊肿（Baker 囊肿）：</b><br>• 与腓肠肌及半膜肌之间的滑膜囊的慢性扩大<br>• 常位于腓肠肌内侧头与半膜肌肌腱之间<br>• 囊肿可与关节腔相通<br>• 一般发生于腘窝的后内侧<br><br><b>腘窝囊肿形成原因：</b><br>• 导致膝关节腔内积液增加的任何因素：如骨性关节炎、半月板病变、关节内游离体等<br>• 炎性膝关节病变", "tip": "Baker 囊肿位于腓肠肌内侧头与半膜肌肌腱之间，常与关节腔相通。", "tags": ["肌肉骨骼", "膝关节", "腘窝"], "images": [["img_in_image_box_333_227_901_681.jpg", "图 6-27 腘窝解剖结构"]], "chapter": "第6章 · 髋关节与膝关节"}, {"no": "31-6", "title": "膝关节扫查与临床要点", "question": "膝关节扫查方法和临床要点是什么？", "answer": "<b>扫查方法：</b><br>• 膝关节周围结构位置表浅，常规高频探头能够满足扫查要求<br>• 按前、内、后、外四个区域进行扫查<br>• 膝关节应适度屈曲，以紧张股四头肌肌腱和髌腱<br>• 股四头肌肌腱深方与股骨之间为膝关节腔的髌上隐窝（髌上囊）<br>• 正常情况下可以有少量关节液<br>• 髌腱扫查时应结合短轴切面，以免漏诊<br>• 内侧副韧带扫查时，下肢外旋、关节适当屈曲<br><br><b>临床要点：</b><br>• 股四头肌为膝关节伸肌，且是<span class='highlight'>唯一的伸展膝肌</span><br>• 它是除臀大肌以外人体第 2 有力的肌肉<br>• 股四头肌肌腱断裂，多在髌上发生，常伴有关节囊撕裂<br>• 膝关节轻度屈曲位可减少股四头肌肌腱各向异性伪像的发生<br>• 髌腱断裂常发生于髌腱的髌骨附着处<br>• 内侧副韧带功能：保持关节稳定和调节关节活动，是限制膝外翻应力的主要结构<br>• 单发内侧副韧带损伤常见于下肢外侧直接暴力导致膝关节外翻不伴旋转", "tip": "股四头肌是唯一的伸展膝肌，轻度屈曲位可减少各向异性伪像。", "tags": ["肌肉骨骼", "膝关节", "临床"], "images": [["img_in_image_box_152_449_405_853.jpg", "图 6-23 股四头肌肌腱扫查体位及长轴切面"], ["img_in_image_box_151_1001_358_1380.jpg", "图 6-24 髌腱扫查体位及长轴切面"], ["img_in_image_box_192_225_1040_561.jpg", "图 6-25 内侧副韧带扫查体位及长轴切面"]], "chapter": "第6章 · 髋关节与膝关节"}, {"no": "32-1", "title": "踝关节解剖基础", "question": "踝关节构成、踝内侧屈肌腱（3 条）和踝管的内容物是什么？", "answer": "<b>踝关节构成：</b><br>• 距小腿关节：由胫、腓骨下端和距骨的滑车构成<br>• 关节周围有韧带与软组织加固<br><br><b>踝内侧 - 屈肌腱（3 条）：</b><br>• 自前向后为：胫骨后肌腱、趾长屈肌腱、踇长屈肌腱<br>• 分别由各自腱鞘包绕穿过踝管<br>• <b>胫骨后肌腱</b>：附着于舟骨结节，并向 3 个楔骨和第 1～4 跖骨的底延伸。它的作用为足内翻<br>• <b>趾长屈肌腱</b>：胫骨后肌腱外侧走行。进入足底后分为 4 个肌腱，止于趾骨远节<br>• <b>踇长屈肌腱</b>：3 条屈肌腱中最外侧一根，位于内踝偏后，进入足底，止于第 1 趾骨远节底部<br>• <span class='highlight'>胫骨后肌腱为内踝最粗的肌腱</span>，在远端呈扇形展开，主要止于足舟骨，可作为寻找足舟骨的标志<br>• 趾长屈肌腱内踝水平处直径约为胫骨后肌腱的 1/2<br><br><b>踝管：</b><br>• 由屈肌支持带与内踝、跟骨内侧面共同构成<br>• 其内自前向后依次容纳：胫骨后肌腱、趾长屈肌腱、胫后动静脉及胫神经、踇长屈肌腱<br>• 踝管是小腿后区与足底的重要通道<br>• 感染时可借踝管相互蔓延<br>• 某种原因压迫踝管内容物，形成<span class='highlight'>踝管综合征</span>", "tip": "胫骨后肌腱是内踝最粗的肌腱，是寻找足舟骨的标志。", "tags": ["肌肉骨骼", "踝关节", "解剖"], "images": [["img_in_image_box_152_710_998_1040.jpg", "图 6-28 距小腿关节内侧屈肌腱扫查体位及横断面"], ["img_in_image_box_239_1025_908_1354.jpg", "图 6-32 踝内侧屈肌腱解剖结构"]], "chapter": "第6章 · 距小腿关节"}, {"no": "32-2", "title": "踝外侧（腓肌腱 + 距腓前韧带）", "question": "踝外侧腓肌腱、距腓前韧带的解剖和临床要点是什么？", "answer": "<b>腓肌腱：</b><br>• 包括腓骨长肌腱和腓骨短肌腱<br>• 均位于外踝后部浅沟内<br>• 腓骨短肌腱位于腓骨长肌腱前方<br>• 二者近端共用一个腱鞘，远端分别有各自腱鞘<br>• <b>腓骨长肌腱</b>：止于第 1 跖骨和内侧楔骨<br>• <b>腓骨短肌腱</b>：止于第 5 跖骨基底部<br><br><b>外踝远端解剖：</b><br>• 外踝远侧跟骨上有一小骨性突起——腓骨肌滑车<br>• 它将腓骨长、短肌腱分开<br>• 上方为腓骨短肌腱，下方为腓骨长肌腱<br><br><b>距腓前韧带：</b><br>• 距小腿关节外侧 3 条独立的韧带之一<br>• 起自外踝前缘，向前内延伸，止于距骨颈外侧面<br>• 另外两条外侧副韧带为跟腓韧带及距腓后韧带<br><br><b>副腓骨：</b><br>• 腓骨长肌腱内有时可见一斑状强回声，后伴声影<br>• 其为副腓骨，是腓骨长肌腱的一籽骨<br>• 少部分正常人可出现，位于腓骨长肌腱骰骨部转向足底的转折处<br><br><b>临床要点：</b><br>• 腓骨肌腱撕裂多为纵向撕裂，并常累及腓骨短肌腱<br>• 原因常为腓骨肌腱半脱位、腓骨外侧骨刺及副腓骨肌腱<br>• <span class='highlight'>临床最常见的距小腿关节损伤为距腓前韧带损伤，约占 70%</span><br>• 严重损伤可致距腓前韧带和跟腓韧带同时损伤<br>• 单发距腓后韧带与跟腓韧带损伤较少见<br>• 距腓前韧带损伤可伴有关节囊的撕裂，导致距小腿关节腔积液，同时液体外溢至踝前外侧软组织内", "tip": "距腓前韧带损伤占踝关节损伤约 70%，是最常见的踝关节损伤。", "tags": ["肌肉骨骼", "踝关节", "腓肌腱"], "images": [["img_in_image_box_150_1173_515_1454.jpg", "图 6-29 距小腿关节外侧腓肌腱扫查体位及横断面"], ["img_in_image_box_537_1174_1002_1453.jpg", "图 6-29 距小腿关节外侧腓肌腱扫查体位及横断面"], ["img_in_image_box_193_225_1039_603.jpg", "图 6-30 距腓前韧带扫查体位及长轴切面"], ["img_in_image_box_283_497_961_860.jpg", "图 6-33 踝外侧腓肌腱解剖结构"]], "chapter": "第6章 · 距小腿关节"}, {"no": "32-3", "title": "踝后区（跟腱）", "question": "跟腱解剖、功能、血液供应和周围滑囊是什么？", "answer": "<b>跟腱解剖：</b><br>• 又称小腿三头肌腱<br>• 由腓肠肌腱和比目鱼肌腱合成<br>• 起于小腿中部，止于跟骨后结节中点<br>• <span class='highlight'>跟腱是身体最长最坚强的肌腱，长约 15 cm</span><br>• 由上而下逐渐变窄增厚，踝后区最窄甚厚，至跟骨结节上 4 cm 处向下渐展阔<br>• 跟腱前后径 5～6 mm，超声检查应在横切面测量，纵切面测量易倾斜而使数值增大<br><br><b>跟腱功能：</b><br>• 屈小腿，抬足跟，使距小腿关节跖屈，固定距小腿关节<br><br><b>跟腱血液供应：</b><br>• 跟腱无腱鞘，其远端背侧面、外侧面和内侧面由腱旁组织包绕，以利跟腱滑动，并提供血液供应<br>• <span class='highlight'>跟腱末端很少发生撕裂，因该部位接收来自骨膜血管的血液供应</span><br><br><b>跟腱周围滑囊：</b><br>• <b>跟骨后滑囊（跟腱囊）</b>：位于跟骨与跟腱之间<br>• <b>跟腱后滑囊（跟皮下囊）</b>：位于跟腱与足跟皮肤之间<br>• 跟骨后滑囊内可有少量积液，一般不超过 3 mm<br>• 跟腱后滑囊正常时超声无法显示，出现积液时可见<br><br><b>临床要点：</b><br>• 跟腱断裂常见于中年男性参加体育活动时<br>• 损伤部位多见于跟腱附着点上方 4～6 cm 处的乏血供区<br>• 跟腱完全断裂时，测量踝背屈及跖屈时跟腱断端之间的距离对于治疗方案的选择较重要", "tip": "跟腱断裂多发于附着点上方 4～6 cm 的乏血供区。", "tags": ["肌肉骨骼", "踝关节", "跟腱"], "images": [["img_in_image_box_191_731_1040_1033.jpg", "图 6-31 跟腱扫查体位及长轴切面"], ["img_in_image_box_246_222_905_799.jpg", "图 6-34 跟腱解剖结构"], ["img_in_image_box_333_761_905_1160.jpg", "图 6-35 跟腱囊与跟皮下囊解剖结构"]], "chapter": "第6章 · 距小腿关节"}, {"no": "32-4", "title": "踝关节扫查方法", "question": "踝关节各区（内侧、外侧、距腓前韧带、跟腱）扫查方法是什么？", "answer": "<b>踝内侧屈肌腱扫查：</b><br>• 关节适度外旋，可以使肌腱紧张<br>• 探头首先采取肌腱的横断面进行扫查<br>• 自内踝向后，依次排列为胫骨后肌腱、趾长屈肌腱和踇长屈肌腱<br>• 胫骨后肌腱最为粗大<br>• 踇长屈肌腱位置最靠后<br><br><b>踝外侧腓肌腱扫查：</b><br>• 关节适当内旋可紧张肌腱，易于扫查<br>• 同样首先采取肌腱的横断面扫查<br>• 声像图以外踝骨为标示，识别其后方的腓骨长、短肌腱<br>• 在外踝处，腓骨短肌腱位置较深，紧贴敷于骨表面<br><br><b>距腓前韧带扫查：</b><br>• 与腓肌腱扫查采用类似的内旋体位，使韧带紧张<br>• 探头一端置于外踝之上，另一端略指向足第 1 趾<br>• 可获得距腓前韧带的长轴切面声像图<br>• 韧带深方为距小腿关节侧隐窝，有时可见少量关节液<br><br><b>跟腱扫查：</b><br>• 采用俯卧自然下垂位或脚趾立于检查床，使跟腱紧张<br>• 探头直接接触扫查可以获得清晰的跟腱声像图<br>• 跟腱的跟骨附着处，肌腱纤维走行方向发生转折，出现低回声的各向异性伪像", "tip": "踝内侧外旋、踝外侧内旋可使肌腱紧张，便于扫查。", "tags": ["肌肉骨骼", "踝关节", "扫查"], "images": [["img_in_image_box_152_710_998_1040.jpg", "图 6-28 距小腿关节内侧屈肌腱扫查体位及横断面"], ["img_in_image_box_150_1173_515_1454.jpg", "图 6-29 距小腿关节外侧腓肌腱扫查体位及横断面"], ["img_in_image_box_193_225_1039_603.jpg", "图 6-30 距腓前韧带扫查体位及长轴切面"], ["img_in_image_box_191_731_1040_1033.jpg", "图 6-31 跟腱扫查体位及长轴切面"]], "chapter": "第6章 · 距小腿关节"}, {"no": "32-5", "title": "距小腿关节周围肌腱触诊", "question": "距小腿关节周围肌腱可触及对应动作是什么？", "answer": "<b>肌腱可触及对应动作：</b><br><table><tr><th>动作</th><th>肌腱</th></tr><tr><td>背屈</td><td>趾长伸肌腱、踇长伸肌腱</td></tr><tr><td>背屈并内翻</td><td>胫骨前肌腱</td></tr><tr><td>跖屈</td><td>跟腱</td></tr><tr><td>跖屈并外翻</td><td>胫骨后肌腱</td></tr><tr><td>外踝后面</td><td>腓骨长肌腱</td></tr></table><br><b>部分踇长屈肌腱腱鞘与距小腿关节相通：</b><br>• 故距小腿关节腔有积液时，可扩张至踇长屈肌腱腱鞘内", "tip": "跖屈并外翻可触及胫骨后肌腱，背屈并内翻可触及胫骨前肌腱。", "tags": ["肌肉骨骼", "踝关节", "肌腱触诊"], "images": [["img_in_image_box_152_710_998_1040.jpg", "图 6-28 距小腿关节内侧屈肌腱扫查体位及横断面"], ["img_in_image_box_150_1173_515_1454.jpg", "图 6-29 距小腿关节外侧腓肌腱扫查体位及横断面"], ["img_in_image_box_191_731_1040_1033.jpg", "图 6-31 跟腱扫查体位及长轴切面"]], "chapter": "第6章 · 距小腿关节"}];

function imgSrc(f){ return IMG_DATA[f] || (IMG_BASE + f); }
function escq(s){ return String(s).replace(/'/g, "\\'"); }

function buildGalleryHTML(images){
  if(!images || images.length === 0) return '';
  const figs = images.map(([f,c]) =>
    `<figure><img src="${imgSrc(f)}" alt="${c}" loading="lazy" decoding="async" onclick="openLightbox('${escq(imgSrc(f))}','${escq(c)}')" />`
    + `<figcaption>${c}</figcaption></figure>`
  ).join('');
  return `<div class="img-gallery">${figs}</div>`;
}

let currentIdx = 0;
let showingAnswer = false;

function groupByChapter(){
  const groups = [];
  const idxMap = {};
  cardsData.forEach((c,i) => {
    const ch = c.chapter || '未分类';
    if(idxMap[ch] === undefined){ idxMap[ch] = groups.length; groups.push({name:ch, items:[]}); }
    groups[idxMap[ch]].items.push({card:c, idx:i});
  });
  return groups;
}

function renderNav(){
  const navList = document.getElementById('nav-list');
  navList.innerHTML = '';
  if(NAV_BY_CARD){
    cardsData.forEach((c,i) => {
      const a = document.createElement('a');
