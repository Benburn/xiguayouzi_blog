const NAV_BY_CARD = false;
const cardsData = [{"no": "1-1", "title": "肝右叶最大斜径", "question": "成人肝右叶最大斜径的正常值是多少？标准切面如何获取？", "answer": "<b>正常值：</b><span class='highlight'>10~14 cm</span><br><br><b>标准切面：</b>仰卧位，探头（2.5~5.0 MHz）置于右肋缘下，声束指向右肩，深吸气后显示肝右静脉长轴汇入下腔静脉（第二肝门），可见弧度清晰的右膈肌。<br><br><b>测量方法：</b>肝表面至横膈内缘之间的最大垂直距离。<br><br><b>小儿参考：</b>新生儿 5.51±0.95 cm（前后径）→ 7~12岁 8.05±1.11 cm", "tip": "肝径线受高矮胖瘦、体位、呼吸影响较大，吸气时左叶较长/较薄，呼气时较短/较厚——必须在标准体位、标准断面上测量。", "tags": ["测量", "肝脏"], "images": [["img_in_image_box_192_747_606_1078.jpg", "图1-1A 标准切面"], ["img_in_image_box_627_746_1041_1078.jpg", "图1-1B 测量方法"]], "chapter": "第1章 · 肝脏"}, {"no": "1-2", "title": "肝左叶上下径及前后径", "question": "肝左叶上下径和前后径的正常值上限是多少？", "answer": "<b>正常值：</b><br>• 上下径（a）：<span class='highlight'>≤ 9.0 cm</span><br>• 前后径（b）：<span class='highlight'>≤ 6.0 cm</span><br><br><b>标准切面：</b>探头长轴置于剑突下略偏左，与腹壁垂直，声束指向腹后壁，显示肝左叶上方膈肌、肝左叶下角和后方腹主动脉长轴。<br><br><b>测量方法：</b><br>• 前后径：肝表面至腹主动脉前肝后缘的最大垂直距离<br>• 上下径：肝左叶顶部膈面至肝左叶下缘角的最大垂直距离", "tip": "肝右叶前后径、横径、上下径因标准断面标志不清或重复性差，一般不纳入常规测量范围。", "tags": ["测量", "肝脏"], "images": [["img_in_image_box_151_341_566_623.jpg", "图1-5A 肝左叶标准切面"], ["img_in_image_box_587_342_1001_623.jpg", "图1-5B 测量方法"], ["img_in_image_box_409_234_823_519.jpg", "图1-6 重要解剖结构"]], "chapter": "第1章 · 肝脏"}, {"no": "1-3", "title": "肝尾状叶测量", "question": "肝尾状叶增大的常见原因有哪些？", "answer": "<b>正常值（cm，x̄±s）：</b><br>• 男性：上下径 5.27±0.44，前后径 2.10±0.28，左右径 5.56±0.42<br>• 女性：上下径 5.30±0.46，前后径 1.97±0.24，左右径 5.34±0.39<br><br><b>测量方法：</b><br>• 纵切（IVC前/静脉韧带后）：上下径 + 前后径<br>• 横切：左右径——左侧界为静脉韧带，右侧界为下腔静脉", "tip": "尾状叶增大常见于：①Budd-Chiari 综合征 ②结节性肝硬化 ③肝良恶性肿瘤（原发/继发）。肝硬化时尾状叶代偿性肥大是影像学特征之一。", "tags": ["测量", "病理", "肝脏"], "images": [["img_in_image_box_151_1128_563_1406.jpg", "图1-8A 上下径/前后径"], ["img_in_image_box_589_1129_999_1401.jpg", "图1-8B 左右径"]], "chapter": "第1章 · 肝脏"}, {"no": "1-4", "title": "Couinaud 八段法", "question": "Couinaud 八段法的解剖学依据是什么？脏面观和膈面观的排列顺序？", "answer": "<b>解剖学依据：</b><br>• 肝静脉分支 = 分区分段的<span class='highlight'>界标</span><br>• 肝门静脉分支 = 分区分段的<span class='highlight'>示标</span><br><br><b>肝段记忆口诀：</b><br>• 脏面观：以 S1 为起始，<span class='highlight'>逆时针</span>依次排列至 S7（看不到 S8）<br>• 膈面观：以 S2 为起始，<span class='highlight'>顺时针</span>依次排列至 S8（看不到 S1）<br><br><b>分界标志：</b><br>• 左内/外叶：左叶间裂 + 肝左静脉近段 + 肝圆韧带 + 肝门静脉左支矢状部<br>• 尾状叶/左内叶：肝门静脉左支横部<br>• 尾状叶/左外叶：静脉韧带", "tip": "每一肝段接受独立的 Glisson 系统分支，可视为独立的外科切除单位。临床上可做最小范围切除以保留更多正常肝组织。", "tags": ["解剖", "肝脏"], "images": [["img_in_image_box_157_221_992_509.jpg", "图1-9 库氏肝分段+Glisson+肝静脉"], ["img_in_image_box_154_1091_1000_1404.jpg", "图1-10 肝-右肾纵断面"], ["img_in_image_box_169_224_564_505.jpg", "图1-13A 高位肝横断面"], ["img_in_image_box_171_1161_984_1455.jpg", "图1-15 经肝切迹横断面"]], "chapter": "第1章 · 肝脏"}, {"no": "1-5", "title": "三肝门解剖 + Glisson 系统", "question": "第一、二、三肝门的解剖位置和内容物是什么？", "answer": "<b>第一肝门（横沟）：</b><br>胆管、肝门静脉、肝固有动脉、淋巴管、神经的门户<br>前后排列：<span class='highlight'>胆管在前（最高）→ 门静脉左右支在后（分叉稍低）→ 肝固有动脉居中（分叉最低）</span><br><br><b>第二肝门：</b>肝膈面下腔静脉沟，肝静脉汇入下腔静脉处，位于第一肝门上方约 5 cm<br><br><b>第三肝门：</b>右后肝静脉和尾状叶小静脉出肝处，直接汇入下腔静脉<br><br><b>Glisson 系统：</b>肝门静脉 + 肝动脉 + 胆管，共同被结缔组织鞘（Glisson 膜）包裹", "tip": "", "tags": ["解剖", "肝脏"], "images": [["img_in_image_box_368_684_784_960.jpg", "图1-2 肝右叶切面解剖"], ["img_in_image_box_385_420_847_714.jpg", "图1-3 门静脉系统"], ["img_in_image_box_324_1115_909_1477.jpg", "图1-4 三支肝静脉与IVC"]], "chapter": "第1章 · 肝脏"}, {"no": "1-6", "title": "肝大判断标准", "question": "超声判断肝增大的标准是什么？", "answer": "<b>正常肝上界/下界：</b><br>• 正常肝上界：右锁骨中线第 5 肋间<br>• 平静呼吸时右肝下缘在肋下不能触及<br><br><b>肝增大评估标准：</b><br>1. 肝超过上述上/下界范围，且测量值明显增大<br>2. 肝右叶下缘超过右肾下极（Riedel 叶除外）<br>3. 肝下缘变钝<br>4. 肝左外叶向左延伸至脾上方", "tip": "肝形态不规则，同一部位声束稍倾斜测值即有不同。正常肝测量值受个体差异（高矮胖瘦）影响较大。", "tags": ["病理", "肝脏"], "images": [], "chapter": "第1章 · 肝脏"}, {"no": "1-7", "title": "粗大膈肌束（咳纹肝）", "question": "什么是咳纹肝？超声表现和鉴别要点是什么？", "answer": "<b>概念：</b>膈肌的腹侧与肝紧贴，膈肌束压迫肝表面可形成沟纹<br>发生率 <span class='highlight'>20%~25%</span>，右肝多见，可多发<br><br><b>超声表现：</b><br>1. 好发部位：右肝（多偏右外侧区），由前向后斜行<br>2. 长轴切面：强弱回声相间的多层条带样结构<br>3. 横切面：膈肌凸向肝内的强回声结节<br>4. 不典型者：略呈逗号样<br>5. 多发者：呈多发小帆形结构", "tip": "鉴别要点：呼吸加深时膈肌束体积可增大（与肝占位不同）。不典型者可表现为肝内中强回声结节，易误诊为肝内病变。扫查时平行于膈肌束可见两侧均有肝实质；垂直扫查则见短轴结节。", "tags": ["变异", "肝脏"], "images": [["img_in_image_box_168_835_566_1153.jpg", "图1-19A 膈肌束短轴切面"], ["img_in_image_box_587_836_984_1154.jpg", "图1-19B 膈肌束短轴"], ["img_in_image_box_382_1170_777_1458.jpg", "图1-19C 膈肌束长轴"], ["img_in_image_box_670_517_1016_763.jpg", "图1-20 咳纹肝"]], "chapter": "第1章 · 肝脏"}, {"no": "1-8", "title": "Riedel 叶", "question": "什么是 Riedel 叶？发生率是多少？", "answer": "<b>概念：</b>肝右叶下段呈舌样向足侧延伸，凸入右肾前方，达脐水平或以下<br><br><b>流行病学：</b><br>• 出现率 <span class='highlight'>1.2%</span><br>• <span class='highlight'>女性多见</span><br>• 胚胎期变异<br><br><b>超声表现：</b>右肝纵切：肝下缘远超出右肾下缘，呈舌样向下延伸（非锐角边缘）。一般于右肋弓下可触及，随呼吸运动下降。", "tip": "常被误诊为肿物或肾下垂。认识此变异可避免不必要的进一步检查。", "tags": ["变异", "肝脏"], "images": [["img_in_image_box_155_264_1001_549.jpg", "图1-21 Riedel叶与右肾关系"], ["img_in_image_box_153_660_474_983.jpg", "图1-22 Riedel叶超声表现"]], "chapter": "第1章 · 肝脏"}, {"no": "1-9", "title": "尾状叶乳头突", "question": "什么是肝尾状叶乳头突？需要与哪些疾病鉴别？", "answer": "<b>概念：</b>肝尾状叶左下部的圆形小突起<br>• 出现率约 <span class='highlight'>10%</span><br>• 部分人乳头突可下达小网膜囊，与肝总动脉、肝门静脉和胰颈部相邻<br><br><b>超声表现：</b><br>• 位置：肝左叶下缘背侧、肝总动脉和肝门静脉前上方、胰腺颈部上方<br>• 横切面：孤立卵圆形结构<br>• 纵切面：卵圆形或腰果形<br>• 大小：长径 2.0~3.0 cm", "tip": "鉴别诊断：①腹腔淋巴结肿大——乳头突回声与肝一致，CDFI 无血流，纵切时与尾状叶连接（扁圆形），超声造影三期均呈等增强；②胰头颈部占位——乳头突随呼吸上下移动（与肝同步），横切面时与胰腺不在同一切面。", "tags": ["变异", "肝脏", "鉴别"], "images": [["img_in_image_box_154_1121_1000_1448.jpg", "图1-23 乳头突(2D+彩色)"]], "chapter": "第1章 · 肝脏"}, {"no": "1-10", "title": "肝左叶缺如 + 獭尾肝", "question": "什么是肝左叶缺如？什么是獭尾肝？", "answer": "<b>肝左叶缺如：</b><br>原因（Battle 分类）：①肝动脉血供减少 ②出生时血栓形成导致肝门静脉左支栓塞 ③营养不良致血流优先到右叶<br>超声表现：胆囊窝左侧无肝组织，伴发肝右叶肥大和尾叶舌状突起，肝镰状韧带、肝圆韧带消失<br><br><b>獭尾肝：</b>肝左外叶细长，越过胃延伸至脾侧，形似水獭尾巴。多在左侧腹行脾扫查时发现。", "tip": "肝左叶缺如本身无临床意义，但可合并异常病变和影像学误诊。最常见并发：胃扭转；其他：胆石症、裂孔疝。獭尾肝应避免误诊为脾病变或脾破裂。", "tags": ["变异", "肝脏"], "images": [["img_in_image_box_191_1051_607_1359.jpg", "图1-24A 肝左叶缺如"], ["img_in_image_box_627_1052_1040_1359.jpg", "图1-24B 肝左叶缺如"], ["img_in_image_box_151_254_565_597.jpg", "图1-25A 獭尾肝"], ["img_in_image_box_587_254_999_596.jpg", "图1-25B 獭尾肝"]], "chapter": "第1章 · 肝脏"}, {"no": "1-11", "title": "肝移植后血管监测", "question": "肝移植术后超声监测的内容和测量部位是什么？", "answer": "<b>检查内容：</b><br>1. 肝动脉：流速、阻力指数（RI）、加速度时间（AT）<br>2. 肝门静脉：管径、管腔、管壁、血流充盈、方向、流速<br>3. 流出道：下腔静脉、肝静脉、桥静脉<br><br><b>测量部位（按术式）：</b><br>• 全肝移植：肝固有动脉 / 肝门静脉主干<br>• 右半肝移植：右肝动脉 / 肝门静脉右支<br>• 左半肝移植：左肝动脉 / 肝门静脉左支", "tip": "异常发现处理：速度或 RI 异常 → 扩大检查范围寻找狭窄（肝动脉、肝门静脉）；测量病变远端、近端及狭窄处血流参数；门静脉狭窄：测量狭窄处及狭窄前的血流速度。", "tags": ["移植", "肝脏"], "images": [], "chapter": "第1章 · 肝脏"}, {"no": "2-1", "title": "胆囊测量", "question": "胆囊的正常值是多少？长径和横径如何判断？", "answer": "<b>正常值：</b><br>• 长径 ≤ 9.0 cm<br>• <span class='highlight'>横径 ≤ 4.0 cm</span>（个体差异大，<b>以横径判断为主</b>）<br>• 胆囊壁厚度 ≤ 0.3 cm<br>• 儿童：长径 &lt; 7 cm，横径 &lt; 3.5 cm<br>• 1 岁以下婴儿：长径 1.5~3.0 cm<br>• 容量：40~60 ml<br><br><b>标准切面：</b>仰卧位（最常用）；左侧卧位约 45°提高肝外胆管显示率<br><br><b>测量细节：</b>体部或底部的前壁；声束垂直于胆囊壁；长径和横径均测内径<br><br><b>解剖要点：</b>胆囊分四部分——底、体、颈、管；<b>Murphy 点</b>（底：右腹直肌外缘与右肋弓交点）；<b>Hartmann 囊</b>（颈起始部略膨大，胆囊结石常嵌顿于此）；<b>Heister 瓣</b>（管内壁黏膜形成，防止胆囊管扭曲）；<b>Calot 三角</b>（胆囊动脉通过，胆囊手术标志）", "tip": "长径和横径均测<b>内径</b>（不包括胆囊壁）。", "tags": ["测量", "胆道"], "images": [["img_in_image_box_150_743_563_965.jpg", "图1-27A 胆囊长轴标准切面"], ["img_in_image_box_587_743_999_964.jpg", "图1-27B 胆囊短轴标准切面"]], "chapter": "第1章 · 胆道"}, {"no": "2-2", "title": "肝外胆管测量", "question": "肝外胆管正常值是多少？测量位置和标志是什么？", "answer": "<b>正常值：</b><br>• 肝外胆管/胆总管内径 ≤ <span class='highlight'>0.8 cm</span><br>• 肝左、右管内径 &lt; 0.3 cm，或 &lt; 伴行肝门静脉内径的 40%<br>• 婴幼儿胆总管内径 ≤ 0.2 cm<br>• 较大儿童胆总管内径 ≤ 0.4 cm<br><br><b>测量方法：</b><br>• 测量位置：肝外胆管<b>上段</b><br>• 标志：<b>肝右动脉跨越肝门静脉与胆管处</b>下方 1~2 cm<br>• 测量最宽纵切面管腔内径（<b>内缘—内缘</b>）<br>• 增加显示率方法：加压、饮水、左侧卧位、俯卧位<br><br><b>解剖分段（4 段）：</b>①十二指肠上段 ②十二指肠后段 ③胰腺段 ④十二指肠壁段<br><br><b>超声 3 段分法：</b>上段（近肝门）/ 中段（至胰头）/ 下段（胰头背侧及以下）", "tip": "实际工作中超声<b>不能严格区分</b>肝总管和胆总管 → 统称肝外胆管。", "tags": ["测量", "胆道"], "images": [["img_in_image_box_368_223_784_521.jpg", "图1-29 肝外胆管长轴切面"], ["img_in_image_box_369_1117_784_1398.jpg", "图1-30 肝外胆管长轴解剖结构"]], "chapter": "第1章 · 胆道"}, {"no": "2-3", "title": "米老鼠征（Mickey sign）", "question": "什么是超声中的米老鼠征？包括哪几种？", "answer": "<b>第一肝门米老鼠征：</b><br>由肝门静脉主干、肝外胆管上段、肝动脉的横切面组成<br><b>位置关系：</b>肝门静脉主干右前方 = 肝外胆管；左前方 = 肝动脉<br><br><b>另外两个米老鼠征：</b><br>1. <b>脐带横切面</b>：2 个小的脐动脉 + 1 个大的脐静脉<br>2. <b>露脑畸形</b>：胎儿双大脑半球向左、右分开，无侧脑室，冠状切面呈米老鼠征", "tip": "米老鼠征是超声解剖的形象记忆法，识别这些征象有助于快速定位结构。", "tags": ["解剖", "胆道", "征象"], "images": [["img_in_image_box_410_677_821_979.jpg", "图1-34 米老鼠征（肝门静脉、肝外胆管、肝动脉）"]], "chapter": "第1章 · 胆道"}, {"no": "2-4", "title": "胆道系统解剖知识", "question": "肝内胆管分级、胆汁流动和胆囊壁结构是什么？", "answer": "<b>肝内胆管分级：</b><br>1. <b>一级胆管</b>：肝左、右管（位于肝门静脉左、右支前方）<br>2. <b>二级胆管</b>：肝内各叶胆管<br>3. <b>三级胆管</b>：肝内各段胆管（一般不易显示）<br><br><b>胆汁流动：</b>胆汁生成 → 微胆管/胆小管 → 非消化期经肝管、胆囊管贮存于胆囊 → 消化期由肝或胆囊经胆总管排入十二指肠。流动取决于胆囊、胆管内压差和 Oddi 括约肌阻抗压<br><br><b>肝胰壶腹（Vater 壶腹）：</b>胆总管于十二指肠后内侧壁与胰管汇合形成的略膨大共同管道，开口于十二指肠大乳头<br><br><b>胆囊壁结构（3 层）：</b><br>1. <b>黏膜层</b>：高柱状上皮细胞，吸收功能<br>2. <b>肌层</b>：纵向、环状、斜形纤维肌层 + 弹性纤维<br>3. <b>浆膜层</b>：即腹膜脏层", "tip": "", "tags": ["解剖", "胆道"], "images": [["img_in_image_box_353_343_880_631.jpg", "图1-28 胆囊长轴及短轴切面重要解剖结构"], ["img_in_image_box_268_643_953_976.jpg", "图1-31 肝外胆管（上中下三段）"], ["img_in_image_box_357_1078_877_1484.jpg", "图1-32 胆管与肝门静脉的位置关系"], ["img_in_image_box_215_587_935_786.jpg", "图1-33 胆道系统"]], "chapter": "第1章 · 胆道"}, {"no": "2-5", "title": "胆管/胆囊内径变化的特殊情况", "question": "哪些情况下胆管/胆囊内径会发生变化？", "answer": "<b>胆管内径可发生变化的特殊情况：</b><br>1. 部分人深吸气时胆管管径较呼气时增大 1 mm 或更多<br>2. <span class='highlight'>65 岁以上</span>人群胆管内径可达 10 mm<br>3. <span class='highlight'>约 15% 胆囊切除术后</span>受检者胆总管内径可增至 10 mm<br>4. 胆囊切除术后或曾有胆道梗阻的患者 → 肝外胆管内径可增宽<br><br><b>胆囊大小变化：</b><br>• 胆囊大小有随年龄增长而<b>增大</b>的趋势<br>• 胆囊大小变化较大，<b>横径增大、张力高、压缩性差</b> → 提示病理改变", "tip": "老年或胆囊切除术后患者胆管扩张达 10 mm 不一定提示梗阻。", "tags": ["病理", "胆道"], "images": [], "chapter": "第1章 · 胆道"}, {"no": "2-6", "title": "胆囊超声伪像 + 胆囊壁增厚病因", "question": "胆囊常见超声伪像有哪些？胆囊壁增厚病因如何分类？", "answer": "<b>常见超声伪像：</b><br>1. <b>多重反射</b>：胆囊底部靠近腹壁时易出现<br>2. <b>旁瓣伪像</b>：酷似胆泥沉着于胆囊颈、体部<br>3. <b>部分容积效应</b>：胆囊邻近消化管气体及声影，看似位于胆囊腔内的结石<br>4. 减少伪像方法：改变体位/扫查方向、采用组织谐波显像技术<br><br><b>胆囊壁局限性增厚：</b>①胆囊腺肌症 ②胆囊癌<br><br><b>胆囊壁弥漫性增厚：</b>①进食后 ②胆囊炎 ③肝硬化 ④酒精性肝损害 ⑤急性肝炎 ⑥胆囊腺肌症 ⑦胆囊癌 ⑧腹水", "tip": "超声伪像需与真实病变鉴别，动态改变体位和扫查方向可减少误诊。", "tags": ["病理", "鉴别", "胆道"], "images": [], "chapter": "第1章 · 胆道"}, {"no": "2-7", "title": "超声与 ERC 肝外胆管测值差异因素", "question": "超声与 ERC 肝外胆管测值差异的因素有哪些？", "answer": "<b>影响因素：</b><br>1. <b>放射投影比例</b> → 肝外胆管测量值增大（ERC 偏大）<br>2. <b>混响伪像</b> → 肝外胆管壁增厚 → 低估管腔内径（超声偏小）<br>3. <b>ERC 注射造影剂</b>时使肝外胆管扩张<br>4. <b>测量部位不同</b>：超声测肝右管，ERC 测胆总管<br>5. <b>测量切面不同</b>：超声测前后径，ERC 测横径<br><br><b>临床提示：</b><br>• 写报告时若与既往 ERC/ERCP 对比，应注明测量部位与切面<br>• 胆囊切除术后肝外胆管 10 mm 以内<b>不一定是梗阻</b>", "tip": "与 ERC/ERCP 报告对比时，务必注明测量部位与切面。", "tags": ["鉴别", "胆道"], "images": [], "chapter": "第1章 · 胆道"}, {"no": "3-1", "title": "脾脏正常值（成人）", "question": "成人脾脏长径、宽径、厚径的正常值是多少？", "answer": "<b>脾正常值（x̄±s）：</b><br><table><tr><th>组别</th><th>长径(cm)</th><th>宽径(cm)</th><th>厚径(cm)</th></tr><tr><td>成年男</td><td>9.0 ± 1.1</td><td>5.5 ± 1.6</td><td>3.1 ± 0.6</td></tr><tr><td>成年女</td><td>8.5 ± 1.5</td><td>5.4 ± 1.5</td><td>2.9 ± 0.5</td></tr></table><br><b>关键判断值：</b><br>• <span class='highlight'>脾长径 &gt; 12 cm → 提示脾增大</span><br>• 正常脾前缘不超过腋前线，下缘不超过左肋缘<br>• <b>自身比较法</b>：正常脾长径不应大于左侧肾长径——更客观", "tip": "自身比较法（与左肾长径对比）比绝对值判断更客观。", "tags": ["测量", "脾脏"], "images": [["img_in_image_box_150_1118_566_1399.jpg", "图1-35A 脾肋间标准切面"], ["img_in_image_box_588_1120_1001_1398.jpg", "图1-35B 脾测量方法"]], "chapter": "第1章 · 脾脏"}, {"no": "3-2", "title": "0~20岁脾脏参考值（厚径）", "question": "0~20 岁小儿脾脏厚径的正常值范围是多少？", "answer": "<b>0~20岁脾测量参考值（cm）：</b><br><table><tr><th>年龄</th><th>中间值</th><th>范围</th><th>上限值</th></tr><tr><td>0~3个月</td><td>4.5</td><td>3.3~5.8</td><td>6.0</td></tr><tr><td>3~6个月</td><td>5.3</td><td>4.9~6.4</td><td>6.5</td></tr><tr><td>6~12个月</td><td>6.2</td><td>5.2~6.8</td><td>7.0</td></tr><tr><td>1~2岁</td><td>6.9</td><td>5.4~7.5</td><td>8.0</td></tr><tr><td>2~4岁</td><td>7.4</td><td>6.4~8.6</td><td>9.0</td></tr><tr><td>4~6岁</td><td>7.8</td><td>6.9~8.8</td><td>9.5</td></tr><tr><td>6~8岁</td><td>8.2</td><td>7.0~9.6</td><td>10.0</td></tr><tr><td>8~10岁</td><td>9.2</td><td>7.9~10.5</td><td>11.0</td></tr><tr><td>10~12岁</td><td>9.9</td><td>8.6~10.9</td><td>11.5</td></tr><tr><td>12~15岁</td><td>10.1</td><td>8.7~11.4</td><td>12.0</td></tr><tr><td>15~20岁（女）</td><td>10.0</td><td>9.0~11.7</td><td>12.0</td></tr><tr><td>15~20岁（男）</td><td>11.2</td><td>10.1~12.6</td><td>13.0</td></tr></table><br>（引自：Rosenberg HK, et al. AJR. 1991, 157:119）", "tip": "小儿脾脏大小随年龄变化大，应使用对应年龄段的参考值。", "tags": ["测量", "小儿", "脾脏"], "images": [], "chapter": "第1章 · 脾脏"}, {"no": "3-3", "title": "脾脏扫查方法", "question": "脾脏超声扫查的常用切面和测量方法是什么？", "answer": "<b>常用切面：</b><br>• <b>左肋间斜切面</b>（典型切面：脾呈半月形，显示实质、脾门及脾门血管）<br><br><b>测量方法：</b><br>• <b>厚径</b>：通过左肋间斜切面显示脾门及脾静脉，为脾门至脾对侧缘弧形切线的距离<br>• <b>长径</b>：通过左肋间斜切面显示脾最长径线，测量其上下端距离<br><br><b>解剖标志：</b>脾静脉、脾门是<b>最重要的超声解剖标志</b><br><br><b>扫查细节：</b><br>• 检查脾以<b>空腹</b>为佳，<b>不宜在饱餐后</b>进行<br>• 饱餐后脾过多向后上方移位<br>• 由于脾上部常被肺气遮盖形成盲区，<b>必须在患者适度深呼吸时获得最大声窗</b><br>• 脾萎缩时常规扫查难以显示，<b>俯卧位</b>扫查可有助于显示（与腹膜后肿瘤鉴别）<br><br><b>临床提示：</b>即便在正常范围，如果<b>出现边缘钝化</b>也应考虑脾增大", "tip": "空腹 + 适度深呼吸 = 最佳声窗。", "tags": ["扫查", "脾脏"], "images": [["img_in_image_box_150_1118_566_1399.jpg", "图1-35A 脾肋间标准切面（共用）"]], "chapter": "第1章 · 脾脏"}, {"no": "3-4", "title": "脾脏解剖知识", "question": "脾的位置、形态、毗邻和功能是什么？", "answer": "<b>位置与体表投影：</b>左季肋区，相当于第 9~11 肋深面的左侧膈肌和胃之间<br><b>形态：</b>卵圆形，重约 300 g<br><br><b>体表标志：</b><br>• 上极：腋中线相当于第 9 肋骨高度<br>• 下极：左腋前线和第 11 肋间<br>• 长轴：与左侧第 10 肋骨平行<br><br><b>毗邻关系：</b><br>• 前面：胃<br>• 后面：膈肌左侧部（将脾与胸膜、肺、肋骨分隔）<br>• 下方：结肠左曲<br>• 内侧：左肾<br><br><b>脾门：</b>脾脏面凹陷中央处，血管、神经、淋巴管出入之处<br><br><b>脾的功能：</b>人体最大的周围淋巴器官；过滤外周血液；脾质地柔软有弹性，血液充满静脉窦时脾体积增大", "tip": "", "tags": ["解剖", "脾脏"], "images": [["img_in_image_box_369_240_783_544.jpg", "图1-36 脾肋间切面重要解剖结构"]], "chapter": "第1章 · 脾脏"}, {"no": "3-5", "title": "脾大的常见原因", "question": "脾大的常见原因有哪些？", "answer": "<b>脾大病因分类：</b><br><br>1. <b>弥漫性肝病</b>：肝硬化、急性肝炎、慢性肝炎<br>2. <b>门静脉高压症</b>：<br>   • 特发性门静脉高压症<br>   • 门静脉血栓<br>   • 布-加综合征（Budd-Chiari）<br>   • 右心功能不全<br>3. <b>血液病</b>：白血病、恶性淋巴瘤、溶血性贫血、血小板减少性紫癜<br>4. <b>感染性疾病</b>：败血症、亚急性细菌性心内膜炎、伤寒、传染性单核细胞增多症、日本血吸虫病、疟疾", "tip": "遇到脾大，应结合肝病、血液病、感染等系统评估。", "tags": ["病理", "脾脏"], "images": [], "chapter": "第1章 · 脾脏"}, {"no": "3-6", "title": "脾大小的临床评估要点", "question": "脾大小的临床评估要点和影响因素有哪些？", "answer": "<b>肋下触诊分度：</b><br>• <b>轻度</b>：指尖刚能触及脾<br>• <b>中度</b>：可触及脾，但脾下极未超过脐水平线<br>• <b>重度</b>：脾下极超过脐水平线<br><br><b>关键概念：</b><br>• 一般认为，肋下触及脾时，脾大小已是正常的 2~3 倍<br>• <span class='highlight'>如果脾位置下移，即使不肿大也可能于肋下触及脾</span><br>• → <b>体格检查的脾大与超声检查的脾大概念不完全相同</b><br><br><b>脾大小的影响因素：</b><br>1. <b>脾动脉血流量和脾静脉压力</b>：<br>   • 血压升高、进食后 → 脾增大<br>   • 剧烈运动或饥饿后 → 脾缩小<br>2. <b>年龄影响</b>：65 岁前脾无太大变化，之后脾逐渐<b>缩小</b><br><br><b>副脾：</b>脾最常见的先天变异；由形成于背侧胃系膜上的孤立脾部分未能与脾融合所致", "tip": "体格检查的脾大与超声的脾大概念<b>不完全相同</b>，位置下移也可触及脾。", "tags": ["临床", "脾脏"], "images": [], "chapter": "第1章 · 脾脏"}, {"no": "3-7", "title": "脾脏超声鉴别诊断提示", "question": "脾脏超声中哪些情况易误诊为脾肿瘤？", "answer": "<b>易误诊为脾肿瘤的情况：</b><br>• 同一脾内，<b>上下两极</b>（尤其是下极）回声可比中部低或略高<br>• 加之脾内血管影响 → 易被误认为肿瘤<br>• 应注意鉴别（注意：副脾也有类似误诊风险）<br><br><b>超声检查优势切面：</b><br>• 左肋间斜切面（首选）<br>• 俯卧位（用于脾萎缩/与腹膜后肿瘤鉴别时）", "tip": "脾上下极回声不均易误诊为肿瘤，结合多切面多角度鉴别。", "tags": ["鉴别", "脾脏"], "images": [], "chapter": "第1章 · 脾脏"}, {"no": "4-1", "title": "胰腺长轴-切线测量法", "question": "胰腺长轴切线测量法如何操作？", "answer": "<b>测量法：</b><br>• 根据胰腺走行弯曲度，在前缘画出切线<br>• 在头、体、尾测量处（切点）做垂线测量胰腺厚度<br><br><b>测量位置：</b><br>• <b>胰头</b>：于<span class='highlight'>下腔静脉</span>前方测量，应清楚显示胰头内侧缘（脾静脉与肠系膜上静脉汇合处）<br>• <b>胰体</b>：于<span class='highlight'>肠系膜上动脉</span>（或腹主动脉）前方测量<br>• <b>胰尾</b>：在<span class='highlight'>腹主动脉左侧方或左前外侧</span>测量", "tip": "切线法更符合胰腺走行弯曲的实际形态。", "tags": ["测量", "胰腺"], "images": [["img_in_image_box_152_481_566_774.jpg", "图1-37A 胰腺长轴切线测量标准切面"], ["img_in_image_box_587_481_1001_775.jpg", "图1-37B 切线测量方法"]], "chapter": "第1章 · 胰腺"}, {"no": "4-2", "title": "胰腺长轴-最大前后径测量法", "question": "胰腺长轴最大前后径测量法如何操作？", "answer": "<b>测量法：</b><br>• <b>胰头</b>：在下腔静脉前方，<span class='highlight'>胰腺后缘中点向前引垂线至前缘</span><br>• <b>胰体</b>：在主动脉前方测量<br>• <b>胰尾</b>：在主动脉左侧方或左前外侧测量", "tip": "最大前后径法是测胰腺后缘中点到前缘的最大垂线距离。", "tags": ["测量", "胰腺"], "images": [["img_in_image_box_151_977_566_1273.jpg", "图1-38A 最大前后径测量标准切面"], ["img_in_image_box_587_975_1001_1271.jpg", "图1-38B 最大前后径测量方法"]], "chapter": "第1章 · 胰腺"}, {"no": "4-3", "title": "胰腺正常值（切线测量法）", "question": "切线测量法胰腺厚径的正常值是多少？", "answer": "<b>成年人胰腺厚径（cm）：</b><br><table><tr><th>部位</th><th>正常</th><th>可疑</th><th>增大</th></tr><tr><td>胰头（a）</td><td>&lt; 2.0</td><td>2.1~2.5</td><td>&gt; 2.6</td></tr><tr><td>胰体（b）、胰尾（c）</td><td>&lt; 1.5</td><td>1.6~2.0</td><td>&gt; 2.1</td></tr></table><br><b>小儿胰腺厚径（cm）：</b><br><table><tr><th>年龄（岁）</th><th>胰头</th><th>胰体</th><th>胰尾</th></tr><tr><td>0~6</td><td>1.6 (1.0~1.9)</td><td>0.7 (0.4~1.0)</td><td>1.2 (0.8~1.6)</td></tr><tr><td>7~12</td><td>1.9 (1.7~2.0)</td><td>0.9 (0.6~1.0)</td><td>1.4 (1.3~1.6)</td></tr><tr><td>13~18</td><td>2.0 (1.8~2.0)</td><td>1.0 (0.7~1.0)</td><td>1.6 (1.3~1.8)</td></tr></table><br>（引自：Colem BG et al. Radiology. 1983, 146-150）", "tip": "切线法中胰头和胰体尾的正常上限不同：胰头 &lt; 2.0，胰体尾 &lt; 1.5。", "tags": ["测量", "胰腺"], "images": [], "chapter": "第1章 · 胰腺"}, {"no": "4-4", "title": "胰腺正常值（最大前后径测量法）", "question": "最大前后径测量法胰腺的正常值是多少？", "answer": "<b>成年人胰腺前后径（cm）：</b><br><table><tr><th>部位</th><th>最大前后径（x̄±s）</th><th>95%位数</th></tr><tr><td>胰头（a）</td><td>2.2 ± 0.3</td><td>2.6</td></tr><tr><td>胰体（b）</td><td>1.8 ± 0.3</td><td>2.2</td></tr></table><br><b>0~19岁胰腺最大前后径（cm）：</b><br><table><tr><th>年龄组</th><th>胰头</th><th>胰体</th><th>胰尾</th></tr><tr><td>&lt;1个月</td><td>1.0 ± 0.4</td><td>0.6 ± 0.2</td><td>1.0 ± 0.4</td></tr><tr><td>1个月至1岁</td><td>1.5 ± 0.5</td><td>0.8 ± 0.3</td><td>1.2 ± 0.4</td></tr><tr><td>1~5岁</td><td>1.7 ± 0.3</td><td>1.0 ± 0.2</td><td>1.8 ± 0.4</td></tr><tr><td>5~10岁</td><td>1.6 ± 0.4</td><td>1.0 ± 0.3</td><td>1.8 ± 0.4</td></tr><tr><td>10~19岁</td><td>2.0 ± 0.5</td><td>1.1 ± 0.3</td><td>2.0 ± 0.4</td></tr></table>", "tip": "95% 位数是判断正常/可疑的重要界值。", "tags": ["测量", "胰腺"], "images": [], "chapter": "第1章 · 胰腺"}, {"no": "4-5", "title": "胰腺扫查方法", "question": "胰腺超声扫查前的准备、探头位置和特殊部位扫查方法是什么？", "answer": "<b>扫查前准备：</b><br>• 禁食 8~12 h（胃肠道气体减少，胰腺显示更清晰）<br><br><b>探头位置：</b><br>• 大部分胰腺<b>头低尾高</b> → 探头应向左上适当倾斜（与水平线呈 15°~30° 角）才能获得整个胰腺长轴断面<br>• 较胖体形/胰腺显示不理想者 → 饮水 500~1000 ml 后<b>坐位</b>和<b>右侧卧位</b>检查<br><br><b>特殊部位扫查：</b><br>• <b>胰钩突部</b>：纵向扫查，显示肠系膜上静脉后在其附近显示<br>• <b>胰尾部</b>：在左第 8~9 肋间<b>以脾为透声窗</b>，在脾门旁观察胰尾", "tip": "禁食 8~12 h + 饮水 500~1000 ml = 胰腺显示最清晰。", "tags": ["扫查", "胰腺"], "images": [["img_in_image_box_368_593_783_873.jpg", "图1-39 饮水后胰腺扫查"]], "chapter": "第1章 · 胰腺"}, {"no": "4-6", "title": "胰腺解剖知识", "question": "胰腺的位置、分部和毗邻关系是什么？", "answer": "<b>位置与形态：</b><br>• 位于腹上部左季肋区<b>腹膜后间隙</b>，紧贴腹后壁<br>• 平齐第 1、2 腰椎水平，横跨脊柱<br>• 一般胰尾部较胰头部偏高<br>• 表面覆盖腹膜，为<b>腹膜后位器官</b><br>• 位于胃和小网膜囊之后<br><br><b>胰腺分部：</b><br>• <b>头部</b>：胰腺膨大部，被 C 形十二指肠包绕至肠系膜上动、静脉的右侧<br>• <b>颈部</b>：胰头、体间的移行部位<br>• <b>体部</b>：位于正中线左侧<br>• <b>尾部</b>：胰体向左上方延伸，位于脾肾韧带内<br>• <b>钩突</b>：胰头下部向左下方凸出呈钩状<br><br><b>胰头后方结构：</b>下腔静脉、右肾动静脉、左肾静脉<br><br><b>胰体毗邻：</b>正上方为腹腔干；正下方为十二指肠空肠曲；前面为网膜囊后壁所覆盖；后面由右向左为腹主动脉、肠系膜上动脉起始部、左肾上腺、左肾血管（<b>脾静脉位于上述结构与胰腺之间</b>）<br><br><b>胰尾毗邻：</b>后方为左肾上腺及左肾；下方为结肠脾曲；前方为胃；左侧为脾门", "tip": "脾静脉位于胰体后方，是识别胰腺后缘的重要标志。", "tags": ["解剖", "胰腺"], "images": [["img_in_image_box_368_1187_784_1459.jpg", "图1-40 胰腺长轴测量切面重要解剖结构"], ["img_in_image_box_314_415_915_824.jpg", "图1-41 胰腺（头颈体尾分部）"]], "chapter": "第1章 · 胰腺"}, {"no": "4-7", "title": "胰管测量", "question": "胰管的正常值是多少？超声观察主胰管的最佳位置和原因是什么？", "answer": "<b>正常值（cm）：</b><br>• 胰管：正常 &lt; 0.2；可疑 0.2~0.3；异常 &gt; 0.3<br><br><b>胰管解剖：</b><br>• <b>主胰管</b>：通行于胰实质中心偏后；起自胰尾 → 横贯胰体 → 胰头后转向后下方达钩突；横行向右，与胆总管汇合成肝胰壶腹 → 开口于十二指肠乳头<br>• <b>副胰管</b>：短小且细；从胰头下部开始 → 经主胰管前面上行 → 与主胰管交通；单独开口于十二指肠乳头附近的小乳头<br><br><b>超声观察主胰管的要点：</b><br>• 建议超声探查主胰管在<b>胰颈部</b>最为适宜<br>• 原因：<br>  1. 胰颈后方为脾静脉和肠系膜上静脉汇成的肝门静脉 → 不会像胰体/尾部脾静脉嵌入胰腺可能被误认为扩大的主胰管<br>  2. 胰颈部主胰管较粗<br>  3. 胰颈前方为胃幽门部，幽门括约肌犹如实质结构 → 不会像胰头周围十二指肠和胰体/尾部前方胃内空气或食糜干扰探查主胰管<br><br><b>临床提示：</b><br>• 观察主胰管<b>超声优于 CT 和 MRI</b>——超声为薄层图像，能发现 0.2 cm 正常主胰管<br>• 胰管随年龄增长管腔逐渐增粗，有的管腔还可粗细不均，呈结节状或串珠状及小囊状扩张<br>• 老年人胰腺较年轻人小（50 岁以后逐渐萎缩）", "tip": "胰颈部是观察主胰管的最佳部位，因后方为门静脉汇合处、前方为幽门括约肌。", "tags": ["测量", "胰管", "胰腺"], "images": [["img_in_image_box_191_466_606_753.jpg", "图1-43A 胰管长轴标准切面"], ["img_in_image_box_628_467_1038_751.jpg", "图1-43B 胰管测量方法"]], "chapter": "第1章 · 胰腺"}, {"no": "4-8", "title": "胰腺变异与异常", "question": "胰腺形态变异、增大/萎缩的常见情况以及超声与 ERCP 胰管测值差异因素是什么？", "answer": "<b>胰腺形态变异：</b><br>• 约 1/4 人胰腺形态或位置有变异<br>• 常见形态：蝌蚪形、哑铃形、腊肠形<br><br><b>胰腺增大常见于：</b><br>1. <b>弥漫性</b>：急性胰腺炎、胰腺癌<br>2. <b>局限性</b>：胰腺癌、肿瘤、局限性胰腺炎<br><br><b>胰腺萎缩常见于：</b>慢性胰腺炎、高龄者<br><br><b>超声与 ERCP 胰管测量值差异因素：</b><br>1. 放射投影比例致 ERCP 胰管测量值增大<br>2. 超声上主胰管管壁为强回声<br>3. ERCP 检查时注射造影剂使主胰管扩张<br>4. 超声在正常生理状态下测量，ERCP 检查时患者需要服药", "tip": "约 1/4 人胰腺形态或位置有变异，不要把正常变异误认为病变。", "tags": ["病理", "变异", "胰腺"], "images": [["img_in_image_box_196_633_948_919.jpg", "图1-42 胰腺形态（蝌蚪/哑铃/腊肠形变异）"]], "chapter": "第1章 · 胰腺"}, {"no": "4-9", "title": "CT/MRI 与超声胰腺测量值差异", "question": "CT/MRI 与超声在胰腺测量值上有什么差异？为什么？", "answer": "<b>关键差异：</b><br>• 测量<b>胰体厚度</b>：CT 和 MRI 测量值比超声<b>大</b><br>• 测量<b>胰颈厚度</b>：CT 和 MRI 测量值与超声<b>近似</b><br><br><b>胰体差异原因：</b><br>1. CT 和 MRI 是断层，而超声图像是一个甚薄的图像<br>2. 超声先扫查到脾静脉后，再测其前方的胰体厚度 → 脾静脉深嵌入胰体后面 → 厚度变薄<br><br><b>胰颈相似原因：</b><br>• 胰颈后方有肠系膜上静脉，胰颈斜置其前，胰颈后方较平坦", "tip": "超声测胰体偏薄，是因为脾静脉嵌入胰体后方。", "tags": ["鉴别", "胰腺"], "images": [], "chapter": "第1章 · 胰腺"}, {"no": "5-1", "title": "胃的正常值", "question": "贲门管、胃壁厚度、幽门的正常值是多少？", "answer": "<b>贲门管：</b>内径 ≤ 1.5 cm（一般为 0.5~1.2 cm）<br><br><b>胃壁厚度：</b><br>• 空腹时胃底及高位胃体胃壁厚可达 <span class='highlight'>1.0 cm</span><br>• 胃充盈约 500 ml 造影剂时：<br>  • 胃体壁厚 0.3~0.5 cm<br>  • 胃窦壁厚 0.4~0.6 cm<br>• 胃窦和胃底部厚度 &lt; 胃体部<br>• 胃黏膜皱襞厚度：0.4~0.6 cm<br><br><b>幽门：</b><br>• 幽门开放时内径 0.2~0.4 cm<br>• 长度 0.5~0.8 cm<br><br><b>小儿幽门正常参考：</b><br>• 幽门管长度约 15 mm<br>• 幽门肌层厚度 &lt; 2 mm<br>• 3~4 mm：可疑异常<br>• <span class='highlight'>&gt; 4 mm：异常 → 考虑肥厚性幽门狭窄</span>（主要见于出生 2~10 周婴儿）", "tip": "小儿幽门肌层 &gt; 4 mm 提示肥厚性幽门狭窄。", "tags": ["测量", "胃"], "images": [], "chapter": "第1章 · 胃肠道"}, {"no": "5-2", "title": "胃的扫查方法", "question": "胃超声扫查顺序和测量细节是什么？", "answer": "<b>扫查顺序：</b><br>1. <b>剑突下纵切面</b>：观察胃前壁、后壁及胃小弯/大弯侧<br>2. <b>剑突下横切面</b>：以胃角切迹为中心，观察幽门侧和胃体<br>3. <b>左肋弓切面</b>：观察食管-胃底结合处的贲门部及胃底上部<br>4. <b>右上腹纵切面</b>：观察幽门部和收缩的幽门环及十二指肠壶腹部<br><br><b>测量细节：</b><br>• <b>贲门前后径</b>：贲门短轴切面前后壁最大垂直径<br>• <b>贲门左右径</b>：贲门短轴切面左右壁之间最大直径<br>• <b>胃壁厚度</b>：黏膜至浆膜层的垂直距离<br>• <b>幽门管内径</b>：幽门开放时长轴切面内径<br>• <b>黏膜皱襞厚度</b>：胃腔充盈后，凸入胃腔的黏膜皱襞厚度", "tip": "扫查胃需多切面结合，顺序：纵 → 横 → 左肋弓 → 右上腹。", "tags": ["扫查", "胃"], "images": [["img_in_image_box_187_222_1043_836.jpg", "图1-44 胃扫查顺序（剑突下/左肋弓等切面）"]], "chapter": "第1章 · 胃肠道"}, {"no": "5-3", "title": "胃的解剖知识", "question": "胃的分部、壁层结构和体表投影是什么？", "answer": "<b>胃的分部（解剖 4 部）：</b><br>1. <b>贲门部</b>：贲门为胃入口，与食管相接，周围区域为贲门部<br>2. <b>胃底</b>：贲门平面以上向左侧膨出部分，临床称<b>胃穹</b><br>3. <b>胃体</b>：胃底与幽门之间，约占整个胃的 2/3<br>4. <b>幽门部</b>：幽门为胃出口，与十二指肠相接；临床常称<b>胃窦</b>；分为左侧膨大的<b>幽门窦</b>和右侧管状的<b>幽门管</b><br><br><b>角切迹：</b>胃体和胃窦的分界标志，沿胃小弯约 2/3 处的转折角<br><br><b>胃壁结构（5 层，由内向外）：</b><br>①黏膜层 ②黏膜肌层 ③黏膜下层 ④肌层 ⑤浆膜层<br><br><b>体表投影：</b><br>• <b>贲门</b>：左侧第 7 肋软骨，距胸骨左缘外侧 2.5 cm；前为肝左叶，后为膈，右侧有胃左血管的食管支<br>• <b>幽门</b>：中线右侧 2.5 cm；前面为肝左内叶，后为胰头", "tip": "胃壁 5 层结构是超声观察胃壁的基础。", "tags": ["解剖", "胃"], "images": [["img_in_image_box_410_1041_822_1395.jpg", "图1-45 正常胃充盈造影剂声像图"]], "chapter": "第1章 · 胃肠道"}, {"no": "5-4", "title": "胃的超声表现与生理", "question": "胃壁回声特征、蠕动判断和溃疡显示要点是什么？", "answer": "<b>胃壁回声特征：</b><br>• 正常呈<span class='highlight'>三强两弱</span>的强弱相间回声：强-弱-强-弱-强<br>• 由内向外分别对应：黏膜层、黏膜肌层、黏膜下层、肌层、浆膜层和周围组织界面回声<br><br><b>胃肠生理性蠕动：</b><br>• 约 20 s 1 次，自胃体向幽门部呈节律性、对称性管壁收缩<br>• 蠕动波在声像图上呈小丘状隆起<br><br><b>蠕动判断：</b><br>• <b>正常</b>：蠕动 ≥ 2 次/分，或幅度不变<br>• <b>蠕动减弱</b>：蠕动 &lt; 2 次/分，或幅度减弱<br>• <b>蠕动消失</b>：未见蠕动或病变处蠕动中断<br><br><b>溃疡显示：</b><br>• 显像剂充盈良好时，常见直径 3~5 mm 的小溃疡<br>• 胃内容物残留过多、直径 &lt; 3 mm 的溃疡 → <span class='highlight'>易漏诊</span>", "tip": "胃壁五层回声 = 三强两弱，识别这个特征是基础。", "tags": ["超声", "胃"], "images": [], "chapter": "第1章 · 胃肠道"}, {"no": "5-5", "title": "肠道正常值（充盈状态）", "question": "十二指肠、小肠、结肠、阑尾的正常值是多少？", "answer": "<b>十二指肠：</b><br>• 壶腹部面积：3~6 cm²<br>• 十二指肠内径：2~4 cm<br><br><b>小肠：</b><br>• 管径 &lt; 3.0 cm<br>• 壁厚 &lt; 0.2 cm<br><br><b>结肠：</b><br>• 管径 &lt; 3.5 cm<br>• 壁厚 &lt; 0.3 cm<br><br><b>阑尾：</b><br>• 外径 &lt; 0.7 cm<br>• 长度 5~7 cm<br>• 位置：回盲瓣下 2.5~3.0 cm", "tip": "阑尾外径 ≥ 0.7 cm 常提示阑尾炎。", "tags": ["测量", "肠道"], "images": [], "chapter": "第1章 · 胃肠道"}, {"no": "5-6", "title": "肠道扫查方法", "question": "十二指肠、小肠、阑尾、大肠的扫查方法分别是什么？", "answer": "<b>十二指肠：</b><br>• 探头置于右上腹可获得壶腹部、降部及水平部完整声像图<br>• 升部切面不易显示<br><br><b>空肠、回肠：</b><br>• 走行纤曲，范围广，占据整个腹腔<br>• 小肠回声异常时，可于局部行多方位扫查<br>• 利用显像剂在小肠管腔充盈时的回声改变，结合运动、体位变换辨别<br><br><b>阑尾：</b><br>• 先用 3.0~3.5 MHz 凸阵探头对右下腹阑尾区探查<br>• 发现可疑异常回声区或最大压痛点后，选用 5 MHz 以上高频线阵探头扫查<br>• 清晰显示肿胀阑尾及阑尾周围情况<br><br><b>大肠检查顺序：</b><br>• 按显像剂走行：直肠 → 乙状结肠 → 降结肠 → 横结肠 → 升结肠 → 回盲瓣 → 盲肠（回盲部）→ 回肠末端", "tip": "阑尾扫查先用低频凸阵定位，再用高频线阵精细观察。", "tags": ["扫查", "肠道"], "images": [], "chapter": "第1章 · 胃肠道"}, {"no": "5-7", "title": "肠道解剖知识", "question": "小肠、大肠的组成和结构是什么？", "answer": "<b>小肠组成：</b><br>• 从十二指肠壶腹部至盲肠<br>• 上 2/5 为空肠，位于左上腹<br>• 下 3/5 为回肠，位于右下腹<br>• 分为无系膜的十二指肠和带系膜的空肠、回肠三部分<br>• <b>十二指肠分 4 部分</b>：壶腹部、降部、水平部、升部<br><br><b>小肠系膜：</b><br>• 空肠、回肠的肠系膜从第 2 腰椎左侧往下延伸至右下腹<br>• 跨过腹主动脉和下腔静脉至右骶髂关节<br>• 空肠、回肠在外观上区别不大，并无明显分界<br><br><b>大肠组成：</b><br>• 包括：盲肠、阑尾、结肠、直肠、肛管<br>• <b>盲肠</b>：长 6~8 cm，位于右髂窝，是大肠的起始部<br>• <b>回盲口</b>：回肠末端在盲肠的开口<br>• <b>回盲瓣</b>：回盲口上、下两片唇样黏膜皱襞；功能：控制回肠内容物流速、防止反流<br>• <b>回盲部</b>：临床将回肠末端 + 盲肠 + 阑尾合称<br><br><b>小肠壁的组织学（由内至外）：</b>黏膜层、肌层、浆膜层", "tip": "回盲瓣功能：控制回肠内容物流速、防止反流。", "tags": ["解剖", "肠道"], "images": [["img_in_image_box_410_809_822_1166.jpg", "图1-46 正常十二指肠充盈造影剂声像图"]], "chapter": "第1章 · 胃肠道"}, {"no": "5-8", "title": "肠道声像图特点", "question": "十二指肠、空肠、大肠的声像图特点分别是什么？", "answer": "<b>十二指肠声像图：</b><br>• 随幽门开放逐段充盈<br>• 壶腹部呈三角形或椭圆形<br>• 与胃窦部紧连，多位于胆囊的左后方<br>• 降部及水平部充盈后不如胃壁边界清楚<br>• 十二指肠壁（由内向外）：黏膜层（强）、黏膜肌层（低）、黏膜下层（强）、肌层（低）、浆膜层（高）<br><br><b>空肠声像图：</b><br>• 肠管内液体常以低回声为主<br>• 横切面酷似小结节（淋巴结）<br>• 纵切面酷似肠壁增厚<br>• 有时可见流动现象<br>• <b>难以和轻度扩张区分时的鉴别方法</b>：<br>  • 观察有无肠蠕动（实性结节/肠壁增厚无蠕动）<br>  • 局部加压手法：压瘪者为正常<br><br><b>大肠壁声像图（三强两弱回声）：</b><br>1. 较薄的强回声（腔内造影剂/水 + 肠黏膜表层界面，呈小锯齿状）<br>2. 较薄的弱回声（黏膜肌层）<br>3. <b>稍厚的强回声（黏膜下层，五层中最明显的一层）</b><br>4. 稍厚的弱回声（肌层）<br>5. 最外层强回声（浆膜及浆膜下脂肪组织）", "tip": "空肠与淋巴结/肠壁增厚鉴别：观察蠕动 + 局部加压。", "tags": ["超声", "肠道"], "images": [], "chapter": "第1章 · 胃肠道"}, {"no": "6-1", "title": "肾脏正常值（成人）", "question": "成人肾脏超声测量的标准切面和正常值是什么？", "answer": "<b>标准切面：</b><br>• 肾冠状切面（长径测量）<br>• 肾横切面（宽径、厚径、肾实质厚度、肾窦宽度测量）<br><br><b>正常值（cm）：</b><br><table><tr><th>指标</th><th>正常值</th></tr><tr><td>长径（a）</td><td>10.0～12.0</td></tr><tr><td>宽径（b）</td><td>4.0～5.0</td></tr><tr><td>厚径（c）</td><td>3.0～5.0</td></tr><tr><td>肾实质厚度（d）</td><td>1.0～2.0</td></tr><tr><td>肾皮质厚度</td><td>0.5～0.7</td></tr><tr><td>肾窦宽度（e）</td><td>占肾横断面宽度的 <span class='highlight'>1/2～2/3</span></td></tr></table><br><b>测量方法：</b><br>• 长径：沿肾轴方向，从肾上腺肾包膜处测至肾下极<br>• 宽径：旋转探头 90°，从肾门进入处测至肾横切面最凸点<br>• 厚径：通过横径中点且与其垂直的径线", "tip": "肾长径易低估，宽径、厚径易高估，必须在标准切面测量才可靠。", "tags": ["测量", "肾脏"], "images": [["img_in_image_box_191_640_606_919.jpg", "图2-1 肾冠状切面 (A.标准切面)"], ["img_in_image_box_628_640_1042_918.jpg", "图2-1 肾冠状切面 (B.长径测量方法)"], ["img_in_image_box_369_227_784_542.jpg", "图2-2 肾横切面 (A.标准切面)"]], "chapter": "第2章 · 肾脏"}, {"no": "6-2", "title": "小儿肾测量参考值", "question": "小儿肾脏长径/宽径/厚径的正常参考值范围是多少？", "answer": "<b>新生儿～6岁小儿肾测量参考值（cm，x̄±s）：</b><br>• 新生儿：长 4.4±0.4，宽 2.6±0.3，厚 1.8±0.2<br>• 1岁：长 6.5±0.3，宽 3.6±0.2，厚 2.7±0.3<br>• 3岁：长 6.8±0.4，宽 3.4±0.2，厚 2.9±0.2<br>• 6岁：长 7.6±0.4，宽 3.9±0.3，厚 3.2±0.2<br>• 12岁：长 8.9±0.6，宽 4.8±0.3，厚 3.6±0.2<br>• 17岁：长 10.5±0.5，宽 5.3±0.4，厚 4.5±0.4<br><br><b>小儿肾特点：</b><br>• 髓质锥体大而回声低<br>• 肾窦回声不如成人显著<br>• 肾表面呈分叶状（胎儿小叶痕迹）<br>• <span class='highlight'>2 岁后接近成人</span>", "tip": "小儿肾测量值随年龄变化大，必须按年龄段对照使用。", "tags": ["测量", "小儿", "肾脏"], "images": [], "chapter": "第2章 · 肾脏"}, {"no": "6-3", "title": "肾脏解剖知识", "question": "肾的位置、肾门、肾窦、被膜结构是什么？", "answer": "<b>位置：</b><br>• 左肾：第 11 胸椎下缘至第 2～3 腰椎间<br>• 右肾：低于左肾 1～2 cm，第 12 胸椎上缘至第 3 腰椎上缘<br>• 正常肾随呼吸上下移动 <span class='highlight'>2～3 cm</span><br><br><b>肾门与肾窦：</b><br>• 肾门：肾内侧缘中部凹陷，约第 1 腰椎水平<br>• 体表投影：腰背部竖脊肌外侧缘与第 12 肋夹角处<br>• 肾蒂自前向后：肾静脉→肾动脉→肾盂末端<br>• 肾蒂自上而下：肾动脉→肾静脉→肾盂<br>• 肾窦由肾血管、肾小盏、肾大盏、肾盂、脂肪组织占据<br><br><b>肾表面三层被膜：</b><br>1. 纤维膜：紧贴皮质的结缔组织膜<br>2. 脂肪囊：弹性垫样保护<br>3. 肾筋膜：分前后两层，固定作用", "tip": "肾脂肪囊与肝、脾做相对运动（与肾一起呼吸运动），可作为超声分界标志。", "tags": ["解剖", "肾脏"], "images": [["img_in_image_box_368_417_784_686.jpg", "图2-3 肾脂肪囊、肾筋膜"], ["img_in_image_box_270_251_963_351.jpg", "图2-4 肾、肝、脾三者回声比较"]], "chapter": "第2章 · 肾脏"}, {"no": "6-4", "title": "肾大小变化的临床意义", "question": "肾增大和肾萎缩的常见原因是什么？", "answer": "<b>肾增大常见于：</b><br>1. 急性肾炎<br>2. 肾病综合征<br>3. 肾盂肾炎<br>4. 肾肿瘤<br>5. 肾积水<br>6. 多囊肾<br>7. 炎性或浸润性病变<br>8. 肾静脉血栓形成<br><br><b>肾萎缩常见于：</b><br>1. 慢性肾衰竭<br>2. 肾发育不良<br><br><b>急性/慢性肾衰鉴别：</b><br>• 肾正常大小 → 多提示急性肾衰<br>• 肾缩小 → 常与慢性肾病有关<br>• 左肾略大于右肾，但相差 <span class='highlight'>≤ 2 cm</span><br><br><b>测量细节：</b><br>• 嘱受检者深吸气后屏气，图像稳定后冻结测量<br>• 必须在标准切面测量才可靠", "tip": "评估肾大小是肾超声检查的重要组成部分。", "tags": ["病理", "肾脏"], "images": [["img_in_image_box_191_640_606_919.jpg", "图2-1 肾冠状切面 (A.标准切面)"], ["img_in_image_box_369_227_784_542.jpg", "图2-2 肾横切面 (A.标准切面)"]], "chapter": "第2章 · 肾脏"}, {"no": "6-5", "title": "肾柱肥大 + 幼儿肾特点", "question": "什么是肾柱肥大？幼儿肾的声像图特点是什么？", "answer": "<b>肾柱肥大：</b><br>• 与皮质无分界的低回声团突入肾窦<br>• 回声因切面不同可略高或略低于皮质<br>• CDFI 显示其内有弓状动脉<br>• 形成原因：胚胎期肾叶融合发育，形成肥大肾柱<br>• <span class='highlight'>位置：常位于肾门对侧</span><br><br><b>临床意义：</b><br>• 易误诊为肾肿瘤<br>• <b>CDFI 显示弓状动脉是关键鉴别点</b><br><br><b>新生儿及幼儿肾特点：</b><br>• 皮、髓质差别明显<br>• 髓质锥体大而回声低<br>• 肾窦回声不如成人显著<br>• 肾表面呈分叶状（胎儿小叶痕迹）<br>• <b>2 岁后接近成人</b>", "tip": "CDFI 显示弓状动脉是鉴别肾柱肥大与肾肿瘤的关键。", "tags": ["变异", "小儿", "肾脏"], "images": [["img_in_image_box_410_743_822_1045.jpg", "图2-5 肾柱肥大"], ["img_in_image_box_270_251_963_351.jpg", "图2-4 肾、肝、脾三者回声比较"]], "chapter": "第2章 · 肾脏"}, {"no": "6-6", "title": "移植肾血管监测", "question": "移植肾超声监测的内容和 CDFI 检查要点是什么？", "answer": "<b>二维图像：</b><br>• 移植肾的形态、大小<br>• 皮质回声是否均匀<br>• 集合系统是否分离<br>• 输尿管是否扩张<br>• 移植肾周围有无异常<br>• 检查原肾和膀胱情况<br><br><b>CDFI：</b><br>• 肾血管分布<br>• 脉冲多普勒检测吻合口、主肾动脉、上中下段动脉、叶间动脉的峰值流速及阻力指数<br>• <b>可疑血管狭窄时</b>：需测量狭窄远段收缩期加速度时间及加速度<br><br><b>CEUS（超声造影）：</b><br>• 有助于评价移植肾梗死及实质灌注", "tip": "移植肾 CDFI 评估需常规测量各级动脉的流速及 RI。", "tags": ["移植", "肾脏"], "images": [], "chapter": "第2章 · 肾脏"}, {"no": "6-7", "title": "肾上腺", "question": "肾上腺的正常值、形态和扫查方法是什么？", "answer": "<b>正常值（cm）：</b><br>• 长：4.0～6.0<br>• 宽：2.0～3.0<br>• 厚：0.2～0.8<br><br><b>形态：</b><br>• 成对腹膜后器官，薄片状<br>• 右肾上腺：多呈三角形<br>• 左肾上腺：多呈半月形<br><br><b>扫查方法：</b><br>• 纵切：探及肾长轴后向内移动至消失处<br>• 横切：横切扫查后向头侧移动至消失处<br>• <b>左肾上腺显示率低</b>，采用右侧卧位，利用脾为透声窗冠状切面<br><br><b>解剖：</b>3 层似三明治（皮质-髓质-皮质）<br><br><b>动脉血供：</b><br>1. 肾上腺中动脉（腹主动脉）<br>2. 肾上腺上动脉（膈下动脉）<br>3. 肾上腺下动脉（肾动脉）", "tip": "新生儿肾上腺相对较大（约肾的 1/3），肺癌/乳腺癌患者须注意检查两侧肾上腺（血行转移多）。", "tags": ["解剖", "肾脏", "肾上腺"], "images": [["img_in_image_box_194_222_1041_485.jpg", "图附2B-1 正常成年人肾上腺 (A.右肾上腺；B.左肾上腺)"]], "chapter": "第2章 · 肾脏"}, {"no": "7-1", "title": "输尿管正常值与扫查", "question": "输尿管内径的正常值和扫查方法是什么？", "answer": "<b>正常值：</b><br>• 目前尚无统一标准<br>• 多数学者认为：<b>输尿管内径 0.5～0.7 cm</b><br>• 狭窄部内径约 0.2 cm<br><br><b>扫查方法：</b><br>1. <b>侧腰部探查</b>：获得肾长轴断面后，自肾盂向下追踪至肾盂输尿管连接部；如有扩张，沿扩张的输尿管向下追踪<br>2. <b>充盈膀胱</b>：对双侧输尿管开口部及膀胱壁段进行观察<br>3. <b>下腔静脉/腹主动脉外侧 1～2 cm 处</b>：寻找有无扩张的输尿管，向上或向下追踪", "tip": "充盈膀胱可更好地显示输尿管开口部和膀胱壁段。", "tags": ["测量", "输尿管"], "images": [["img_in_image_box_410_223_822_546.jpg", "图2-6 输尿管长轴"]], "chapter": "第2章 · 输尿管"}, {"no": "7-2", "title": "输尿管解剖", "question": "输尿管全长多少？分几段？有几个狭窄？", "answer": "<b>全长 20～34 cm，分 3 段：</b><br>1. <b>腹部（上段）</b>：起自肾盂输尿管连接部，止于跨越髂总动脉处<br>2. <b>盆段（中段）</b>：起自髂总动脉前方，达膀胱后壁<br>3. <b>膀胱壁段（下段）</b>：斜穿膀胱壁，止于输尿管口处<br><br><b>3 个狭窄处（内径约 0.2 cm）：</b><br>1. 输尿管与肾盂连接处<br>2. 输尿管跨越髂总动脉或髂外动脉处<br>3. 膀胱壁内段", "tip": "3 个狭窄是结石好发部位和生理性梗阻点。", "tags": ["解剖", "输尿管"], "images": [["img_in_image_box_410_223_822_546.jpg", "图2-6 输尿管长轴"]], "chapter": "第2章 · 输尿管"}, {"no": "7-3", "title": "输尿管喷尿与结石好发部位", "question": "输尿管喷尿的多普勒特征和结石好发部位是什么？", "answer": "<b>输尿管喷尿：</b><br>• 输尿管管口的喷尿状态可间接反映输尿管的通畅程度或蠕动功能<br>• 尿流正常最高流速：<b>（31.8 ± 15.3）cm/s</b><br>• 平均流速：<b>（20.0 ± 10.2）cm/s</b><br>• 持续时间：<b>（2.5 ± 1.3）s</b><br><br><b>结石好发部位：</b><br>• 结石主要位于输尿管 <b>3 个生理狭窄部</b><br>• 输尿管肿瘤或转移性肿瘤压迫则可发生于任何部位<br>• <b>重点应在扩张的输尿管中断处仔细寻找</b>", "tip": "CDFI 显示输尿管喷尿可帮助评估通畅性。", "tags": ["测量", "解剖", "输尿管"], "images": [["img_in_image_box_410_223_822_546.jpg", "图2-6 输尿管长轴"]], "chapter": "第2章 · 输尿管"}, {"no": "7-4", "title": "输尿管扫查注意事项", "question": "输尿管超声扫查的观察内容和影响因素有哪些？", "answer": "<b>超声观察内容：</b><br>• 观察输尿管走行有无扩张、狭窄、梗阻<br>• 输尿管管腔内及其周围有无肿物、结石等异常回声<br>• 超声探查输尿管应<b>常规检查肾和膀胱</b><br><br><b>影响输尿管显示的因素：</b><br>• 输尿管膀胱壁段的病变可因充盈膀胱后方回声过强而被掩盖 → 适当抑制远场增益可得到改善<br>• 肠气干扰会影响输尿管腹段病变的超声探查 → 应结合其他检查以免漏诊<br><br><b>探头加压扫查：</b><br>• 排开肠管干扰 + 缩短探头与输尿管距离，提高图像质量<br>• 体型较瘦者过分加压可使扩张的输尿管压痕，不能显示", "tip": "探头加压要适度，体型较瘦者避免过压。", "tags": ["扫查", "输尿管"], "images": [["img_in_image_box_410_223_822_546.jpg", "图2-6 输尿管长轴"]], "chapter": "第2章 · 输尿管"}, {"no": "8-1", "title": "膀胱正常值", "question": "膀胱残余尿量、膀胱壁厚度和膀胱容量的正常值是什么？", "answer": "<b>残余尿量：</b><br>• 残余尿量 < 10 ml<br>• 计算方法：<b>0.52 × a 上下径 × b 前后径 × c 左右径</b><br>• <span class='highlight'>> 30 ml 提示病理状态</span><br><br><b>膀胱壁厚度：</b><br>• 正常膀胱壁（适度充盈时）厚度 < 4 mm<br><br><b>膀胱容量：</b><br>• 正常成年人膀胱容量为 <b>350～500 ml</b>", "tip": "超声测量残余尿量不如导尿准确，但简单易行，可反复测定。", "tags": ["测量", "膀胱"], "images": [["img_in_image_box_152_850_566_1106.jpg", "图2-7 膀胱横切面（标准横切测量）"], ["img_in_image_box_587_850_1000_1105.jpg", "图2-7 膀胱纵切面（标准纵切测量）"], ["img_in_image_box_731_221_988_449.jpg", "图2-8 膀胱壁厚度测量"]], "chapter": "第2章 · 膀胱"}, {"no": "8-2", "title": "膀胱扫查方法", "question": "膀胱超声经腹壁和经直肠扫查的方法是什么？", "answer": "<b>经腹壁：</b><br>• 充盈膀胱，于耻骨联合以上做纵、横、斜切面移动扫查<br>• 观察膀胱壁有无局限性增厚、膀胱腔内有无异常回声<br>• 取膀胱最大横切面测量膀胱腔左右径、前后径<br>• 取膀胱最大纵切面测量上下径<br><br><b>经直肠：</b><br>• 排净大便，适度充盈膀胱<br>• 随手法转动探头，可做纵向、横向和斜冠状扫查<br><br><b>膀胱壁厚度测量：</b><br>• 自膀胱壁外层（浆膜层）的外缘，测至内层（黏膜层）的内缘", "tip": "经腹壁扫查需膀胱充盈良好，经直肠扫查无需充盈膀胱。", "tags": ["扫查", "膀胱"], "images": [["img_in_image_box_152_850_566_1106.jpg", "图2-7 膀胱横切面"], ["img_in_image_box_587_850_1000_1105.jpg", "图2-7 膀胱纵切面"], ["img_in_image_box_731_221_988_449.jpg", "图2-8 膀胱壁厚度测量"]], "chapter": "第2章 · 膀胱"}, {"no": "8-3", "title": "膀胱解剖知识", "question": "膀胱的分部、膀胱三角区、膀胱壁结构是什么？", "answer": "<b>膀胱壁（自外向内）：</b><br>1. 浆膜层<br>2. 肌层<br>3. 黏膜下层<br>4. 黏膜层<br><br><b>膀胱分四部分：</b><br>• <b>膀胱尖</b>：朝向前上方<br>• <b>膀胱体</b>：尖与底之间部分<br>• <b>膀胱底</b>：膀胱后下部分，呈三角形<br>• <b>膀胱颈</b>：最下部变细部分，尿道内口位于此<br><br><b>膀胱三角区：</b><br>• 位于膀胱底部<br>• 3 个角：两侧输尿管口 + 尿道内口<br>• <b>位置固定，膀胱充盈时其厚度基本不变</b><br><br><b>毗邻：</b><br>• 前方：下腹壁；前下方：耻骨联合<br>• 后方（男）：精囊、输精管壶腹、直肠<br>• 后方（女）：阴道、子宫颈", "tip": "膀胱三角区位置固定，是评估膀胱壁的可靠区域。", "tags": ["解剖", "膀胱"], "images": [["img_in_image_box_681_750_1040_1089.jpg", "图2-9 膀胱三角区"], ["img_in_image_box_731_221_988_449.jpg", "图2-8 膀胱壁厚度测量"]], "chapter": "第2章 · 膀胱"}, {"no": "8-4", "title": "膀胱超声方位判读", "question": "膀胱横切面和纵切面的方位判读规则是什么？", "answer": "<b>膀胱横切面方位：</b><br>• 前方 = 前壁<br>• 后方 = 后壁或三角区<br>• 右方 = 左侧壁<br>• 左方 = 右侧壁<br><br><b>纵切面方位：</b><br>• 前方 = 前壁<br>• 后方 = 后壁<br>• 右下方 = 三角区<br>• 正右方 = 膀胱颈部<br>• 左上方 = 顶部", "tip": "膀胱横切面方位与腹腔方向相反（左右镜像），需注意区分。", "tags": ["扫查", "膀胱"], "images": [["img_in_image_box_152_405_566_823.jpg", "图2-10 膀胱横切面"], ["img_in_image_box_586_408_1002_824.jpg", "图2-11 膀胱纵切面"]], "chapter": "第2章 · 膀胱"}, {"no": "8-5", "title": "膀胱超声注意事项", "question": "膀胱超声伪像处理和占位病变扫查要点是什么？", "answer": "<b>伪像处理：</b><br>• 膀胱充盈后，经腹壁检查可在膀胱前壁下方出现腹壁混响伪像<br>• 加大近区抑制或利用组织谐波技术可减少此干扰<br>• 必要时可更换高频探头观察<br><br><b>占位病变：</b><br>• 当膀胱内探及占位病变时，应嘱患者改变体位以观察病变的活动性<br><br><b>残余尿量：</b><br>• 超声测量残余尿量有一定的误差，不如导尿准确<br>• 此法简单易行，可反复测定", "tip": "改变体位观察占位病变的活动性是鉴别结石与实性占位的重要方法。", "tags": ["扫查", "膀胱"], "images": [["img_in_image_box_152_850_566_1106.jpg", "图2-7 膀胱横切面（含混响伪像区域）"], ["img_in_image_box_587_850_1000_1105.jpg", "图2-7 膀胱纵切面"]], "chapter": "第2章 · 膀胱"}, {"no": "9-1", "title": "前列腺正常值", "question": "前列腺的正常径线和重量计算公式是什么？", "answer": "<b>正常值（cm）：</b><br><table><tr><th>指标</th><th>正常值</th></tr><tr><td>前后径（a）</td><td>2.5～3.0</td></tr><tr><td>上下径（b）</td><td>3.0～4.0</td></tr><tr><td>横径（c）</td><td>4.0～4.5</td></tr><tr><td>重量</td><td><span class='highlight'>12～20 g</span></td></tr></table><br><b>重量计算公式：</b><br>• 重量（g）= 体积 = <b>0.52 × 横径 × 厚径 × 上下径</b>", "tip": "前列腺重量与体积在数值上相等（g ≈ ml）。", "tags": ["测量", "前列腺"], "images": [["img_in_image_box_151_1109_565_1392.jpg", "图2-12 经腹前列腺纵切面 (A.标准切面)"], ["img_in_image_box_588_1109_1001_1391.jpg", "图2-12 经腹前列腺纵切面 (B.前后径、上下径测量方法)"], ["img_in_image_box_192_280_607_563.jpg", "图2-13 经腹前列腺横切面 (A.标准切面)"]], "chapter": "第2章 · 前列腺与精囊"}, {"no": "9-2", "title": "前列腺扫查方法", "question": "前列腺经腹壁和经直肠扫查的方法和测量要点是什么？", "answer": "<b>经腹壁扫查：</b><br>• 仰卧位，适度充盈膀胱<br>• 先纵置探头做前列腺矢状扫查，再逆时针旋转 90°横切扫查<br>• <b>膀胱适度充盈即可，过度充盈不利显示</b><br><br><b>经直肠扫查：</b><br>• 无须充盈膀胱<br>• 患者左侧卧位，探头置于直肠内<br>• 充分显示前列腺，分别进行横切及纵切扫查<br>• <b>外痔、肛裂患者慎用</b><br><br><b>测量方法：</b><br>• 上下径：正中矢状切面测最大径<br>• 前后径：正中矢状面或横切面测最大厚度<br>• 横径：最大横切面或最大斜冠状切面测最大横径", "tip": "经直肠检查测量值比经腹壁更可靠，尤其在节段性评估时。", "tags": ["扫查", "前列腺"], "images": [["img_in_image_box_151_1109_565_1392.jpg", "图2-12 经腹前列腺纵切面"], ["img_in_image_box_192_280_607_563.jpg", "图2-13 经腹前列腺横切面"], ["img_in_image_box_191_733_606_1019.jpg", "图2-14 经直肠前列腺纵切面"], ["img_in_image_box_192_1193_605_1467.jpg", "图2-15 经直肠前列腺横切面"]], "chapter": "第2章 · 前列腺与精囊"}, {"no": "9-3", "title": "前列腺解剖——五叶分法", "question": "前列腺按解剖学分叶法和临床特点是什么？", "answer": "<b>按解剖学分叶法：</b>（缺乏组织学依据，主要用于手术及肛门指检时确定位置）<br><br><table><tr><th>分叶</th><th>特点</th></tr><tr><td><b>左右侧叶</b></td><td>最大，是增生好发部位</td></tr><tr><td><b>后叶</b></td><td><span class='highlight'>癌好发部位</span></td></tr><tr><td><b>中叶</b></td><td>增生时向上突入膀胱腔</td></tr><tr><td><b>前叶</b></td><td>甚小，无重要临床意义</td></tr></table><br><b>临床要点：</b><br>• 左右侧叶增大易压迫尿道导致排尿困难<br>• 中叶增生影响排尿（直肠线阵扫描可清楚显示）", "tip": "后叶是前列腺癌好发部位，左右侧叶和中叶是增生好发部位。", "tags": ["解剖", "前列腺"], "images": [["img_in_image_box_385_1153_767_1432.jpg", "图2-16 前列腺五叶分法"]], "chapter": "第2章 · 前列腺与精囊"}, {"no": "9-4", "title": "前列腺解剖——McNeal 分区", "question": "McNeal 分区的内外腺与病变关系是什么？", "answer": "<b>McNeal 分区（组织学分区法，1986 年提出）：</b><br>• 前列腺外腺对应<b>周围区</b>和<b>中央区</b><br>• 前列腺内腺对应<b>移行区</b><br>• 正常前列腺，<span class='highlight'>内腺：外腺 = 1:1</span><br><br><b>内外腺来源与病变：</b><br>• <b>内腺</b>：来自中胚层 → <b>前列腺增生</b>好发部位<br>• <b>外腺</b>：来自外胚层 → <b>前列腺癌</b>好发部位<br><br><b>中央带：</b><br>• 腺体较粗大<br>• 有淀粉样小体沉积于腺管<br>• 回声略高<br>• 是<b>结石或钙化</b>的好发部位", "tip": "McNeal 分区是超声评估前列腺病变的核心解剖基础。", "tags": ["解剖", "前列腺"], "images": [["img_in_image_box_323_281_907_582.jpg", "图2-17 前列腺带区（McNeal分区）"], ["img_in_image_box_240_749_989_1010.jpg", "图2-18 前列腺组织结构"]], "chapter": "第2章 · 前列腺与精囊"}, {"no": "9-5", "title": "前列腺超声观察内容与检查技巧", "question": "前列腺超声观察内容和经腹壁检查的注意事项是什么？", "answer": "<b>超声观察内容：</b><br>1. 腺体回声是否均匀<br>2. 两侧结构是否对称<br>3. 有否占位性病变<br>4. 前列腺包膜是否光滑完整，对周围组织有无浸润<br><br><b>经腹壁探查：</b><br>• 膀胱适度充盈即可<br>• 过度充盈的不良影响：①增加皮肤至前列腺的距离 ②妨碍探头向前列腺方向倾斜<br>• 探头声束需指向内下方<br>• 显示的前列腺横切面图有一定倾斜<br>• → <b>厚径测量值偏大</b><br>• → <b>经直肠检查测量值较为可靠</b><br><br><b>图像分辨率：</b><br>• 经腹部超声检查前列腺的图像分辨率远不及经直肠检查法", "tip": "经腹壁测厚径易偏大，应采用经直肠检查。", "tags": ["扫查", "前列腺"], "images": [["img_in_image_box_151_1109_565_1392.jpg", "图2-12 经腹前列腺纵切面"], ["img_in_image_box_192_280_607_563.jpg", "图2-13 经腹前列腺横切面"], ["img_in_image_box_191_733_606_1019.jpg", "图2-14 经直肠前列腺纵切面（更可靠）"]], "chapter": "第2章 · 前列腺与精囊"}, {"no": "9-6", "title": "精囊正常值与扫查", "question": "精囊的正常值和经腹壁/经直肠扫查方法是什么？", "answer": "<b>正常值（cm）：</b><br>• 长：4～5<br>• 宽：1.5～2<br>• 前后径：< 1.5<br><br><b>经腹壁扫查：</b><br>• 适度充盈膀胱<br>• 探头横置于耻骨联合上方<br>• 向耻骨联合后下方做横切扫查<br>• 获得前列腺横切面后，向上移动探头获得位于前列腺后上方两侧的精囊<br><br><b>经直肠扫查：</b><br>• 无须充盈膀胱<br>• 先行找到前列腺声像图<br>• 再于其上方偏后侧探查精囊<br><br><b>测量方法：</b><br>• 在矢状旁切面显示精囊最大长径和厚度<br>• 以<b>底部中点到颈部中点的连线</b>作为长径<br>• 在连线的中点测量厚度", "tip": "精囊大小个体差异较大，比较双侧大小可作为客观评价方法。", "tags": ["测量", "扫查", "精囊"], "images": [["img_in_image_box_386_650_799_906.jpg", "图2-19 经直肠精囊超声图像"]], "chapter": "第2章 · 前列腺与精囊"}, {"no": "9-7", "title": "精囊解剖与声像图", "question": "精囊的解剖位置、形态和声像图特点是什么？", "answer": "<b>解剖：</b><br>• 位于前列腺后上方，膀胱底和直肠之间<br>• 左右成对的长扁形囊袋<br>• 由约 15 cm 长的纡曲管状结构盘曲成橄榄球状<br>• 表面凸凹不平<br><br><b>功能：</b><br>• 分泌黄色黏稠液体，参与组成精液<br>• 精液中含血液称血糖，通常继发于精囊良性充血或感染<br>• <b>精囊大小的个体差异较大</b>，通常两侧精囊大小相似<br><br><b>正常精囊声像图：</b><br>• <b>纵切面</b>：呈纺锤形或梭形无回声带，后方增强效应明显<br>• <b>横切面</b>：两侧精囊呈领结样在中线会合，边界清楚<br>• 内部透声较差，有纤细回声结构，呈网络状", "tip": "精囊横切面的领结样形态是典型表现。", "tags": ["解剖", "精囊"], "images": [["img_in_image_box_386_650_799_906.jpg", "图2-19 经直肠精囊超声图像"]], "chapter": "第2章 · 前列腺与精囊"}, {"no": "10-1", "title": "阴囊内容物正常值", "question": "成年人及小儿睾丸、附睾和精索静脉的正常值是什么？", "answer": "<b>成年人：</b><br>• 睾丸：约 <span class='highlight'>4 cm × 3 cm × 2 cm</span>（长 × 宽 × 厚）<br>• 附睾头部厚度：0.5～1.2 cm<br>• 附睾体尾部厚度：< 0.2～0.5 cm<br>• 阴囊壁厚度：0.2～0.8 cm<br>• 精索静脉内径：< 0.2 cm<br><br><b>小儿睾丸测量正常值（cm）：</b><br><table><tr><th>组别</th><th>长</th><th>宽</th></tr><tr><td>新生儿</td><td>1.2～1.5</td><td>0.8～1.1</td></tr><tr><td>6岁以内</td><td>1.5～2.0</td><td>1.0～1.2</td></tr><tr><td>青春期</td><td>3.0～4.0</td><td>2.0～3.0</td></tr></table>", "tip": "精索静脉内径 ≥ 0.2 cm 提示精索静脉曲张可能。", "tags": ["测量", "阴囊"], "images": [["img_in_image_box_410_836_821_1053.jpg", "图2-20 正常睾丸、附睾纵切面"]], "chapter": "第2章 · 阴囊"}, {"no": "10-2", "title": "阴囊扫查方法", "question": "阴囊超声纵切和横切扫查的内容和测量方法是什么？", "answer": "<b>纵切扫查：</b><br>• 显示睾丸及附睾头、体、尾部<br>• 观察位于上方的部分精索<br><br><b>横切扫查：</b><br>• 对比观察两侧阴囊皮肤、附睾和睾丸的形态、大小、包膜和内部回声改变<br><br><b>测量方法：</b><br>• 睾丸：长轴切面测量长径及厚径；在与长轴垂直最大切面上测量宽径<br>• 附睾：纵切面上测量厚度，通常在患者同一部位观察大小变化<br>• 精索静脉：选取纤曲明显处行内径测量；Valsalva 试验后在同一部位测量，反流时间也需在同一部位测量", "tip": "双侧对比是阴囊超声检查的核心原则。", "tags": ["扫查", "阴囊"], "images": [["img_in_image_box_410_836_821_1053.jpg", "图2-20 正常睾丸、附睾纵切面（纵切扫查）"], ["img_in_image_box_368_283_784_530.jpg", "图2-22 附睾纵切面"]], "chapter": "第2章 · 阴囊"}, {"no": "10-3", "title": "阴囊解剖知识", "question": "阴囊、睾丸、附睾和鞘膜腔的解剖结构是什么？", "answer": "<b>阴囊：</b><br>• 多层囊状结构<br>• 由纤维膜分为两个左、右对称的囊<br>• 内部包含睾丸及附睾<br><br><b>睾丸：</b><br>• 对称椭圆形结构<br>• 前缘游离；后缘有血管、神经和淋巴管出入，与附睾和输精管睾丸部相连<br>• 上端被附睾头遮盖；下端游离<br><br><b>附睾：</b><br>• 呈新月形<br>• 由睾丸输出小管和纡曲的附睾管组成<br>• 紧贴睾丸上端和后缘<br>• 长度与睾丸相似<br>• 头侧端=附睾头；中部=附睾体；远端=附睾尾<br><br><b>鞘膜腔：</b><br>• 睾丸表面被有双层鞘膜结构=睾丸固有鞘膜<br>• 外层为壁层，脏层覆盖睾丸表面<br>• 脏、壁两层间的空隙=鞘膜腔", "tip": "鞘膜腔内可有少量液体（尤其靠近睾丸上极和附睾周围），是正常现象。", "tags": ["解剖", "阴囊"], "images": [["img_in_image_box_410_836_821_1053.jpg", "图2-20 正常睾丸、附睾纵切面"], ["img_in_image_box_368_283_784_530.jpg", "图2-22 附睾纵切面（附睾头、体、尾）"]], "chapter": "第2章 · 阴囊"}, {"no": "10-4", "title": "超声观察内容", "question": "睾丸、附睾和精索静脉的超声观察内容是什么？", "answer": "<b>睾丸：</b><br>• 对比观察双侧睾丸大小、形态及内部回声<br>• 有无占位病变<br>• 有无微石症<br>• 观察睾丸内血流分布是否正常<br>• 血供有无增多或减少<br><br><b>附睾：</b><br>• 重点观察大小、血流信号、回声是否均匀<br><br><b>精索静脉：</b><br>• 观察内径是否增粗<br>• 走行是否规则<br>• 有无曲张<br>• 进行 Valsalva 动作观察有无反流<br><br><b>附睾形态：</b><br>• 附睾回声与睾丸相似<br>• 形态可呈锥形、新月形及泪滴形等", "tip": "Valsalva 动作观察有无反流是诊断精索静脉曲张的关键。", "tags": ["扫查", "阴囊"], "images": [["img_in_image_box_410_836_821_1053.jpg", "图2-20 正常睾丸、附睾纵切面"], ["img_in_image_box_411_1213_823_1446.jpg", "图2-21 正常睾丸、附睾彩色多普勒血流图"], ["img_in_image_box_369_738_783_1034.jpg", "图2-23 Valsalva 动作检查精索静脉"]], "chapter": "第2章 · 阴囊"}, {"no": "10-5", "title": "Valsalva 试验", "question": "Valsalva 试验的方法、原理和临床意义是什么？", "answer": "<b>试验方法：</b><br>• 深吸气后屏气<br><br><b>意义：</b><br>• Valsalva 动作时，四肢大静脉或中等大小的静脉内径明显增宽<br>• 血流信号减少、短暂消失甚至出现短暂反流<br><br><b>原理：</b><br>• 正常上肢静脉 Valsalva 反应：胸腔内压力增加<br>• 正常下肢静脉 Valsalva 反应：腹压增加<br><br><b>作用：</b><br>• 用于判断从检查部位至胸腔或腹腔的静脉系统的开放情况<br>• 严重静脉阻塞才引起异常的 Valsalva 反应<br>• 当静脉腔部分阻塞时，可显示正常的 Valsalva 反应<br><br><b>精索静脉检查记录：</b><br>• 静脉数目及最大静脉内径<br>• 观察有无自发性反流<br>• 测量安静状态下及 Valsalva 试验后静脉内径变化情况", "tip": "Valsalva 试验阴性不能排除轻度静脉阻塞，仅提示开放性较好。", "tags": ["扫查", "阴囊"], "images": [["img_in_image_box_369_738_783_1034.jpg", "图2-23 Valsalva 动作检查精索静脉"]], "chapter": "第2章 · 阴囊"}, {"no": "10-6", "title": "精索静脉曲张与儿童睾丸发育", "question": "精索静脉曲张左侧多见的原因和儿童睾丸发育规律是什么？", "answer": "<b>精索静脉曲张左侧多于右侧原因：</b><br>• 左侧精索静脉走行陡直，<span class='highlight'>垂直入左肾静脉</span>，静脉回流阻力大<br>• 右侧精索静脉入下腔静脉，阻力小<br><br><b>鞘膜腔内液体：</b><br>• 尤其靠近睾丸上极和附睾周围常可见极少量液体<br>• 所产生的新月形无回声区=<b>正常现象</b><br><br><b>儿童睾丸发育规律：</b><br>• 新生儿睾丸大小约 1.5 cm × 1.0 cm<br>• 2～3 个月时略有增大<br>• 约 6 个月时，睾丸体积缓慢减小<br>• 6 个月至 6 岁，睾丸体积不变<br>• 6 岁后至青春期睾丸缓慢增大<br>• 上述变化继发于血清 FSH、LH 及睾酮水平的变化", "tip": "儿童与成年人差异：儿童的附睾与睾丸的比例较成年人大，8~9 岁后睾丸回声逐渐增强。", "tags": ["病理", "小儿", "阴囊"], "images": [["img_in_image_box_369_738_783_1034.jpg", "图2-23 Valsalva 动作检查精索静脉"], ["img_in_image_box_410_836_821_1053.jpg", "图2-20 正常睾丸、附睾纵切面（含鞘膜腔正常表现）"]], "chapter": "第2章 · 阴囊"}, {"no": "11-1", "title": "子宫（宫体）正常值（生育期）", "question": "生育期子宫的标准切面和正常值是什么？", "answer": "<b>标准切面：</b><br>• 经腹子宫纵切面（测纵径、前后径）<br>• 经腹子宫横切面（测横径）<br>• 经阴道子宫纵切面、横切面（更清晰）<br><br><b>正常值（生育期，cm）：</b><br><table><tr><th>指标</th><th>正常值</th></tr><tr><td>纵径（a）</td><td>5.0～7.0</td></tr><tr><td>前后径（b）</td><td>3.0～4.0</td></tr><tr><td>横径（c）</td><td>4.0～5.0</td></tr></table><br><b>三径之和判断：</b><br>• 经产子宫：<span class='highlight'>15～18 cm</span><br>• 未产子宫：<span class='highlight'>12～15 cm</span><br>• 绝经后子宫：≤ 13 cm<br>• <b>重点参考三径之和</b>，个体差异可致单纯某一径线增大", "tip": "重点参考三径之和，单纯某一径线增大不一定提示病变。", "tags": ["测量", "子宫"], "images": [["img_in_image_box_192_788_605_1128.jpg", "图3-1 经腹子宫纵切面及横切面"], ["img_in_image_box_152_274_564_526.jpg", "图3-2 经阴道子宫纵切面及横切面"]], "chapter": "第3章 · 子宫"}, {"no": "11-2", "title": "宫颈正常值", "question": "宫颈的正常值是多少？", "answer": "<b>正常值（生育期，cm）：</b><br>• 长径（a）：<span class='highlight'>2.5～3.0</span><br>• 前后径（b）：<span class='highlight'>&lt; 3.0</span>", "tip": "宫颈过长、过短或前后径异常均提示可能病变。", "tags": ["测量", "子宫", "宫颈"], "images": [["img_in_image_box_151_947_565_1293.jpg", "图3-3 宫颈纵切面（标准切面）"], ["img_in_image_box_588_948_999_1290.jpg", "图3-3 宫颈纵切面（测量方法）"]], "chapter": "第3章 · 子宫"}, {"no": "11-3", "title": "子宫内膜正常厚度（随月经周期变化）", "question": "子宫内膜厚度在不同月经周期的正常值和超声表现是什么？", "answer": "<b>正常值（cm）：</b><br><table><tr><th>时期</th><th>内膜厚度</th></tr><tr><td>月经期</td><td>0.1～0.4</td></tr><tr><td>增殖期（月经第 5～14 天）</td><td>0.4～0.8</td></tr><tr><td>排卵期</td><td>厚度达 <span class='highlight'>1.1</span></td></tr><tr><td>分泌期（月经第 15～28 天）</td><td>0.7～1.2</td></tr><tr><td>绝经后</td><td>不超过 0.5</td></tr></table><br><b>超声表现：</b><br>• 月经期：内膜薄，宫腔线清晰<br>• 增殖期：\"<b>三线</b>\"征（基底层强、功层低、宫腔线强）<br>• 分泌期：内膜厚，全层呈较均质高回声<br><br><b>测量方法：</b>子宫矢状切面，测量包含<b>两层内膜</b>厚度<br><br><b>检查时机：</b><br>• 疑子宫畸形：月经前期<br>• 疑内膜病变：月经干净后 3～4 d", "tip": "绝经后内膜 > 0.5 cm 应警惕内膜病变。", "tags": ["测量", "子宫内膜", "子宫"], "images": [["img_in_image_box_195_339_1040_665.jpg", "图3-4 子宫内膜纵切面"], ["img_in_image_box_436_1057_794_1346.jpg", "图3-5 月经周期与子宫内膜变化"], ["img_in_image_box_199_1278_523_1445.jpg", "图3-7 子宫内膜测量"]], "chapter": "第3章 · 子宫"}, {"no": "11-4", "title": "宫内节育器（IUD）", "question": "宫内节育器的正常位置和移位超声诊断标准是什么？", "answer": "<b>正常位置：</b><br>• 位于宫腔中上部，其上缘靠近宫底部内膜<br>• <b>子宫纵切面上节育器上缘到宫底外缘的距离 &lt; 2 cm</b><br><br><b>IUD 移位超声诊断：</b><br>1. <b>下移</b>：IUD 上缘到宫底外缘距离 > 2.0 cm，或 IUD 下缘达宫颈区<br>2. <b>脱落</b>：宫腔内无 IUD 回声<br>3. <b>嵌顿</b>：宫腔内无 IUD 或仅见部分回声，而子宫肌壁间可见部分或全部 IUD<br>4. <b>外移</b>：宫腔和肌壁内均无 IUD，腹腔或子宫直肠窝等处可见 IUD 强回声<br>5. <b>带器妊娠</b>：<br>   • IUD 在妊娠囊以外时，对妊娠囊影响不大<br>   • IUD 与妊娠囊靠近，或妊娠囊突入 IUD 环内，将影响胚胎发育甚至流产<br>   • 继续妊娠时，超声监测至少至中期妊娠", "tip": "IUD 上缘到宫底外缘 > 2 cm 即提示下移。", "tags": ["测量", "子宫"], "images": [["img_in_image_box_152_288_565_638.jpg", "图3-6 宫内节育器强回声（节育器显示切面）"], ["img_in_image_box_587_288_1001_637.jpg", "图3-6 宫内节育器强回声（箭头所指）"]], "chapter": "第3章 · 子宫"}, {"no": "11-5", "title": "子宫解剖知识", "question": "子宫的位置、子宫壁结构、韧带和血供是什么？", "answer": "<b>位置：</b>位于真骨盆内，前为膀胱，后为直肠乙状结肠<br><br><b>子宫壁 3 层：</b><br>1. 外层：浆膜层（腹膜脏层）<br>2. 中层：肌层（平滑肌）<br>3. 内层：黏膜层（子宫内膜）<br><br><b>子宫峡部：</b>宫体与宫颈之间最狭窄的部分，长约 1 cm<br><br><b>4 对韧带：</b>圆韧带、阔韧带、主韧带、子宫骶韧带<br><br><b>血供：</b>子宫动脉（主要）、卵巢动脉<br><br><b>子宫内膜分层：</b><br>• 浅层（功能层）：随月经周期发生周期性改变<br>• 深层（基底层）：无周期性变化<br><br><b>子宫陷凹：</b><br>• 前陷凹（膀胱子宫陷窝）<br>• 后陷凹（直肠子宫陷窝 / Douglas 陷凹）", "tip": "Douglas 陷凹积液是评估盆腔积液的关键。", "tags": ["解剖", "子宫"], "images": [["img_in_image_box_157_319_996_682.jpg", "图3-10 子宫动脉解剖"]], "chapter": "第3章 · 子宫"}, {"no": "11-6", "title": "子宫位置 + 宫体/宫颈比值", "question": "子宫位置分型和宫体/宫颈比值的年龄变化是什么？", "answer": "<b>子宫位置判断：</b><br><table><tr><th>位置</th><th>特点</th></tr><tr><td>前倾位</td><td>子宫向前弯曲，与阴道成角</td></tr><tr><td>前屈位</td><td>子宫体明显前弯，与子宫颈间向前成角</td></tr><tr><td>中位</td><td>子宫体与宫颈在同一水平</td></tr><tr><td>后倾位</td><td>子宫体向后弯曲，与阴道成角</td></tr><tr><td>后屈位</td><td>子宫体明显向后弯曲</td></tr></table><br><b>宫体/宫颈长度比值：</b><br><table><tr><th>时期</th><th>比值</th></tr><tr><td>新生儿期</td><td>1:2</td></tr><tr><td>青春期</td><td>1:1</td></tr><tr><td>性成熟期</td><td><span class='highlight'>2:1</span></td></tr><tr><td>绝经后期</td><td>1:1</td></tr></table><br><b>子宫随年龄变化：</b><br>• 新生儿期：子宫高出小骨盆上口，宫颈较宫体长而粗<br>• 性成熟期：宫体与宫颈之比为 2:1<br>• 经产妇：子宫各径、内腔均增大，重量可增加一倍<br>• 绝经后期：子宫萎缩变小，壁变薄", "tip": "性成熟期宫体/宫颈之比为 2:1，是基本解剖特征。", "tags": ["解剖", "子宫"], "images": [["img_in_image_box_192_788_605_1128.jpg", "图3-1 经腹子宫纵切面及横切面"]], "chapter": "第3章 · 子宫"}, {"no": "11-7", "title": "正常产褥期子宫超声表现", "question": "正常产褥期子宫超声表现和剖宫产切口的变化规律是什么？", "answer": "<b>时间相关变化：</b><br>• 1 周内：回声可不均匀<br>• 1 周后：接近正常子宫回声<br><br><b>产后子宫内膜：</b><br>• 多呈线状高回声<br>• 基底线与肌层分界不清<br>• 厚 ≤ 1.0 cm<br>• <span class='highlight'>如宫腔内出现增强团块回声，厚度 > 1.5 cm，应注意胎盘胎膜残留</span><br><br><b>子宫复旧：</b><br>• 产后 5～7 d 子宫逐渐恢复至妊娠前形态<br>• 宫体、宫颈分界逐渐明显<br>• 宫颈管低回声逐渐缩小<br><br><b>剖宫产切口：</b><br>• 术后切口处局部外突<br>• 肌层呈不均匀高回声<br>• 术后 4 周切口处高回声消失，恢复至妊娠前子宫表面形态", "tip": "产褥期宫腔内增强团块 > 1.5 cm 应警惕胎盘胎膜残留。", "tags": ["扫查", "子宫"], "images": [["img_in_image_box_192_788_605_1128.jpg", "图3-1 经腹子宫纵切面（参考）"]], "chapter": "第3章 · 子宫"}, {"no": "11-8", "title": "经阴道超声检查", "question": "经阴道超声的探头操作、优点和局限性是什么？", "answer": "<b>探头操作：</b><br>• 沿长轴旋转 0°~90° 可获得从矢状面至冠状面的任意切面<br>• 变换探头角度可显示不同部位<br>• 探头在阴道内推拉式移动，靠近感兴趣区<br>• 脏器位置较高时，左手可在腹壁加压配合<br><br><b>优点：</b><br>1. 探头紧贴宫颈、阴道穹窿、盆腔器官 → 声像图清晰<br>2. 不需要充盈膀胱<br>3. 经阴道彩色多普勒对子宫动脉显示比腹部更明显<br>4. 经阴道超声引导下的穿刺是介入性超声最常用的途径<br><br><b>局限性：</b><br>1. 探头频率限制：> 10 cm 的包块、中晚期妊娠胎儿难以显示全貌<br>2. 禁忌人群：处女膜完整、阴道严重感染、老年性阴道萎缩、先天性阴道狭窄及闭锁<br>3. 后陷凹有少量游离液体属正常<br>4. 当前陷凹或侧陷凹也出现积液 → 评价肝肾隐窝积液评估整体积液量", "tip": "经阴道超声声像图较经腹明显清晰，是评估妇科疾病的首选方法。", "tags": ["扫查", "子宫"], "images": [["img_in_image_box_152_274_564_526.jpg", "图3-2 经阴道子宫纵切面"], ["img_in_image_box_587_275_1000_526.jpg", "图3-2 经阴道子宫横切面"]], "chapter": "第3章 · 子宫"}, {"no": "11-9", "title": "卵巢正常值", "question": "成年女性卵巢的正常值、测量方法和大小变化是什么？", "answer": "<b>正常值（成年女性）：</b><br>• 长 × 宽 × 厚：<span class='highlight'>4.0 cm × 3.0 cm × 1.0 cm</span><br><br><b>测量方法：</b><br>• 卵巢最大长轴切面测量长径及前后径<br>• 最大横切面测量横径<br>• <b>卵巢大小的超声测量应包括功能性囊肿在内</b><br><br><b>卵巢大小变化：</b><br>• 围排卵期容积最大<br>• 黄体期最小<br>• 正常绝经后 1 年，经腹超声卵巢基本无法显示<br>• 经阴道超声可显示卵巢为较低回声结节", "tip": "卵巢测量应包括功能性囊肿（如卵泡、黄体），否则会低估。", "tags": ["测量", "卵巢"], "images": [["img_in_image_box_151_353_565_622.jpg", "图3-8 卵巢经腹超声声像图"], ["img_in_image_box_587_352_1001_622.jpg", "图3-8 卵巢经阴道超声声像图（LOV/ROV）"]], "chapter": "第3章 · 卵巢与多普勒"}, {"no": "11-10", "title": "卵巢扫查方法", "question": "卵巢经阴道和经腹壁扫查的方法和寻找小技巧是什么？", "answer": "<b>经阴道扫查：</b><br>• 沿双侧宫角向外扫查<br>• 在输卵管等结构形成的低回声远端、髂血管内侧可显示卵巢低回声结构<br><br><b>经腹壁扫查：</b><br>• 探头侧向盆壁<br>• 在髂血管内前方易获得卵巢的斜冠状切面<br><br><b>经阴道寻找卵巢小技巧：</b><br>• <b>子宫前屈位时</b>：首先获取宫底冠状切面，然后向宫角和阔韧带方向移动探头，显示宫角后上下缓慢摆动探头柄<br>• <b>卵巢位置过高</b>：受检者适当抬高臀部或按压两侧腹壁，使卵巢更接近探头", "tip": "抬高臀部可使卵巢更接近探头，提高显示率。", "tags": ["扫查", "卵巢"], "images": [["img_in_image_box_151_353_565_622.jpg", "图3-8 卵巢经腹超声声像图"], ["img_in_image_box_587_352_1001_622.jpg", "图3-8 卵巢经阴道超声声像图"]], "chapter": "第3章 · 卵巢与多普勒"}, {"no": "11-11", "title": "卵巢解剖知识", "question": "卵巢的位置、毗邻、结构和血供是什么？", "answer": "<b>位置：</b>移动度较大，多位于<b>卵巢窝内（Waldeyer 窝）</b><br><br><b>周围毗邻：</b><br>• 前方：闭塞的脐动脉<br>• 后方：输尿管及髂内动脉<br>• 上方：髂外静脉<br><br><b>卵巢实质：</b><br>• 浅层为<b>皮质</b>：含数以万计不同发育阶段的卵泡<br>• 中央部为<b>髓质</b>：疏松结缔组织、血管、淋巴管和神经<br><br><b>血供：</b>双重血供：子宫动脉卵巢支 + 卵巢动脉<br><br><b>年龄相关变化：</b><br>• 青春前期：卵巢表面光滑<br>• 青春期后：排卵后表面逐渐凹凸不平<br>• 绝经后：卵巢萎缩变小<br><br><b>卵巢附属器：</b>卵巢冠、囊状附件、卵巢旁体", "tip": "卵巢为双重血供（子宫动脉+卵巢动脉），这是其超声表现的解剖基础。", "tags": ["解剖", "卵巢"], "images": [["img_in_image_box_291_267_857_671.jpg", "图3-9 卵巢周期性变化"]], "chapter": "第3章 · 卵巢与多普勒"}, {"no": "11-12", "title": "输卵管解剖", "question": "输卵管的位置、形态和全长是多少？", "answer": "<b>位置：</b><br>• 在子宫两侧行于阔韧带上缘前后两层之间<br>• 内侧开口于子宫腔（与子宫角相连）<br>• 外端游离，与卵巢接近，开口于腹腔<br>• 腹腔内位器官，移动度较大<br>• 位置随子宫大小和位置变化而变化<br><br><b>毗邻：</b><br>• 左侧：乙状结肠和直肠<br>• 右侧：小肠、阑尾、右输尿管盆段<br><br><b>形态 4 部分：</b><br>1. <b>间质部</b>：通入子宫壁内的部分，狭窄而短，长约 1 cm<br>2. <b>峡部</b>：间质部外侧，管腔也较窄，长 2～3 cm<br>3. <b>壶腹部</b>：位于峡部外侧，管腔较宽大，长 5～8 cm<br>4. <b>漏斗部（伞部）</b>：输卵管末端，开口于腹腔，游离端呈漏斗状<br><br><b>全长：</b><span class='highlight'>8～14 cm</span>", "tip": "壶腹部是输卵管最长、最宽的部分，是异位妊娠最常见部位。", "tags": ["解剖", "输卵管"], "images": [["img_in_image_box_157_319_996_682.jpg", "图3-10 子宫动脉解剖（含输卵管血供）"]], "chapter": "第3章 · 卵巢与多普勒"}, {"no": "11-13", "title": "卵巢周期性变化", "question": "卵巢的卵泡期、排卵期、黄体期变化是什么？", "answer": "<b>卵泡期：</b><br>• 育龄妇女每一月经周期有数个卵泡生长发育<br>• 优势卵泡能达到成熟，其余自行退化<br><br><b>排卵期：</b><br>• 卵泡发育成熟后移向卵巢表面并向外突出<br>• 最终表层破裂而排卵<br><br><b>黄体期：</b><br>• 排卵后卵泡壁塌陷，血液进入卵泡腔、凝固，形成血体<br>• 血液被吸收，颗粒细胞和内膜细胞增殖、黄体化，形成黄体<br>• <b>受精</b>：胚胎分泌 HCG，黄体继续发育为妊娠黄体，持续至妊娠 3～4 个月后退化为白体<br>• <b>未受精</b>：排卵后第 9～10 天，黄体变性，渐被结缔组织取代，成为白体而萎缩", "tip": "黄体在排卵后 9~10 天退化，是月经周期的重要节点。", "tags": ["生理", "卵巢"], "images": [["img_in_image_box_291_267_857_671.jpg", "图3-9 卵巢周期性变化"]], "chapter": "第3章 · 卵巢与多普勒"}, {"no": "11-14", "title": "排卵与黄体超声表现", "question": "排卵和黄体的超声表现是什么？", "answer": "<b>排卵的超声表现：</b><br>1. 优势卵泡突然变小或消失<br>2. <b>血体形成</b>：卵泡破裂后血液充盈形成囊性血体结构 → 边界不清、形态不规则、内壁较卵泡壁稍厚的混合性回声区<br>3. CDFI 显示血体周围环状血流信号，为低阻频谱<br>4. <b>盆腔积液</b>：卵泡液流出，于子宫直肠窝见少量积液<br>5. 子宫内膜呈分泌期高回声<br><br><b>黄体超声表现：</b><br>• 多变化：可为完全囊性、混合性及完全实性回声结构", "tip": "卵泡突然消失+子宫直肠窝积液+血体形成是排卵的超声三联征。", "tags": ["超声", "卵巢"], "images": [["img_in_image_box_291_267_857_671.jpg", "图3-9 卵巢周期性变化（含排卵、黄体）"]], "chapter": "第3章 · 卵巢与多普勒"}, {"no": "11-15", "title": "子宫动脉多普勒正常值", "question": "子宫动脉 RI 各生理期的正常值和变化规律是什么？", "answer": "<b>子宫动脉 RI：</b><br><table><tr><th>时期</th><th>RI</th></tr><tr><td>育龄期</td><td>0.86 ± 0.04</td></tr><tr><td>增生期</td><td>0.88 ± 0.05</td></tr><tr><td>黄体期</td><td>0.84 ± 0.06</td></tr><tr><td>绝经后</td><td>0.89 ± 0.06</td></tr></table><br><b>子宫动脉 RI 变化规律：</b><br>• 随绝经年份增加 RI 增大<br>• <span class='highlight'>妊娠期 RI 值明显下降</span>（与正常胎盘及胎儿生长需要更多血流有关）<br>• 增生期 RI 值比黄体期高<br>• RI 值各生理期不同可能与雌激素水平波动有关", "tip": "妊娠期 RI 明显下降是正常生理现象，反映胎盘血流增加。", "tags": ["多普勒", "子宫"], "images": [["img_in_image_box_157_319_996_682.jpg", "图3-10 子宫动脉解剖"]], "chapter": "第3章 · 卵巢与多普勒"}, {"no": "11-16", "title": "卵巢动脉多普勒正常值", "question": "卵巢动脉 RI 的正常值和周期性变化规律是什么？", "answer": "<b>卵巢动脉 RI：</b><br><table><tr><th>时期</th><th>RI</th></tr><tr><td>平均值</td><td>0.92 ± 0.08</td></tr><tr><td>卵泡期</td><td>0.86 ± 0.04</td></tr><tr><td>黄体期</td><td>0.83 ± 0.04</td></tr><tr><td>绝经后</td><td>约 0.94</td></tr></table><br><b>卵巢动脉峰值流速：</b>10～40 cm/s<br><br><b>卵巢动脉血流周期性变化：</b><br>• <b>优势卵泡形成前</b>：低速高阻血流，舒张期血流减少或消失<br>• <b>围卵泡期和黄体期</b>：优势卵泡侧 RI 值显著下降<br>• <b>非优势卵泡侧</b>：血流周期性改变较优势侧小，整个月经周期中均保持高速<br>• <b>绝经后</b>：卵巢血管呈低速高阻血流<br><br><b>RI 变化归因：</b>激素对管壁顺应性的影响，导致卵泡后期和黄体早期流向卵巢的血流增多", "tip": "优势卵泡侧在围卵泡期和黄体期 RI 显著下降，提示血流增加。", "tags": ["多普勒", "卵巢"], "images": [["img_in_image_box_157_319_996_682.jpg", "图3-10 子宫动脉解剖（含卵巢动脉吻合）"]], "chapter": "第3章 · 卵巢与多普勒"}, {"no": "11-17", "title": "子宫动脉与卵巢动脉解剖", "question": "子宫动脉、卵巢动脉的走行和静脉回流是什么？", "answer": "<b>子宫动脉：</b><br>• 来源：髂内动脉分支<br>• 在阴道上端宫颈部分为上下两支：<br>  - <b>上支（宫体支）</b>：分布于子宫、输卵管及卵巢<br>  - <b>下支（宫颈-阴道支）</b>：分布于宫颈及阴道上部<br>• 走行：肛提肌内侧 → 距宫颈 2 cm 处跨过输尿管前上方 → 阔韧带内纡曲上行 → 宫角向外侧至卵巢门 → 与卵巢动脉吻合<br>• <b>对营养子宫起绝对主导作用</b><br><br><b>卵巢动脉：</b><br>• 起自腹主动脉外侧缘<br>• 相当于腹主动脉发出肾动脉略偏下方水平<br>• 向下走行至盆腔<br>• 跨过髂外动静脉，进入卵巢悬韧带向内侧下行<br><br><b>静脉回流：</b><br>• 子宫两侧的弓形静脉汇成子宫静脉 → 经髂内静脉 → 髂总静脉<br>• <b>左卵巢静脉</b> → 左肾静脉<br>• <b>右卵巢静脉</b> → 下腔静脉", "tip": "左卵巢静脉汇入左肾静脉，这解释了左卵巢静脉曲张更常见。", "tags": ["解剖", "子宫", "卵巢"], "images": [["img_in_image_box_157_319_996_682.jpg", "图3-10 子宫动脉解剖"]], "chapter": "第3章 · 卵巢与多普勒"}, {"no": "11-18", "title": "多普勒超声应用领域", "question": "彩色多普勒+经阴道超声的临床应用领域有哪些？", "answer": "<b>彩色多普勒 + 经阴道超声联合应用：</b><br><br>1. <b>盆腔疼痛或怀疑异位妊娠者</b><br>   • 鉴别优势卵泡或黄体囊肿<br>   • 异位妊娠囊和黄体囊肿均具\"火环\"彩色血流<br>   • 通过检测多普勒信号起源于卵巢或附件包块来鉴别<br>2. <b>检测异常宫内妊娠胎盘组织、异位妊娠、产后宫内残留物</b><br>3. <b>诊断卵巢扭转</b>（卵巢内无正常血流信号）<br>4. <b>卵巢和附件肿块诊断</b><br>5. <b>探测子宫异常</b>：子宫肌瘤、息肉、肿瘤、动静脉畸形和盆腔充血综合征等血管异常", "tip": "异位妊娠囊与黄体囊肿均有\"火环\"征，需通过多普勒信号起源鉴别。", "tags": ["多普勒", "应用"], "images": [["img_in_image_box_369_707_783_1091.jpg", "图3-47 脐动脉S/D值（多普勒频谱参考）"]], "chapter": "第3章 · 卵巢与多普勒"}, {"no": "12-1", "title": "盆底超声意义", "question": "盆底超声的主要临床意义是什么？", "answer": "<b>主要意义：</b><br>1. 评估肛提肌裂孔形态和变化<br>2. 协助评价盆底功能障碍性疾病（FPFD）程度<br>3. 发现及评估肛提肌和肛门括约肌损伤及程度<br>4. 盆底术后的观察", "tip": "盆底超声是评估 FPFD 的重要无创方法。", "tags": ["应用", "盆底"], "images": [["img_in_image_box_284_901_866_1307.jpg", "图3-11 盆底超声检查基本程序"]], "chapter": "第3章 · 盆底"}, {"no": "12-2", "title": "盆底超声适应证", "question": "盆底超声的主要适应证是什么？", "answer": "<b>主要适应证：</b><br>1. 妊娠及分娩后盆底功能评估<br>2. 女性压力性尿失禁（SUI）或无意识漏尿、粪失禁患者<br>3. 反复泌尿系感染，与膀胱相关联的疼痛患者<br>4. 持续性排尿困难，或具有其他泌尿系统症状患者<br>5. 梗阻性排便障碍患者<br>6. 阴道前壁和（或）后壁膨出及子宫脱垂患者<br>7. 各类盆腔脏器脱垂（POP）和（或）尿失禁术前盆底结构及功能评估<br>8. 上述手术的术后评估", "tip": "POP 术前的盆底结构评估是制订手术方案的重要依据。", "tags": ["应用", "盆底"], "images": [["img_in_image_box_284_901_866_1307.jpg", "图3-11 盆底超声检查基本程序"]], "chapter": "第3章 · 盆底"}, {"no": "12-3", "title": "盆底超声观察内容", "question": "盆底超声的 10 个观察项目和关键正常值是什么？", "answer": "<b>10 个观察项目（记忆口诀）：</b><br><b>残余尿量，4 个距离，2 个角度，1 个厚度，1 个面积，两组肌肉</b><br><br><b>具体内容：</b><br>1. 残余尿量<br>2. 逼尿肌厚度<br>3. 膀胱尿道后角<br>4. 尿道倾斜角<br>5. 膀胱、膀胱颈、子宫、直肠的位置<br>6. 膀胱颈移动度<br>7. 尿道内口有无漏斗形成<br>8. 尿道周围有无囊肿、包块或憩室<br>9. 肛提肌、肛门括约肌<br>10. 肛提肌裂孔面积<br><br><b>关键正常值：</b><br>• <b>逼尿肌厚度</b>：正常 < 5 mm<br>• <b>膀胱尿道后角</b>：正常 90°~100°<br>• <b>尿道倾斜角</b>：正常 < 30°", "tip": "记忆口诀：残余尿量，4个距离，2个角度，1个厚度，1个面积，两组肌肉。", "tags": ["扫查", "盆底"], "images": [["img_in_image_box_284_901_866_1307.jpg", "图3-11 盆底超声检查基本程序"]], "chapter": "第3章 · 盆底"}, {"no": "12-4", "title": "盆底超声扫查提示", "question": "盆底超声扫查的操作要点和注意事项是什么？", "answer": "<b>操作要点：</b><br>1. 需在<b>残余尿 < 50 ml</b>时测量逼尿肌厚度（正常 < 5 mm）<br>2. 膀胱前上缘显示不清时，可嘱患者轻轻增加腹压观察<br>3. 膀胱完全排空后不易显示膀胱颈的位置<br>4. 膀胱壁局限性收缩可致逼尿肌测量偏大，可建议患者 30 min 后复查<br>5. 做 Valsalva 动作时，探头不宜挤压膨出物，以免出现假阴性<br>6. 如 Valsalva 动作不满意，可让患者站立检查<br>7. <span class='highlight'>任何时候耻骨联合均应在图像中显示</span>", "tip": "任何时候耻骨联合均应在图像中显示，是盆底超声的重要原则。", "tags": ["扫查", "盆底"], "images": [["img_in_image_box_284_901_866_1307.jpg", "图3-11 盆底超声检查基本程序（含耻骨联合定位）"]], "chapter": "第3章 · 盆底"}, {"no": "12-5", "title": "女性盆腔解剖", "question": "女性盆腔的骨性标志和盆底现代解剖学理论是什么？", "answer": "<b>骨性标志：</b><br>• 前方：耻骨联合下缘<br>• 后方：尾骨尖<br>• 两侧：耻骨降支、坐骨升支、坐骨结节<br><br><b>盆底：</b><br>• 相互关联的有机整体<br>• 由盆底肌、韧带等结缔组织支撑盆腔内的解剖结构<br><br><b>现代盆底解剖学理论：</b><br>• <b>水平方向</b>：\"三水平\"理论<br>• <b>纵轴方向</b>：\"三腔室\"理论", "tip": "\"三水平\"+ \"三腔室\"理论是现代盆底解剖学的核心。", "tags": ["解剖", "盆底"], "images": [["img_in_image_box_284_901_866_1307.jpg", "图3-11 盆底超声检查基本程序（含耻骨联合）"]], "chapter": "第3章 · 盆底"}, {"no": "12-6", "title": "\"三水平\"理论", "question": "盆底\"三水平\"理论的支持结构和对象是什么？", "answer": "<table><tr><th>水平</th><th>支持结构</th><th>支持对象</th></tr><tr><td><b>顶端支持</b></td><td>主韧带-骶韧带复合体</td><td>子宫、阴道上 1/3</td></tr><tr><td><b>水平支持</b></td><td>肛提肌群-直肠阴道筋膜、耻骨宫颈筋膜</td><td>膀胱、阴道上 2/3 和直肠</td></tr><tr><td><b>远端支持</b></td><td>会阴体和括约肌</td><td>尿道远端</td></tr></table>", "tip": "顶端损伤易致子宫脱垂；水平损伤易致阴道前后壁膨出；远端损伤易致尿失禁。", "tags": ["解剖", "盆底"], "images": [], "chapter": "第3章 · 盆底"}, {"no": "12-7", "title": "\"三腔室\"理论", "question": "盆底\"三腔室\"理论的内容是什么？", "answer": "<b>（三腔室以阴道前后壁为界矢状观）</b><br><br><table><tr><th>腔室</th><th>包括结构</th></tr><tr><td><b>前腔室</b></td><td>耻骨联合（SP）、耻骨后间隙（Retzius 间隙/膀胱前间隙）、阴道前壁、膀胱、膀胱颈（BN）、尿道（U）</td></tr><tr><td><b>中腔室</b></td><td>阴道穹窿、子宫</td></tr><tr><td><b>后腔室</b></td><td>阴道后壁、直肠阴道隔、直肠、肛管、会阴体</td></tr></table>", "tip": "前腔室损伤多见膀胱膨出；后腔室损伤多见直肠膨出。", "tags": ["解剖", "盆底"], "images": [["img_in_image_box_284_901_866_1307.jpg", "图3-11 盆底超声检查基本程序（矢状观三腔室参考）"]], "chapter": "第3章 · 盆底"}, {"no": "12-8", "title": "盆底肌功能", "question": "盆底肌的 4 大功能是什么？", "answer": "<b>4 大功能：</b><br>1. 填充盆腔底部和会阴部<br>2. 衬托盆腔器官于正常位置<br>3. 维持阴道紧缩度<br>4. 保证尿道及直肠括约肌正常功能", "tip": "盆底肌是支撑盆腔器官的核心动力结构。", "tags": ["解剖", "盆底"], "images": [], "chapter": "第3章 · 盆底"}, {"no": "12-9", "title": "盆底功能障碍性疾病（FPFD）", "question": "FPFD 的原因、主要表现和发病率是什么？", "answer": "<b>FPFD 原因：</b><br>1. 盆底缺陷或支撑组织松弛及损失所致<br>2. 危险因素：妊娠、阴道分娩、绝经、长期增加腹压<br>3. <span class='highlight'>妊娠和绝经是其主要原因</span><br><br><b>FPFD 主要表现：</b><br>• 压力性尿失禁（SUI）<br>• 盆腔脏器脱垂（POP）<br>• 性功能障碍<br><br><b>FPFD 发病率：</b><br>• 30% 以上的妇女有不同程度 FPFD<br>• 约 1/3 的女性受到尿失禁的影响<br><br><b>SUI 病因：</b><br>• 尿道括约肌功能减弱（内在括约肌缺陷）<br>• 膀胱颈、尿道过度活动<br>• 诱因：咳嗽、喷嚏、大笑等<br><br><b>POP 包括：</b>膀胱膨出、子宫脱垂、小肠膨出/肠疝、直肠膨出/脱垂", "tip": "妊娠和绝经是 FPFD 的两大主要原因。", "tags": ["病理", "盆底"], "images": [], "chapter": "第3章 · 盆底"}, {"no": "13-1", "title": "妊娠期超声检查时机", "question": "妊娠期各阶段超声检查的内容和最佳时机是什么？", "answer": "<b>各孕期超声检查：</b><br><table><tr><th>时期</th><th>检查内容</th></tr><tr><td>孕早期</td><td>普通超声：识别宫内妊娠、估计妊娠周、计数绒毛膜及羊膜囊数目</td></tr><tr><td><b>11~13⁺⁶周</b></td><td><b>NT 值测量</b>：评估胎龄、筛查染色体畸形、早期诊断严重畸形</td></tr><tr><td><b>妊娠 20~24 周</b></td><td><b>重大结构畸形筛查 + 先心病筛查</b>（系统超声最佳时机）</td></tr><tr><td>妊娠 28~34 周</td><td>胎儿生长发育的监测，高危妊娠的管理</td></tr></table><br><b>最小剂量原则：</b>完成该检查尽可能使用最小超声能量", "tip": "目前尚无研究证实诊断性产前超声检查对胚胎、胎儿产生不良影响。", "tags": ["扫查", "产科"], "images": [["img_in_image_box_192_461_605_757.jpg", "图3-12 妊娠囊测量方法"], ["img_in_image_box_628_461_1041_758.jpg", "图3-12 卵黄囊超声图"]], "chapter": "第3章 · 产科早中孕测量"}, {"no": "13-2", "title": "孕早期超声测量", "question": "妊娠开始至 13⁺⁶ 周的超声测量方法和 NT 正常值是什么？", "answer": "<b>扫查准备：</b><br>• 妊娠 11 周前经腹扫查应<b>适度充盈膀胱</b><br>• 妊娠 11 周后<b>无需充盈膀胱</b><br>• 尽量采用<b>低能量输出</b><br><br><b>妊娠囊测量：</b><br>• 取其最大直径（<b>不包括绒毛膜高回声边缘</b>）<br>• 用平均妊娠囊直径（MSD），测 3 次取平均值<br><br><b>头臀长（CRL）测量：</b><br>• 在胚胎最大长轴或胎儿正中矢状切面测量<br>• 测 3 次，取平均值<br><br><b>NT 测量：</b><br>• <span class='highlight'>正常值（11~13⁺⁶周）：< 2.5 mm</span><br>• 测量方法：皮肤层内缘测量至筋膜层外缘<br>• <b>NT 增厚意义</b>：可能与染色体异常或其他异常有关", "tip": "NT 测量应在 CRL 45~84 mm 时进行。", "tags": ["测量", "产科"], "images": [["img_in_image_box_192_461_605_757.jpg", "图3-12 妊娠囊测量方法"], ["img_in_image_box_194_955_1041_1255.jpg", "图3-13 胚胎长轴切面（头臀长测量）"], ["img_in_image_box_368_280_784_559.jpg", "图3-14 颈项透明层（NT值）测量切面"]], "chapter": "第3章 · 产科早中孕测量"}, {"no": "13-3", "title": "估测孕龄公式", "question": "妊娠囊和 CRL 估测孕龄的公式是什么？", "answer": "<b>公式：</b><br>• 妊娠囊：<b>孕龄（周）= 妊娠囊最大直径（cm）+ 3</b>（最宜时间 5~7 周）<br>• 头臀长（CRL）：<b>孕龄（周）= CRL（cm）+ 6.5</b>（最宜时间 7~12 周）<br><br><b>妊娠囊超声表现：</b><br>• 小的圆形液体聚集<br>• \"<b>双环</b>\"征的高回声组织包绕：<br>  - 内环：周围高回声绒毛形成<br>  - 外环：包蜕膜与真蜕膜之间的暗区<br><br><b>卵黄囊：</b><br>• 第一个可被超声证实的妊娠囊内结构<br>• <b>宫内孕的标志</b><br>• 5~5.5 周时首次发现，直径 ≤ 6 mm<br>• 10 周左右消失，最迟 12 周以前应消失<br><br><b>卵黄囊异常：</b><br>• 平均妊娠囊直径 ≥ 10 mm，未见卵黄囊 → 提示难免流产<br>• 卵黄囊直径 > 10 mm 或 < 3 mm → 提示预后不良", "tip": "胎心活动出现之前，卵黄囊大小和形态需放在早孕监测的首位。", "tags": ["测量", "产科"], "images": [["img_in_image_box_192_461_605_757.jpg", "图3-12 妊娠囊测量方法"], ["img_in_image_box_628_461_1041_758.jpg", "图3-12 卵黄囊超声图"], ["img_in_image_box_194_955_1041_1255.jpg", "图3-13 头臀长测量方法"]], "chapter": "第3章 · 产科早中孕测量"}, {"no": "13-4", "title": "中晚孕期胎儿超声测量项目", "question": "中晚孕期胎儿超声的主要测量项目和 BPD 标准切面是什么？", "answer": "<b>主要测量内容：</b><br>1. <b>双顶径（BPD）</b>：标准切面 - 颅脑横断面<br>2. <b>头围（HC）</b>：同 BPD 切面<br>3. <b>透明隔腔</b>：左右径 < 10 mm<br>4. <b>侧脑室后角宽度</b>：中晚孕期 ≤ 10 mm<br>5. <b>小脑延髓池宽度</b>：< 10 mm<br>6. <b>小脑横径</b>：24 周前约等于孕周数<br>7. <b>颈项皮肤厚度（NF）</b>：15~21 周 ≤ 5~6 mm<br>8. <b>心胸比值</b>：0.25~0.33<br>9. <b>腹围</b><br>10. <b>肾盂宽度</b><br>11. <b>肠管宽度</b><br>12. <b>股骨长（FL）</b><br><br><b>BPD 标准切面：</b>近场颅骨骨板外缘至远场颅骨内缘间垂直于脑中线的最大距离<br><br><b>BPD 增长规律：</b><br>• 31 周前：平均增长 3 mm/周<br>• 31~36 周：平均增长 1.5 mm/周<br>• 36 周后：平均增长 1 mm/周", "tip": "HC 在孕晚期取代双顶径测量，更全面反映胎头实际大小。", "tags": ["测量", "产科"], "images": [["img_in_image_box_151_224_566_530.jpg", "图3-15 双顶径标准切面"], ["img_in_image_box_588_223_1001_529.jpg", "图3-15 双顶径测量方法"], ["img_in_image_box_410_280_822_598.jpg", "图3-16 头围切面"]], "chapter": "第3章 · 产科早中孕测量"}, {"no": "13-5", "title": "透明隔腔+侧脑室+小脑切面", "question": "透明隔腔、侧脑室、小脑横径的正常值和测量方法是什么？", "answer": "<b>透明隔腔切面：</b><br>• 丘脑水平胎头横切面<br>• <span class='highlight'>正常值：左右径 < 10 mm</span><br>• 是双顶径和头围测量标准切面标记之一<br><br><b>侧脑室切面：</b><br>• 颅骨光环呈椭圆形<br>• 显示侧脑室体部、后角及侧脑室内脉络丛<br>• <b>中晚孕期正常值：≤ 10 mm</b><br>• <b>临床意义</b>：侧脑室扩张是大脑发育异常的非特异性标志<br><br><b>小脑横切面 + 小脑延髓池切面：</b><br>• <b>小脑延髓池宽 < 10 mm</b><br>• <b>小脑横径 24 周前约等于孕周数</b><br>• 临床意义：脊柱发育缺陷可致\"香蕉小脑\"，小脑延髓池异常增大或消失", "tip": "侧脑室扩张是大脑发育异常的非特异性标志。", "tags": ["测量", "产科"], "images": [["img_in_image_box_151_277_564_601.jpg", "图3-17 透明隔腔标准切面"], ["img_in_image_box_588_276_998_599.jpg", "图3-17 透明隔腔测量方法"], ["img_in_image_box_152_964_564_1283.jpg", "图3-18 侧脑室标准切面"], ["img_in_image_box_589_964_999_1281.jpg", "图3-18 侧脑室测量方法"], ["img_in_image_box_191_428_607_737.jpg", "图3-19 小脑横切面"], ["img_in_image_box_191_879_607_1207.jpg", "图3-20 小脑延髓池标准切面"]], "chapter": "第3章 · 产科早中孕测量"}, {"no": "13-6", "title": "NF+心胸比值", "question": "NF、心胸比值的测量方法和正常值是什么？", "answer": "<b>颈项皮肤、皮下组织厚度（NF）：</b><br>• 定义：14 周后淋巴系统发育完善，颈项透明层消失、皮肤增厚、皮下脂肪积累<br>• 测量切面：小脑平面<br>• 测量方法：从枕骨外缘测量至皮肤外缘<br>• <span class='highlight'>正常值（15~21 周）：≤ 5~6 mm</span><br>• 临床意义：同 NT<br><br><b>心胸比值：</b><br>• 定义：心脏面积占胸腔面积的比值<br>• 标准切面：心尖四腔切面<br>• <span class='highlight'>正常值：0.25~0.33</span>", "tip": "NF 与 NT 临床意义相同，是评估胎儿异常的重要指标。", "tags": ["测量", "产科"], "images": [["img_in_image_box_368_1205_784_1470.jpg", "图3-22 心胸比值测量切面"]], "chapter": "第3章 · 产科早中孕测量"}, {"no": "13-7", "title": "腹围+肾盂+肠管", "question": "腹围、肾盂、肠管的正常值和测量方法是什么？", "answer": "<b>腹围：</b><br>• 标准切面：胎儿胃泡、肝门静脉左/右支及脊柱的横切面<br>• 测量方法：用椭圆功能键测量（包括皮肤层）<br><br><b>肾盂宽度：</b><br>• 标准切面：胎儿腹横切面上显示肾盂<br>• <b>正常值：</b><br>  - 33 周前 ≤ 4 mm<br>  - 33 周后 ≤ 7 mm<br><br><b>肠管宽度：</b><br>• 标准切面：显示胎儿肠管长轴最大切面<br>• <b>正常值：</b><br>  - 中孕期 < 7 mm<br>  - 晚孕期 < 18 mm<br>• 测量肠管时变异较大，怀疑肠管增宽时应密切超声随访", "tip": "肠管宽度变异大，怀疑增宽时应密切随访。", "tags": ["测量", "产科"], "images": [["img_in_image_box_409_436_822_719.jpg", "图3-23 腹围测量切面"], ["img_in_image_box_207_281_605_598.jpg", "图3-25 肾盂宽度测量标准切面"], ["img_in_image_box_627_283_1026_598.jpg", "图3-25 肾盂宽度测量方法"], ["img_in_image_box_207_964_604_1309.jpg", "图3-26 肠管宽度测量标准切面"]], "chapter": "第3章 · 产科早中孕测量"}, {"no": "13-8", "title": "股骨长（FL）", "question": "股骨长（FL）的标准切面和测量方法是什么？", "answer": "<b>标准切面：</b><br>• 从股骨外侧扫查<br>• 完全显示股骨，股骨两端呈平等的斜面<br>• 声束与股骨长径垂直，显示股骨全长<br><br><b>测量方法：</b><br>• <b>不包括股骨颈及远端的骨骼的股骨干全长</b><br>• 测量点在股骨两端的中点上", "tip": "FL 测量不包括股骨颈及远端骨骼。", "tags": ["测量", "产科"], "images": [["img_in_image_box_165_399_564_685.jpg", "图3-27 股骨长标准切面"], ["img_in_image_box_588_399_987_684.jpg", "图3-27 股骨长测量方法"]], "chapter": "第3章 · 产科早中孕测量"}, {"no": "14-1", "title": "正常胎儿超声观察内容", "question": "正常胎儿超声观察的 10 个标准切面和内容是什么？", "answer": "<b>1. 颅骨强回声环</b>：完整的颅骨强回声环<br><br><b>2. 颜面部</b>：矢状面显示前额、额骨、鼻、鼻骨、上下唇、下颌；冠状面显示双侧鼻孔、上唇、下唇及颏部<br><br><b>3. 脊柱</b>：矢状面呈两条平行的串珠样强回声带；横切面呈\"品\"字形排列<br><br><b>4. 腹壁</b>：腹前壁光滑，延续完整；<b>正常腹壁皮肤厚度 < 5 mm</b><br><br><b>5. 胃泡+脐静脉切面</b>：<span class='highlight'>胃泡位于胎儿左侧腹腔</span><br><br><b>6. 胆囊+脐静脉切面</b>：<span class='highlight'>胆囊位于脐静脉的右侧</span><br><br><b>7. 脐带入口切面</b>：周围无异常膨出物<br><br><b>8. 双肾横切面</b>：两侧肾基本等大<br><br><b>9. 膀胱+双脐动脉切面</b>：CDFI 显示膀胱两侧的脐动脉血流信号<br><br><b>10. 四肢长骨切面及掌骨切面</b><br><br><b>双眼眶切面</b>：两眼眶无回声直径与内眼距三者基本等大", "tip": "腹壁皮肤厚度 > 5 mm 应考虑皮肤水肿。", "tags": ["扫查", "产科", "胎儿"], "images": [["img_in_image_box_410_369_822_661.jpg", "图3-28 颅骨强回声环"], ["img_in_image_box_192_823_606_1161.jpg", "图3-29 颜面部正中矢状切面"], ["img_in_image_box_628_823_1041_1161.jpg", "图3-29 鼻唇冠状切面"], ["img_in_image_box_310_227_842_544.jpg", "图3-30 脊柱矢状面"], ["img_in_image_box_151_821_565_1152.jpg", "图3-31 脊柱横切面"], ["img_in_image_box_587_820_999_1150.jpg", "图3-32 脊柱冠状切面"], ["img_in_image_box_191_224_606_542.jpg", "图3-33 腹壁"], ["img_in_image_box_628_224_1041_540.jpg", "图3-34 胃泡+脐静脉切面"], ["img_in_image_box_191_852_606_1180.jpg", "图3-35 胆囊+脐静脉切面"], ["img_in_image_box_628_852_1040_1182.jpg", "图3-36 脐带入口切面"], ["img_in_image_box_151_238_565_546.jpg", "图3-37 双肾横切面"], ["img_in_image_box_586_238_1000_545.jpg", "图3-38 膀胱+双脐动脉切面"], ["img_in_image_box_369_362_783_689.jpg", "图3-21 双眼眶切面"]], "chapter": "第3章 · 胎儿观察"}, {"no": "14-2", "title": "胎儿心脏切面", "question": "胎儿超声心脏评估的主要切面有哪些？", "answer": "<b>四腔心切面：</b><br>• 胎儿胸部横切面<br>• 显示心脏四腔、完整的室间隔、原发房间隔、左右心房室瓣<br><br><b>左心室流出道切面：</b><br>• 显示左心室流出道长轴<br>• 升主动脉前壁与室间隔相连续<br>• 后壁与二尖瓣前叶相连续<br><br><b>右心室流出道切面：</b><br>• 显示肺动脉从右心室发出<br>• 动态观察可见其根部走行与左心室流出道根部走行方向<span class='highlight'>垂直</span><br><br><b>三血管切面：</b>自左至右：肺动脉主干+动脉导管、主动脉、上腔静脉横断面<br><br><b>主动脉弓切面：</b>显示主动脉弓及 3 支分支、升主动脉及降主动脉<br><br><b>动脉导管切面：</b>显示右心室流出道及动脉导管，连接于降主动脉", "tip": "右心室流出道与左心室流出道交叉呈垂直关系是判断的关键。", "tags": ["扫查", "产科", "胎儿", "心脏"], "images": [["img_in_image_box_191_291_607_560.jpg", "图3-40 四腔心切面"], ["img_in_image_box_627_291_1040_559.jpg", "图3-41 左心室流出道切面"], ["img_in_image_box_190_908_607_1167.jpg", "图3-42 右心室流出道切面"], ["img_in_image_box_627_826_1041_1166.jpg", "图3-43 三血管切面"], ["img_in_image_box_390_229_764_635.jpg", "图3-44 主动脉弓切面"], ["img_in_image_box_156_710_999_1131.jpg", "图3-45 动脉导管切面"]], "chapter": "第3章 · 胎儿观察"}, {"no": "14-3", "title": "胎盘正常值与成熟度分级", "question": "胎盘正常值和成熟度分级标准是什么？", "answer": "<b>足月胎盘正常值：</b><br>• 直径 15～20 cm<br>• 容积 400～600 ml<br>• 厚度 ≤ 4.5 cm<br><br><b>胎盘成熟度分级：</b><br><table><tr><th>级别</th><th>成熟度</th><th>出现时间</th></tr><tr><td>0</td><td>未成熟</td><td>29 周前</td></tr><tr><td>I</td><td>趋向成熟</td><td>29 周后，40% 可持续至足月</td></tr><tr><td>II</td><td>接近或基本成熟</td><td>36 周后</td></tr><tr><td>III</td><td>已成熟并趋于老化</td><td>38 周后，多见于 40 周后</td></tr></table><br><b>关键提示：</b>真正的胎盘母体面血流在妊娠 12 周前并未形成<br><br><b>胎盘、脐带观察：</b><br>• 胎盘位置（前置、早剥、帆状胎盘）<br>• 脐带有无打结、脐带囊肿、脐带增粗等", "tip": "胎盘成熟度 0~III 级，分别对应未成熟到老化。", "tags": ["测量", "产科", "胎盘"], "images": [["img_in_image_box_191_813_607_1120.jpg", "图3-46 0级胎盘"], ["img_in_image_box_627_813_1041_1120.jpg", "图3-46 I级胎盘"], ["img_in_image_box_192_1143_608_1449.jpg", "图3-46 II级胎盘"], ["img_in_image_box_627_1143_1041_1448.jpg", "图3-46 III级胎盘"]], "chapter": "第3章 · 胎儿观察"}, {"no": "14-4", "title": "脐带正常值与多普勒", "question": "脐带的正常值和脐动脉 S/D 参考值是什么？", "answer": "<b>足月脐带正常值：</b><br>• 直径 < 2 cm<br>• 长 40～60 cm（<b>超声无法测量脐带长度</b>）<br><br><b>脐动脉 S/D 值：</b><br><table><tr><th>孕周</th><th>S/D 值</th></tr><tr><td>妊娠 20 周</td><td>约 3.9</td></tr><tr><td>妊娠 26 周</td><td>约 3.4</td></tr><tr><td>妊娠 33 周</td><td>约 2.6</td></tr><tr><td>足月</td><td>约 2.2（多数学者认为妊娠晚期 S/D ≤ 3.0）</td></tr></table><br><b>脐动脉频谱测量方法：</b><br>1. 确定一段<b>游离的脐带</b>，避开邻近胎盘及胎儿的部分<br>2. <b>12~14 周前无舒张末期血流</b><br>3. 12~14 周后舒张期血流消失或反流考虑有缺氧；如 34 周后，须立即终止妊娠<br><br><b>脐带解剖：</b>包含<b>两条动脉和一条静脉</b>", "tip": "足月 S/D > 3.0 或舒张期血流消失/反流提示缺氧。", "tags": ["测量", "多普勒", "产科", "脐带"], "images": [["img_in_image_box_369_707_783_1091.jpg", "图3-47 脐动脉S/D值"], ["img_in_image_box_628_852_1040_1182.jpg", "图3-36 脐带入口切面"], ["img_in_image_box_586_238_1000_545.jpg", "图3-38 膀胱+双脐动脉切面"]], "chapter": "第3章 · 胎儿观察"}, {"no": "14-5", "title": "羊水测量", "question": "羊水指数、最大深度和测量方法是什么？", "answer": "<b>正常值（cm）：</b><br><table><tr><th>指标</th><th>正常值</th></tr><tr><td>羊水池深度</td><td>3～8</td></tr><tr><td><b>羊水指数</b></td><td><span class='highlight'>10～20</span></td></tr><tr><td>羊水量（10 周）</td><td>约 30 ml</td></tr><tr><td>羊水量（20 周）</td><td>约 350 ml</td></tr><tr><td>羊水量（36~38 周）</td><td>1000～1500 ml</td></tr><tr><td>羊水量（40 周）</td><td>500～1000 ml</td></tr></table><br><b>临床正常范围：</b>500～2000 ml<br><br><b>测量方法：</b><br>1. <b>羊水池深度</b>：寻找最清晰的羊水池，测最大垂直深度<br>2. <b>羊水指数</b>：以脐为中心分右上、右下、左上、左下四个象限，每个象限最大深度之和<br><br><b>注意事项：</b><br>• 探头应垂直于水平面而非孕妇腹壁<br>• 羊水暗区不包括肢体或脐带<br>• 全面观察羊水分布宽度比测量羊水深度更客观", "tip": "可疑羊水过多或过少时用羊水指数更客观。", "tags": ["测量", "产科", "羊水"], "images": [], "chapter": "第3章 · 胎儿观察"}, {"no": "14-6", "title": "宫颈长度测量", "question": "宫颈长度的正常值和三种测量方法是什么？", "answer": "<b>正常值：</b><br>• 宫颈长度 <span class='highlight'>≥ 3 cm</span><br>• （妊娠 37 周）后 > 2.8 cm<br>• <span class='highlight'>宫颈长度 < 3 cm 应引起重视</span> → 提示宫颈功能不全<br><br><b>测量方法：</b><br><table><tr><th>方法</th><th>特点</th></tr><tr><td><b>经腹壁</b></td><td>适度充盈膀胱，显示宫颈内口及外口，测量其长度；简单易行，但<b>测量误差较大</b></td></tr><tr><td><b>经阴道</b></td><td>可清晰显示整个宫颈；<b>操作需轻柔</b>，以免碰破已突入阴道内的胎囊</td></tr><tr><td><b>经会阴</b></td><td>探头置于会阴部大阴唇偏后方处；安全可靠，操作方便，<b>不必充盈膀胱</b></td></tr></table>", "tip": "经会阴扫查安全可靠且无需充盈膀胱。", "tags": ["测量", "产科", "宫颈"], "images": [["img_in_image_box_151_266_564_571.jpg", "图3-48 经腹壁测量宫颈长度标准切面"], ["img_in_image_box_587_266_1000_572.jpg", "图3-48 经腹壁测量宫颈长度方法"]], "chapter": "第3章 · 胎儿观察"}, {"no": "15-1", "title": "产前超声检查 4 个层次（Ⅰ~Ⅳ级）", "question": "产前超声检查Ⅰ级和Ⅱ级的内容和适应证是什么？", "answer": "<b>一般产前超声检查（Ⅰ级）：</b><br><b>适应证：</b>无法开展高层次超声检查的基层医院；已进行过系统超声检查的孕妇<br><b>检查目的：</b>主要对胎儿进行大致的生长发育评估，<b>不以检测胎儿畸形为目的</b><br><b>检查内容：</b>胎数、胎先露、胎动、羊水池深度、胎盘位置、双顶径、股骨长、腹围<br><br><b>常规产前超声检查（Ⅱ级）：</b><br><b>适应证：</b>所有孕妇；已进行过系统超声检查的孕妇<br><b>检查目的：</b>完成第一层次 + 对胎儿主要脏器形态学观察<br>• <span class='highlight'>筛查 6 种严重致死性畸形</span>（18~24 周应诊断）：<br>  - 无脑儿<br>  - 严重的脑膨出<br>  - 严重的开放性脊柱裂<br>  - 严重的胸、腹壁缺损（内脏外翻）<br>  - 单腔心<br>  - 致命性软骨发育不全", "tip": "Ⅱ 级超声须在 18~24 周筛查 6 种严重致死性畸形。", "tags": ["分级", "产科"], "images": [], "chapter": "第3章 · 产前超声分级"}, {"no": "15-2", "title": "产前超声 Ⅲ 级", "question": "产前超声 Ⅲ 级（系统胎儿超声）的适应证和检查时间是什么？", "answer": "<b>适应证：</b><br>1. 所有孕妇，尤其是<b>高危孕妇及 35 岁以上高龄孕妇</b><br>2. 生育过畸形或染色体异常胎儿者<br>3. 夫妇一方有染色体平衡易位者或患有先天性疾病者<br>4. 有遗传性家族史或近亲婚配史者<br>5. 妊娠早期受过化学毒剂、辐射影响或严重病毒感染的孕妇<br>6. 原因不明的流产、死产、畸形或有新生儿死亡史者<br>7. 本次妊娠羊水过多、过少，胎儿疑有畸形者<br><br><b>检查时间：</b><br>• 适合妊娠 <b>18~24 周</b>检查<br>• 建议在妊娠 <b>20~24 周</b>进行<br>• 超过此时限，胎儿颜面部、四肢及心脏等结构可能观察不全或显示不清<br><br><b>主要观察：</b>脊柱、头颅、颜面部、心脏、腹部、肢体、脐带等<br><br><b>注意事项：</b>系统产前超声检查检出所有胎儿畸形是不现实也是不可能的", "tip": "系统超声的最佳时机是妊娠 20~24 周。", "tags": ["分级", "产科"], "images": [["img_in_image_box_191_291_607_560.jpg", "图3-40 四腔心切面"], ["img_in_image_box_151_740_564_1018.jpg", "图3-39 四肢长骨切面"]], "chapter": "第3章 · 产前超声分级"}, {"no": "15-3", "title": "产前超声 Ⅳ 级", "question": "产前超声 Ⅳ 级（针对性超声）的检查内容和适应证是什么？", "answer": "<b>适应证：</b><br>• 针对胎儿、孕妇特殊问题进行特定目的的检查<br>• 如胎儿超声心动图、胎儿神经系统、胎儿肢体检查<br>• Ⅰ、Ⅱ、Ⅲ 级检查发现或疑诊胎儿异常、有胎儿异常的高危因素、母体血生化检验异常等<br><br><b>颜面部检查：</b>冠状面、横切面、矢状面、其他<br><br><b>肢体检查：</b>对胎儿肢体逐一检查，长骨数目、对称性、足长、手足姿势<br><br><b>心脏检查：</b><br>1. 横切胎儿腹部观察腹主动脉及下腔静脉位置关系<br>2. 明确心脏在胸腔内位置、心尖指向、心胸比值<br>3. 四腔心切面：心脏中央\"十\"字交叉是否存在<br>4. 心脏短轴切面：双心室短轴、房室瓣水平、大动脉短轴<br>5. 动态观察大动脉起始部的交叉关系<br>6. 上下腔静脉长轴切面<br>7. 动脉导管弓切面及主动脉弓切面<br>8. 主动脉弓水平横切面<br>9. 彩色血流检查<br><br><b>与染色体异常相关检查：</b>颜面部、颈部、心脏、腹部、肢体骨骼、颅脑、脐动脉及静脉导管血流", "tip": "Ⅳ 级是针对性检查，需针对特定问题选择最佳方法。", "tags": ["分级", "产科"], "images": [["img_in_image_box_191_291_607_560.jpg", "图3-40 四腔心切面"], ["img_in_image_box_627_291_1040_559.jpg", "图3-41 左心室流出道切面"], ["img_in_image_box_192_823_606_1161.jpg", "图3-29 颜面部正中矢状切面"]], "chapter": "第3章 · 产前超声分级"}, {"no": "15-4", "title": "胎儿肢体扫查步骤", "question": "妊娠中期胎儿上肢和下肢的扫查步骤是什么？", "answer": "<b>妊娠中期胎儿上肢扫查：</b><br>1. 胎儿颈部横切后稍向下平推 → 脊柱两侧前方各有一近似\"S\"形强回声（锁骨）<br>2. 锁骨外侧摆动探头 → 显示呈三角形的肩胛骨<br>3. 以肩胛骨为支点，向胎儿腹侧旋转探头 → 显示出肱骨<br>4. 沿肱骨追踪扫查即能显示尺、桡骨<br>5. 沿尺骨向下扫查即可见胎儿手部<br>6. 手姿势自然呈握拳状，活动时五指伸开<br><br><b>妊娠中期胎儿下肢扫查：</b><br>1. 胎儿膀胱两侧可显示髂骨<br>2. 髂骨外下侧有一强回声，以此为支点向胎儿腹侧旋转探头 → 显示股骨的全长<br>3. 顺着股骨向下可找到胫骨与腓骨<br>4. 向下可扫查到足<br><br><b>有限产前超声检查：</b>为解决某一具体问题而进行的产前超声检查<br>• 多数情况下仅适用于急症或床旁超声检查", "tip": "上肢扫查以锁骨→肩胛骨→肱骨为定位骨架；下肢以髂骨→股骨为定位骨架。", "tags": ["扫查", "产科"], "images": [["img_in_image_box_151_740_564_1018.jpg", "图3-39 股骨"], ["img_in_image_box_587_741_999_1017.jpg", "图3-39 胫、腓骨及足"], ["img_in_image_box_376_1041_791_1290.jpg", "图3-39 尺、桡骨及肱骨"]], "chapter": "第3章 · 产前超声分级"}, {"no": "15-5", "title": "CT 和 MRI 在产科应用", "question": "CT 和 MRI 在产科的安全性、适应证和应用是什么？", "answer": "<b>安全性：</b><br>• 单次腹部 CT 检查对子宫的辐射剂量为 1 rad<br>• 美国放射性保护和测量委员会认为：当放射剂量 < 5 rad 时，由放射性导致的罹患畸形的危险性可忽略不计<br>• <span class='highlight'>MRI 无生物学危险性</span>，未发现任何继发性后遗症<br>• <b>应尽量避免在孕早期进行 MRI 检查</b><br><br><b>MRI 适用情况：</b><br>1. 其他非放射性手段不足以得到准确诊断时<br>2. MRI 提供的诊断信息可取代可能需要的放射性检查<br><br><b>孕妇腹痛诊断：</b><br>• 阑尾炎：MRI 可用于孕妇腹痛的诊断<br>• 肾积水：如生理性肾积水、尿路扩张、结石导致的肾绞痛<br>• 附件包块：对于超声不能诊断的妊娠期附件包块，可行 MRI 检查<br><br><b>MRI 在检查胎盘：</b>可疑前置胎盘行矢状面 MRI 序列成像<br><br><b>MRI 在胎儿中枢神经系统的应用：</b>可直接显示大脑实质", "tip": "MRI 在中枢神经系统评估上优于超声。", "tags": ["应用", "产科", "CT/MRI"], "images": [], "chapter": "第3章 · 产前超声分级"}, {"no": "17-1", "title": "胸骨旁左心室长轴切面", "question": "胸骨旁左心室长轴切面的标准切面和主要测量值是什么？", "answer": "<b>标准切面与扫查：</b><br>• 探头位置：胸骨左缘第 3、4 肋间<br>• 标志方向指向 10 点左右<br>• 显示结构：右心室前壁、右心室腔、室间隔、左心室腔、左心室后壁、主动脉根部、主动脉瓣、二尖瓣前后叶、左心房<br><br><b>正常值（mm）：</b><br><table><tr><th>结构</th><th>正常值</th></tr><tr><td>AAO（升主动脉内径）</td><td>22.4～33.1</td></tr><tr><td>AO 窦（主动脉窦部内径）</td><td>24.0～32.3</td></tr><tr><td>AV 环（主动脉瓣环内径）</td><td>18.2～22.1</td></tr><tr><td>RVOT（右心室流出道）</td><td>男 21.0～33.0 / 女 23.0～32.0</td></tr><tr><td>LA（左心房前后径）</td><td>26.2～34.2</td></tr><tr><td>MV 环（二尖瓣环径）</td><td>21.0～34.0</td></tr><tr><td>RVAW（右心室前壁厚度）</td><td>3.25～4.52</td></tr><tr><td>RV（右心室内径）</td><td>18.9～24.0</td></tr><tr><td>LV 舒张末内径</td><td>男 44.8～47.6 / 女 42.2～44.7</td></tr><tr><td>LV 收缩末内径</td><td>26.7～31.9</td></tr></table><br><b>要点：</b>该切面为最常用切面，是测量左心房、左心室、主动脉根部及观察二尖瓣、主动脉瓣形态的主要切面", "tip": "胸骨旁左心室长轴切面是测量心脏结构的基础切面。", "tags": ["测量", "心脏", "二维切面"], "images": [["img_in_image_box_192_674_606_1006.jpg", "图4-1 胸骨旁左心室长轴切面 (A. 收缩期)"], ["img_in_image_box_628_675_1040_1005.jpg", "图4-1 胸骨旁左心室长轴切面 (B. 舒张期)"], ["img_in_image_box_294_307_858_838.jpg", "图4-2 胸骨旁左心室长轴切面重要解剖结构"]], "chapter": "第4章 · 二维心脏切面"}, {"no": "17-2", "title": "胸骨旁主动脉短轴切面", "question": "胸骨旁主动脉短轴切面的扫查和主要测量值是什么？", "answer": "<b>标准切面与扫查：</b><br>• 探头位置：胸骨左缘第 2、3 肋间<br>• 在胸骨旁左心室长轴切面基础上将探头顺时针旋转 90°<br>• 探头稍向上倾斜 → 可见肺动脉主干及左、右分支<br>• 在该切面基础上继续向下倾斜或滑动可依次显示二尖瓣水平、乳头肌水平、心尖水平、心底水平短轴切面<br><br><b>正常值（mm）：</b><br><table><tr><th>结构</th><th>正常值</th></tr><tr><td>PA（肺动脉主干内径）</td><td>17.5～22.7</td></tr><tr><td>RPA（右肺动脉）</td><td>10.9～14.8</td></tr><tr><td>LPA（左肺动脉）</td><td>11.2～14.1</td></tr><tr><td>RCA（右冠状动脉内径）</td><td>2.58～4.46</td></tr><tr><td>LCA（左冠状动脉内径）</td><td>2.72～4.62</td></tr><tr><td>AVA（主动脉瓣口面积）</td><td>3～4 cm²</td></tr></table><br><b>要点：</b>显示结构包括主动脉根部及瓣叶、左心房、右心房、三尖瓣、右心室流出道、肺动脉近端、肺房沟、左冠状动脉主干<br>• 左冠状动脉位于该切面 4 点处、右冠状动脉位于 10 点处<br>• 肺动脉干分叉处稍左侧有动脉韧带", "tip": "主动脉短轴切面是评估主动脉瓣、肺动脉及冠状动脉的重要切面。", "tags": ["测量", "心脏", "二维切面"], "images": [["img_in_image_box_152_1010_565_1321.jpg", "图4-3 胸骨旁主动脉短轴切面 (A. 显示结构)"], ["img_in_image_box_587_1010_1000_1320.jpg", "图4-3 胸骨旁主动脉短轴切面 (B. 肺动脉测量方法)"], ["img_in_image_box_308_938_793_1347.jpg", "图4-6 胸骨旁主动脉短轴切面重要解剖结构"], ["img_in_image_box_369_297_783_636.jpg", "图4-5 主动脉瓣瓣口面积测量"]], "chapter": "第4章 · 二维心脏切面"}, {"no": "17-3", "title": "二尖瓣水平短轴切面", "question": "二尖瓣水平短轴切面的扫查和二尖瓣瓣口面积正常值是什么？", "answer": "<b>标准切面与扫查：</b><br>• 由胸骨旁主动脉短轴切面继续向下倾斜探头即可获得<br>• 舒张期从二尖瓣瓣尖处测量二尖瓣口面积<br><br><b>正常值：</b><br>• MVA（二尖瓣瓣口面积）：<span class='highlight'>4～6 cm²</span><br><br><b>要点：</b><br>• 描述法：舒张期沿瓣缘内侧描述瓣口轮廓<br>• PHT 法（用于单纯性二尖瓣狭窄）：心尖四腔切面获取二尖瓣血流频谱，测 PHT（E 峰压差降至一半处的时间），<b>MVA = 220 / PHT</b>", "tip": "PHT = 220 / MVA 是评估二尖瓣狭窄的常用公式。", "tags": ["测量", "心脏", "二维切面"], "images": [["img_in_image_box_311_755_931_1118.jpg", "图4-4 心尖水平、乳头肌水平、二尖瓣水平、心底水平观察方法"], ["img_in_image_box_369_297_783_636.jpg", "图4-5 主动脉瓣瓣口面积测量 (描述法示意)"]], "chapter": "第4章 · 二维心脏切面"}, {"no": "17-4", "title": "左心室短轴切面（乳头肌/心尖水平）", "question": "左心室短轴切面的扫查和临床应用是什么？", "answer": "<b>标准切面与扫查：</b><br>• 在胸骨旁主动脉短轴切面基础上继续向下倾斜或滑动<br>• 可依次获得：心底水平 → 二尖瓣水平 → 乳头肌水平 → 心尖水平<br><br><b>要点：</b><br>• 乳头肌水平短轴切面用于评估左心室壁节段运动（16 节段 / 17 节段分析法）<br>• 是 M 型超声心动图腱索水平测量的基础切面<br>• 用于评估心肌梗死后的节段性室壁运动异常", "tip": "乳头肌水平短轴是评估节段性室壁运动的标准切面。", "tags": ["测量", "心脏", "二维切面"], "images": [["img_in_image_box_311_755_931_1118.jpg", "图4-4 心尖水平、乳头肌水平、二尖瓣水平、心底水平观察方法"]], "chapter": "第4章 · 二维心脏切面"}, {"no": "17-5", "title": "左心室壁节段与冠状动脉供血关系", "question": "冠状动脉供血与左心室壁节段的对应关系是什么？", "answer": "<table><tr><th>冠状动脉</th><th>供血节段</th></tr><tr><td><b>左前降支（LAD）</b></td><td>前壁及前间隔基底-中间段、全部心尖段</td></tr><tr><td><b>左回旋支（LCX）</b></td><td>侧壁及后壁基底-中间段</td></tr><tr><td><b>右冠状动脉（RCA）</b></
