["A1型题", "选择题", "介入"], "kind": "选择题", "page": 217, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-9", "title": "9. 肾囊肿穿刺后行酒精硬化治疗的禁忌证是", "front": "A.直径&gt;5cm<br>B.明显向包膜外凸起<br>C.数量超过3个<br>D.位于肾脏上、下极<br>E.抽出液酒精蛋白反应试验囊液不变混浊", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 217, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-10", "title": "10. 不适合 进行穿刺活检的疾病是", "front": "A.肝硬化<br>B.肝左叶实质内占位性病变<br>C.急性胰腺炎<br>D.急性肾炎<br>E.胆管细胞癌", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 218, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-11", "title": "11. 关于超声引导下肿瘤射频消融治疗的适应证， 不正确 的描述是", "front": "A.直径&gt;5cm 的肝癌单发结节<br>B.直径≤5cm 的肝癌单发结节<br>C.直径≤4cm 的 3 个结节<br>D.直径≤3cm 的 5 个结节<br>E.术后复发无法再行手术者", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 218, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-12", "title": "12. 关于超声引导下肝肿瘤无水乙醇消融治疗，正确的描述是", "front": "A.适用于&lt;5cm 的单发肝癌结节<br>B.应将穿刺针插入病灶中央开始治疗<br>C.注射无水乙醇时应快速推注<br>D.酒精用量应覆盖肿瘤及周边至少1cm范围的正常肝组织<br>E.不适于出现门静脉癌栓或弥漫性肝癌的病人", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 218, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-13", "title": "13. 关于囊肿硬化治疗， 不正确 的描述是", "front": "A.无水乙醇的量为囊肿液容量的 1/5 ∼ 1/2 <br>B.注射无水乙醇前，确定穿刺针在囊肿内<br>C.肾囊肿进行酒精蛋白反应实验，如液体变浑浊，则可进行无水乙醇的注射<br>D.囊肿硬化治疗后短期内增大，提示治疗失败<br>E.无法明确穿刺针针尖位置时，可注入生理盐水进行观察", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 218, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-14", "title": "14. 关于超声引导下穿刺路径的选择，正确的描述是", "front": "A.胆囊穿刺应先通过一部分肝组织<br>B.上腹部穿刺进针点位于肺底强回声带以下<br>C.肝病灶进行穿刺应尽量直接进入病灶<br>D.肾脏穿刺应先通过一部分肾组织<br>E.胰腺病灶穿刺应先通过一部分胰腺组织", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 218, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-15", "title": "15. 关于脓肿的介入治疗， 不正确 的描述是", "front": "A.脓肿引流原则上不能途经空腔脏器<br>B.腹膜后脓肿只能经腰背部或侧腹壁引流<br>C.较大脓肿置管引流后，应每天定时用生理盐水冲洗引流管<br>D.多腔脓肿应置入多根引流管<br>E.肠袢间脓肿不能进行穿刺", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 218, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-16", "title": "16. 关于超声引导下治疗，正确的描述是", "front": "A.囊肿硬化治疗后短期内增大，提示治疗失败<br>B.囊肿硬化治疗后6个月无缩小，提示治疗失败<br>C.肝癌无水乙醇消融治疗后2~3天，病人出现发热，需对症治疗<br>D.肝癌无水乙醇消融治疗每周治疗一次<br>E.肝癌无水乙醇消融治疗完成后应立即退针", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 218, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-17", "title": "17. 肝癌射频消融治疗适用于", "front": "A.直径 3cm 的肝癌<br>B.弥漫性肝癌<br>C.安装心脏起搏器的病人<br>D.晚期巨大肝癌<br>E.肝癌伴大量顽固性腹水病人", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 219, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-18", "title": "18. 肝肿瘤射频消融应注意", "front": "A.治疗范围应完全覆盖肿瘤组织<br>B.病灶紧邻肝门部胆管时，应避免胆管损伤<br>C.治疗完成后应快速退针<br>D.治疗完成进行针道凝固时保持针尖温度在 50° C<br>E.治疗中病人出现疼痛、恶心应立即终止治疗", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 219, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-19", "title": "19. 不属于 腔内超声的是", "front": "A.经食管超声<br>B.经直肠超声<br>C.经尿道超声<br>D.经阴道超声<br>E.经会阴超声", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 219, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-20", "title": "20. 关于 HIFU 治疗乳腺癌的适应证, 正确的描述是", "front": "A.Ⅰ、Ⅱ期乳腺癌<br>B.多中心性乳腺癌<br>C.乳晕下乳腺癌<br>D.Ⅲ期乳腺癌<br>E.Ⅳ期乳腺癌", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 219, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-21", "title": "21. 关于 HIFU 治疗肝癌的适应证, 正确的描述是", "front": "A.弥漫性肝癌<br>B.晚期肝癌肝功能严重失代偿<br>C.肿瘤远处转移<br>D.恶病质病人<br>E.直径&lt;12cm 的右肝单发肝癌", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 219, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-22", "title": "22. 关于超声微泡造影剂， 不正确 的描述是", "front": "A.超声微泡可作为空化核，提高超声波空化效应<br>B.超声微泡可携带基因治疗<br>C.超声微泡可携带药物治疗<br>D.仅可用于诊断领域<br>E.超声微泡可与超声联合溶栓", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "介入"], "kind": "选择题", "page": 220, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-1", "title": "23. 病人，男性。45岁，超声体检于右肾下份见一大小约7.5cm×5.4cm的无回声区，边界清楚，边缘欠规则，后方回声增强，CDFI：其内未见确切彩色血流信号。该病人最适宜的治疗方法是", "front": "A.超声引导下射频消融<br>B.超声引导下微波治疗<br>C.超声引导下穿刺抽液及硬化治疗<br>D.超声引导下置管引流<br>E.超声引导下细针抽吸", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "介入"], "kind": "选择题", "page": 220, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-2", "title": "24. 病人，男性。50 岁，原发性肝癌术后 2 年，于左外叶见一大小约 2.1 cm × 1.8 cm 的低回声结节，边界清楚，边缘欠规则，拟行超声引导下无水乙醇消融治疗。正确的描述是", "front": "A.酒精用量应覆盖肿瘤及其周边至少 0.5cm 范围的正常肝组织<br>B.酒精注射时应快速推注<br>C.注射酒精时从病灶中央开始注射<br>D.注射酒精时从病灶浅面开始注射<br>E.酒精用量应覆盖肿瘤及其周边至少 1cm 范围的正常肝组织", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A2型题", "选择题", "介入"], "kind": "选择题", "page": 220, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-3", "title": "25. 病人，女性。42岁，肝硬化病史10年，肝右后叶见一大小约3.0cm×2.5cm的低回声结节，边界欠清，边缘规则，内部回声不均匀，周边可见低回声晕。可选择的介入治疗方法中， 不适用 的是", "front": "A.超声引导下无水乙醇消融治疗<br>B.超声引导下置管引流<br>C.超声引导下微波消融治疗<br>D.HIFU 治疗<br>E.超声引导下射频消融治疗", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "介入"], "ki "介入"], "kind": "共用备选答案", "page": 0, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-3-6", "title": "31. 前列腺穿刺活检可使用", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["B型题", "介入"], "kind": "共用备选答案", "page": 0, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-4-1", "title": "1. 简述超声引导下穿刺的优势和特点。", "front": "", "back": "<b>参考答案:</b><br>（1）引导准确：理论上普通二维超声完全能够准确引导穿刺针进入直径6mm以上的深部靶病灶内。近年来，随着超声成像技术的飞速发展，特别是实时三维成像技术的不断完善和应用，超声引导穿刺的精确性得到了进一步的提高。\n\n（2）简单方便：超声与X线、CT、MRI等影像学检查方法相比更普及实用，超声引导下穿刺对设备和技术要求都相对简单。超声仪器携带或移动方便，便于进行床旁和术中检查与引导穿刺。\n\n（3）安全可靠：一方面，超声引导穿刺对于操作者和病人均无放射性危害。另一方面，超声引导穿刺的全过程均是在超声实时监视下进行的，不但可观察穿刺针进针过程，避免损伤大血管和邻近重要结构，减少了并发症；而且还能及时评价治疗效果和发现一些潜在的并发症。\n\n（4）费用低廉：与 CT 和 MRI 相比，超声引导穿刺费用低、性价比高，有利于降低医疗成本，减轻病人经济负担。", "tags": ["简答题", "介入"], "kind": "简答题", "page": 221, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-4-2", "title": "2. 简述超声引导下穿刺的禁忌证。", "front": "", "back": "<b>参考答案:</b><br>（1）病人无法配合，如频繁咳嗽、躁动等；\n\n（2）病人有严重出血倾向；\n\n（3）病灶紧邻重要脏器结构或大血管，或穿刺进针路径上有重要脏器结构或大血管而又无法规避；\n\n（4）动脉瘤、嗜铬细胞瘤、肝表面的血管瘤或癌结节及胰腺炎等不宜进行穿刺。", "tags": ["简答题", "介入"], "kind": "简答题", "page": 221, "chapter": "ch12", "static": false, "image": "", "figcap": ""}, {"no": "12-4-3", "title": "3. 简述超声引导下穿刺路径选择的基本原则及注意事项。", "front": "", "back": "<b>参考答案:</b><br>穿刺路径的选择原则是在安全的前提下，以选择最短路径为基本原则。穿刺路径上应避开大血管及其他重要脏器。上腹部穿刺应避免损伤胸膜腔，进针点应距肺底强回声带以下至少3cm。肾、肾上腺、腹膜后病变穿刺，原则上应经侧腹壁或后腹壁进针。\n\n对肝脏病灶进行穿刺应先通过一部分正常肝组织；对胰腺囊肿穿刺禁忌经过正常胰腺组织；肾脏病灶穿刺则要求尽量直接进入病灶，穿刺对周围组织造成的损伤越小越好。\n\n（冉海涛 张群霞）\n# 国家卫生和计划生育委员会“十三五”规划教材配套教材 全国高等学校配套教材 供医学影像学专业用", "tags": ["简答题", "介入"], "kind": "简答题", "page": 221, "chapter": "ch12", "static": false, "image": "", "figcap": ""}];

const container = document.getElementById('cards-container');
let activeFilter = 'all';
let searchTerm = '';

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function attrEscape(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function cardHTML(card) {
  const tags = (card.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  const searchBlob = ((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '')).toLowerCase();
  const safeSearch = attrEscape(searchBlob);
  const safeKind = attrEscape(card.kind);
  const safeTags = attrEscape((card.tags || []).join(','));
  const figHTML = card.image ? `<figure class="card-fig"><img src="${card.image}" alt="${attrEscape(card.figcap)}" loading="lazy"><figcaption>${card.figcap || ''}</figcaption></figure>` : '';
  if (card.static) {
    const isKp = card.kind === '重点';
    const icon = isKp ? '⭐' : '🔗';
    const cls = isKp ? 'static-card kp-static' : 'static-card';
    return `
    <div class="card ${cls}" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}" data-static="1">
      <div class="card-static-inner">
        <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
        <div class="card-title">${icon} ${card.title}</div>
        <div class="card-body">${card.front}</div>
        <div class="tags">${tags}</div>
      </div>
    </div>
  `;
  }
  return `
    <div class="card" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title">📌 ${card.title}</div>
          ${figHTML}
          <div class="card-body">${card.front}</div>
          <div class="tags">${tags}</div>
          <div class="flip-hint">💡 点击卡片翻面查看答案</div>
        </div>
        <div class="card-face card-back">
          <div class="card-no">卡号 ${card.no} · 答案 ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title answer-title">✅ ${card.title}</div>
          ${figHTML}
          <div class="card-body answer-body">${card.back}</div>
          <div class="tags">${tags}</div>
          <div class="card-actions"><button type="button" class="flip-back-btn">↩︎ 返回题目</button></div>
        </div>
      </div>
    </div>
  `;
}

function renderCards() {
  let html = '';
  let visibleCount = 0;
  const sections = {
    '前言': [], '目录': [], '重点': [],
    '名词解释': [], '填空题': [], '选择题': [], '共用备选答案': [], '简答题': []
  };
  const others = [];

  CARDS_DATA.forEach(card => {
    const tags = card.tags || [];
    const kind = card.kind || '';
    let placed = false;
    for (const k of Object.keys(sections)) {
      if (tags.includes(k) || kind === k) {
        sections[k].push(card); placed = true; break;
      }
    }
    if (!placed) others.push(card);
  });

  // 标题映射
  const titleMap = {
    '前言': '📖 前言',
    '目录': '📚 目录',
    '重点': '⭐ 重点难点',
    '名词解释': '📝 名词解释',
    '填空题': '✏️ 填空题',
    '选择题': '🔘 选择题',
    '共用备选答案': '🔗 共用备选答案(B型题)',
    '简答题': '📋 简答题'
  };

  let allCards = [];
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    allCards.push({type: 'title', label: titleMap[k], key: k});
    list.forEach(c => allCards.push({type: 'card', data: c, key: k}));
  }
  others.forEach(c => allCards.push({type: 'card', data: c, key: '其他'}));

  allCards.forEach(item => {
    if (item.type === 'title') {
      html += `<div class="section-title" id="section-${item.key}" data-section="${item.key}">${item.label} <span style="font-size:13px;color:#94a3b8;">(${sections[item.key]?.length || 0} 张)</span></div>`;
    } else {
      const card = item.data;
      const matchSearch = !searchTerm || (((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '') + ' ' + (card.tags || []).join(' ')).toLowerCase().includes(searchTerm));
      const matchFilter = activeFilter === 'all' ||
        (card.tags || []).some(t => t === activeFilter) ||
        card.kind === activeFilter;
      if (matchSearch && matchFilter) {
        html += cardHTML(card);
        visibleCount++;
      }
    }
  });

  if (visibleCount === 0) {
    html = '<div class="empty">🚫 没有匹配的卡片</div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('.section-title').forEach(title => {
    const next = title.nextElementSibling;
    if (!next || next.classList.contains('section-title')) title.remove();
  });
  renderNav(sections, titleMap);
  document.querySelectorAll('#section-nav a[href^="#section-"]').forEach(link => {
    const targetId = link.getAttribute('href').slice(1);
    if (!document.getElementById(targetId)) link.remove();
  });

  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
}

function renderNav(sections, titleMap) {
  const nav = document.getElementById('section-nav');
  let html = '<a href="#top">⬆️ 顶部</a>';
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    const label = titleMap[k] || k;
    const short = label.replace(/^[^一-龥A-Za-z]+/, '');
    html += `<a href="#section-${k}">${short}</a>`;
  }
  nav.innerHTML = html;
}

document.getElementById('section-nav').addEventListener('click', e => {
  const link = e.target.closest('a');
  if (!link) return;
  e.preventDefault();
  const id = link.getAttribute('href').slice(1);
  if (id === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  const target = document.getElementById(id);
  if (target) {
    const top = target.getBoundingClientRect().top + window.scrollY - 50;
    window.scrollTo({ top, behavior: 'smooth' });
  }
});

container.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card || card.classList.contains('static-card')) return;
  // 显式"返回题目"按钮:收起答案
  if (e.target.closest('.flip-back-btn')) {
    card.classList.remove('flipped');
    return;
  }
  // 已翻面时,点击不再翻回(避免误触遮住答案);仅按钮可收起
  if (card.classList.contains('flipped')) return;
  // 正在选择文字(复制)时不翻面
  const sel = window.getSelection();
  if (sel && sel.toString().trim().length > 0) return;
  // 链接/图片等交互元素不触发翻面
  if (e.target.closest('a, img, button')) return;
  card.classList.add('flipped');
});

document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

document.getElementById('flip-all').addEventListener('click', () => {
  const cards = document.querySelectorAll('.card:not(.static-card)');
  const allFlipped = Array.from(cards).every(c => c.classList.contains('flipped'));
  cards.forEach(c => c.classList.toggle('flipped', !allFlipped));
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  renderCards();
});

window.addEventListener('scroll', () => {
  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
});

// ===== 学习追踪 (艾宾浩斯遗忘曲线) =====
const EB_INTERVALS = [1, 2, 4, 7, 15, 30, 60, 90];
const LEVEL_NAMES = ['Lv.0 入门', 'Lv.1 巩固', 'Lv.2 熟练', 'Lv.3 精通', 'Lv.4 大师', 'Lv.5 宗师'];
const STORAGE_KEY = 'us_xtj_tracker_' + (CARDS_DATA[0]?.chapter || 'default');

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function formatDuration(ms) {
  const total = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return h > 0 ? `${pad2(h)}:${pad2(m)}:${pad2(s)}` : `${pad2(m)}:${pad2(s)}`;
}

function formatRemaining(ms) {
  if (ms <= 0) return '⏰ 现在该复习啦!';
  const total = Math.floor(ms / 1000);
  const d = Math.floor(total / 86400);
  const h = Math.floor((total % 86400) / 3600);
  const m = Math.floor((total % 3600) / 60);
  if (d > 0) return `还有 ${d} 天 ${h} 小时`;
  if (h > 0) return `还有 ${h} 小时 ${m} 分`;
  return `还有 ${m} 分钟`;
}

function loadTracker() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { firstOpen: Date.now(), lastOpen: Date.now(), visits: 0, level: 0, nextReviewAt: null };
}

function saveTracker(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function recomputeNextReview(state) {
  if (state.level >= EB_INTERVALS.length) {
    state.nextReviewAt = null;
    return;
  }
  const days = EB_INTERVALS[state.level];
  state.nextReviewAt = Date.now() + days * 24 * 3600 * 1000;
}

const tracker = loadTracker();
tracker.visits = (tracker.visits || 0) + 1;
tracker.lastOpen = Date.now();
if (!tracker.nextReviewAt) recomputeNextReview(tracker);
saveTracker(tracker);

const sessionStart = Date.now();
const $elapsed = document.getElementById('elapsed');
const $visit = document.getElementById('visit-count');
const $level = document.getElementById('review-level');
const $next = document.getElementById('next-review');
const $hint = document.getElementById('review-hint');

function renderTracker() {
  $elapsed.textContent = formatDuration(Date.now() - sessionStart);
  $visit.textContent = tracker.visits;
  $level.textContent = LEVEL_NAMES[Math.min(tracker.level, LEVEL_NAMES.length - 1)];
  if (tracker.level >= EB_INTERVALS.length) {
    $next.textContent = '🎉 已完全掌握';
    $hint.textContent = '你已超越艾宾浩斯曲线,知识长存!';
  } else {
    const now = Date.now();
    if (tracker.nextReviewAt && now >= tracker.nextReviewAt) {
      $next.textContent = '⏰ 现在该复习啦!';
      $hint.textContent = `按 Lv.${tracker.level} 间隔 ${EB_INTERVALS[tracker.level]} 天,已到复习点`;
    } else {
      $next.textContent = formatRemaining((tracker.nextReviewAt || 0) - now);
      const nextDays = EB_INTERVALS[tracker.level];
      $hint.textContent = `当前等级:第 ${tracker.level} 次复习 · 间隔 ${nextDays} 天`;
    }
  }
}

renderTracker();
setInterval(renderTracker, 1000);

document.getElementById('mark-reviewed').addEventListener('click', () => {
  tracker.level = Math.min(tracker.level + 1, EB_INTERVALS.length);
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
  const btn = document.getElementById('mark-reviewed');
  const orig = btn.textContent;
  btn.textContent = '🎉 已记录!';
  btn.style.background = '#10b981';
  setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1200);
});

document.getElementById('reset-tracker').addEventListener('click', () => {
  if (!confirm('确定要重置本章节的学习记录吗?')) return;
  tracker.firstOpen = Date.now();
  tracker.lastOpen = Date.now();
  tracker.visits = 1;
  tracker.level = 0;
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
});

renderCards();
</script>
