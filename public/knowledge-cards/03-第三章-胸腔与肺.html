<script>
const CARDS_DATA = [{"no": "3-1-1", "title": "胸膜腔", "front": "请简述该名词的定义。", "back": "<b>胸膜腔</b>:<br>脏层胸膜与壁层胸膜之间是一个封闭、狭窄的腔隙，即胸膜腔。", "tags": ["名词解释", "胸肺"], "kind": "名词解释", "page": 49, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-1-2", "title": "胸膜滑动征", "front": "请简述该名词的定义。", "back": "<b>胸膜滑动征</b>:<br>脏层胸膜随呼吸可做上下运动，这种现象称为“滑动征”，是特征性生理现象。", "tags": ["名词解释", "胸肺"], "kind": "名词解释", "page": 49, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-1-3", "title": "肺点", "front": "请简述该名词的定义。", "back": "<b>肺点</b>:<br>指在气胸病人的胸壁上存在特定部位，此部位气胸声像与正常肺部声像动态交替出现，超声表现为特定部位“滑动征”或B线随呼吸的周期出现后消失。", "tags": ["名词解释", "胸肺"], "kind": "名词解释", "page": 49, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-1-4", "title": "支气管气相", "front": "请简述该名词的定义。", "back": "<b>支气管气相</b>:<br>实变肺内含气支气管，超声表现为等回声实变肺内条线状强回声，称为“支气管气相”。", "tags": ["名词解释", "胸肺"], "kind": "名词解释", "page": 49, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-1-5", "title": "支气管液相", "front": "请简述该名词的定义。", "back": "<b>支气管液相</b>:<br>实变肺内支气管充满液体时，超声表现为等回声实变肺内分支状无回声结构，称为“支气管液相”。", "tags": ["名词解释", "胸肺"], "kind": "名词解释", "page": 49, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-2-1", "title": "1. 胸壁是由骨骼及软组织构成，软组织包括___、___、___及乳房等。", "front": "", "back": "<b>答案:</b>皮肤 皮下组织 肌肉", "tags": ["填空题", "胸肺"], "kind": "填空题", "page": 49, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-2-2", "title": "2. 胸膜腔是一个封闭、狭窄的腔隙，生理状态下内有微量浆液，约___ml。", "front": "", "back": "<b>答案:</b>13~15ml", "tags": ["填空题", "胸肺"], "kind": "填空题", "page": 49, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-2-3", "title": "3. 胸膜增厚分为___和___两种。", "front": "", "back": "<b>答案:</b>弥漫性 局限性", "tags": ["填空题", "胸肺"], "kind": "填空题", "page": 49, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-2-4", "title": "4. 膈肌在外侧及前后方与胸壁相交形成 ___。", "front": "", "back": "<b>答案:</b>肋膈角", "tags": ["填空题", "胸肺"], "kind": "填空题", "page": 49, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-2-5", "title": "5. 以肋骨为声学标志，胸膜腔各结构容易被识别。胸膜腔位于肋骨深方约___处。", "front": "", "back": "<b>答案:</b>1cm", "tags": ["填空题", "胸肺"], "kind": "填空题", "page": 49, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-2-6", "title": "6. 脏层胸膜随呼吸可做上下运动，这种现象称___，是特征性生理现象。", "front": "", "back": "<b>答案:</b>滑动征", "tags": ["填空题", "胸肺"], "kind": "填空题", "page": 49, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-2-7", "title": "7. 当含气肺组织紧贴膈肌时，在膈肌上方可反射出肝脏或脾脏的图像，这种现象称为___。", "front": "", "back": "<b>答案:</b>镜面反射", "tags": ["填空题", "胸肺"], "kind": "填空题", "page": 49, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-2-8", "title": "8. 正常膈肌厚度约为___, 其胸腔面由壁层胸膜覆盖, 腹腔面由腹膜覆盖。", "front": "", "back": "<b>答案:</b>5mm", "tags": ["填空题", "胸肺"], "kind": "填空题", "page": 49, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-1", "title": "1. 产生“彗星尾征”的原因是", "front": "A.多次内部混响<br>B.旁瓣伪像<br>C.镜面伪像<br>D.声束失真<br>E.棱镜伪像", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "胸肺"], "kind": "选择题", "page": 50, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-2", "title": "2. 关于肺炎所致肺组织实变的超声表现， 不正确 的描述是", "front": "A.多呈楔形或三角形<br>B.内可见超声“支气管气相”<br>C.与周围正常的肺组织分界欠清晰<br>D.实变肺组织内的血管结构受压变形甚至被破坏<br>E.回声酷似肝实质", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "胸肺"], "kind": "选择题", "page": 50, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-3", "title": "3. 关于支气管肺癌， 不正确 的描述是", "front": "A.为肺的原发性肿瘤<br>B.大多数起源于各级支气管黏膜上皮或腺体<br>C.组织学分类可为鳞癌、腺癌、小细胞癌和大细胞癌<br>D.女性多于男性<br>E.可出现类癌综合征", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "胸肺"], "kind": "选择题", "page": 50, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-4", "title": "4. 右肝肋缘下向上扫查时常可见到镜面伪像， 不正确 的描述是", "front": "A.正常肝脏：膈下为肝脏实像，膈上为肝脏虚像<br>B.肝内肿瘤：膈下、膈上各有一个对称的肿瘤，前者为实像，后者是伪像<br>C.肝内囊肿：膈下、膈上各有一个对称的肿瘤，前者为实像，后者是伪像<br>D.右侧胸腔积液时，以上镜面伪像更明显<br>E.右侧胸腔积液时，以上镜面伪像消失", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "胸肺"], "kind": "选择题", "page": 51, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-5", "title": "5. 可出现混响伪像的是", "front": "A.超声束垂直于胸壁和肺表面引起多次内部混响<br>B.超声束垂直于腹壁引起内部混响<br>C.超声束在器官组织的异物内来回反射<br>D.超声束垂直射入骨膜和骨表面<br>E.超声束射向肩关节软骨和骨表面时，在软骨内部", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "胸肺"], "kind": "选择题", "page": 51, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-6", "title": "6. 关于组织、体液的声衰减， 不正确 的描述是", "front": "A.不同的体液也存在着不同的声衰减<br>B.通常骨骼声衰减很强，往往引起声影<br>C.瘢痕组织声衰减也是比较强的，次于骨骼<br>D.含气肺的密度很低，因此不容易引起声衰减<br>E.肝、脾、肾、胰等实质器官声衰减也存在着一定程度的差异", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "胸肺"], "kind": "选择题", "page": 51, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-7", "title": "7. 关于人体不同组织回声强度， 不正确 的描述是", "front": "A.皮肤：高回声或较高(较强)回声<br>B.皮下脂肪：较高水平回声<br>C.肝、脾：中等水平回声<br>D.肝、脾包膜：高回声<br>E.胸膜-肺组织：高回声伴多次反射和声影", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "胸肺"], "kind": "选择题", "page": 51, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-1", "title": "8. 该病人出现胸腔积液，则胸腔积液的性状最可能为", "front": "A.清亮透彻<br>B.脓性<br>C.血性<br>D.蛋清状<br>E.乳糜状", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "胸肺"], "kind": "选择题", "page": 52, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-2", "title": "9. 其最可能的诊断是", "front": "A.肺结核<br>B.支气管肺癌<br>C.肺错构瘤<br>D.肺转移瘤<br>E.胸膜间皮瘤", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "胸肺"], "kind": "选择题", "page": 52, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-3", "title": "10. 关于超声探查到的楔形低回声， 不正确 的描述是", "front": "A.可能为阻塞性肺实变<br>B.可能为阻塞性肺不张<br>C.楔形低回声邻近的脏层胸膜的线样强回声中断、显著破坏<br>D.内可见支气管液相<br>E.内可见支气管气相", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "胸肺"], "kind": "选择题", "page": 52, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-shared-11-13", "title": "共用备选答案 · 第 11~13 题", "front": "<b>下列第 11~13 题共用以下备选答案:</b><br>A.混响伪像<br>B.彗星尾征<br>C.胸膜滑动征<br>D.蝙蝠征<br>E.镜面反射", "back": "", "tags": ["B型题", "胸肺"], "kind": "共用备选答案", "page": 0, "chapter": "ch3", "static": true, "image": "", "figcap": ""}, {"no": "3-3-1", "title": "11. 当声波垂直投射于光滑的胸膜-肺界面时，表现为垂直于超声束且等距离排列的多条强回声，间距等于皮肤到胸膜线的距离，称", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["B型题", "胸肺"], "kind": "共用备选答案", "page": 0, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-2", "title": "12. 脏层胸膜随呼吸可做上下运动，这种现象称为", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["B型题", "胸肺"], "kind": "共用备选答案", "page": 0, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-3", "title": "13. 肋骨声影和胸膜线构成的图像,称为", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["B型题", "胸肺"], "kind": "共用备选答案", "page": 0, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-shared-14-16", "title": "共用备选答案 · 第 14~16 题", "front": "<b>下列第 14~16 题共用以下备选答案:</b><br>A.5mm<br>B.13~15ml<br>C.3~4cm<br>D.15~20ml<br>E.1~2cm", "back": "", "tags": ["B型题", "胸肺"], "kind": "共用备选答案", "page": 0, "chapter": "ch3", "static": true, "image": "", "figcap": ""}, {"no": "3-3-4", "title": "14. 正常膈肌厚度约为", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["B型题", "胸肺"], "kind": "共用备选答案", "page": 0, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-5", "title": "15. 胸膜腔生理性积液量为", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["B型题", "胸肺"], "kind": "共用备选答案", "page": 0, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-3-6", "title": "16. 右膈顶部比左膈顶部高", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["B型题", "胸肺"], "kind": "共用备选答案", "page": 0, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-4-1", "title": "1. 简述胸壁结构的声像图表现。", "front": "", "back": "<b>参考答案:</b><br>沿肋间用高频探头可显示皮肤、皮下脂肪、胸壁肌层及内外侧筋膜结构。胸壁皮肤呈高回声带，厚2~3mm，其下方低回声为皮下脂肪组织，胸壁肌层为实性等回声，筋膜为细线状高回声，声像图上表现为高-低-等-高回声。由于声波无法穿透骨骼，因此肋骨表现为弧形高回声以及后方伴随声影，相邻两个肋骨之间为肋间肌。", "tags": ["简答题", "胸肺"], "kind": "简答题", "page": 53, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-4-2", "title": "2. 简述恶性胸膜间皮瘤的超声表现。", "front": "", "back": "<b>参考答案:</b><br>①恶性弥漫型间皮瘤多呈广泛胸膜增厚，可包裹肺；②肿瘤位于胸壁与肺之间，自胸膜向胸腔内突起，并与胸壁相连或分界不清；③多呈片状或结节融合状，边界不规则，其范围（长度及宽度）多明显大于厚度；④以低回声多见，亦可呈不均匀等回声，内部无气体或支气管结构；⑤侵及肋骨可见肿块中有弧形强回声伴声影；⑥胸腔积液位于肿瘤与肺表面之间，少量胸腔积液的部位有助于鉴别肺肿瘤与胸膜肿瘤；⑦肺组织受压或受侵犯呈广泛实变。", "tags": ["简答题", "胸肺"], "kind": "简答题", "page": 53, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-4-3", "title": "3. 简述肺实变的超声表现。", "front": "", "back": "<b>参考答案:</b><br>实变肺通常呈楔形、片状，回声类似肝脏。内可见“支气管气相”和“支气管液相”。肺血管也可显示为分支的管状结构。", "tags": ["简答题", "胸肺"], "kind": "简答题", "page": 53, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-4-4", "title": "4. 简述气胸的超声表现。", "front": "", "back": "<b>参考答案:</b><br>当气胸产生时，脏壁层胸膜分离，胸膜腔内充满气体，超声波无法进行有效的传播。若超声检查时提示胸膜“滑动征”及“彗星尾征”（B线）消失，则提示气胸可能。出现“肺\n点”是诊断气胸高度特异性征象。", "tags": ["简答题", "胸肺"], "kind": "简答题", "page": 53, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-4-5", "title": "5. 简述肺水肿的超声表现。", "front": "", "back": "<b>参考答案:</b><br>肺水肿时肺组织中气体和水的比例发生明显变化，气液体间的声阻抗差较大，超声在气体和水的界面上即产生强烈的混响，声束在反射体内来回往返，形成多次反射，表现为弥漫性“彗星尾征”（B线）。", "tags": ["简答题", "胸肺"], "kind": "简答题", "page": 53, "chapter": "ch3", "static": false, "image": "", "figcap": ""}, {"no": "3-4-6", "title": "6. 简述肺实变与周围型肺肿瘤的鉴别诊断。", "front": "", "back": "<b>参考答案:</b><br>肺实变二维超声表现为尖端指向肺门的楔形改变，“支气管气相”及“支气管液相”有助于对肺实变的鉴别诊断。周围型肺肿瘤形态不固定，局部胸膜可出现隆起，当恶性肿瘤侵犯胸膜时可出现胸膜线中断，或向内凹陷等表现。\n\n（严昆 王凇） 2100 2101 2102 2103 2104 2105 2106 2107 2108 2109 2110 2111 2112 2113 2114 2115 2116 2117 2118 2119 2200 2201 2202 2203 2204 2205 2206 2207 2208 2209 2210 2211 2212 2213 2214 2215 2216 2217 2218 2219 2220 2221 2222 2223 2224 2225 2226 2227 2228 2229 2230 2231 2232 2233 2234 2235 2236 2237 2238 2239 2240 2241 2242 2243 2244 2245 2246 2247 2248 2249 2250 2251 2252 2253 2254 2255 2256 2257 2258 2259 2260 2261 2262 2263 2264 2265 2266 2267 2268 2269 2270 2271 2272 2273 2274 2275 2276 2277 ...", "tags": ["简答题", "胸肺"], "kind": "简答题", "page": 53, "chapter": "ch3", "static": false, "image": "", "figcap": ""}];

const container = document.getElementById('cards-container');
let activeFilter = 'all';
let searchTerm = '';

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function attrEscape(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function cardHTML(card) {
  const tags = (card.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  const searchBlob = ((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '')).toLowerCase();
  const safeSearch = attrEscape(searchBlob);
  const safeKind = attrEscape(card.kind);
  const safeTags = attrEscape((card.tags || []).join(','));
  const figHTML = card.image ? `<figure class="card-fig"><img src="${card.image}" alt="${attrEscape(card.figcap)}" loading="lazy"><figcaption>${card.figcap || ''}</figcaption></figure>` : '';
  if (card.static) {
    const isKp = card.kind === '重点';
    const icon = isKp ? '⭐' : '🔗';
    const cls = isKp ? 'static-card kp-static' : 'static-card';
    return `
    <div class="card ${cls}" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}" data-static="1">
      <div class="card-static-inner">
        <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
        <div class="card-title">${icon} ${card.title}</div>
        <div class="card-body">${card.front}</div>
        <div class="tags">${tags}</div>
      </div>
    </div>
  `;
  }
  return `
    <div class="card" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title">📌 ${card.title}</div>
          ${figHTML}
          <div class="card-body">${card.front}</div>
          <div class="tags">${tags}</div>
          <div class="flip-hint">💡 点击卡片翻面查看答案</div>
        </div>
        <div class="card-face card-back">
          <div class="card-no">卡号 ${card.no} · 答案 ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title answer-title">✅ ${card.title}</div>
          ${figHTML}
          <div class="card-body answer-body">${card.back}</div>
          <div class="tags">${tags}</div>
          <div class="card-actions"><button type="button" class="flip-back-btn">↩︎ 返回题目</button></div>
        </div>
      </div>
    </div>
  `;
}

function renderCards() {
  let html = '';
  let visibleCount = 0;
  const sections = {
    '前言': [], '目录': [], '重点': [],
    '名词解释': [], '填空题': [], '选择题': [], '共用备选答案': [], '简答题': []
  };
  const others = [];

  CARDS_DATA.forEach(card => {
    const tags = card.tags || [];
    const kind = card.kind || '';
    let placed = false;
    for (const k of Object.keys(sections)) {
      if (tags.includes(k) || kind === k) {
        sections[k].push(card); placed = true; break;
      }
    }
    if (!placed) others.push(card);
  });

  // 标题映射
  const titleMap = {
    '前言': '📖 前言',
    '目录': '📚 目录',
    '重点': '⭐ 重点难点',
    '名词解释': '📝 名词解释',
    '填空题': '✏️ 填空题',
    '选择题': '🔘 选择题',
    '共用备选答案': '🔗 共用备选答案(B型题)',
    '简答题': '📋 简答题'
  };

  let allCards = [];
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    allCards.push({type: 'title', label: titleMap[k], key: k});
    list.forEach(c => allCards.push({type: 'card', data: c, key: k}));
  }
  others.forEach(c => allCards.push({type: 'card', data: c, key: '其他'}));

  allCards.forEach(item => {
    if (item.type === 'title') {
      html += `<div class="section-title" id="section-${item.key}" data-section="${item.key}">${item.label} <span style="font-size:13px;color:#94a3b8;">(${sections[item.key]?.length || 0} 张)</span></div>`;
    } else {
      const card = item.data;
      const matchSearch = !searchTerm || (((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '') + ' ' + (card.tags || []).join(' ')).toLowerCase().includes(searchTerm));
      const matchFilter = activeFilter === 'all' ||
        (card.tags || []).some(t => t === activeFilter) ||
        card.kind === activeFilter;
      if (matchSearch && matchFilter) {
        html += cardHTML(card);
        visibleCount++;
      }
    }
  });

  if (visibleCount === 0) {
    html = '<div class="empty">🚫 没有匹配的卡片</div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('.section-title').forEach(title => {
    const next = title.nextElementSibling;
    if (!next || next.classList.contains('section-title')) title.remove();
  });
  renderNav(sections, titleMap);
  document.querySelectorAll('#section-nav a[href^="#section-"]').forEach(link => {
    const targetId = link.getAttribute('href').slice(1);
    if (!document.getElementById(targetId)) link.remove();
  });

  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
}

function renderNav(sections, titleMap) {
  const nav = document.getElementById('section-nav');
  let html = '<a href="#top">⬆️ 顶部</a>';
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    const label = titleMap[k] || k;
    const short = label.replace(/^[^一-龥A-Za-z]+/, '');
    html += `<a href="#section-${k}">${short}</a>`;
  }
  nav.innerHTML = html;
}

document.getElementById('section-nav').addEventListener('click', e => {
  const link = e.target.closest('a');
  if (!link) return;
  e.preventDefault();
  const id = link.getAttribute('href').slice(1);
  if (id === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  const target = document.getElementById(id);
  if (target) {
    const top = target.getBoundingClientRect().top + window.scrollY - 50;
    window.scrollTo({ top, behavior: 'smooth' });
  }
});

container.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card || card.classList.contains('static-card')) return;
  // 显式"返回题目"按钮:收起答案
  if (e.target.closest('.flip-back-btn')) {
    card.classList.remove('flipped');
    return;
  }
  // 已翻面时,点击不再翻回(避免误触遮住答案);仅按钮可收起
  if (card.classList.contains('flipped')) return;
  // 正在选择文字(复制)时不翻面
  const sel = window.getSelection();
  if (sel && sel.toString().trim().length > 0) return;
  // 链接/图片等交互元素不触发翻面
  if (e.target.closest('a, img, button')) return;
  card.classList.add('flipped');
});

document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

document.getElementById('flip-all').addEventListener('click', () => {
  const cards = document.querySelectorAll('.card:not(.static-card)');
  const allFlipped = Array.from(cards).every(c => c.classList.contains('flipped'));
  cards.forEach(c => c.classList.toggle('flipped', !allFlipped));
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  renderCards();
});

window.addEventListener('scroll', () => {
  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
});

// ===== 学习追踪 (艾宾浩斯遗忘曲线) =====
const EB_INTERVALS = [1, 2, 4, 7, 15, 30, 60, 90];
const LEVEL_NAMES = ['Lv.0 入门', 'Lv.1 巩固', 'Lv.2 熟练', 'Lv.3 精通', 'Lv.4 大师', 'Lv.5 宗师'];
const STORAGE_KEY = 'us_xtj_tracker_' + (CARDS_DATA[0]?.chapter || 'default');

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function formatDuration(ms) {
  const total = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return h > 0 ? `${pad2(h)}:${pad2(m)}:${pad2(s)}` : `${pad2(m)}:${pad2(s)}`;
}

function formatRemaining(ms) {
  if (ms <= 0) return '⏰ 现在该复习啦!';
  const total = Math.floor(ms / 1000);
  const d = Math.floor(total / 86400);
  const h = Math.floor((total % 86400) / 3600);
  const m = Math.floor((total % 3600) / 60);
  if (d > 0) return `还有 ${d} 天 ${h} 小时`;
  if (h > 0) return `还有 ${h} 小时 ${m} 分`;
  return `还有 ${m} 分钟`;
}

function loadTracker() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { firstOpen: Date.now(), lastOpen: Date.now(), visits: 0, level: 0, nextReviewAt: null };
}

function saveTracker(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function recomputeNextReview(state) {
  if (state.level >= EB_INTERVALS.length) {
    state.nextReviewAt = null;
    return;
  }
  const days = EB_INTERVALS[state.level];
  state.nextReviewAt = Date.now() + days * 24 * 3600 * 1000;
}

const tracker = loadTracker();
tracker.visits = (tracker.visits || 0) + 1;
tracker.lastOpen = Date.now();
if (!tracker.nextReviewAt) recomputeNextReview(tracker);
saveTracker(tracker);

const sessionStart = Date.now();
const $elapsed = document.getElementById('elapsed');
const $visit = document.getElementById('visit-count');
const $level = document.getElementById('review-level');
const $next = document.getElementById('next-review');
const $hint = document.getElementById('review-hint');

function renderTracker() {
  $elapsed.textContent = formatDuration(Date.now() - sessionStart);
  $visit.textContent = tracker.visits;
  $level.textContent = LEVEL_NAMES[Math.min(tracker.level, LEVEL_NAMES.length - 1)];
  if (tracker.level >= EB_INTERVALS.length) {
    $next.textContent = '🎉 已完全掌握';
    $hint.textContent = '你已超越艾宾浩斯曲线,知识长存!';
  } else {
    const now = Date.now();
    if (tracker.nextReviewAt && now >= tracker.nextReviewAt) {
      $next.textContent = '⏰ 现在该复习啦!';
      $hint.textContent = `按 Lv.${tracker.level} 间隔 ${EB_INTERVALS[tracker.level]} 天,已到复习点`;
    } else {
      $next.textContent = formatRemaining((tracker.nextReviewAt || 0) - now);
      const nextDays = EB_INTERVALS[tracker.level];
      $hint.textContent = `当前等级:第 ${tracker.level} 次复习 · 间隔 ${nextDays} 天`;
    }
  }
}

renderTracker();
setInterval(renderTracker, 1000);

document.getElementById('mark-reviewed').addEventListener('click', () => {
  tracker.level = Math.min(tracker.level + 1, EB_INTERVALS.length);
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
  const btn = document.getElementById('mark-reviewed');
  const orig = btn.textContent;
  btn.textContent = '🎉 已记录!';
  btn.style.background = '#10b981';
  setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1200);
});

document.getElementById('reset-tracker').addEventListener('click', () => {
  if (!confirm('确定要重置本章节的学习记录吗?')) return;
  tracker.firstOpen = Date.now();
  tracker.lastOpen = Date.now();
  tracker.visits = 1;
  tracker.level = 0;
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
});

renderCards();
</script>
