": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-7", "title": "7. 关于急性跟腱炎的超声表现， 不正确 的描述是", "front": "A.跟腱弥漫性增厚<br>B.跟腱回声减弱<br>C.跟腱内探及丰富彩色血流信号<br>D.跟腱于跟骨附着部增厚、回声减弱<br>E.跟腱内探及强回声钙化灶", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 208, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-8", "title": "8. 关于跟腱断裂的超声表现， 不正确 的描述是", "front": "A.跟腱纤维完全中断<br>B.跟腱断端之间可见无回声的积血<br>C.跟腱增粗<br>D.踝关节跖屈时断端距离缩小<br>E.踝关节背屈时断端距离缩小", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 208, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-9", "title": "9. 关于肘伸肌总腱， 不正确 的描述是", "front": "A.附着于肱骨外上髁<br>B.主要作用是伸腕<br>C.主要作用是伸肘<br>D.主要作用是前臂旋前<br>E.主要作用是前臂旋后", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 208, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-10", "title": "10. 关于网球肘的超声表现,正确的是", "front": "A.肱骨内上髁表面不光滑<br>B.屈肌总腱增厚、回声减低<br>C.伸肌总腱增厚、回声减低<br>D.肱骨内上髁骨刺形成<br>E.屈肌总腱部分撕裂", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 209, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-11", "title": "11. 关于韧带， 不正确 的描述是", "front": "A.两端附着于骨骼表面<br>B.腕关节三角纤维韧带是关节周围韧带<br>C.膝关节交叉韧带是关节腔内韧带<br>D.由致密结缔组织构成<br>E.功能是维持关节的稳定性并协助运动", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 209, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-12", "title": "12. 关于 Pellegrini-Stieda 病的超声表现，正确的是", "front": "A.膝关节外侧副韧带内强回声钙化灶<br>B.膝关节内侧副韧带内强回声钙化灶<br>C.膝关节鹅足腱内强回声钙化灶<br>D.膝关节髂胫束内强回声钙化灶<br>E.膝关节髌腱内强回声钙化灶", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 209, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-13", "title": "13. 关于膝关节内侧副韧带损伤急性期的超声表现， 不正确 的描述是", "front": "A.韧带肿胀增厚，回声减低<br>B.韧带内探及明显血流<br>C.韧带内可见无回声裂隙<br>D.韧带萎缩，回声增强<br>E.韧带纤维纹理模糊不清", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 209, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-14", "title": "14. 关于正常关节软骨的超声表现, 正确的是", "front": "A.边界清晰、厚薄均匀的高回声<br>B.边界清晰、厚薄均匀的线状强回声, 呈“双边征”<br>C.边界清晰、厚薄均匀的无回声或低回声<br>D.边界清晰、厚薄均匀的等回声<br>E.边界清晰、厚薄不均匀的低回声", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 209, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-15", "title": "15. 关于关节软骨损伤早期的超声表现，正确的是", "front": "A.关节软骨厚薄不均<br>B.关节软骨变薄<br>C.关节软骨内出现钙化灶<br>D.关节软骨局部消失<br>E.关节软骨与表面软组织分界不清", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 210, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-16", "title": "16. 撕脱性骨折的超声表现，正确的是", "front": "A.骨皮质呈“虫蚀样”改变<br>B.骨皮质连续性中断，且局部骨皮质向深面凹陷<br>C.骨皮质连续性中断，且局部骨皮质向浅面分离<br>D.骨皮质连续性中断，断端呈“阶梯状”<br>E.骨皮质连续性中断，断端成角", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 210, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-17", "title": "17. 关于骨刺的超声表现,正确的是", "front": "A.骨皮质表面的强回声隆起<br>B.骨皮质粗糙、不光滑<br>C.骨皮质呈“虫蚀样”改变<br>D.骨皮质连续性中断<br>E.骨皮质表面低回声", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 210, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-18", "title": "18. 关于滑囊， 不正确 的描述是", "front": "A.关节内或关节周围的囊状结构<br>B.由致密结缔组织组成<br>C.正常情况下滑囊内有极少量的浆液<br>D.滑囊壁分为内外两层<br>E.主要作用是减少肌肉与骨面之间的摩擦", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 210, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-19", "title": "19. 生理情况下超声能显示的滑囊是", "front": "A.髌前皮下囊<br>B.髌上囊<br>C.鹰嘴滑囊<br>D.跟骨前滑囊<br>E.鹅足腱滑囊", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 210, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-20", "title": "20. 关于类风湿关节炎的超声表现， 不正确 的描述是", "front": "A.关节滑膜增厚<br>B.关节滑膜内有血流信号<br>C.关节周围骨皮质呈“虫蚀样”改变<br>D.关节软骨表面见线状强回声，呈“双边征”<br>E.关节腔内积液", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 211, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-21", "title": "21. 关于周围神经解剖， 不正确 的描述是", "front": "A.基本构成单位是神经纤维<br>B.完整的神经纤维由中心的轴索、周围的髓鞘和薄层的结缔组织神经内膜构成<br>C.多条神经纤维相互聚集形成神经干<br>D.数目不等的神经纤维束形成神经干<br>E.周围神经主要功能为接受刺激、整合信息和传导冲动等", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 211, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-22", "title": "22. 关于周围神经卡压综合征， 不正确 的描述是", "front": "A.周围神经卡压综合征由周围神经受到机械性压迫导致<br>B.常发生位置是神经走行通路上较狭窄的解剖部位<br>C.受压部位神经肿胀增粗<br>D.受压部位近端神经肿胀增粗<br>E.骨纤维管综合征是最常见的神经卡压综合征", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 211, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-23", "title": "23. 关于外伤性周围神经损伤， 不正确 的描述是", "front": "A.损伤的常见原因是牵拉、挫伤和刺伤<br>B.严重损伤可导致神经束部分或完全断裂<br>C.神经部分撕裂，超声显示神经束连续性存在、粗细不均<br>D.结节样神经瘤仅见于神经完全断裂<br>E.外伤性神经病变中最常见的病变是创伤性神经瘤", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "肌骨"], "kind": "选择题", "page": 211, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-1", "title": "24. 病人，男性。26岁，左膝关节扭伤60天。查体：左膝关节不能伸直，股骨内侧髁压痛，左下肢肌肉轻度萎缩。超声检查显示：左膝关节内侧副韧带内一强回声钙化灶。其最可能的诊断是", "front": "A.de Quervain病<br>B.Sinding-Larsen病<br>C.Pellegrini-Stieda病<br>D.Osgood-Schlatter病<br>E.Wartenbrg病", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "肌骨"], "kind": "选择题", "page": 211, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-2", "title": "25. 病人，女性。48岁，反复发作四肢小关节肿痛2年。查体：双手近端指间关节梭形肿胀、压痛。ANA(-)，RF(+)，CCPA(+)，AKA(+)。超声检查显示：双手近端指间关节滑膜增厚，并见丰富血流信号，骨皮质呈“虫蚀样”。其最可能的诊断是", "front": "A.骨关节炎<br>B.类风湿关节炎<br>C.痛风性关节炎<br>D.反应性关节炎<br>E.结核菌感染引起的关节炎", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "肌骨"], "kind": "选择题", "page": 211, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-3", "title": "26. 病人，女性。40岁，提举物体和拧毛巾时出现右肘关节外侧疼痛，并向下放射。查体：右肘关节外侧局限性压痛，抗阻伸腕试验(+)。超声检查显示：右肘伸肌总腱增厚、回声减低，并探及血流信号，肱骨外上髁表面粗糙、不光整。其最可能的诊断是", "front": "A.骨关节炎<br>B.类风湿关节炎<br>C.高尔夫球肘<br>D.网球肘<br>E.肱骨下端骨折", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "肌骨"], "kind": "选择题", "page": 212, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-4", "title": "27. 病人，女性。62岁，双膝关节疼痛进行性加重1年余，上下楼梯尤其明显。超声检查显示：双膝关节骨皮质表面有强回声隆起，滑车软骨表面不光滑，回声增强、不均匀，厚薄不均一，部分区域软骨变薄。其最可能的诊断是", "front": "A.骨关节炎<br>B.类风湿关节炎<br>C.反应性关节炎<br>D.痛风性关节炎<br>E.创伤性关节炎", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A2型题", "选择题", "肌骨"], "kind": "选择题", "page": 212, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-5", "title": "28. 病人，男性。43岁，右肘关节外伤后发现右肘后肿物。查体：右肘关节伸直后可见 5 cm×3 cm 肿块，质软、压痛。超声检查显示：右肘后皮肤与肱三头肌腱之间可见一无回声区，边界清晰，壁较厚；CDFI显示囊壁上可见彩色血流信号。其最可能的诊断是", "front": "A.外伤性肘关节积液<br>B.外伤性肱三头肌腱下囊积液<br>C.肱三头肌腱断裂<br>D.外伤性鹰嘴滑囊炎<br>E.网球肘", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "肌骨"], "kind": "选择题", "page": 212, "chapter": "ch11", "static": false, "image": "", "figcap": ""}, {"no": "11-3-shared-29-30", "title": "共用备选答案 · 第 29~30 题", "front": "<b>下列第 29~30 题共用以下备选答案:</b><br>A.肌腹内无回声区<br>B.肌肉弥漫性肿大，其内多发低回声和高回声区<br>C.肌肉内弧形强回声伴声影<br>D.肌肉体积明显缩小，回声增强<br>E.肌肉内肿块，呈“棋盘格”样", "back": "", "tags": ["B型题", "肌 const container = document.getElementById('cards-container');
let activeFilter = 'all';
let searchTerm = '';

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function attrEscape(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function cardHTML(card) {
  const tags = (card.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  const searchBlob = ((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '')).toLowerCase();
  const safeSearch = attrEscape(searchBlob);
  const safeKind = attrEscape(card.kind);
  const safeTags = attrEscape((card.tags || []).join(','));
  const figHTML = card.image ? `<figure class="card-fig"><img src="${card.image}" alt="${attrEscape(card.figcap)}" loading="lazy"><figcaption>${card.figcap || ''}</figcaption></figure>` : '';
  if (card.static) {
    const isKp = card.kind === '重点';
    const icon = isKp ? '⭐' : '🔗';
    const cls = isKp ? 'static-card kp-static' : 'static-card';
    return `
    <div class="card ${cls}" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}" data-static="1">
      <div class="card-static-inner">
        <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
        <div class="card-title">${icon} ${card.title}</div>
        <div class="card-body">${card.front}</div>
        <div class="tags">${tags}</div>
      </div>
    </div>
  `;
  }
  return `
    <div class="card" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title">📌 ${card.title}</div>
          ${figHTML}
          <div class="card-body">${card.front}</div>
          <div class="tags">${tags}</div>
          <div class="flip-hint">💡 点击卡片翻面查看答案</div>
        </div>
        <div class="card-face card-back">
          <div class="card-no">卡号 ${card.no} · 答案 ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title answer-title">✅ ${card.title}</div>
          ${figHTML}
          <div class="card-body answer-body">${card.back}</div>
          <div class="tags">${tags}</div>
          <div class="card-actions"><button type="button" class="flip-back-btn">↩︎ 返回题目</button></div>
        </div>
      </div>
    </div>
  `;
}

function renderCards() {
  let html = '';
  let visibleCount = 0;
  const sections = {
    '前言': [], '目录': [], '重点': [],
    '名词解释': [], '填空题': [], '选择题': [], '共用备选答案': [], '简答题': []
  };
  const others = [];

  CARDS_DATA.forEach(card => {
    const tags = card.tags || [];
    const kind = card.kind || '';
    let placed = false;
    for (const k of Object.keys(sections)) {
      if (tags.includes(k) || kind === k) {
        sections[k].push(card); placed = true; break;
      }
    }
    if (!placed) others.push(card);
  });

  // 标题映射
  const titleMap = {
    '前言': '📖 前言',
    '目录': '📚 目录',
    '重点': '⭐ 重点难点',
    '名词解释': '📝 名词解释',
    '填空题': '✏️ 填空题',
    '选择题': '🔘 选择题',
    '共用备选答案': '🔗 共用备选答案(B型题)',
    '简答题': '📋 简答题'
  };

  let allCards = [];
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    allCards.push({type: 'title', label: titleMap[k], key: k});
    list.forEach(c => allCards.push({type: 'card', data: c, key: k}));
  }
  others.forEach(c => allCards.push({type: 'card', data: c, key: '其他'}));

  allCards.forEach(item => {
    if (item.type === 'title') {
      html += `<div class="section-title" id="section-${item.key}" data-section="${item.key}">${item.label} <span style="font-size:13px;color:#94a3b8;">(${sections[item.key]?.length || 0} 张)</span></div>`;
    } else {
      const card = item.data;
      const matchSearch = !searchTerm || (((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '') + ' ' + (card.tags || []).join(' ')).toLowerCase().includes(searchTerm));
      const matchFilter = activeFilter === 'all' ||
        (card.tags || []).some(t => t === activeFilter) ||
        card.kind === activeFilter;
      if (matchSearch && matchFilter) {
        html += cardHTML(card);
        visibleCount++;
      }
    }
  });

  if (visibleCount === 0) {
    html = '<div class="empty">🚫 没有匹配的卡片</div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('.section-title').forEach(title => {
    const next = title.nextElementSibling;
    if (!next || next.classList.contains('section-title')) title.remove();
  });
  renderNav(sections, titleMap);
  document.querySelectorAll('#section-nav a[href^="#section-"]').forEach(link => {
    const targetId = link.getAttribute('href').slice(1);
    if (!document.getElementById(targetId)) link.remove();
  });

  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
}

function renderNav(sections, titleMap) {
  const nav = document.getElementById('section-nav');
  let html = '<a href="#top">⬆️ 顶部</a>';
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    const label = titleMap[k] || k;
    const short = label.replace(/^[^一-龥A-Za-z]+/, '');
    html += `<a href="#section-${k}">${short}</a>`;
  }
  nav.innerHTML = html;
}

document.getElementById('section-nav').addEventListener('click', e => {
  const link = e.target.closest('a');
  if (!link) return;
  e.preventDefault();
  const id = link.getAttribute('href').slice(1);
  if (id === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  const target = document.getElementById(id);
  if (target) {
    const top = target.getBoundingClientRect().top + window.scrollY - 50;
    window.scrollTo({ top, behavior: 'smooth' });
  }
});

container.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card || card.classList.contains('static-card')) return;
  // 显式"返回题目"按钮:收起答案
  if (e.target.closest('.flip-back-btn')) {
    card.classList.remove('flipped');
    return;
  }
  // 已翻面时,点击不再翻回(避免误触遮住答案);仅按钮可收起
  if (card.classList.contains('flipped')) return;
  // 正在选择文字(复制)时不翻面
  const sel = window.getSelection();
  if (sel && sel.toString().trim().length > 0) return;
  // 链接/图片等交互元素不触发翻面
  if (e.target.closest('a, img, button')) return;
  card.classList.add('flipped');
});

document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

document.getElementById('flip-all').addEventListener('click', () => {
  const cards = document.querySelectorAll('.card:not(.static-card)');
  const allFlipped = Array.from(cards).every(c => c.classList.contains('flipped'));
  cards.forEach(c => c.classList.toggle('flipped', !allFlipped));
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  renderCards();
});

window.addEventListener('scroll', () => {
  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
});

// ===== 学习追踪 (艾宾浩斯遗忘曲线) =====
const EB_INTERVALS = [1, 2, 4, 7, 15, 30, 60, 90];
const LEVEL_NAMES = ['Lv.0 入门', 'Lv.1 巩固', 'Lv.2 熟练', 'Lv.3 精通', 'Lv.4 大师', 'Lv.5 宗师'];
const STORAGE_KEY = 'us_xtj_tracker_' + (CARDS_DATA[0]?.chapter || 'default');

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function formatDuration(ms) {
  const total = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return h > 0 ? `${pad2(h)}:${pad2(m)}:${pad2(s)}` : `${pad2(m)}:${pad2(s)}`;
}

function formatRemaining(ms) {
  if (ms <= 0) return '⏰ 现在该复习啦!';
  const total = Math.floor(ms / 1000);
  const d = Math.floor(total / 86400);
  const h = Math.floor((total % 86400) / 3600);
  const m = Math.floor((total % 3600) / 60);
  if (d > 0) return `还有 ${d} 天 ${h} 小时`;
  if (h > 0) return `还有 ${h} 小时 ${m} 分`;
  return `还有 ${m} 分钟`;
}

function loadTracker() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { firstOpen: Date.now(), lastOpen: Date.now(), visits: 0, level: 0, nextReviewAt: null };
}

function saveTracker(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function recomputeNextReview(state) {
  if (state.level >= EB_INTERVALS.length) {
    state.nextReviewAt = null;
    return;
  }
  const days = EB_INTERVALS[state.level];
  state.nextReviewAt = Date.now() + days * 24 * 3600 * 1000;
}

const tracker = loadTracker();
tracker.visits = (tracker.visits || 0) + 1;
tracker.lastOpen = Date.now();
if (!tracker.nextReviewAt) recomputeNextReview(tracker);
saveTracker(tracker);

const sessionStart = Date.now();
const $elapsed = document.getElementById('elapsed');
const $visit = document.getElementById('visit-count');
const $level = document.getElementById('review-level');
const $next = document.getElementById('next-review');
const $hint = document.getElementById('review-hint');

function renderTracker() {
  $elapsed.textContent = formatDuration(Date.now() - sessionStart);
  $visit.textContent = tracker.visits;
  $level.textContent = LEVEL_NAMES[Math.min(tracker.level, LEVEL_NAMES.length - 1)];
  if (tracker.level >= EB_INTERVALS.length) {
    $next.textContent = '🎉 已完全掌握';
    $hint.textContent = '你已超越艾宾浩斯曲线,知识长存!';
  } else {
    const now = Date.now();
    if (tracker.nextReviewAt && now >= tracker.nextReviewAt) {
      $next.textContent = '⏰ 现在该复习啦!';
      $hint.textContent = `按 Lv.${tracker.level} 间隔 ${EB_INTERVALS[tracker.level]} 天,已到复习点`;
    } else {
      $next.textContent = formatRemaining((tracker.nextReviewAt || 0) - now);
      const nextDays = EB_INTERVALS[tracker.level];
      $hint.textContent = `当前等级:第 ${tracker.level} 次复习 · 间隔 ${nextDays} 天`;
    }
  }
}

renderTracker();
setInterval(renderTracker, 1000);

document.getElementById('mark-reviewed').addEventListener('click', () => {
  tracker.level = Math.min(tracker.level + 1, EB_INTERVALS.length);
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
  const btn = document.getElementById('mark-reviewed');
  const orig = btn.textContent;
  btn.textContent = '🎉 已记录!';
  btn.style.background = '#10b981';
  setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1200);
});

document.getElementById('reset-tracker').addEventListener('click', () => {
  if (!confirm('确定要重置本章节的学习记录吗?')) return;
  tracker.firstOpen = Date.now();
  tracker.lastOpen = Date.now();
  tracker.visits = 1;
  tracker.level = 0;
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
});

renderCards();
</script>
