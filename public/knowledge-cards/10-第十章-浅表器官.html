167-168", "title": "共用备选答案 · 第 167~168 题", "front": "<b>下列第 167~168 题共用以下备选答案:</b><br>A.肿大的淋巴结可随局部或全身性疾病痊愈而回缩<br>B.肿大淋巴结的局部皮肤有红、肿、热、痛<br>C.肿大的淋巴结质中等，活动，可有轻微压痛<br>D.肿大淋巴结的局部皮肤破溃，窦道形成<br>E.肿大的淋巴结质硬、固定、融合，并有发热、消瘦等症状", "back": "", "tags": ["B型题", "浅表"], "kind": "共用备选答案", "page": 0, "chapter": "ch10", "static": true, "image": "", "figcap": ""}, {"no": "10-3-31", "title": "167. 急性淋巴结炎", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["B型题", "浅表"], "kind": "共用备选答案", "page": 0, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-3-32", "title": "168. 慢性淋巴结炎", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["B型题", "浅表"], "kind": "共用备选答案", "page": 0, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-3-shared-169-170", "title": "共用备选答案 · 第 169~170 题", "front": "<b>下列第 169~170 题共用以下备选答案:</b><br>A.肿大的淋巴结呈椭圆形或圆形，皮质增厚、回声低，髓质增厚呈高回声，包膜光滑，淋巴结之间分界清楚<br>B.淋巴结明显肿大，以多发为主，呈椭圆形、圆形或融合成不规则形，长径厚径之比&lt;2，部分肿大的淋巴结近似无回声，但可见分布杂乱血流信号<br>C.肿大的淋巴结出现不规则无回声区，含有细点状或絮状回声、加压时可见漂动现象<br>D.肿大的淋巴结，以多发为主，长径厚径之比&gt;2，皮质增厚，髓质居中，无明显增厚，血流信号轻度或明显增多，呈树杈状分布<br>E.淋巴结不同程度肿大，长径厚径之比&lt;2，包膜圆滑或局部隆起，部分淋巴结融合成团。皮质弥漫性或局限性增厚，也可向外隆起，髓质变形、偏心或消失", "back": "", "tags": ["B型题", "浅表"], "kind": "共用备选答案", "page": 0, "chapter": "ch10", "static": true, "image": "", "figcap": ""}, {"no": "10-3-33", "title": "169. 淋巴结结核", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["B型题", "浅表"], "kind": "共用备选答案", "page": 0, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-3-34", "title": "170. 淋巴结反应性增生", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["B型题", "浅表"], "kind": "共用备选答案", "page": 0, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-3-shared-171-172", "title": "共用备选答案 · 第 171~172 题", "front": "<b>下列第 171~172 题共用以下备选答案:</b><br>A.淋巴结呈扁椭圆形，长径厚径之比＞4，包膜薄而光滑，皮质为均匀性低回声，中央髓质呈条带状高回声<br>B.淋巴结呈椭圆形，长径厚径之比＞2，皮质增厚、回声低，髓质增厚呈高回声，包膜光滑，淋巴结之间分界清楚<br>C.淋巴结呈椭圆形，长径厚径之比＜2，内见规则无回声区，含有细点状或絮状回声、加压时可见漂动现象，并向皮肤破溃<br>D.淋巴结呈类圆形，部分融合成不规则形，长径厚径之比＜2，内部呈低回声，髓质显示不清<br>E.淋巴结呈椭圆形、圆形，长径厚径之比＜2，包膜圆滑或局部隆起，皮质弥漫性或局限性增厚，并可见多个砂砾样强回声", "back": "", "tags": ["B型题", "浅表"], "kind": "共用备选答案", "page": 0, "chapter": "ch10", "static": true, "image": "", "figcap": ""}, {"no": "10-3-35", "title": "171. 淋巴瘤", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["B型题", "浅表"], "kind": "共用备选答案", "page": 0, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-3-36", "title": "172. 淋巴结转移癌", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["B型题", "浅表"], "kind": "共用备选答案", "page": 0, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-3-shared-173-174", "title": "共用备选答案 · 第 173~174 题", "front": "<b>下列第 173~174 题共用以下备选答案:</b><br>A.颈部<br>B.左侧锁骨上<br>C.右侧锁骨上<br>D.腋下<br>E.腹股沟", "back": "", "tags": ["B型题", "浅表"], "kind": "共用备选答案", "page": 0, "chapter": "ch10", "static": true, "image": "", "figcap": ""}, {"no": "10-3-37", "title": "173. 乳腺癌淋巴结转移的常见部位", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["B型题", "浅表"], "kind": "共用备选答案", "page": 0, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-3-38", "title": "174. 胃癌淋巴结转移的常见部位", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["B型题", "浅表"], "kind": "共用备选答案", "page": 0, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-1", "title": "1. 简述急性腮腺炎的临床特征和超声诊断要点。", "front": "", "back": "<b>参考答案:</b><br>急性腮腺炎多发生于成年人，年老体弱者易于发病，腮腺部位局部红肿、疼痛，饮食时加剧，导管口充血肿胀，有的可见脓液排出。双侧腮腺急性炎症主要见于流行性腮腺炎，流行病学、血液检查有助于鉴别。超声表现为腮腺肿大，边界不清晰，实质回声不均匀，血流信号明显增多。脓肿形成时，腺体实质出现含有点状回声漂浮的液性区，边界不规则。脓肿单发，也可多发，单发大脓腔后方回声增强，腔内无血流信号显示。流行性腮腺炎，多为双侧腺体同时发生，也可先后发生。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-2", "title": "2. 简述良性淋巴上皮病的超声诊断要点。", "front": "", "back": "<b>参考答案:</b><br>良性淋巴上皮病亦称干燥综合征，多见于中老年女性。临床主要表现为双侧腮腺无痛性肿大，大多数为弥漫性、少数为不对称局灶性肿大。触诊腺体质地较硬，表面不平。当其他涎腺也受累时，口腔干燥明显，同时伴有眼干、鼻干等症状。超声表现为双侧腮腺\n弥漫性肿大，颌下腺及舌下腺也可同时受累及；腺体内回声不均，可见散在小低回声区，呈“网格”样改变；少数病灶表现为团块状，内部回声不均匀；CDFI显示大多数受累腺体血流信号明显增多。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-3", "title": "3. 简述涎腺囊肿的主要种类和超声表现。", "front": "", "back": "<b>参考答案:</b><br>涎腺囊肿以舌下腺多见，颌下腺、腮腺少见。涎腺囊肿有以下几种：外渗性黏液囊肿、潴留性黏液囊肿和淋巴上皮囊肿等。超声表现为圆形无回声，少数舌下腺外渗性黏液囊肿呈哑铃形，两端分别位于舌下区和颌下区，部分囊内可见细点状回声漂浮，伴发感染时尤为明显；囊壁薄，边界清楚，后方回声增强。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-4", "title": "4. 简述颌下腺混合瘤与腺样囊性癌的超声鉴别诊断要点。", "front": "", "back": "<b>参考答案:</b><br>混合瘤大多数为圆形或椭圆形，有的瘤体呈分叶状；瘤内回声多样性，以均质低回声多见，有的瘤内可见到无回声区或钙化灶；瘤体边界清晰，瘤体后方腺体实质常出现回声增强；CDFI显示体积大的瘤体常显示较丰富的血流信号，PW检测多为低速动脉血流频谱；一般不伴引流区域淋巴结肿大。腺样囊性癌多为不规则形，边缘不清晰；内部为不均匀低回声，后方常伴声衰减；瘤体内血供丰富，PW检测多为高速动脉血流频谱；常可见同侧颈部Ⅱ区淋巴结肿大。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-5", "title": "5. 简述涎腺疾病超声检查的临床价值。", "front": "", "back": "<b>参考答案:</b><br>X线涎腺造影、超声检查、CT、MRI和同位素 99m 锝等检查对涎腺疾病的诊断都有一定的价值，但目前应用较多的方法是超声检查，它在囊实性病变、炎症及结石等疾病的诊断较其他影像学检查更具优势。但也有不足之处，如超声检查容易发现涎腺主导管的扩张，而对小叶间导管、末梢导管的显示则不如X线造影检查。识别深部肿瘤与周围组织（尤其是骨组织）关系的能力逊于CT、MRI。超声引导下涎腺组织细针吸取细胞学检查，操作简单，有助于明确诊断。但要注意的是，涎腺肿瘤的组织活检可能导致肿瘤沿切割针道种植。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-6", "title": "6. 简述甲状腺疾病的超声诊断步骤。", "front": "", "back": "<b>参考答案:</b><br>（1）首先定位鉴别诊断，需与甲状腺病变鉴别的疾病有：甲状旁腺肿物，周围淋巴结疾病和食管肿瘤等。\n\n（2）区分甲状腺弥漫性肿大与甲状腺结节，一般来说超声能很好地区分甲状腺弥漫性肿大与甲状腺结节，当甲状腺结节很大几乎占据整叶腺体或均匀等回声结节时，有可能误诊为弥漫性肿大或遗漏结节，观察结节周边晕环或环绕血流信号有助于发现结节。\n\n（3）区分哪一种疾病引起甲状腺弥漫性肿大或甲状腺结节。\n\n（4）检测颈部有无肿大淋巴结以及鉴别淋巴结的良恶性。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-7", "title": "7. 简述亚急性甲状腺炎、局限性桥本甲状腺炎与甲状腺癌的超声鉴别诊断要点。", "front": "", "back": "<b>参考答案:</b><br>&lt;table border=1 style='margin: auto; word-wrap: break-word;'&gt;&lt;tr&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;&lt;/td&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;甲状腺癌&lt;/td&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;局限性桥本甲状腺炎&lt;/td&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;亚急性甲状腺炎&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;数量&lt;/td&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;单发多见&lt;/td&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;单发多见&lt;/td&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;多发多见，分布于双侧叶&lt;/td&gt;&lt;/tr&gt;...", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-8", "title": "8. 简述甲状腺功能亢进症的超声表现。", "front": "", "back": "<b>参考答案:</b><br>（1）甲状腺呈对称性、均匀性肿大，被膜规则。\n\n（2）腺体回声可分为两种类型：弥漫回声减低型与散在回声减低型。前者表现为双侧腺体弥漫性回声减低、不均，腺体弹性好；后者可见于年龄较大者，表现为双侧腺体多发散在、局灶性回声减低，边界模糊。\n\n（3）CDFI：弥漫回声减低型表现为整个腺体内布满搏动性的彩色血流信号，密集如一片火的海洋，称之为火海征。散在回声减低型表现为回声减低处血流信号尤为丰富，其内动脉流速加快。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-9", "title": "9. 简述甲状腺癌与甲状腺腺瘤的超声鉴别诊断要点。", "front": "", "back": "<b>参考答案:</b><br>&lt;table border=1 style='margin: auto; word-wrap: break-word;'&gt;&lt;tr&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;&lt;/td&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;甲状腺癌&lt;/td&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;甲状腺腺瘤&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;数量&lt;/td&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;单发多见&lt;/td&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;单发多见&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;形态&lt;/td&gt;&lt;td style='text-align: center; word-wrap: break-word;'&gt;不规则&lt;/td&gt;&lt;td style='te...", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-10", "title": "10. 简述甲状旁腺腺瘤的超声表现。", "front": "", "back": "<b>参考答案:</b><br>甲状旁腺腺瘤形态规则，边界清晰，其长轴与身体矢状面平行；有高回声包膜，周边可\n见规整的薄晕环；内部呈均匀等回声或低回声，可合并囊性变、出血或坏死；内部可见丰富血流信号，周边常见较为完整的环绕血管。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-11", "title": "11. 简述超声弹性成像对乳腺病灶的诊断价值。", "front": "", "back": "<b>参考答案:</b><br>传统的临床医师触诊是利用手指的触觉定性地判断乳腺内有无肿块以及肿块的良恶性。超声弹性成像技术发展迅速，为判断乳腺病灶的硬度提供了一种新的定量方法，与常规超声联合应用，提高了对乳腺良恶性病变的诊断准确性，具有较好的临床应用前景。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-12", "title": "12. 简述乳腺纤维腺瘤的声像图特征。", "front": "", "back": "<b>参考答案:</b><br>（1）肿块呈圆形、椭圆形或分叶状。\n\n（2）边界清晰，包膜完整。\n\n（3）常为低回声，内部回声均匀，后方无衰减。\n\n（4）肿块可有侧方声影。\n\n（5）与周围组织无粘连，加压时，可被轻度压缩。\n\n（6）彩色多普勒，部分肿块可有血流信号，走行规则。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-13", "title": "13. 简述乳腺增生症的声像图特征。", "front": "", "back": "<b>参考答案:</b><br>（1）一侧或双侧腺体结构紊乱，小叶结构体积增大，数目增多。\n\n（2）腺体内可见多个大小不等无回声区，边界清，后方回声增强。\n\n（3）腺体内有时可见中等或低回声实性结节，边界清，体积小，常无血流信号。\n\n（4）可出现细小点状钙化。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-14", "title": "14. 简述导管内乳头状瘤的声像图特征。", "front": "", "back": "<b>参考答案:</b><br>（1）导管囊状扩张呈无回声，内可见乳头状低回声或中等回声。\n\n（2）中央型乳头状瘤表现为乳晕处导管扩张，管腔内见边界清楚的低回声实性小结节。\n\n（3）外周型乳头状瘤表现为低回声实性结节，需与乳腺其他良性肿瘤鉴别。\n\n（4）彩色多普勒实性结节可见丰富血流信号。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-15", "title": "15. 简述导管内乳头状瘤的鉴别诊断。", "front": "", "back": "<b>参考答案:</b><br>导管内乳头状瘤需与乳腺增生症鉴别，后者也可见导管扩张，但通常导管内无乳头状实性回声。较大的导管内乳头状瘤需与导管内乳头状癌相鉴别，尤其是发生囊内乳头状癌，后者病变通常较大（平均2cm），实性成分多，形态不规则。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-16", "title": "16. 简述乳腺癌的二维超声表现。", "front": "", "back": "<b>参考答案:</b><br>（1）病灶内部呈低回声，部分伴有肿块后方回声衰减。\n\n（2）形态不规则。\n\n（3）边界不清与毛刺状边缘。\n\n（4）纵横比 &gt;1 （5）微小钙化。\n\n（6）间接征象：库柏韧带连续性中断，皮肤水肿增厚和腋窝淋巴结肿大、形态失常。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-17", "title": "17. 简述乳腺癌与其他乳腺良性病变的鉴别诊断要点。", "front": "", "back": "<b>参考答案:</b><br>首先要注意病人的年龄、症状和体征，考虑不同年龄病人发生乳腺癌的危险性；其次要对乳腺肿块的超声声像图进行鉴别诊断，分析肿块的形态、边界、回声、是否伴有钙化、血流是否丰富以及血流形态等，仔细寻找病变有无恶性征象；值得注意的是，良、恶性肿瘤\n声像图可能重叠，必须综合考虑。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-18", "title": "18. 简述超声引导下肿块穿刺活检的内容和优势。", "front": "", "back": "<b>参考答案:</b><br>活检的主要取材方法有细针穿刺抽吸活检和组织切割活检，后者能更好地区分乳腺病变的良恶性。超声引导乳腺经皮穿刺活检创伤小、操作迅速、并发症少，尤其是可以实时观察穿刺的位置、多方位准确取样，同时具有无电离辐射、不需要专用的设备、花费低廉等优点。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-19", "title": "19. 简述鞘膜积液的超声表现。", "front": "", "back": "<b>参考答案:</b><br>鞘膜积液包括：①睾丸鞘膜积液，单侧或双侧，少量积液位于睾丸上极、下极周围，中至大量积液可三面环绕睾丸。②精索鞘膜积液，以单侧为主，积液包绕精索。③混合型鞘膜积液，以单侧多见，睾丸鞘膜腔内中～大量积液，并扩展至精索周围。④交通性鞘膜积液，以单侧多见，睾丸鞘膜腔内中等量以上积液，改变体位或挤压阴囊时积液量明显减少，可合并斜疝。阴囊外伤积血或炎症时，积液内含有点状、带状或絮状高回声。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-20", "title": "20. 简述不同部位疾病导致浅表淋巴结肿大应重点扫查的相应区域。", "front": "", "back": "<b>参考答案:</b><br>浅表淋巴结可根据临床要求进行检查，口腔、咽等疾病，重点扫查颏下淋巴结（ⅠA区）、颌下淋巴结（ⅠB区）及颈上深淋巴结（Ⅱ区）；甲状腺疾病，重点扫查颈中（Ⅲ区）、颈下深淋巴结（Ⅳ区）及气管周围淋巴结（Ⅵ区）；胸腔、腹腔疾病分别重点扫查右侧、左侧锁骨上窝淋巴结；乳房疾病，重点扫查腋窝淋巴结、胸小肌深面淋巴结、锁骨下淋巴结、锁骨上淋巴结及胸骨旁淋巴结；盆腔及下肢疾病重点扫查腹股沟淋巴结。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-21", "title": "21. 简述急性淋巴结炎的临床与超声特征。", "front": "", "back": "<b>参考答案:</b><br>急性淋巴结炎是由引流区域组织细菌、病毒及真菌等感染引起的急性炎症，局部感染和引流区域的淋巴结肿大并存，肿大淋巴结的局部皮肤有红、肿、热、痛的急性炎症表现，有时周边可见到淋巴管炎所致的“红线”，严重者伴有发热及白细胞增高。超声表现为淋巴结明显肿大，多呈椭圆形或圆形，长径厚径之比&gt;2。皮质增厚、回声低，髓质增厚呈高回声，包膜光滑，淋巴结之间分界清楚。淋巴结内血流信号明显增多，沿门部、髓质、皮质呈放射状分布。多普勒检测，动脉血流为低阻型频谱，收缩期峰值流速加快。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-22", "title": "22. 简述淋巴结结核的超声特征。", "front": "", "back": "<b>参考答案:</b><br>淋巴结结核超声表现为淋巴结不同程度肿大，多呈椭圆形，长径厚径之比&lt;2，常融合成串珠状。包膜完整，也可不清楚；髓质偏心或显示不清，结内回声不均匀，以低回声为主；脓肿形成，出现不规则无回声区，含有细点状或絮状回声、加压时可见漂动现象，脓肿破溃时，淋巴结形态不清晰，周围组织回声不均匀，含有不规则无回声区；有的结内可见呈斑片状强回声的钙化灶；淋巴结内血流信号增多，往往分布于皮质边缘，干酪样坏死、脓肿区则无血流信号。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-23", "title": "23. 简述淋巴瘤的超声特征。", "front": "", "back": "<b>参考答案:</b><br>淋巴瘤超声表现为淋巴结明显肿大，以多发为主，呈椭圆形、圆形或融合成不规则形，长径厚径之比&lt;2，包膜清晰或不清晰；淋巴结皮质明显增厚，呈低回声，无液化或钙化，髓质受压变形或显示不清；当髓质消失时，淋巴结内近似无回声。淋巴结内血流信号轻度或明显增多，血管分支扭曲，分布杂乱；淋巴结内动脉血流速度明显加快，阻力指数正常或偏高。", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}, {"no": "10-4-24", "title": "24. 简述淋巴结疾病超声检查的价值。", "front": "", "back": "<b>参考答案:</b><br>高频超声对浅表淋巴结的检出率高于临床触诊或其他影像技术检查。在一般情况下，高频超声有助于良恶性淋巴结疾病的鉴别诊断，对于不典型的病例，需要结合临床病史进行诊断，必要时可在超声引导下穿刺，进行细胞学及组织学检查。超声检查方便、快捷，随访对比图像的变化，也有助于指导临床的治疗。临床研究表明，三维彩色多普勒超声对浅表淋巴结内部血流的显示更完整，对走行迂曲的血流判断更明晰。淋巴结超声造影，转移癌表现为癌组织、坏死区的造影剂不规则分布、非均匀性增强和充盈缺损，不同于良性的均匀性增强，能够提高超声鉴别良恶性淋巴结的能力。淋巴结超声造影引导下进行淋巴结异常灌注区穿刺活检，更能提高穿刺活检的成功率。\n\n（杨文利 詹维伟 罗葆明 李建初 杜国庆 王亚红 朱庆莉 冷晓萍 陈林 薛恩生）", "tags": ["简答题", "浅表"], "kind": "简答题", "page": 204, "chapter": "ch10", "static": false, "image": "", "figcap": ""}];

const container = document.getElementById('cards-container');
let activeFilter = 'all';
let searchTerm = '';

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function attrEscape(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function cardHTML(card) {
  const tags = (card.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  const searchBlob = ((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '')).toLowerCase();
  const safeSearch = attrEscape(searchBlob);
  const safeKind = attrEscape(card.kind);
  const safeTags = attrEscape((card.tags || []).join(','));
  const figHTML = card.image ? `<figure class="card-fig"><img src="${card.image}" alt="${attrEscape(card.figcap)}" loading="lazy"><figcaption>${card.figcap || ''}</figcaption></figure>` : '';
  if (card.static) {
    const isKp = card.kind === '重点';
    const icon = isKp ? '⭐' : '🔗';
    const cls = isKp ? 'static-card kp-static' : 'static-card';
    return `
    <div class="card ${cls}" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}" data-static="1">
      <div class="card-static-inner">
        <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
        <div class="card-title">${icon} ${card.title}</div>
        <div class="card-body">${card.front}</div>
        <div class="tags">${tags}</div>
      </div>
    </div>
  `;
  }
  return `
    <div class="card" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title">📌 ${card.title}</div>
          ${figHTML}
          <div class="card-body">${card.front}</div>
          <div class="tags">${tags}</div>
          <div class="flip-hint">💡 点击卡片翻面查看答案</div>
        </div>
        <div class="card-face card-back">
          <div class="card-no">卡号 ${card.no} · 答案 ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title answer-title">✅ ${card.title}</div>
          ${figHTML}
          <div class="card-body answer-body">${card.back}</div>
          <div class="tags">${tags}</div>
          <div class="card-actions"><button type="button" class="flip-back-btn">↩︎ 返回题目</button></div>
        </div>
      </div>
    </div>
  `;
}

function renderCards() {
  let html = '';
  let visibleCount = 0;
  const sections = {
    '前言': [], '目录': [], '重点': [],
    '名词解释': [], '填空题': [], '选择题': [], '共用备选答案': [], '简答题': []
  };
  const others = [];

  CARDS_DATA.forEach(card => {
    const tags = card.tags || [];
    const kind = card.kind || '';
    let placed = false;
    for (const k of Object.keys(sections)) {
      if (tags.includes(k) || kind === k) {
        sections[k].push(card); placed = true; break;
      }
    }
    if (!placed) others.push(card);
  });

  // 标题映射
  const titleMap = {
    '前言': '📖 前言',
    '目录': '📚 目录',
    '重点': '⭐ 重点难点',
    '名词解释': '📝 名词解释',
    '填空题': '✏️ 填空题',
    '选择题': '🔘 选择题',
    '共用备选答案': '🔗 共用备选答案(B型题)',
    '简答题': '📋 简答题'
  };

  let allCards = [];
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    allCards.push({type: 'title', label: titleMap[k], key: k});
    list.forEach(c => allCards.push({type: 'card', data: c, key: k}));
  }
  others.forEach(c => allCards.push({type: 'card', data: c, key: '其他'}));

  allCards.forEach(item => {
    if (item.type === 'title') {
      html += `<div class="section-title" id="section-${item.key}" data-section="${item.key}">${item.label} <span style="font-size:13px;color:#94a3b8;">(${sections[item.key]?.length || 0} 张)</span></div>`;
    } else {
      const card = item.data;
      const matchSearch = !searchTerm || (((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '') + ' ' + (card.tags || []).join(' ')).toLowerCase().includes(searchTerm));
      const matchFilter = activeFilter === 'all' ||
        (card.tags || []).some(t => t === activeFilter) ||
        card.kind === activeFilter;
      if (matchSearch && matchFilter) {
        html += cardHTML(card);
        visibleCount++;
      }
    }
  });

  if (visibleCount === 0) {
    html = '<div class="empty">🚫 没有匹配的卡片</div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('.section-title').forEach(title => {
    const next = title.nextElementSibling;
    if (!next || next.classList.contains('section-title')) title.remove();
  });
  renderNav(sections, titleMap);
  document.querySelectorAll('#section-nav a[href^="#section-"]').forEach(link => {
    const targetId = link.getAttribute('href').slice(1);
    if (!document.getElementById(targetId)) link.remove();
  });

  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
}

function renderNav(sections, titleMap) {
  const nav = document.getElementById('section-nav');
  let html = '<a href="#top">⬆️ 顶部</a>';
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    const label = titleMap[k] || k;
    const short = label.replace(/^[^一-龥A-Za-z]+/, '');
    html += `<a href="#section-${k}">${short}</a>`;
  }
  nav.innerHTML = html;
}

document.getElementById('section-nav').addEventListener('click', e => {
  const link = e.target.closest('a');
  if (!link) return;
  e.preventDefault();
  const id = link.getAttribute('href').slice(1);
  if (id === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  const target = document.getElementById(id);
  if (target) {
    const top = target.getBoundingClientRect().top + window.scrollY - 50;
    window.scrollTo({ top, behavior: 'smooth' });
  }
});

container.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card || card.classList.contains('static-card')) return;
  // 显式"返回题目"按钮:收起答案
  if (e.target.closest('.flip-back-btn')) {
    card.classList.remove('flipped');
    return;
  }
  // 已翻面时,点击不再翻回(避免误触遮住答案);仅按钮可收起
  if (card.classList.contains('flipped')) return;
  // 正在选择文字(复制)时不翻面
  const sel = window.getSelection();
  if (sel && sel.toString().trim().length > 0) return;
  // 链接/图片等交互元素不触发翻面
  if (e.target.closest('a, img, button')) return;
  card.classList.add('flipped');
});

document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

document.getElementById('flip-all').addEventListener('click', () => {
  const cards = document.querySelectorAll('.card:not(.static-card)');
  const allFlipped = Array.from(cards).every(c => c.classList.contains('flipped'));
  cards.forEach(c => c.classList.toggle('flipped', !allFlipped));
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  renderCards();
});

window.addEventListener('scroll', () => {
  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
});

// ===== 学习追踪 (艾宾浩斯遗忘曲线) =====
const EB_INTERVALS = [1, 2, 4, 7, 15, 30, 60, 90];
const LEVEL_NAMES = ['Lv.0 入门', 'Lv.1 巩固', 'Lv.2 熟练', 'Lv.3 精通', 'Lv.4 大师', 'Lv.5 宗师'];
const STORAGE_KEY = 'us_xtj_tracker_' + (CARDS_DATA[0]?.chapter || 'default');

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function formatDuration(ms) {
  const total = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return h > 0 ? `${pad2(h)}:${pad2(m)}:${pad2(s)}` : `${pad2(m)}:${pad2(s)}`;
}

function formatRemaining(ms) {
  if (ms <= 0) return '⏰ 现在该复习啦!';
  const total = Math.floor(ms / 1000);
  const d = Math.floor(total / 86400);
  const h = Math.floor((total % 86400) / 3600);
  const m = Math.floor((total % 3600) / 60);
  if (d > 0) return `还有 ${d} 天 ${h} 小时`;
  if (h > 0) return `还有 ${h} 小时 ${m} 分`;
  return `还有 ${m} 分钟`;
}

function loadTracker() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { firstOpen: Date.now(), lastOpen: Date.now(), visits: 0, level: 0, nextReviewAt: null };
}

function saveTracker(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function recomputeNextReview(state) {
  if (state.level >= EB_INTERVALS.length) {
    state.nextReviewAt = null;
    return;
  }
  const days = EB_INTERVALS[state.level];
  state.nextReviewAt = Date.now() + days * 24 * 3600 * 1000;
}

const tracker = loadTracker();
tracker.visits = (tracker.visits || 0) + 1;
tracker.lastOpen = Date.now();
if (!tracker.nextReviewAt) recomputeNextReview(tracker);
saveTracker(tracker);

const sessionStart = Date.now();
const $elapsed = document.getElementById('elapsed');
const $visit = document.getElementById('visit-count');
const $level = document.getElementById('review-level');
const $next = document.getElementById('next-review');
const $hint = document.getElementById('review-hint');

function renderTracker() {
  $elapsed.textContent = formatDuration(Date.now() - sessionStart);
  $visit.textContent = tracker.visits;
  $level.textContent = LEVEL_NAMES[Math.min(tracker.level, LEVEL_NAMES.length - 1)];
  if (tracker.level >= EB_INTERVALS.length) {
    $next.textContent = '🎉 已完全掌握';
    $hint.textContent = '你已超越艾宾浩斯曲线,知识长存!';
  } else {
    const now = Date.now();
    if (tracker.nextReviewAt && now >= tracker.nextReviewAt) {
      $next.textContent = '⏰ 现在该复习啦!';
      $hint.textContent = `按 Lv.${tracker.level} 间隔 ${EB_INTERVALS[tracker.level]} 天,已到复习点`;
    } else {
      $next.textContent = formatRemaining((tracker.nextReviewAt || 0) - now);
      const nextDays = EB_INTERVALS[tracker.level];
      $hint.textContent = `当前等级:第 ${tracker.level} 次复习 · 间隔 ${nextDays} 天`;
    }
  }
}

renderTracker();
setInterval(renderTracker, 1000);

document.getElementById('mark-reviewed').addEventListener('click', () => {
  tracker.level = Math.min(tracker.level + 1, EB_INTERVALS.length);
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
  const btn = document.getElementById('mark-reviewed');
  const orig = btn.textContent;
  btn.textContent = '🎉 已记录!';
  btn.style.background = '#10b981';
  setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1200);
});

document.getElementById('reset-tracker').addEventListener('click', () => {
  if (!confirm('确定要重置本章节的学习记录吗?')) return;
  tracker.firstOpen = Date.now();
  tracker.lastOpen = Date.now();
  tracker.visits = 1;
  tracker.level = 0;
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
});

renderCards();
</script>
</body>
