<script>
const CARDS_DATA = [{"no": "2-1-1", "title": "心包腔", "front": "请简述该名词的定义。", "back": "<b>心包腔</b>:<br>脏、壁两层心包之间的潜在性腔隙,内含少量浆液起润滑作用。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-2", "title": "心动周期", "front": "请简述该名词的定义。", "back": "<b>心动周期</b>:<br>心脏一个活动周期,由心脏一次收缩和舒张构成。通常用心室活动周期代表心动周期。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-3", "title": "心肌应变", "front": "请简述该名词的定义。", "back": "<b>心肌应变</b>:<br>心脏在外力作用下,心肌某一方向两点之间局部心肌长度的瞬间变化率,以百分比表示(%),表示心肌变形的大小。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-4", "title": "TDI(组织多普勒成像)", "front": "请简述该名词的定义。", "back": "<b>TDI(组织多普勒成像)</b>:<br>以多普勒原理为基础,通过特殊滤波技术直接提取心肌运动的多普勒频移信号,进行彩色编码,以速度/加速度/能量多普勒三种模式成像。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-5", "title": "心室顺应性", "front": "请简述该名词的定义。", "back": "<b>心室顺应性</b>:<br>心室在单位压力变化下所引起的容积改变(dV/dt),是心室舒张功能的主要内容。顺应性差说明心室功能差。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-6", "title": "改良Bernoulli方程", "front": "请简述该名词的定义。", "back": "<b>改良Bernoulli方程</b>:<br>利用频谱多普勒测算狭窄口两端压力阶差,公式ΔP=4V²。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-7", "title": "PHT(压差降半时间)", "front": "请简述该名词的定义。", "back": "<b>PHT(压差降半时间)</b>:<br>评价二尖瓣狭窄的方法,反映压差下降斜率,公式 MVA=220/PHT。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-8", "title": "二尖瓣脱垂", "front": "请简述该名词的定义。", "back": "<b>二尖瓣脱垂</b>:<br>各种病因导致二尖瓣装置损害,瓣叶在收缩中/晚期或全收缩期部分或全部脱向左心房,超过瓣环水平。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-9", "title": "二尖瓣瓣膜瘤(MVA)", "front": "请简述该名词的定义。", "back": "<b>二尖瓣瓣膜瘤(MVA)</b>:<br>主动脉瓣反流冲击二尖瓣前叶,局部瓣膜组织薄弱呈瘤样膨出,突向左房,收缩期显著。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-10", "title": "冠状动脉血流储备", "front": "请简述该名词的定义。", "back": "<b>冠状动脉血流储备</b>:<br>冠脉在运动/缺氧等情况下扩张,血流量可增至静息时4~5倍的能力(CFR)。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-11", "title": "室壁瘤", "front": "请简述该名词的定义。", "back": "<b>室壁瘤</b>:<br>大面积心肌梗死后,纤维瘢痕组织在心腔内压力作用下局部室壁变薄、扩张向外膨出,最常发生于左室心尖部。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-12", "title": "缺血性心肌病", "front": "请简述该名词的定义。", "back": "<b>缺血性心肌病</b>:<br>心肌长期供血不足,导致广泛受累心肌营养障碍/萎缩/纤维化,心脏扩大,出现心力衰竭,与扩张型心肌病相似。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-13", "title": "主动脉夹层", "front": "请简述该名词的定义。", "back": "<b>主动脉夹层</b>:<br>主动脉内膜撕裂,血流进入动脉壁中层形成血肿,将动脉分离成真腔和假腔。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-14", "title": "SAM现象", "front": "请简述该名词的定义。", "back": "<b>SAM现象</b>:<br>见于梗阻性肥厚型心肌病,收缩期二尖瓣C~D段呈多层弓背样向前隆起。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 23, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-15", "title": "左室心肌致密化不全", "front": "请简述该名词的定义。", "back": "<b>左室心肌致密化不全</b>:<br>先天性心肌发育不良罕见类型,正常心内膜胚胎发育停止,心肌小梁压缩不良呈海绵状,属左室发育不良的特殊类型。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-16", "title": "致心律失常性右室心肌病", "front": "请简述该名词的定义。", "back": "<b>致心律失常性右室心肌病</b>:<br>以右心室心肌被纤维或脂肪组织取代为特征的原因不明的心肌病,可进展为弥漫性,最终导致左心功能不全。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-17", "title": "心包积液(PE)", "front": "请简述该名词的定义。", "back": "<b>心包积液(PE)</b>:<br>心包腔内液体超过50ml。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-18", "title": "自发显影", "front": "请简述该名词的定义。", "back": "<b>自发显影</b>:<br>正常血流超声显示为无回声,缓慢流动的血流可呈现烟雾状回声,提示存在血栓形成条件,需抗凝治疗。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-19", "title": "肺动脉高压", "front": "请简述该名词的定义。", "back": "<b>肺动脉高压</b>:<br>静息状态下右心导管测定平均肺动脉收缩压≥25mmHg。轻度40~50;中度50~70;重度≥70mmHg。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-20", "title": "鲁登巴赫综合征", "front": "请简述该名词的定义。", "back": "<b>鲁登巴赫综合征</b>:<br>继发孔型房间隔缺损合并二尖瓣狭窄。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-21", "title": "室间隔缺损(VSD)", "front": "请简述该名词的定义。", "back": "<b>室间隔缺损(VSD)</b>:<br>胚胎发育时期室间隔未能完整发育,导致左右心室之间形成异常通道,产生心室水平分流。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-22", "title": "动脉导管", "front": "请简述该名词的定义。", "back": "<b>动脉导管</b>:<br>胎儿期肺动脉与主动脉之间重要的正常生理通道。出生后1年未闭合=动脉导管未闭。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-23", "title": "房室间隔缺损(AVSD)", "front": "请简述该名词的定义。", "back": "<b>房室间隔缺损(AVSD)</b>:<br>心内膜垫房室组织发育不全造成的低位房间隔、部分流入道室间隔和房室瓣发育异常的一组畸形。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-24", "title": "肺动脉狭窄", "front": "请简述该名词的定义。", "back": "<b>肺动脉狭窄</b>:<br>广义:右室流出道到肺动脉分支之间的任何梗阻。狭义:单纯肺动脉瓣膜处狭窄(最常见)。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-25", "title": "先天性主动脉狭窄", "front": "请简述该名词的定义。", "back": "<b>先天性主动脉狭窄</b>:<br>从左室流出道至升主动脉之间任何部位出现的梗阻,约占先天性心脏病3%~10%。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-26", "title": "法洛四联症(TOF)", "front": "请简述该名词的定义。", "back": "<b>法洛四联症(TOF)</b>:<br>一组复合先天性心血管畸形(肺动脉狭窄、室间隔缺损、主动脉骑跨、右心室肥厚)。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-1-27", "title": "大动脉转位", "front": "请简述该名词的定义。", "back": "<b>大动脉转位</b>:<br>主动脉与肺动脉两支大动脉之间的空间位置及与心室连接关系异常。分完全型和矫正型。", "tags": ["名词解释", "心脏"], "kind": "名词解释", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-1", "title": "三尖瓣位于________与________之间。完整的三尖瓣由________与________组成。", "front": "", "back": "<b>答案:</b>右心房、右心室、三尖瓣环、瓣叶/腱索/乳头肌", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-2", "title": "CVP一般代表________的压力变化。连续测定CVP可反映________情况。", "front": "", "back": "<b>答案:</b>右心房/腔静脉胸腔段、右心前负荷", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-3", "title": "影响心排血量的主要因素是________和________。", "front": "", "back": "<b>答案:</b>心肌前负荷、心肌收缩性(及心肌后负荷)", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-4", "title": "心肌舒张功能障碍可能与________和________等因素有关。", "front": "", "back": "<b>答案:</b>钙离子复位延迟、肌球-肌动蛋白复合体解离障碍/心室顺应性降低", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-5", "title": "二尖瓣狭窄典型M型表现为前后叶运动呈'6'样改变,前后叶________。", "front": "", "back": "<b>答案:</b>同向城墙样", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-6", "title": "二尖瓣狭窄瓣口面积定量评价常用________、________、________。", "front": "", "back": "<b>答案:</b>二维超声直接测量瓣口面积、压差减半时间法(PHT)、连续方程法", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-7", "title": "冠心病是指因冠状动脉________使血管腔狭窄或闭塞,或因冠状动脉________导致心肌缺血缺氧。", "front": "", "back": "<b>答案:</b>粥样硬化、痉挛", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-8", "title": "1979年WHO将冠心病分为:无症状性心肌缺血、________、________、________、________。", "front": "", "back": "<b>答案:</b>心绞痛、心肌梗死、缺血性心力衰竭(缺血性心肌病)、猝死", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-9", "title": "室壁运动异常按程度分为:________、________、________、________。", "front": "", "back": "<b>答案:</b>运动减弱、运动消失、反常运动、室壁瘤", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-10", "title": "肥厚型心肌病以________肥厚最为多见。", "front": "", "back": "<b>答案:</b>室间隔", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-11", "title": "根据左室流出道有无梗阻,肥厚型心肌病分为________和________两型。", "front": "", "back": "<b>答案:</b>梗阻性、非梗阻性", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-12", "title": "心包腔内液体超过________ml即称为心包积液。", "front": "", "back": "<b>答案:</b>50", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-13", "title": "心脏压塞时超声表现为右心房________期塌陷,右心室________期塌陷。", "front": "", "back": "<b>答案:</b>收缩期、舒张早期", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-14", "title": "房间隔缺损分四型:________、________、________、________。", "front": "", "back": "<b>答案:</b>继发孔型、原发孔型、静脉窦型、冠状静脉窦型", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-2-15", "title": "先天性主动脉狭窄分________、________、________三型。", "front": "", "back": "<b>答案:</b>主动脉瓣上、主动脉瓣下、主动脉瓣", "tags": ["填空题", "心脏"], "kind": "填空题", "page": 24, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-1", "title": "1. 下列关于左心室的解剖结构及邻近结构关系的描述， 不正确 的是", "front": "A.左室流入道<br>B.左室流出道<br>C.与肺动脉连接<br>D.左房接口，通过左房室口与左心房连接<br>E.左室壁", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-2", "title": "2. 下列关于室间隔的解剖学要点的描述,正确的是", "front": "A.分为膜部与肌部<br>B.位于左心房室间<br>C.膜部在下、肌部在上<br>D.大部分由纤维组织构成<br>E.其下部紧邻主动脉", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-3", "title": "3. 最能说明心房收缩期在生理上意义的是", "front": "A.心房收缩是舒张期的开始<br>B.左心房收缩引起左心室收缩<br>C.心房收缩期引起心室的快速充盈<br>D.心房收缩期是左心室射血的终结<br>E.心房的血液因心房收缩，最终全部被充盈到左心室", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-4", "title": "4. 等容舒张期在心动周期的时相上指的是", "front": "A.右室舒张晚期时间<br>B.左室舒张中期时间<br>C.左室舒张早期的时间<br>D.肺动脉射血晚期时间<br>E.主动脉瓣关闭到二尖瓣开放这一段时间", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-5", "title": "5. 心动周期的次序排列应该是", "front": "A.快速射血期，减慢射血期，等容收缩期，快速舒张期<br>B.等容收缩期，减慢射血期，快速射血期，等容舒张期<br>C.等容收缩期，快速射血期，减慢射血期，等容舒张期<br>D.等容舒张期，快速舒张期，快速收缩期，等容收缩期<br>E.减慢射血期，等容射血期，等容收缩期，快速射血期", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-6", "title": "6. 心搏出量与心排血量的不同点是", "front": "A.心搏出量在数值上与心排血量相等<br>B.心率不变时，心搏出量增大反而使心排血量减低<br>C.心搏出量大于心排血量<br>D.心排血量是心搏出量乘以心率，心搏出量是每次心搏的排出量<br>E.心排血量不乘以心率，心 : 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-13", "title": "13. 有关左右心室壁的描述， 错误 的是", "front": "A.左室壁厚于右室壁<br>B.左室壁厚9~12mm<br>C.右室壁厚3~4mm<br>D.左室壁是右室壁的1.5倍<br>E.左右室壁的共同部分为室间隔", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-14", "title": "14. 由心尖部可获得的心脏超声切面图为", "front": "A.上腔静脉长轴切面图<br>B.四腔心切面图<br>C.主动脉弓长轴切面图<br>D.大动脉短轴切面<br>E.主动脉短轴切面图", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-15", "title": "15. 评价左心收缩功能指标 不包括", "front": "A.射血分数<br>B.心室容积<br>C.每搏量<br>D.心排血量<br>E.等容舒张期", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-16", "title": "16. 反映收缩功能指标的是", "front": "A.等容舒张期时间<br>B.舒张期压力减半时间<br>C.左室压力最大下降速率<br>D.左室心肌松弛时间常数<br>E.左室短轴缩短率", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-17", "title": "17. 二维超声检测左室判断有无冠心病主要依据为", "front": "A.左心室壁厚径增加<br>B.左心室壁收缩运动幅度增大<br>C.节段性室壁运动异常<br>D.左室形状改变<br>E.左心室壁收缩期增厚率减低", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-18", "title": "18. M型超声心动图的二尖瓣水平波群可观察到的结构运动曲线是", "front": "A.二尖瓣前后叶曲线<br>B.乳头肌曲线<br>C.动脉瓣曲线<br>D.肺动脉瓣曲线<br>E.主动脉根部曲线", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-19", "title": "19. 左室整体舒张功能的超声测量指标为", "front": "A.等容收缩时间<br>B.左室快速充盈分数<b :</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-45", "title": "45. 关于乳头肌功能不全， 不正确 的描述是", "front": "A.乳头肌收缩减弱<br>B.二尖瓣前后叶对合不良、脱垂<br>C.左房、左室扩大<br>D.二尖瓣叶出现连枷样运动<br>E.可见不同程度二尖瓣反流", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-46", "title": "46. 关于心肌梗死并发室间隔穿孔， 不正确 的描述是", "front": "A.缺损口边缘不整齐<br>B.缺损口大小随心动周期变化<br>C.缺损口附近周围室壁运动异常<br>D.左室、右室增大<br>E.好发于膜部室间隔", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-47", "title": "47. 关于心肌梗死并发血栓形成， 不正确 的描述是", "front": "A.为心肌梗死常见并发症<br>B.边界常清楚，边缘多不规则<br>C.血栓附着于室壁的面积较广<br>D.血栓与心内膜面界线常较明确<br>E.血栓附着局部室壁运动多无异常", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-48", "title": "48. 缺血性心肌病与扩张型心肌病超声鉴别的要点是", "front": "A.心腔扩大程度<br>B.心室壁厚度<br>C.二尖瓣舒张期开放幅度<br>D.节段性室壁运动异常<br>E.收缩功能降低程度", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-49", "title": "49. 主动脉夹层，夹层发生在", "front": "A.内膜<br>B.中层<br>C.外膜<br>D.内、中、外三层<br>E.外膜与周围组织之间", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-50", "title": "50. 梗阻性肥厚型心肌病的超声表现， 不正确 的描述是", "front": "A.主动脉瓣收缩中期部分关闭<br>B.室间隔厚度明显增厚<br>C.左室壁厚度增厚，但增厚程度小于室间隔<br>D.心室壁呈弥漫性向心性肥厚<br>E.室间隔厚径与左室壁厚径比值大于1.5", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-51", "title": "51. 临床上与限制型心肌病难以鉴别的疾病主要是", "front": "A.缩窄性心包炎<br>B.扩张型心肌病<br>C.肥厚型心肌病<br>D.急性心肌梗死<br>E.缺血性心肌病", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-52", "title": "52. 关于左室心肌致密化不全， 不正确 的描述是", "front": "A.左心室壁呈非均匀性增厚或变薄<br>B.心肌变薄处为5~6mm<br>C.收缩末期非致密化心肌层与致密化心肌层厚度比例&gt;2<br>D.收缩末期非致密化心肌层与致密化心肌层厚度比例&gt;3<br>E.近心外膜处心肌回声接近正常", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-53", "title": "53. 梗阻性肥厚型心肌病病人左室流出道内射流频谱为", "front": "A.峰值后移，呈匕首状单峰充填型，峰速一般大于3m/s<br>B.峰值前移，呈匕首状单峰充填型，峰速一般大于3m/s<br>C.峰值后移，呈双峰状，峰速一般大于2m/s<br>D.峰值前移，呈双峰状，峰速一般大于2m/s<br>E.峰值前移，呈双峰状，峰速一般大于3m/s", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-54", "title": "54. 关于高血压心脏病超声表现， 不正确 的描述是", "front": "A.左心室心肌重量增加<br>B.左室壁呈非对称性肥厚<br>C.左房增大较常见，且较早出现<br>D.各型均存在左室舒张功能异常，且早于收缩功能异常<br>E.左室流出道流速正常", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-55", "title": "55. 扩张型心肌病的二维超声表现主要是", "front": "A.室壁增厚率增大<br>B.左心或全心扩大，室壁收缩运动幅度普遍减低<br>C.心室扩大，心房变小<br>D.室壁弥漫性增厚，室壁收缩运动幅度增大<br>E.左心室正常，左心房变小", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-56", "title": "56. 关于肥厚型心肌病的超声诊断， 不正确 的描述是", "front": "A.梗阻性左室流出道狭窄、阻塞<br>B.左室壁与室间隔厚径比值&gt;1.5<br>C.室间隔与左室壁厚径比值&gt;1.5<br>D.梗阻性可有 SAM 现象<br>E.室壁肥厚，绝对值常&gt;1.5cm", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-57", "title": "57. 扩张型心肌病的病理特点是", "front": "A.全心型，一般以左室型为主，偶有右室型<br>B.室壁肥厚<br>C.心脏重量增加<br>D.心肌广泛坏死<br>E.心内膜增厚", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-58", "title": "58. M型超声EPSS代表", "front": "A.二尖瓣开口前后径<br>E.A 峰间距<br>C.E 峰峰值<br>D.E 峰峰值压差<br>E.二尖瓣开放时前叶", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-59", "title": "59. 下列关于扩张型心肌病的描述， 不正确 的是", "front": "A.大心腔<br>B.小瓣口<br>C.高容量<br>D.低排血量<br>E.高排血量", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-60", "title": "60. 二尖瓣 E 峰值正常，E～F 斜率缓慢，A 峰明显增高，可见于", "front": "A.高血压性心脏病<br>B.扩张型心肌病<br>C.肥厚型心肌病<br>D.肺心病<br>E.冠心病", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-61", "title": "61. 限制型心肌病右室型，超声检查应注意鉴别的是", "front": "A.缩窄性心包炎<br>B.肺心病<br>C.扩张型心肌病右室型<br>D.三尖瓣下移畸形<br>E.房间隔缺损", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-62", "title": "62. “左室重构”常发生于", "front": "A.风湿性心脏病<br>B.心肌病<br>C.冠心病急性心梗<br>D.高血压性心脏病", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-63", "title": "63. 梗阻性肥厚型心肌病超声改变， 不可能 出现的是", "front": "A.室间隔非对称性肥厚<br>B.室间隔厚度与左室壁厚度之比大于1.3~1.5<br>C.左室流出道狭窄<br>D.收缩期二尖瓣向前运动(SAM)<br>E.二尖瓣舒张期震颤运动", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-64", "title": "64. 扩张型心肌病的心功能超声测量", "front": "A.每搏量(SV)增大<br>B.心排血量(CO)增大<br>C.收缩及舒张功能指标普遍低下(功能差)<br>D.舒张末 A 速度与正常比无变化<br>E.快速充盈分数增大", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-65", "title": "65. 关于扩张型心肌病多普勒超声表现， 不正确 的描述是", "front": "A.血流速度缓慢<br>B.心腔彩色呈明亮的红色<br>C.各瓣口不同程度的反流<br>D.瓣膜多无明显的器质性异常<br>E.收缩期二尖瓣、三尖瓣口心房侧反流信号呈蓝色为", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-66", "title": "66. 关于肥厚型心肌病超声心动图的表现， 不正确 的描述是", "front": "A.主动脉瓣反流最常见<br>B.二尖瓣前叶收缩期向前运动<br>C.室间隔增厚<br>D.主动脉瓣提前关闭<br>E.左室流出道狭窄", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-67", "title": "67. 关于扩张型心肌病左心型的病理及血流动力学改变， 不正确 的描述是", "front": "A.收缩功能减退<br>B.舒张功能损害为主<br>C.心肌收缩无力，心排量减少，心贮血量增多<br>D.两侧心室扩张，通常以左心扩大为主<br>E.两侧心室扩张，通常以右心扩大为主", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-68", "title": "68. 有关心包， 不正确 的描述是", "front": "A.由浆膜层和纤维层构成<br>B.浆膜层分为壁层和脏层<br>C.正常心包腔内没有液体<br>D.心包有限制心脏容量作用<br>E.有防止邻近器官和组织炎症向心脏蔓延作用", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-69", "title": "69. 心包积液的定义是", "front": "A.心包腔内液体超过 5 ml <br>B.心包腔内液体超过 50 ml <br>C.心包腔内液体超过 100 ml <br>D.心包腔内液体超过 150 ml <br>E.心包腔内液体超过 500 ml", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-70", "title": "70. 有关中量心包积液， 不正确 的描述是", "front": "A.心包腔内液体为500~1000ml<br>B.左室后壁心包腔内无回声宽为1.0~2.0cm<br>C.右室前壁心包腔内无回声宽为0.5~1.0cm<br>D.左房后心包腔内可有少量无回声<br>E.心尖四腔心切面，心尖部出现无回声区", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-71", "title": "71. 超声心动图显示右心房收缩期塌陷，常见于", "front": "A.心脏压塞<br>B.微量心包积液<br>C.少量心包积液<br>D.中量心包积液<br>E.大量心包积液", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-72", "title": "72. 超声心动图显示室间隔“弹跳征”或“跳跃征”，常见于", "front": "A.心包积液<br>B.扩张型心肌病<br>C.缩窄性心包炎<br>D.限制型心肌病<br>E.肥厚型心肌病", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-73", "title": "73. 不属于 心脏原发性良性肿瘤的是", "front": "A.黏液瘤<br>B.横纹肌瘤<br>C.乳头状弹力纤维瘤<br>D.血管肉瘤<br>E.畸胎瘤", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-74", "title": "74. 发绀型先天性心脏病， 不包括", "front": "A.法洛四联症<br>B.右室双出口<br>C.完全型大动脉转位<br>D.房间隔缺损<br>E.单心室", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-75", "title": "75. 关于房间隔缺损的血流动力学改变, 描述正确的是", "front": "A.左心容量负荷加重<br>B.左心压力负荷过重<br>C.肺动脉收缩压降低<br>D.右心容量负荷加重<br>E.右心压力负荷过重", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-76", "title": "76. 室间隔缺损引起的病理改变为", "front": "A.左房左室增大<br>B.左房右室增大<br>C.右房右室增大<br>D.双房增大<br>E.左室小,右室大", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-77", "title": "77. 室间隔缺损病人 SBP 为 120 mmHg ，室缺分流速度 3 m/s ，肺动脉血流速度 2 m/s ，其肺动脉压可能为", "front": "A.84mmHg<br>B.74mmHg<br>C.68mmHg<br>D.64mmHg<br>E.58mmHg", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-78", "title": "78. 室间隔缺损类型中, 大动脉短轴切面 不能 显示的是", "front": "A.单纯膜部型<br>B.峰下型<br>C.肌部型<br>D.峰内型<br>E.干下型", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-79", "title": "79. 关于动脉导管未闭的超声表现， 不正确 的描述是", "front": "A.左肺动脉根部与降主动脉之间存在异常分流信号<br>B.持续整个心动周期的连续性左向右分流，收缩期血流峰值可达5m/s，舒张期可达4~4.5m/s<br>C.大动脉根部短轴切面肺动脉内见以红色为主的五彩高速血流信号<br>D.右房右室增大，右室壁增厚<br>E.左房左室增大", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-80", "title": "80. 先天性心脏病中，血流呈双期连续性分流的是", "front": "A.房间隔缺损<br>B.室间隔缺损<br>C.法洛四联症<br>D.艾森曼格综合征<br>E.动脉导管未闭及主动脉窦瘤破裂", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-81", "title": "81. 关于房室间隔缺损的超声表现， 不正确 的描述是", "front": "A.房间隔下部回声中断<br>B.二尖瓣前叶裂<br>C.十字交叉结构消失<br>D.二尖瓣与三尖瓣为共同房室瓣<br>E.一定合并心内其他结构异常", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-82", "title": "82. 肺动脉狭窄 不包括", "front": "A.肺动脉瓣膜狭窄<br>B.肺动脉主干狭窄<br>C.肺动脉分支狭窄<br>D.右室流出道狭窄<br>E.右室双出口", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-83", "title": "83. 关于肺动脉瓣狭窄彩色多普勒血流，正确的描述是", "front": "A.以红色为主的多彩镶嵌血流束呈喷射状<br>B.以蓝色为主的多彩镶嵌血流束呈喷射状<br>C.以绿色为主的多彩镶嵌血流束呈喷射状<br>D.为橘红色纤细血流束<br>E.为蓝色、绿色的纤细血流束", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-84", "title": "84. 若怀疑有主动脉瓣狭窄，为取得狭窄的高速湍流，取样容积应置于", "front": "A.心尖部<br>B.左室流入道<br>C.左室二尖瓣瓣尖水平<br>D.主动脉瓣下<br>E.主动脉瓣上", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-85", "title": "85. 关于主动脉瓣狭窄的超声表现， 不正确 的描述是", "front": "A.主动脉瓣叶增厚，回声增强<br>B.瓣口面积缩小<br>C.左室腔明显增大<br>D.左室壁普遍性增厚<br>E.升主动脉内探及高速射流频谱", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-86", "title": "86. 关于法洛四联症， 不正确 的描述是", "front": "A.肺动脉瓣狭窄<br>B.室间隔缺损<br>C.房间隔缺损<br>D.右心室肥厚<br>E.主动脉骑跨于室间隔", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-87", "title": "87. 关于矫正型大动脉转位， 不正确 的描述是", "front": "A.主动脉位于左前，发自右室<br>B.肺动脉位于右后，发自左室<br>C.右室位于左侧与左房相连<br>D.左室位于右侧与右房相连<br>E.均合并心内分泌畸形", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-1", "title": "88. 病人，男性，48岁。近两年来有心慌气短并进行性加重，二维超声见心脏扩大，左心增大明显，呈球形，室间隔及左室后壁似变薄，但测值属正常范围，室壁运动搏幅普遍减低，各瓣膜无增厚，EPSS明显增大，呈高容量、低动力型血流动力学表现，CDFI示：二尖瓣轻度反流，该病人心功能超声测量最常见的改变是", "front": "A.每搏输出量(SV)增大<br>B.心排血量(CO)增大<br>C.收缩及舒张功能指标普遍低下<br>D.舒张末A峰速度与正常比无明显变化<br>E.快速充盈分数增大", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-2", "title": "89. 病人，女性，54岁。胸部长期有压迫窒息感、闷胀感，疼痛常放射至左肩，心电图ST段降低，T波倒置，心脏超声检查左室前壁运动异常，测得EDV:150ml，ESV:86ml，FS:19%,SV:64ml，该病人的心功能值为", "front": "A.19%<br>B.74%<br>C.25%<br>D.34%<br>E.43%", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-3", "title": "90. 病人，女性，67岁。高血压史20年，近期头疼头晕症状加重就诊，测得血压160/75mmHg，心脏超声检查室间隔厚度12mm，左室壁厚度12～13mm，左心房（左右径）44mm，二尖瓣下测得E峰107cm/s，A峰82cm/s，DT（E峰下降时间）180毫秒，肺静脉S峰值&gt;D峰值，二尖瓣环组织多普勒e'波5.6cm/s，a'波8.1cm/s，该病人的左室舒张 能", "front": "A.左室舒张功能正常<br>B.左室弛缓功能减退<br>C.左室充盈假性正常化<br>D.左室限制性充盈异常<br>E.左室不可逆限制性充盈异常", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-4", "title": "91. 病人，男性，45岁。发热1个月，伴心悸气促半月，入院查体：T 39.5° C，心尖区闻及全收缩期杂音，呈高调吹风样。超声心动图检查发现二尖瓣前叶瓣尖可见一絮状稍强回声附着，随二尖瓣活动于左房左室之间甩动，二尖瓣口收缩期左房侧可见偏心性反流信号至房顶。该病人最可能的诊断是", "front": "A.二尖瓣赘生物形成并重度关闭不全<br>B.二尖瓣狭窄<br>C.双孔二尖瓣<br>D.二尖瓣中度关闭不全<br>E.降落伞型二尖瓣", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-5", "title": "92. 病人，男性，18 岁。胸闷气短半月余。查体：主动脉瓣听诊区闻及舒张早中期高频、叹气样递减性杂音，向心尖区传导，超声心动图显示舒张期见主动脉瓣呈吊床样脱入左室流出道，超过主动脉瓣根部附着点连线以下。该病人最可能的诊断是", "front": "A.主动脉瓣关闭不全<br>B.主动脉瓣狭窄<br>C.主动脉瓣脱垂<br>D.主动脉瓣二瓣化畸形<br>E.主动脉瓣赘生物形成", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-6", "title": "93. 超声心动图定量：主动脉瓣口面积为 0.6 cm2 ，主动脉瓣跨瓣压差为 60 mmHg ，主动脉瓣口收缩期峰值速度 3.6 m/s 。该病人最可能的诊断是", "front": "A.主动脉瓣重度关闭不全<br>B.主动脉瓣轻度狭窄<br>C.主动脉瓣中度狭窄<br>D.主动脉瓣重度狭窄<br>E.主动脉瓣出现形态学上的狭窄，但无血流动力学梗阻", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-7", "title": "94. 病人，女性，50岁。因左下肢水肿3天入院。住院期间突发剧烈胸痛与呼吸困难，急诊超声检查发现：右房、右室增大，肺动脉增宽，室间隔向左室膨出；左房、左室大小正常，未见节段性室壁运动异常，CDFI示三尖瓣重度反流。其最可能的诊断是", "front": "A.右室心肌梗死<br>B.急性肺动脉栓塞<br>C.应激性心肌病<br>D.变异型心绞痛<br>E.致心律失常型右室心肌病", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-8", "title": "95. 病人，男性，48岁。近两年来有心慌、憋气、进行性加重，二维超声见心脏扩大，左心增大明显，呈球形，室间隔及左室后壁似乎变薄，但测值属正常范围，室壁运动普遍低，各瓣膜无增厚，心尖部可见附壁血栓光团；EPSS明显增大，呈高容量，低动力型血流动力学表现；CDFI示二尖瓣轻度反流。其最可能的诊断是", "front": "A.冠心病，心肌硬化型<br>B.冠心病并左心衰<br>C.扩张型心肌病<br>D.高血压心脏病<br>E.尿毒症性心脏病", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-9", "title": "96. 病人，男性，56岁，体型肥胖。常规体检超声心动图显示：各腔室形态、大小正常，各瓣膜结构与活动无异常，未见室壁运动异常，也无异常分流及反流；于右心室前方探及一层较厚的极低回声，厚约0.5cm，多切面探查，左室后壁未见无回声区。其最可能的诊断是", "front": "A.少量心包积液<br>B.心包囊肿<br>C.心包肿瘤<br>D.心外脂肪垫<br>E.心包局限性增厚", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-10", "title": "97. 病人，女性，29岁。妊娠18周，近日频繁感觉胸闷、气急，心电图表现为窦性心律，电轴右偏，心脏听诊未见明显异常杂音；超声心动图表现为右心增大，右室流出道增宽。其最可能的诊断是", "front": "A.房间隔缺损<br>B.室间隔缺损<br>C.动脉导管未闭<br>D.法洛四联症<br>E.肺动脉瓣狭窄", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-11", "title": "98. 患儿，5岁，男性。发育差，易患呼吸道感染，体检发现胸骨左缘3~4肋间可闻及Ⅲ级以上粗糙收缩期杂音，伴有震颤。超声表现为大动脉短轴切面，CDFI高速血流自左室穿过室间隔射向右室，其最可能的诊断是", "front": "A.房间隔缺损<br>B.室间隔缺损<br>C.主动脉瓣狭窄<br>D.动脉导管未闭<br>E.肺动脉瓣狭窄", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-12", "title": "99. 28 孕周的孕妇，行胎儿超声心动图检查，初步诊断考虑房室间隔缺损，需鉴别诊断的是", "front": "A.永存动脉干<br>B.冠状静脉窦扩张<br>C.右室双出口<br>D.法洛四联症<br>E.继发孔型房间隔缺损", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-13", "title": "100. 某病人超声心动图显示主动脉瓣瓣口缩小，瓣膜增厚，回声增强，瓣叶开放受限，主动脉瓣呈二叶斜裂式，收缩期主动脉瓣口最大血流速度约 3 m/s ，主动脉瓣口及升主动脉内可见五彩镶嵌花色血流信号。其最可能的诊断是", "front": "A.主动脉瓣上狭窄<br>B.主动脉瓣下狭窄<br>C.主动脉瓣狭窄<br>D.风湿性联合心脏瓣膜病<br>E.钙化型主动脉瓣狭窄", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-14", "title": "101. 患儿，男性，6岁。出生6个月出现发绀，逐渐加重，活动后气促，行走后蹲踞。胸片提示：右心室增大，心尖上翘，肺动脉段凹陷，心影似“靴型”，肺血减少。其最可能的诊断是", "front": "A.永存动脉干<br>B.法洛四联症<br>C.巨大房间隔缺损<br>D.心内膜垫缺损<br>E.室间隔缺损", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "心脏"], "kind": "选择题", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-shared-102-103", "title": "共用备选答案 · 第 102~103 题", "front": "<b>下列第 102~103 题共用以下备选答案:</b><br>A.二尖瓣前叶 E 峰与室间隔左心室面的距离<br>B.心排血量<br>C.室壁运动幅度及增厚率<br>D.CK 技术<br>E.应变率", "back": "", "tags": ["B型题", "心脏"], "kind": "共用备选答案", "page": 0, "chapter": "ch2", "static": true, "image": "", "figcap": ""}, {"no": "2-3-1", "title": "102. 检测局部左室收缩功能最常用的指标为", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span 答案:</b> <span class=\"highlight\">B</span>", "tags": ["B型题", "心脏"], "kind": "共用备选答案", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-17", "title": "119. 隐匿型冠心病需采用", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["B型题", "心脏"], "kind": "共用备选答案", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-shared-120-121", "title": "共用备选答案 · 第 120~121 题", "front": "<b>下列第 120~121 题共用以下备选答案:</b><br>A.二尖瓣“城墙样”改变<br>B.二尖瓣 SAM 现象<br>C.二尖瓣吊床征<br>D.二尖瓣舒张期震颤波<br>E.二尖瓣“钻石征”", "back": "", "tags": ["B型题", "心脏"], "kind": "共用备选答案", "page": 0, "chapter": "ch2", "static": true, "image": "", "figcap": ""}, {"no": "2-3-18", "title": "120. 扩张型心肌病的超声表现为", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["B型题", "心脏"], "kind": "共用备选答案", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-19", "title": "121. 梗阻性肥厚型心肌病的超声表现为", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["B型题", "心脏"], "kind": "共用备选答案", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-shared-122-124", "title": "共用备选答案 · 第 122~124 题", "front": "<b>下列第 122~124 题共用以下备选答案:</b><br>A.黏液瘤<br>B.横纹肌瘤<br>C.血管肉瘤<br>D.乳头状弹力纤维瘤<br>E.间皮瘤", "back": "", "tags": ["B型题", "心脏"], "kind": "共用备选答案", "page": 0, "chapter": "ch2", "static": true, "image": "", "figcap": ""}, {"no": "2-3-20", "title": "122. 成人原发性心脏恶性肿瘤中最常见的是", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["B型题", "心脏"], "kind": "共用备选答案", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-21", "title": "123. 心脏瓣膜最常发生的肿瘤是", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["B型题", "心脏"], "kind": "共用备选答案", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-3-22", "title": "124. 心脏原发性良性肿瘤最常见的是", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["B型题", "心脏"], "kind": "共用备选答案", "page": 0, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-1", "title": "简述影响二尖瓣血流频谱的因素。", "front": "", "back": "<b>参考答案:</b><br>1. <b>呼吸</b>:呼气时E峰流速较吸气时增高。E/A值不稳定时,可用TDI测瓣环e/a比值(e/a<1提示舒张功能下降);吸气时E/A更能反映舒张功能变化。<br>2. <b>年龄</b>:E/A随年龄变化。<br>3. <b>心率</b>:过快可致E/A融合。<br>4. <b>前负荷</b>。<br>5. <b>左室顺应性/舒张功能</b>。<br>6. <b>二尖瓣病变</b>。", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-2", "title": "简述组织多普勒(TDI)评价心脏功能的原理、优势及常用衍生技术模式。", "front": "", "back": "<b>参考答案:</b><br><b>原理</b>:基于多普勒原理,通过滤波去除血流高频低振幅信号,保留心肌低频高振幅频移信号,进行彩色编码。<br><b>优势</b>:直接定量心肌运动速度,不受心脏整体运动/呼吸影响。<br><b>模式</b>:①速度模式 ②加速度模式 ③能量模式 ④应变/应变率成像。", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-3", "title": "简述彩色多普勒(CDFI)的主要作用。", "front": "", "back": "<b>参考答案:</b><br>1. <b>实时显示血流方向</b>:红色=朝向探头,蓝色=背离探头<br>2. <b>显示血流速度</b>:色彩亮度反映流速<br>3. <b>显示血流状态</b>:层流(色彩均一)/湍流(五彩镶嵌)<br>4. <b>定位异常血流</b>:分流/反流<br>5. <b>引导频谱多普勒取样</b>", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-4", "title": "试述二尖瓣狭窄程度的超声定量评估。", "front": "", "back": "<b>参考答案:</b><br>1. <b>二维直接测量瓣口面积</b>(planimetry):轻度>1.5cm²;中度1.0~1.5cm²;重度<1.0cm²<br>2. <b>压力阶差</b>(PHT):轻度<5mmHg;中度5~10mmHg;重度>10mmHg<br>3. <b>连续方程法</b>:MVA=π×(LVOT半径)²×LVOT VTI / 二尖瓣口VTI<br>4. <b>PHT法</b>:MVA=220/PHT<br>5. <b>三尖瓣反流估测肺动脉压</b>", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-5", "title": "试述MS常用定量方法及注意事项和优缺点。", "front": "", "back": "<b>参考答案:</b><br>1. <b>二维面积法</b>:最直观,但依赖切面,瓣口钙化时测值不准确<br>2. <b>PHT法</b>:不受瓣口形态影响,但受左室舒张功能/心率影响<br>3. <b>连续方程法</b>:理论准确,但需多参数测量<br>4. <b>跨瓣压差</b>:受心率/流量影响<br>注意:综合应用,避免单一指标误导", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-6", "title": "简述生理性二尖瓣反流的超声特点。", "front": "", "back": "<b>参考答案:</b><br>1. 反流束细小(<1cm或<左房面积20%)<br>2. 局限于瓣口附近<br>3. 收缩早期<br>4. 速度>2m/s<br>5. 瓣膜结构正常<br>6. 左房左室无扩大", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-7", "title": "简述主动脉瓣狭窄程度分级及鉴别诊断。", "front": "", "back": "<b>参考答案:</b><br><b>分级</b>:①面积:轻>1.5;中1.0~1.5;重<1.0cm² ②平均压差:轻<20;中20~40;重>40mmHg<br><b>鉴别</b>:①先天性二叶瓣 ②风湿性 ③退行性钙化(老年最常见) ④感染性 ⑤梗阻性HCM(动力性梗阻)", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-8", "title": "简述主动脉瓣关闭不全超声诊断要点。", "front": "", "back": "<b>参考答案:</b><br>1. 瓣膜增厚/钙化,对合不良<br>2. 左室扩大<br>3. LVOT起源主动脉瓣口反流束<br>4. <b>反流束长度</b>:轻<二尖瓣前叶;中达乳头肌;重超乳头肌<br>5. <b>反流束宽度/LVOT宽度</b>:轻<25%;中25~64%;重≥65%<br>6. <b>PHT法</b>:PHT>500ms=轻度;<200ms=重度<br>7. 二尖瓣前叶舒张期震颤(考虑AR)", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-9", "title": "简述对室壁进行节段划分的主要目的。", "front": "", "back": "<b>参考答案:</b><br>1. <b>定位缺血/梗死区域</b>:与冠脉供血对应<br>2. <b>标准化评估</b>:便于不同操作者/不同时间的比较<br>3. <b>半定量评价</b>:计算WMSI<br>4. <b>指导治疗</b>:溶栓/PCI/CABG<br>5. <b>评估预后</b>:WMSI↑=预后差<br>6. <b>负荷超声定位</b>:识别存活心肌", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-10", "title": "简述多巴酚丁胺负荷试验结果判定标准及临床意义。", "front": "", "back": "<b>参考答案:</b><br><b>判定</b>:①室壁运动改善≥1级=心肌存活 ②原有异常节段运动恶化=缺血<br><b>分级</b>:低剂量(5~10μg/kg/min)=存活心肌;高剂量(20~40μg/kg/min)=诱导缺血<br><b>临床意义</b>:①识别存活心肌(血运重建指征) ②诊断隐匿型冠心病 ③评估心肌梗死范围 ④术前风险评估", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-11", "title": "简述缺血性与扩张型心肌病超声鉴别要点。", "front": "", "back": "<b>参考答案:</b><br>1. <b>病史</b>:缺血性有心绞痛/心梗史;扩张型无<br>2. <b>心腔形态</b>:缺血性可局限性扩大;扩张型全心扩大,左室球形<br>3. <b>室壁运动</b>:缺血性节段性运动减低,不协调;扩张型弥漫性减低,协调<br>4. <b>室壁回声</b>:缺血性回声不均;扩张型尚均匀<br>5. <b>冠脉造影</b>:缺血性狭窄;扩张型正常", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-12", "title": "试述Stanford A型主动脉夹层的超声表现。", "front": "", "back": "<b>参考答案:</b><br>1. 升主动脉不同程度扩张<br>2. M型:腔内线样回声<br>3. 二维:动脉腔被纤细膜样回声分成真腔和假腔<br>4. 假腔内可能有血栓<br>5. CDFI:收缩期血流从真腔经破口流入假腔,真腔流速快,假腔流速慢/无信号<br>6. 假腔内血流可在舒张期经破口回流真腔<br>7. 累及主动脉瓣→AR", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-13", "title": "简述梗阻性肥厚型心肌病的M型超声表现。", "front": "", "back": "<b>参考答案:</b><br>1. <b>IVS非对称性肥厚</b>,IVS/LVPW>1.5<br>2. <b>SAM现象</b>:收缩期二尖瓣C~D段呈多层弓背样前隆<br>3. <b>EF斜率减慢</b><br>4. 收缩期主动脉瓣提前关闭(M型表现:瓣呈'M'型)<br>5. LVOT狭窄(<20mm)<br>6. 左室腔小,左房增大", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-14", "title": "简述扩张型心肌病的超声表现。", "front": "", "back": "<b>参考答案:</b><br>1. 全心增大,<b>以左室为著</b>,左室球形扩大<br>2. M型室壁运动幅度<b>弥漫性减低</b><br>3. 二尖瓣<b>钻石样改变</b>,EPSS明显增大<br>4. 多瓣口轻中度反流<br>5. <b>二尖瓣血流频谱</b>:早期E/A<1;较重反流时E/A>1(假性正常化);严重心衰E/A>1.5~2.0(不可逆)<br>6. 左室收缩及舒张功能普遍减低<br>7. 心腔内血栓", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-15", "title": "简述心包积液与左侧胸腔积液的鉴别。", "front": "", "back": "<b>参考答案:</b><br>1. <b>位置</b>:心包积液在心脏周围;胸腔积液在降主动脉后方<br>2. <b>LV后壁与降主动脉距离</b>:心包积液时增大;胸腔积液不变<br>3. <b>延伸范围</b>:胸腔积液延伸至心脏以外的胸腔壁,肩胛下也可显示<br>4. <b>心脏压塞征</b>:仅心包积液可致心脏压塞<br>5. <b>随体位变化</b>:胸腔积液变化更明显", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-16", "title": "试述心腔内血栓的共同超声表现。", "front": "", "back": "<b>参考答案:</b><br>1. <b>位置</b>:多位于心尖或血流缓慢处<br>2. <b>形态</b>:团块状/条带状回声<br>3. <b>附着</b>:基底较宽,附着于心壁<br>4. <b>活动度</b>:多无活动(附壁血栓),可有蒂<br>5. <b>回声</b>:层状/均匀/不均匀<br>6. <b>附着处室壁</b>:常有运动异常(局部)<br>7. <b>多普勒</b>:内部无血流信号", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-17", "title": "试述左心房黏液瘤的超声表现。", "front": "", "back": "<b>参考答案:</b><br>1. <b>位置</b>:左房内,蒂多附着于房间隔卵圆窝<br>2. <b>形态</b>:团块状/分叶状,内部回声不均<br>3. <b>活动度</b>:随心动周期摆动,舒张期进入二尖瓣口,收缩期回到左房<br>4. <b>血流动力学</b>:部分阻塞二尖瓣口→类似MS表现<br>5. <b>CDFI</b>:舒张期二尖瓣口血流加速,瘤体影响关闭时左房侧反流<br>6. 鉴别:左房血栓(无蒂,多位于左心耳/后壁)", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-18", "title": "简述房间隔缺损的超声表现及诊断要点。", "front": "", "back": "<b>参考答案:</b><br>1. <b>二维</b>:多切面显示房间隔局部回声中断;右房右室增大;RVOT/肺动脉增宽<br>2. <b>M型</b>:右室增大;室间隔运动幅度降低/平坦,甚至与左室后壁同向运动<br>3. <b>CDFI</b>:房间隔中断处全心动周期左向右分流束<br>4. <b>频谱多普勒</b>:房间隔中断处全心动周期分流频谱,峰值流速位于舒张期,~1m/s<br>5. <b>分型</b>:继发孔型(最常见)、原发孔型、静脉窦型、冠状静脉窦型", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-19", "title": "简述室间隔缺损的超声表现及诊断要点。", "front": "", "back": "<b>参考答案:</b><br>1. <b>二维/M型</b>:室间隔局部回声失落,断端回声增强增粗<br>2. <b>膜部间隔瘤</b>:膜部缺损断端纤维组织包绕缺口,形成瘤样结构突向右室<br>3. 左房左室增大,肺动脉增宽,左室壁运动增强<br>4. <b>CDFI</b>:室间隔中断处收缩期左向右五彩镶嵌穿隔血流束<br>5. <b>频谱多普勒</b>:室间隔中断处收缩期高速湍流频谱<br>6. <b>分型</b>:膜部型/嵴下型/嵴内型/干下型/肌部型", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-20", "title": "试述动脉导管未闭时血流动力学改变。", "front": "", "back": "<b>参考答案:</b><br>1. 主动脉压力收缩期及舒张期均高于肺动脉→主动脉血液持续经未闭导管流向肺动脉(大动脉水平左向右分流)<br>2. 肺循环血流量明显增加→左心前负荷增加→左房左室扩大<br>3. 长期肺血流增加→肺血管阻力增高→肺动脉高压<br>4. 严重肺动脉高压→右向左分流→<b>艾森曼格综合征</b>(发绀)", "tags": ["简答题", "心脏"], "kind": "简答题", "page": 38, "chapter": "ch2", "static": false, "image": "", "figcap": ""}, {"no": "2-5-21", "title": "试述房室间隔缺损的超声诊断要点。", "front": "", "back": "<b const container = document.getElementById('cards-container');
let activeFilter = 'all';
let searchTerm = '';

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function attrEscape(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function cardHTML(card) {
  const tags = (card.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  const searchBlob = ((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '')).toLowerCase();
  const safeSearch = attrEscape(searchBlob);
  const safeKind = attrEscape(card.kind);
  const safeTags = attrEscape((card.tags || []).join(','));
  const figHTML = card.image ? `<figure class="card-fig"><img src="${card.image}" alt="${attrEscape(card.figcap)}" loading="lazy"><figcaption>${card.figcap || ''}</figcaption></figure>` : '';
  if (card.static) {
    const isKp = card.kind === '重点';
    const icon = isKp ? '⭐' : '🔗';
    const cls = isKp ? 'static-card kp-static' : 'static-card';
    return `
    <div class="card ${cls}" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}" data-static="1">
      <div class="card-static-inner">
        <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
        <div class="card-title">${icon} ${card.title}</div>
        <div class="card-body">${card.front}</div>
        <div class="tags">${tags}</div>
      </div>
    </div>
  `;
  }
  return `
    <div class="card" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title">📌 ${card.title}</div>
          ${figHTML}
          <div class="card-body">${card.front}</div>
          <div class="tags">${tags}</div>
          <div class="flip-hint">💡 点击卡片翻面查看答案</div>
        </div>
        <div class="card-face card-back">
          <div class="card-no">卡号 ${card.no} · 答案 ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title answer-title">✅ ${card.title}</div>
          ${figHTML}
          <div class="card-body answer-body">${card.back}</div>
          <div class="tags">${tags}</div>
          <div class="card-actions"><button type="button" class="flip-back-btn">↩︎ 返回题目</button></div>
        </div>
      </div>
    </div>
  `;
}

function renderCards() {
  let html = '';
  let visibleCount = 0;
  const sections = {
    '前言': [], '目录': [], '重点': [],
    '名词解释': [], '填空题': [], '选择题': [], '共用备选答案': [], '简答题': []
  };
  const others = [];

  CARDS_DATA.forEach(card => {
    const tags = card.tags || [];
    const kind = card.kind || '';
    let placed = false;
    for (const k of Object.keys(sections)) {
      if (tags.includes(k) || kind === k) {
        sections[k].push(card); placed = true; break;
      }
    }
    if (!placed) others.push(card);
  });

  // 标题映射
  const titleMap = {
    '前言': '📖 前言',
    '目录': '📚 目录',
    '重点': '⭐ 重点难点',
    '名词解释': '📝 名词解释',
    '填空题': '✏️ 填空题',
    '选择题': '🔘 选择题',
    '共用备选答案': '🔗 共用备选答案(B型题)',
    '简答题': '📋 简答题'
  };

  let allCards = [];
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    allCards.push({type: 'title', label: titleMap[k], key: k});
    list.forEach(c => allCards.push({type: 'card', data: c, key: k}));
  }
  others.forEach(c => allCards.push({type: 'card', data: c, key: '其他'}));

  allCards.forEach(item => {
    if (item.type === 'title') {
      html += `<div class="section-title" id="section-${item.key}" data-section="${item.key}">${item.label} <span style="font-size:13px;color:#94a3b8;">(${sections[item.key]?.length || 0} 张)</span></div>`;
    } else {
      const card = item.data;
      const matchSearch = !searchTerm || (((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '') + ' ' + (card.tags || []).join(' ')).toLowerCase().includes(searchTerm));
      const matchFilter = activeFilter === 'all' ||
        (card.tags || []).some(t => t === activeFilter) ||
        card.kind === activeFilter;
      if (matchSearch && matchFilter) {
        html += cardHTML(card);
        visibleCount++;
      }
    }
  });

  if (visibleCount === 0) {
    html = '<div class="empty">🚫 没有匹配的卡片</div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('.section-title').forEach(title => {
    const next = title.nextElementSibling;
    if (!next || next.classList.contains('section-title')) title.remove();
  });
  renderNav(sections, titleMap);
  document.querySelectorAll('#section-nav a[href^="#section-"]').forEach(link => {
    const targetId = link.getAttribute('href').slice(1);
    if (!document.getElementById(targetId)) link.remove();
  });

  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
}

function renderNav(sections, titleMap) {
  const nav = document.getElementById('section-nav');
  let html = '<a href="#top">⬆️ 顶部</a>';
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    const label = titleMap[k] || k;
    const short = label.replace(/^[^一-龥A-Za-z]+/, '');
    html += `<a href="#section-${k}">${short}</a>`;
  }
  nav.innerHTML = html;
}

document.getElementById('section-nav').addEventListener('click', e => {
  const link = e.target.closest('a');
  if (!link) return;
  e.preventDefault();
  const id = link.getAttribute('href').slice(1);
  if (id === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  const target = document.getElementById(id);
  if (target) {
    const top = target.getBoundingClientRect().top + window.scrollY - 50;
    window.scrollTo({ top, behavior: 'smooth' });
  }
});

container.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card || card.classList.contains('static-card')) return;
  // 显式"返回题目"按钮:收起答案
  if (e.target.closest('.flip-back-btn')) {
    card.classList.remove('flipped');
    return;
  }
  // 已翻面时,点击不再翻回(避免误触遮住答案);仅按钮可收起
  if (card.classList.contains('flipped')) return;
  // 正在选择文字(复制)时不翻面
  const sel = window.getSelection();
  if (sel && sel.toString().trim().length > 0) return;
  // 链接/图片等交互元素不触发翻面
  if (e.target.closest('a, img, button')) return;
  card.classList.add('flipped');
});

document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

document.getElementById('flip-all').addEventListener('click', () => {
  const cards = document.querySelectorAll('.card:not(.static-card)');
  const allFlipped = Array.from(cards).every(c => c.classList.contains('flipped'));
  cards.forEach(c => c.classList.toggle('flipped', !allFlipped));
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  renderCards();
});

window.addEventListener('scroll', () => {
  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
});

// ===== 学习追踪 (艾宾浩斯遗忘曲线) =====
const EB_INTERVALS = [1, 2, 4, 7, 15, 30, 60, 90];
const LEVEL_NAMES = ['Lv.0 入门', 'Lv.1 巩固', 'Lv.2 熟练', 'Lv.3 精通', 'Lv.4 大师', 'Lv.5 宗师'];
const STORAGE_KEY = 'us_xtj_tracker_' + (CARDS_DATA[0]?.chapter || 'default');

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function formatDuration(ms) {
  const total = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return h > 0 ? `${pad2(h)}:${pad2(m)}:${pad2(s)}` : `${pad2(m)}:${pad2(s)}`;
}

function formatRemaining(ms) {
  if (ms <= 0) return '⏰ 现在该复习啦!';
  const total = Math.floor(ms / 1000);
  const d = Math.floor(total / 86400);
  const h = Math.floor((total % 86400) / 3600);
  const m = Math.floor((total % 3600) / 60);
  if (d > 0) return `还有 ${d} 天 ${h} 小时`;
  if (h > 0) return `还有 ${h} 小时 ${m} 分`;
  return `还有 ${m} 分钟`;
}

function loadTracker() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { firstOpen: Date.now(), lastOpen: Date.now(), visits: 0, level: 0, nextReviewAt: null };
}

function saveTracker(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function recomputeNextReview(state) {
  if (state.level >= EB_INTERVALS.length) {
    state.nextReviewAt = null;
    return;
  }
  const days = EB_INTERVALS[state.level];
  state.nextReviewAt = Date.now() + days * 24 * 3600 * 1000;
}

const tracker = loadTracker();
tracker.visits = (tracker.visits || 0) + 1;
tracker.lastOpen = Date.now();
if (!tracker.nextReviewAt) recomputeNextReview(tracker);
saveTracker(tracker);

const sessionStart = Date.now();
const $elapsed = document.getElementById('elapsed');
const $visit = document.getElementById('visit-count');
const $level = document.getElementById('review-level');
const $next = document.getElementById('next-review');
const $hint = document.getElementById('review-hint');

function renderTracker() {
  $elapsed.textContent = formatDuration(Date.now() - sessionStart);
  $visit.textContent = tracker.visits;
  $level.textContent = LEVEL_NAMES[Math.min(tracker.level, LEVEL_NAMES.length - 1)];
  if (tracker.level >= EB_INTERVALS.length) {
    $next.textContent = '🎉 已完全掌握';
    $hint.textContent = '你已超越艾宾浩斯曲线,知识长存!';
  } else {
    const now = Date.now();
    if (tracker.nextReviewAt && now >= tracker.nextReviewAt) {
      $next.textContent = '⏰ 现在该复习啦!';
      $hint.textContent = `按 Lv.${tracker.level} 间隔 ${EB_INTERVALS[tracker.level]} 天,已到复习点`;
    } else {
      $next.textContent = formatRemaining((tracker.nextReviewAt || 0) - now);
      const nextDays = EB_INTERVALS[tracker.level];
      $hint.textContent = `当前等级:第 ${tracker.level} 次复习 · 间隔 ${nextDays} 天`;
    }
  }
}

renderTracker();
setInterval(renderTracker, 1000);

document.getElementById('mark-reviewed').addEventListener('click', () => {
  tracker.level = Math.min(tracker.level + 1, EB_INTERVALS.length);
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
  const btn = document.getElementById('mark-reviewed');
  const orig = btn.textContent;
  btn.textContent = '🎉 已记录!';
  btn.style.background = '#10b981';
  setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1200);
});

document.getElementById('reset-tracker').addEventListener('click', () => {
  if (!confirm('确定要重置本章节的学习记录吗?')) return;
  tracker.firstOpen = Date.now();
  tracker.lastOpen = Date.now();
  tracker.visits = 1;
  tracker.level = 0;
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
});

renderCards();
</script>
</body>
</html>
