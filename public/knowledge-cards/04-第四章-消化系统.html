<style>
* { box-sizing: border-box; }
:root {

}
html { -webkit-text-size-adjust: 100%; }
body {

}
.layout {

.card-back { cursor: default; }

.card.flipped .card-back { display: block; }

.kp-static {

.kp-static .card-title { color: #b45309; font-size: 15px; margin: 6px 0 10px; }
.kp-static .card-body { color: #1e293b; }
.kp-static .kp-content { font-size: 14px; line-height: 1.85; color: #1e293b; }
/* "共用备选答案"大类下的 B 型题卡片:左侧统一用青色描边,视觉上与选项卡归为一组 */
.card[data-kind="共用备选答案"]:not(.static-card) { margin-left: 14px; }
.card[data-kind="共用备选答案"]:not(.static-card) .card-front { border-left-color: #0284c7; }
.opt-ref { display:inline-block; font-size:12px; color:#0369a1; background:#e0f2fe;
  padding:2px 8px; border-radius:6px; font-style:italic; }
@keyframes cardFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.kp-prompt {
  font-size: 14px; color: #f59e0b; margin-bottom: 14px;
  padding-bottom: 10px; border-bottom: 1px dashed #cbd5e1;
}
.kp-hint {
  font-size: 15px; color: #1e293b; line-height: 1.7;

}
.kp-tag {

}
.kp-content {

}

.card-title {

.answer-title { color: #b45309; }
.card-body { font-size: 14px; line-height: 1.65; color: #1e293b; overflow-wrap: break-word; word-break: break-word; }
.card-fig { margin: 8px 0 10px; text-align: center; }
.card-fig img { max-width: 100%; max-height: 300px; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 1px 4px rgba(0,0,0,.12); background: #000; }
.card-fig figcaption { margin-top: 4px; font-size: 12px; color: #64748b; }

.highlight {

}
.tip {

}
.tags { margin-top: 10px; }
.tag {

.filter-bar {

}
.filter-bar .btn { font-size: 12px; padding: 5px 10px; }
.progress-bar {

<script>
const CARDS_DATA = [{"no": "4-1-1", "title": "肝脏右叶最大斜径", "front": "请简述该名词的定义。", "back": "<b>肝脏右叶最大斜径</b>:<br>以肝右静脉和肝中静脉汇入下腔静脉的右肋缘下肝脏斜切面为标准测量切面。测量点分别置于肝右叶前、后缘之肝包膜处，测量其最大垂直距离。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-2", "title": "肝静脉", "front": "请简述该名词的定义。", "back": "<b>肝静脉</b>:<br>分为肝左静脉、肝中静脉和肝右静脉三支。肝左静脉近端位于左叶间裂中，肝中静脉走行于肝正中裂，肝右静脉最长，其近心端走行于右叶间裂中。这三条肝静\n脉将肝实质分为左外叶、左内叶、右前叶及右后叶。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-3", "title": "边缘裂隙征", "front": "请简述该名词的定义。", "back": "<b>边缘裂隙征</b>:<br>是肝血管瘤二维超声表现的一种征象，部分病例可见，表现为病灶边缘有小管道进入，称为“边缘裂隙征”。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-4", "title": "focal nodular hyperplasia", "front": "请简述该名词的定义。", "back": "<b>focal nodular hyperplasia</b>:<br>即肝局灶性结节性增生，是发病率仅次于肝血管瘤的肝脏良性肿瘤，目前认为该病是肝实质对先天存在动脉畸形的增生性反应，而不是真正意义上的肿瘤，该病女性多见。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-5", "title": "小肝癌", "front": "请简述该名词的定义。", "back": "<b>小肝癌</b>:<br>肝内出现单个癌结节且直径&lt;3cm 者，或肝内癌结节不超过2个且2个癌结节直径之和&lt;3cm 者称为小肝癌。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-6", "title": "肝包虫病", "front": "请简述该名词的定义。", "back": "<b>肝包虫病</b>:<br>又称肝棘球蚴病，是畜牧地区常见的寄生虫病，多流行于我国西北地区和内蒙古、四川西部地区。由于其幼虫主要寄生于肝脏，故又称肝包虫病。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-7", "title": "“囊中囊”征", "front": "请简述该名词的定义。", "back": "<b>“囊中囊”征</b>:<br>是肝包虫病特征性表现。表现为大的囊肿内有多个大小不等圆形小囊，呈葡萄状或蜂窝状，偶见小囊中又含有更小的囊。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-8", "title": "脂肪肝", "front": "请简述该名词的定义。", "back": "<b>脂肪肝</b>:<br>脂肪肝是指由于各种原因引起的肝细胞内脂肪堆积过多的病变。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-9", "title": "liver cirrhosis", "front": "请简述该名词的定义。", "back": "<b>liver cirrhosis</b>:<br>即肝硬化，是一种常见的慢性肝病，可由一种或多种原因引起肝脏慢性损害，肝脏呈进行性、弥漫性、纤维化病变。具体表现为肝细胞弥漫性变性坏死，继而出现纤维组织增生和肝细胞结节状再生，这三种改变反复交错进行，结果肝小叶结构和血液循环途径逐渐被改建，使肝变形、变硬而导致肝硬化。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-10", "title": "地图肝", "front": "请简述该名词的定义。", "back": "<b>地图肝</b>:<br>血吸虫肝病后期可呈现高回声纤维条索或网格样结构将肝实质分隔成不同大小的区域，类似地图样改变，故称“地图肝”。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-11", "title": "congestive liver", "front": "请简述该名词的定义。", "back": "<b>congestive liver</b>:<br>即淤血肝，是右心衰竭最重要和较早出现的体征之一。主要是由于右心衰竭导致静脉回流受阻，使下腔静脉、肝静脉等内径增宽、压力升高，继而导致肝内中央小静脉扩张、淤血使其周围肝细胞发生缺血、缺氧、坏死和结缔组织增生等病理改变。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-12", "title": "Hartman 囊", "front": "请简述该名词的定义。", "back": "<b>Hartman 囊</b>:<br>胆囊颈部和胆囊体部连接处膨大，称为哈氏囊，为胆囊结石常嵌顿部位。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-13", "title": "WES 征", "front": "请简述该名词的定义。", "back": "<b>WES 征</b>:<br>囊壁结石声影三联征，充满型胆囊结石的一种特征性的超声表现，即前方增厚胆囊壁的弱回声包绕中间结石的强回声，后方伴有声影。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-14", "title": "超声 Murphy 征", "front": "请简述该名词的定义。", "back": "<b>超声 Murphy 征</b>:<br>急性胆囊炎病人在进行超声检查时，当探头接触胆囊区域时病人有明显的触痛，或将探头深压胆囊区域的腹壁时嘱病人深吸气，病人感触痛加剧并突然屏气不动，对确诊急性胆囊炎具有很高的临床意义。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-15", "title": "脾静脉", "front": "请简述该名词的定义。", "back": "<b>脾静脉</b>:<br>脾静脉由脾门处的2~6个属支组成，与脾动脉伴行，达胰颈部与肠系膜上静脉汇合成门静脉主干。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-16", "title": "脾包膜下破裂", "front": "请简述该名词的定义。", "back": "<b>脾包膜下破裂</b>:<br>为包膜下脾实质破裂。脾包膜完整，出血流至脾包膜下形成血肿。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-17", "title": "脾重度肿大", "front": "请简述该名词的定义。", "back": "<b>脾重度肿大</b>:<br>脾脏明显肿大，失去正常形态，脾门切迹消失，周围脏器可被肿大的脾脏推挤、移位，脾下极可超过脐水平线以下。多见于骨髓增生性疾病或慢性粒细胞性白血病。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-18", "title": "splenic infarction", "front": "请简述该名词的定义。", "back": "<b>splenic infarction</b>:<br>即脾梗死，是由于脾动脉的突然栓塞或脾静脉血栓所致的脾\n窦状隙的缺血、坏死、纤维化及瘢痕形成等病理改变。能引发动脉栓子的疾病均可发生脾梗死。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-19", "title": "脾囊肿", "front": "请简述该名词的定义。", "back": "<b>脾囊肿</b>:<br>可分为寄生虫性和非寄生虫性两大类，后者又可分为真性和假性两类。真性脾囊肿包括单纯性囊肿、表皮样囊肿、淋巴管囊肿；假性脾囊肿可由外伤、脾周围炎症、脾梗死等因素引起。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-20", "title": "胃癌", "front": "请简述该名词的定义。", "back": "<b>胃癌</b>:<br>是源于胃黏膜上皮细胞的恶性肿瘤，占胃恶性肿瘤的95%。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-1-21", "title": "急性阑尾炎", "front": "请简述该名词的定义。", "back": "<b>急性阑尾炎</b>:<br>是由各种原因引起阑尾血液循环障碍，使阑尾黏膜受损后继发感染。病理上分为单纯性阑尾炎、化脓性阑尾炎和坏疽性阑尾炎。", "tags": ["名词解释", "消化"], "kind": "名词解释", "page": 59, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-2-1", "title": "1. 临床上常将肝脏超声造影表现分成三个时期，分别为 ___、___、___。", "front": "", "back": "<b>答案:</b>动脉期 门脉期 延迟期", "tags": ["填空题", "消化"], "kind": "填空题", "page": 60, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-2-2", "title": "2. 肝脏是人体最大的实质性脏器，由___、___和___组成。", "front": "", " 和门静脉增宽<br>E.肝大和下腔静脉、肝静脉增宽", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 65, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-17", "title": "17. 空腹病人，超声不能显示胆囊的最常见原因是", "front": "A.慢性胆囊炎<br>B.胆汁淤积<br>C.活动结石<br>D.胆囊结石合并萎缩性胆囊炎<br>E.在超声检查前使用 X 线口服造影剂", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 65, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-18", "title": "18. 关于胆囊结石的典型超声表现， 不正确 的描述是", "front": "A.胆囊腔内形态稳定的强回声团<br>B.后方伴声影<br>C.多呈类椭圆形或弧形<br>D.强回声团随体位改变而移动<br>E.胆囊壁呈双层结构", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 65, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-19", "title": "19. 根据“WES”征(Wall-Echo-Shadow)可诊断", "front": "A.胆囊癌<br>B.胆囊息肉样病变<br>C.慢性萎缩性胆囊炎，其内充满结石<br>D.胆总管囊肿<br>E.胆囊穿孔", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 65, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-20", "title": "20. 关于先天性胆管囊状扩张症， 不正确 的描述是", "front": "A.肝内、肝外胆管可同时囊状扩张<br>B.按其发生部位不同可分为三种<br>C.肝外胆管囊状扩张称为 Caroli 病<br>D.为胆管壁先天性薄弱所致<br>E.腹部包块、腹痛、黄疸为主要临床症状", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 65, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-21", "title": "21. 关于肝内胆管结石的描述， 不正确 的描述是", "front": "A.结石一般不随体位改变而移动<br>B.肝内出现后伴声影的强回声光团<br>C.强回声光团沿肝管走行分布，其周围见液性区<br>D.阻塞部位以下的小胆管扩张<br>E.合并感染时肝内常可见多发小脓肿", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 65, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-22", "title": "22. 急性胆囊炎特异性的超声表现是", "front": "A.胆囊壁增厚<br>B.胆囊增大<br>C.合并胆囊结石<br>D.胆囊内出现细小回声点<br>E.胆囊壁增厚合并超声 Murphy 征阳性", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 66, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-23", "title": "23. 关于慢性胆囊炎超声特征表现， 不正确 的描述是", "front": "A.胆囊大小形态未见明显异常，胆囊壁可稍增厚<br>B.胆囊肿大，壁增厚，腔内出现沉积性回声团<br>C.不会发生穿孔<br>D.胆囊壁可明显增厚，内腔变小<br>E.萎缩性胆囊炎可仅残留一块瘢痕组织", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 66, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-24", "title": "24. 鉴别肝外胆管结石或肿瘤性梗阻，有利于结石诊断的是", "front": "A.肝外胆管扩张，内径大于12mm<br>B.肝外胆管腔内中心部为强回声的低弱回声，与管壁分界欠清<br>C.扩张的胆管突然狭窄并截断<br>D.胆管腔内形态稳定的强回声团，周围包绕细窄的液性暗环<br>E.肝外胆管壁不规则增厚", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 66, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-25", "title": "25. 胆囊腺肌症的声像图特征性表现是", "front": "A.胆囊壁弥漫性或局限性增厚<br>B.增厚囊壁内出现小囊样结构<br>C.脂餐试验显示收缩功能亢进<br>D.增厚的壁内出现点状强回声，后有彗星尾征<br>E.胆囊黏膜面粗糙，胆汁透声差", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 66, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-26", "title": "26. 胆囊肿大，正常液性腔消失，呈现为一低回声团，不随体位改变而移动，CDFI 可见血供，应首先考虑为", "front": "A.胆囊癌<br>B.胆囊炎<br>C.胆汁淤积<br>D.胆囊肌腺症<br>E.胆囊充满结石", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 66, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-27", "title": "27. 关于蕈伞型胆囊癌的声像图特点， 不正确 的描述是", "front": "A.边缘不整齐<br>B.基底较窄<br>C.可单发或多发，以多发常见<br>D.弱回声或中等回声常见<br>E.单发病变以乳头状为主", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 67, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-28", "title": "28. 急性胰腺炎的最常见超声表现是", "front": "A.比肝回声强的高回声，伴形态不规则<br>B.比肾回声强的高回声，伴形态不规则<br>C.胰腺增大，轮廓光滑，均匀性的低回声<br>D.胰腺缩小，轮廓光滑，回声增强<br>E.胰腺缩小，边缘不清，回声增强", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 67, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-29", "title": "29. 关于慢性胰腺炎超声表现中， 不正确 的描述是", "front": "A.胰腺形态常不规则<br>B.胰腺呈弥漫性增大<br>C.内部回声不均匀增粗、增强<br>D.主胰管扩张<br>E.常伴发胰腺假性囊肿", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 67, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-30", "title": "30. 关于胰腺癌的超声表现， 不正确 的描述是", "front": "A.以胰头多见<br>B.肿瘤向周围组织“蟹足样”浸润<br>C.肿块内部呈低回声，出现继发改变时可见强回声斑点<br>D.肿块多数后方回声增强<br>E.可引起胆管或胰管的狭窄、梗阻", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 67, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-31", "title": "31. 关于胰腺囊肿的描述， 不正确 的描述是", "front": "A.胰腺囊肿分为假性和真性囊肿两种<br>B.假性囊肿由纤维组织增生包裹形成，本身没有上皮细胞<br>C.胰腺假性囊肿形成后也可自发消失<br>D.胰腺真性囊肿较假性囊肿多见<br>E.真性囊肿分为先天性囊肿、潴留性和寄生虫性囊肿", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 67, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-32", "title": "32. 胰头癌与胆管癌在声像图上最主要的鉴别点是", "front": "A.肿块呈低回声<br>B.胆管扩张<br>C.胰管扩张<br>D.胆囊肿大<br>E.周围组织受压", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 67, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-33", "title": "33. 关于脾脏的描述， 不正确 的描述是", "front": "A.脾脏是人体最大的淋巴器官<br>B.近中央处为脾门，有脾血管、神经、淋巴等出入<br>C.位于左季肋区深部的腹腔内，与胃、胰尾等毗邻<br>D.脾动脉是腹主动脉的分支<br>E.脾静脉与肠系膜上静脉汇合成门静脉", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 68, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-34", "title": "34. 关于脾轻度肿大, 正确的描述是", "front": "A.超声脾厚度测值超过 50mm<br>B.在右侧卧位平静呼吸时, 肋缘下超声可测及脾脏<br>C.深吸气时脾下缘超过肋缘下2指<br>D.多见于感染性疾病或门脉高压引起的脾大<br>E.呼气时脾下缘超过肋下5cm", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 68, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-35", "title": "35. 关于脾脓肿超声造影表现， 不正确 的描述是", "front": "A.可表现为边缘清晰，周围回声环状增强<br>B.可表现为内部轻度增强，尤其在造影晚期<br>C.病灶内部坏死、液化部分未见明显增强<br>D.脾包膜下或脾周脓肿病灶表现为中心增强，周围未见明显增强<br>E.脓肿内部的分隔可见增强表现", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 68, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-36", "title": "36. 关于脾梗死的超声表现，正确的描述是", "front": "A.依脾动脉阻塞分支的分布区，脾内可出现一个或多个楔形或不规则形的低回声区，内见点状高回声<br>B.楔形的基底部朝向脾门，尖部朝向膈面<br>C.多显示病灶内有少量点线状彩色血流<br>D.随着时间的延长，病灶内不会出现不均条状回声，或钙化<br>E.对于脾静脉栓塞引起的脾梗死，脾外形无明显增大或变形", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 68, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-37", "title": "37. 关于脾血管瘤的超声特征， 不正确 的描述是", "front": "A.二维超声显示脾内出现一个或数个圆形或椭圆形的实质团块，边界清晰规整<br>B.多为高回声，亦可呈低回声或混合回声，内部分布均匀或呈蜂窝状<br>C.当瘤体内出现栓塞，纤维化等改变时可使内部回声分布不均<br>D.彩色多普勒血流显像常未能显示瘤体内的彩色血流，个别在瘤体周边测及点状或短线状彩色血流，均为静脉的血流频谱<br>E.超声造影可显示较大的脾血管瘤，表现为快速呈向心性或弥散性增强，持续时间较长", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 68, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-38", "title": "38. 对胃肠道的解剖描述正确的是", "front": "A.胃分为贲门部、胃底部、胃角部、胃窦部<br>B.胃小弯呈向外凸形，胃大弯呈向内凹形<br>C.胃壁分为黏膜层、黏膜肌层、黏膜下层、肌层及浆膜层<br>D.十二指肠分为球部、水平部及升部<br>E.胃的血供主要来自肠系膜上动脉", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 68, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-39", "title": "39. 关于胃壁结构的超声表现,正确的描述是", "front": "A.黏膜层呈低回声<br>B.黏膜肌层呈强回声<br>C.黏膜下层呈低回声<br>D.肌层呈低回声<br>E.浆膜层呈低回声", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 69, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-40", "title": "40. 关于胃的超声表现中， 不正确 的描述是", "front": "A.胃壁结构由内向外依次为黏膜层、黏膜肌层、黏膜下层、肌层、浆膜层<br>B.正常胃壁厚为3~6mm<br>C.胃大弯和后壁可见少量黏膜皱襞微细小起伏<br>D.胃蠕动起始于胃底部<br>E.幽门开放时其内径宽度为2~4mm，长度为5~8mm", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 69, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-41", "title": "41. 胃溃疡的超声表现中, 正确的描述是", "front": "A.溃疡部位局限性增厚, 一般 &lt;1.0cm<br>B.增厚胃壁呈低回声, 最大范围一般 &lt;3.0cm<br>C.溃疡凹陷部层次清晰<br>D.溃疡凹陷部位随胃蠕动可消失<br>E.溃疡凹陷部表面附增强回声斑", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 69, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-42", "title": "42. 关于胃癌的描述， 不正确 的是", "front": "A.早期胃癌限于黏膜层及黏膜下层<br>B.早期胃癌分为隆起型、平坦型及凹陷型<br>C.小于1cm的胃癌称为微小胃癌<br>D.胃癌组织浸润达肌层或浆膜层称为进展期胃癌<br>E.胃癌组织浸润浆膜层称为中期胃癌", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 69, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-43", "title": "43. 关于胃癌的超声表现中, 正确的描述是", "front": "A.进展期胃癌胃壁层次结构清晰<br>B.进展期胃癌侵犯至黏膜下层<br>C.进展期胃癌胃壁隆起范围常大于3cm<br>D.进展期胃癌胃壁厚度常大于1.5cm<br>E.进展期胃癌可分为隆起型、平坦型及凹陷型", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 69, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-44", "title": "44. 关于胃癌转移的描述中， 不正确 的是", "front": "A.胃癌可转移至周围淋巴结<br>B.胃癌可直接浸润至肝脏<br>C.胃癌可经门静脉转移至肝脏<br>D.胃癌可种植转移至卵巢<br>E.胃癌不会转移至脑", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 69, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-45", "title": "45. 关于胃间质瘤的超声表现, 正确的是", "front": "A.胃壁局部不规则增厚<br>B.边界模糊不清<br>C.内部呈高回声<br>D.一般&lt;5cm<br>E.大多呈不规则形", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 70, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-46", "title": "46. 关于胃息肉的超声表现， 不正确 的是", "front": "A.一般呈圆形或类圆形<br>B.边界清楚，表面光滑<br>C.基底部较宽<br>D.大小1~2cm<br>E.病变自黏膜层突向胃腔", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 70, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-47", "title": "47. 关于十二指肠溃疡的超声表现， 不正确 的是", "front": "A.溃疡好发于球部<br>B.十二指肠球形态不规整，面积减小，多小于 5cm2 <br>C.球壁黏膜面出现凹陷，表面附着增强回声<br>D.溃疡凹陷处球壁层次模糊不清<br>E.溃疡周围球壁局限性增厚", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 70, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-48", "title": "48. 关于肠道肿瘤的超声表现， 不正确 的描述是", "front": "A.肿瘤可表现为靶环征或假肾征<br>B.肿瘤可表现为圆形或不规则形低回声肿块<br>C.病变处肠壁僵硬，蠕动消失<br>D.病变近端肠管可出现肠梗阻表现<br>E.病变内血流信号均较丰富", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 70, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-49", "title": "49. 下列叙述，正确的是", "front": "A.肠梗阻时可见肠管扩张，黏膜皱襞水肿、增厚<br>B.机械性肠梗阻时肠蠕动减弱<br>C.肠套叠时横断面呈圆形团块，内未见血流<br>D.成人肠套叠常见原因是肠道炎症<br>E.超声于腹腔内探及靶环征只见于肠道肿瘤", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 70, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-50", "title": "50. 探头置于胃的下列哪个部分扫查时，显示为“∞”字样结构", "front": "A.胃体部<br>B.胃窦部<br>C.贲门部<br>D.胃角部<br>E.胃底部", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 70, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-51", "title": "51. 关于阑尾炎病理特征与临床分型， 不正确 的描述是", "front": "A.单纯性阑尾炎<br>B.坏疽性阑尾炎<br>C.非典型阑尾炎<br>D.化脓性阑尾炎<br>E.阑尾周围脓肿", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 71, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-52", "title": "52. 胃间质瘤的典型超声特征为", "front": "A.多位于浆膜层<br>B.瘤体常大于 5 cm <br>C.形态不规则的外生性肿块<br>D.边界清楚的类圆形均匀低回声肿块<br>E.绝大多数可见坏死、出血", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "消化"], "kind": "选择题", "page": 71, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-1", "title": "53. 病人，男性。50岁，反复气喘，气促三年，加重一月入院。超声检查：肝脏肋下最大斜径149mm，剑下纵切前后径60mm，门静脉宽度11mm，肝右静脉宽度10mm。查体：肝脏肋下2指，脾脏不大，移动性浊音( ± )。实验室检查：乙肝两对半(-)。病人每日饮2两黄酒。既往有疫区接触史，其最可能的诊断是", "front": "A.慢性肝炎<br>B.早期肝硬化<br>C.淤血性肝大<br>D.血吸虫肝病<br>E.酒精性肝大", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 71, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-2", "title": "54. 病人，男性。65岁，既往有糖尿病史，出现寒战高热三天，WBC 1.5 × 109/L 。超声检查肝右叶可见 5.5 cm × 6.0 cm 的类圆形低回声病变，中央见少许不规则无回声区，壁厚欠光滑，其最可能的诊断是", "front": "A.肝血管<br>B.原发性肝癌<br>C.转移性肝癌<br>D.肝囊肿<br>E.肝脓肿", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 71, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-3", "title": "55. 病人，女性。32岁，单位体检超声检查发现肝右叶 2.2 cm × 2.0 cm 高回声团块，边界清晰，内部回声均匀，呈筛网状；彩色多普勒显示周边部点状彩色血流；脉冲多普勒测及动脉血流，RI=0.53。实验室检查肝功能各项指标均正常，AFP(-)，其最可能的诊断是", "front": "A.肝癌<br>B.肝血管瘤<br>C.肝脓肿<br>D.肝腺瘤<br>E.肝局灶性结节性增生", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 71, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-4", "title": "56. 病人，男性。60岁，长期胃溃疡病史，近两个月消瘦。超声检查发现肝内多个有晕环的低回声团块，直径0.5～2.0cm，同时伴胃窦部淋巴结肿大。肝内最可能的诊断是", "front": "A.肝脓肿<br>B.肝多发血管瘤<br>C.转移性肝癌<br>D.原发性肝癌<br>E.肝包虫病", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 72, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-5", "title": "57. 病人，男性。31岁，肝区回声密集增强，肝右静脉旁见 3.1~cm×2.5~cm 楔形低回声区，形态欠规则；CDFI未见明显彩色血流。AFP(-)，无发热症状，血常规正常。其最可能的诊断是", "front": "A.血管瘤<br>B.肝脓肿<br>C.肝癌<br>D.肝硬化结节<br>E.非均匀性脂肪肝", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 72, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-6", "title": "58. 35岁男性，经常饮酒，右上腹疼痛3天，超声表现为胆囊中度增大，壁毛糙，厚约3mm，胆汁透声差，内见点状、絮状和片状的较高回声，可随体位改变而移动，后无声影。 其最可能的诊断是", "front": "A.胆囊结石<br>B.胆囊癌<br>C.胆囊炎胆泥淤积<br>D.胆囊息肉样病变<br>E.胆囊肌腺症", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 72, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-7", "title": "59. 病人，女性。45岁，自诉右上腹不适。超声见胆囊内大小不等形态各异强回声光团，部分呈鹿角形，最大直径2.1cm，后伴声影，随体位变化而移动。其最可能的诊断是", "front": "A.胆囊腺瘤<br>B.胆囊癌<br>C.胆囊息肉<br>D.胆囊多发结石<br>E.胆囊腺肌症", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 72, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-8", "title": "60. 病人，男性。44岁，常规体检，患有高血脂，糖尿病。超声见胆囊壁多个中强回声光点，与壁相连，后伴彗星尾征。其最可能的诊断是", "front": "A.胆囊泥沙样结石<br>B.胆囊腺肌症<br>C.胆囊壁胆固醇结晶沉积<br>D.胆囊多发结石<br>E.胆囊息肉", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 72, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-9", "title": "61. 一新生儿生后2个月黄疸不退，超声检查示肝脏回声稍增强，胆囊未显示，肝内胆管显示不清，胆总管呈索条状稍高回声。其最可能的诊断是", "front": "A.胆囊缺如<br>B.异位胆囊<br>C.胆道蛔虫<br>D.新生儿肝炎<br>E.胆道闭锁", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 72, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-10", "title": "62. 病人胆囊未见液腔回声，可探及 6 cm × 5 cm 形态不规则的低回声不均匀实性肿块，内见多发强回声团伴声影，肿块内测得高速动脉样血流信号，肿块与肝床界限不清。其最可能的诊断是", "front": "A.蕈伞型胆囊癌<br>B.混合型胆囊癌<br>C.实块型胆囊癌<br>D.胆管细胞肝癌<br>E.肝细胞肝癌", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 73, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-11", "title": "63. 一病人因黄染一周就诊。超声示肝脏肿大，回声增强，肝内胆管树枝状扩张，肝外胆管未显示，胆囊未充盈，其梗阻部位最可能为", "front": "A.胆总管十二指肠后段<br>B.胆总管壶腹部<br>C.胆总管胰腺段<br>D.肝门部<br>E.胆总管十二指肠上段", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 73, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-12", "title": "64. 病人，男性。49岁，胆囊颈部侧壁见一个 2.3 cm × 1.5 cm 的基底较宽的低回声团块，自囊壁突向腔内，表面不平整；彩色多普勒于其基底部探及少量条状搏动性血流频谱，胆囊浆膜层连续性欠佳。其最可能的诊断是", "front": "A.胆囊胆固醇沉着症<br>B.结节型胆囊癌<br>C.胆囊腺瘤<br>D.胆囊炎性息肉<br>E.胆囊腺肌增生症局限型", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 73, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-13", "title": "65. 病人，男性。33岁，自述进食油腻餐后上腹部疼痛伴恶心、呕吐急诊入院。化验检查：血淀粉酶790U。超声描述：胰头厚2.7cm，胰体厚1.8cm，胰尾厚1.8cm；胰腺轮廓显示欠清，表面不平，胰体前方可见1.8cm×0.8cm无回声区。其最可能的诊断是", "front": "A.胰腺假性囊肿<br>B.慢性胰腺炎<br>C.胰腺癌合并坏死液化<br>D.急性胰腺炎并胰周少量积液<br>E.胰腺囊腺瘤", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 73, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-14", "title": "66. 病人反复发作性上腹不适伴脂肪泻，超声显示胰腺体积缩小，边缘不规则，实质回声增强，不均匀，主胰管串珠状扩张并呈断续状，内见强回声结石，超声诊断考虑", "front": "A.急性胰腺炎<br>B.胰腺囊腺瘤<br>C.胰腺结核<br>D.慢性胰腺炎<br>E.胰腺癌", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 73, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-15", "title": "67. 一急性腹痛的病人，超声检查发现胆囊内多发结石，胰腺弥漫性肿大，回声减弱，不均匀，脾静脉细窄，胰腺周围可见弱回声带，肠管扩张，腹腔见大量透声不好的积液。其最可能的诊断是", "front": "A.水肿型胰腺炎<br>B.急性胆囊炎<br>C.肠梗阻<br>D.慢性胰腺炎<br>E.出血坏死型胰腺炎", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 73, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-16", "title": "68. 病人，男性。57岁，有急性胰腺炎病史，常规体检。超声描述：胰体形态、大小正常，回声增强，胰尾部可探及 5.4 cm×4.5 cm 无回声区，边界清晰，向外突起，主胰管内径0.8cm。可能的诊断是", "front": "A.胰尾真性囊肿，主胰管增宽<br>B.胰尾实性占位合并胰腺炎，主胰管增宽<br>C.胰尾假性囊肿，主胰管增宽<br>D.平滑肌肉瘤，主胰管增宽<br>E.胰腺癌，主胰管增宽", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 74, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-17", "title": "69. 病人，女性。68岁，自述腹胀、食欲缺乏、右上腹不适、背痛3个月余，进行性加重。服镇痛药疼痛不能缓解，皮肤瘙痒发黄12天。临床物理检查：皮肤、巩膜黄染。超声描述：胰头形态失常，表面不平，可见 2.2 cm×1.8 cm 低回声区，周边呈毛刺状，主胰管间断显示，内径0.52cm。其最可能的诊断是", "front": "A.胰头炎性假瘤<br>B.胆总管下段癌<br>C.胰头癌，主胰管扩张<br>D.壶腹癌<br>E.胰腺囊腺瘤", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 74, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-18", "title": "70. 病人，男性。51岁，持续性黄疸伴皮肤瘙痒30天，近日加重。超声见肝内外胆管及胆囊均扩张，扩张的胆总管下段呈截断阻塞，局部隐约见一实性结节，主胰管扩张，内径0.6cm。可能的阻塞病因是", "front": "A.壶腹周围癌<br>B.胆总管结石<br>C.胆总管囊肿<br>D.硬化性胆管炎<br>E.非特性胆管炎症", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 74, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-19", "title": "71. 病人，女性。55岁，慢性乙肝病史20余年，1年前行脾切除术及胃底食管静脉断流术。门诊复查超声示：左肾上腺上方见40mm×38mm类圆形稍低回声团块，内部回声均匀，边界清晰，有包膜；CDFI示其内分泌专状彩色血流，测及动脉和静脉血流信号。其最可能的诊断是", "front": "A.左侧肾上腺腺瘤<br>B.腹膜后巨淋巴结增生症<br>C.胰腺尾部胰岛细胞瘤<br>D.胃肠道间质瘤<br>E.副脾大", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 74, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-20", "title": "72. 病人，男性。55岁，突然发生左上腹疼痛，并向左肩放射，伴高热，WBC 9.0 × 109/L ，Hb 134 g/L ，PLT 268 × 109/L 。超声检查发现脾内可见楔形稍低回声区，形态欠规则，基底部朝向膈面，尖部朝向脾门；彩色多普勒示其内未见明显彩色血流。其最可能的诊断是", "front": "A.脾囊肿<br>B.脾淋巴瘤<br>C.脾血管瘤<br>D.脾梗死<br>E.脾淋巴管瘤", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 74, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-21", "title": "73. 病人，男性。40岁，反复上腹部疼痛、反酸、嗳气。口服胃肠造影剂后胃体部可见局部胃壁增厚，厚度约1.0cm，胃壁可见局部凹陷，表面附着增强回声斑。其最可能的诊断是", "front": "A.胃癌<br>B.胃炎<br>C.胃溃疡<br>D.胃间质瘤<br>E.胃息肉", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 74, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-22", "title": "74. 2 岁患儿，突发腹痛，哭闹不止，超声检查示右下腹肠管壁增厚，长轴呈多层“平行管”征，短轴呈“同心圆”征。其最可能的诊断是", "front": "A.急性阑尾炎<br>B.肠扭转<br>C.肠梗阻<br>D.肠套叠<br>E.肠道肿瘤", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 75, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-23", "title": "75. 病人，男性。60岁，因腹痛就诊，超声检查示右侧腹部分肠壁不规则增厚，肠腔狭窄，横断面呈同心圆改变，纵断面见多层肠壁平行排列，近段肠管扩张。其最可能的诊断是", "front": "A.肠扭转<br>B.肠梗阻<br>C.肠癌继发肠套叠<br>D.肠结核<br>E.克罗恩病", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 75, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-24", "title": "76. 病人，男性。45岁，上腹部不适，消瘦，超声检查示胃窦部胃壁不规则增厚，最厚处约2.0cm，呈“假肾征”，近端胃腔扩张，内容物潴留。其最可能的诊断是", "front": "A.胃炎<br>B.胃间质瘤<br>C.胃溃疡<br>D.胃癌<br>E.胃黏膜巨大肥厚症", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "消化"], "kind": "选择题", "page": 75, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-shared-77-78", "title": "共用备选答案 · 第 77~78 题", "front": "<b>下列第 77~78 题共用以下备选答案:</b><br>A.左外叶和左内叶<br>B.左外上段和左外下段<br>C.右前叶和右后叶<br>D.方叶和尾叶<br>E.左叶和右叶", "back": "", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": true, "image": "", "figcap": ""}, {"no": "4-3-1", "title": "77. 门静脉矢状段分肝脏为", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-2", "title": "78. 横沟分肝脏为", "front": "<span class=\"opt-ref\"> 最合适病人进行的检查是", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-12", "title": "88. 对鉴别小肝癌和肝硬化结节最有价值的检查方法是", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-shared-89-90", "title": "共用备选答案 · 第 89~90 题", "front": "<b>下列第 89~90 题共用以下备选答案:</b><br>A.脾包膜线局部中断，缺损呈无回声线状结构并伸入脾实质内，并出现不规则低回声、无回声区，同时在脾周围可出现无回声区<br>B.脾实质内出现局部不规则的低回声区，回声可不均，后方轻度增强<br>C.脾包膜光滑、完整但隆起，脾实质之间为无回声区占据，呈“月牙”形<br>D.脾实质内见单个或多个边界模糊的稍低回声区，呈圆形或椭圆形<br>E.脾实质内圆形无回声区，包膜明亮，后方回声增强。", "back": "", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": true, "image": "", "figcap": ""}, {"no": "4-3-13", "title": "89. 中央性脾破裂的超声表现是", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-14", "title": "90. 早期脾脓肿的超声表现是", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-shared-91-92", "title": "共用备选答案 · 第 91~92 题", "front": "<b>下列第 91~92 题共用以下备选答案:</b><br>A.脾内出现一个或数个圆形或椭圆形的实质团块，边界清晰规整，多为高回声，亦可呈低回声或混合回声，内部回声分布均匀或呈蜂窝状<br>B.脾内出现一个或数个无回声区，呈圆形；囊壁光滑，边界清晰，囊壁后方回声增强，彩色多普勒未见病灶内有彩色血流信号<br>C.脾门处见无回声团块，彩色多普勒显示其内有彩色血流，并呈漩涡状，脉冲多普勒可测及动脉血流频谱<br>D.多为稍高回声型或蜂窝状结构，边界清，内分布欠均匀；彩色多普勒较少显示彩色血流信号<br>E.脾内出现多个低或弱回声的圆形实质性肿块，内部回声分布可均匀或不均，边界清晰但无明显的肿瘤包膜", "back": "", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": true, "image": "", "figcap": ""}, {"no": "4-3-15", "title": "91. 脾血管瘤的超声表现是", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-16", "title": "92. 脾淋巴瘤的超声表现是", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-shared-93-95", "title": "共用备选答案 · 第 93~95 题", "front": "<b>下列第 93~95 题共用以下备选答案:</b><br>A.肠套叠<br>B.肠梗阻<br>C.肠肿瘤<br>D.肠扭转<br>E.肠炎", "back": "", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": true, "image": "", "figcap": ""}, {"no": "4-3-17", "title": "93. 局部肠管扩张，黏膜皱襞水肿增厚，呈鱼背骨刺状，多见于", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-18", "title": "94. 横断面呈同心圆征，纵断面呈多层平行管征，多见于", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-3-19", "title": "95. 局部肠壁明显增厚，形成低回声肿块，呈靶环征或假肾征，多见于", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["B型题", "消化"], "kind": "共用备选答案", "page": 0, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-1", "title": "1. 简述正常肝脏常规超声的典型切面。", "front": "", "back": "<b>参考答案:</b><br>有三个典型切面：①右肋缘下第一肝门斜切面：探头置于右肋缘下，声束方向斜向右上后方，显示第一肝门横沟处结构，即门静脉主干横切面和左右支纵切面。②右肋缘下经第二肝门斜切面：探头置于上述切面的基础上再稍向上扫查，可显示三条无回声的肝静脉汇入下腔静脉。③剑突下经腹主动脉纵切面：探头置于剑突下，沿着腹主动脉长轴纵切，显示肝左外叶切面。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-2", "title": "2. 如何调节仪器参数使常规二维超声和彩色多普勒超声达到适宜状态？", "front": "", "back": "<b>参考答案:</b><br>调节仪器参数，在常规二维超声图像上尽量使正常肝脏浅部、深部实质回声均匀一致，肝内管道结构回声清晰，腔内呈无回声状态。在彩色多普勒图像上，使肝实质内刚好不显示伪彩斑点，而血管内均为彩色血流信号填充但不外溢为宜。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-3", "title": "3. 试述肝囊肿的典型超声表现。", "front": "", "back": "<b>参考答案:</b><br>二维超声表现，肝内可见单个或多个圆形无回声区，壁薄而光滑，可有侧壁回声失落，常伴后方回声增强现象；彩色多普勒超声显示囊肿内无血流信号，较大囊肿的囊壁上可见少量血流信号；超声造影时囊肿内部始终未见增强，呈无回声表现。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-4", "title": "4. 简述细菌性肝脓肿的二维超声表现。", "front": "", "back": "<b>参考答案:</b><br>细菌性肝脓肿在不同的时期有不同的超声表现，早期肝内可出现不均匀的中低回声区，边界欠清晰。随着疾病进展，脓肿内组织液化坏死，内部出现无回声或极低回声区，脓肿腔内常可出现随体位改变而移动的絮状回声；在肝脓肿成熟或液化期，脓肿可出现典型的无回声区，边界清晰，伴后方回声增强；脓肿壁呈典型增厚的高回声，脓肿内壁边缘不光整，呈虫蚀状改变；至脓肿吸收期时，肝脓肿明显缩小或消失，有时仅见一边缘模糊低回声区。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-5", "title": "5. 试述肝血管瘤超声造影的典型表现。", "front": "", "back": "<b>参考答案:</b><br>注射超声造影剂后，肝血管瘤的典型表现为动脉期呈周边环状增强，并逐渐呈结节样向中央填充，在门脉期病灶被完全或部分填充而呈团块状高回声或等回声。造影剂消退\n较慢，至延迟期可呈等回声改变。如肿瘤较大，病灶中央不完全填充，呈不规则形的无回声区。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-6", "title": "6. 肝局灶性结节性增生的鉴别诊断包括哪些常见病？", "front": "", "back": "<b>参考答案:</b><br>（1）原发性肝癌：常有肝硬化背景，肝内病灶以不均匀低回声型常见，彩色多普勒测及高阻型动脉血流，超声造影呈现典型的原发性肝癌“快进快出”的表现。\n\n（2）肝血管瘤：典型者呈高回声，鉴别较容易。低回声型肝血管瘤与肝局灶性结节性增生在二维超声上鉴别有一定的困难，但彩色多普勒显示病灶无彩色血流或少部分出现周围线状血流对鉴别有帮助。超声造影两者亦有区别，血管瘤常表现为周边向中央结节状填充，而局灶性结节性增生则表现为中央向四周的放射状灌注。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-7", "title": "7. 简述原发性肝癌的间接超声征象。", "front": "", "back": "<b>参考答案:</b><br>（1）癌栓：原发性肝癌易发生门脉癌栓，表现为门脉管腔内团块状低、中等回声，癌栓亦可出现在肝静脉、肝内胆管及下腔静脉内。\n\n（2）肝表面局部膨隆：较大或位于肝包膜下的癌肿可出现肝表面局部膨隆，超声上表现为“驼峰征”，癌肿邻近肝缘处可使肝缘变钝。\n\n（3）肝内管道受压：由于受癌肿的压迫、推移肝内血管可发生移位、管腔变细。癌肿压迫肝内胆管可造成远端肝内胆管扩张。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-8", "title": "8. 简述原发性肝细胞癌常见的超声造影表现。", "front": "", "back": "<b>参考答案:</b><br>常表现为“快进快出”，即在注射造影剂后在动脉早期出现病灶整体均匀增强，早于并强于周围肝实质。随后病灶回声快速消退，在门脉期及延迟期常呈低回声改变，这种典型的超声造影表现对诊断肝癌有较高的敏感性和特异性。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-9", "title": "9. 简述转移性肝癌超声造影表现特征。", "front": "", "back": "<b>参考答案:</b><br>注射造影剂后，转移性肝癌常在动脉期呈快速环状增强或整体增强为主，且消退较快，常在动脉晚期或门脉早期病灶即呈低回声表现，出现消退的时间明显比原发性肝癌为早。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-10", "title": "10. 简述肝包虫囊肿二维超声分型及超声表现。", "front": "", "back": "<b>参考答案:</b><br>（1）单囊型：表现为肝内出现单个圆形或类圆形无回声区，边界清晰光滑，囊壁增厚完整，可呈双层，囊内可出现细小的点状反射堆积，随体位改变而漂浮，形成“飘雪”征。\n\n（2）多囊型：表现为大的囊肿内有多个大小不等圆形小囊，呈葡萄状或蜂窝状，形成“囊中囊”征象。\n\n（3）混合型：超声可显示内囊分离、内囊破裂塌陷、囊实变等改变，呈现高低不等、点状片状回声夹杂的混合回声团块。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-11", "title": "11. 简述非均匀性脂肪肝与低回声血管瘤的鉴别要点。", "front": "", "back": "<b>参考答案:</b><br>低回声血管瘤常有周围高回声带环绕，内部可呈细网状；彩色多普勒可无彩色血流或仅在周边出现彩色血流，并能测及动脉血流，阻力指数常&lt;0.6。而非均匀性脂肪肝表现为肝内不规则分布的异常回声区，可为低回声或高回声，形态不规则，边界清楚，后方无衰减；彩色多普勒常无彩色血流显示。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-12", "title": "12. 试述肝硬化的二维超声表现。", "front": "", "back": "<b>参考答案:</b><br>试述肝硬化的二维超声表现。\n早期肝硬化肝脏无特异的超声表现。典型肝硬化时，肝脏体积缩小，左右叶均缩小或左叶代偿性增大；肝包膜呈锯齿状，边缘角变钝或不规则；肝区回声增粗增强，分布不均，部分呈颗粒状、结节状，可表现为低回声或高回声结节，多在0.5~2.0cm；肝内血管粗细不均或纹理紊乱，肝静脉常变细，门静脉可增宽，肝动脉可代偿性增宽。脾大、腹水、胆囊壁增厚。门静脉内可有血栓形成，脐静脉可重开。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-13", "title": "13. 试述肝脏血吸虫肝病的慢性期和后期的超声表现。", "front": "", "back": "<b>参考答案:</b><br>肝脏血吸虫肝病在慢性期和后期可表现为肝叶比例失调，左叶增大，表面高低不平可呈结节状；肝内呈密集中等或较大的高回声斑，也可呈现高回声纤维条索或网格样结构将肝实质分隔成不同大小的区域，类似地图，故称“地图肝”。同时，门静脉管壁可增厚变亮，脾显著增大。晚期可出现肝硬化、门脉高压、腹水等改变。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-14", "title": "14. 试述淤血性肝病的二维超声表现。", "front": "", "back": "<b>参考答案:</b><br>肝脏径线增大、肝静脉增宽（多&gt;10～12mm）、下腔静脉增宽（前后径多&gt;18mm），其波动状现象减弱或消失，并时而见腔内由于血流速度缓慢所致的“云雾”状回声；肝内回声密集增强，病程长者可增粗增强。同时，还可发现肾静脉和下肢静脉内径均增宽，门静脉可在正常范围内。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-15", "title": "15. 简述典型胆囊结石的超声表现。", "front": "", "back": "<b>参考答案:</b><br>表现为胆囊腔内可随体位改变而移动的形态稳定的团状强回声伴后方声影。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-16", "title": "16. 简述急性胆囊炎的超声表现。", "front": "", "back": "<b>参考答案:</b><br>胆囊肿大，胆囊壁增厚呈“双边”影表现，胆囊腔内透声差，充满可移动性光点，超声Murphy征阳性。急性胆囊炎多伴胆囊颈部或胆囊管嵌顿结石，发生穿孔时可见胆囊壁局部膨出或缺损，及胆囊周围局限性积液。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-17", "title": "17. 简述急性胰腺炎的超声表现。", "front": "", "back": "<b>参考答案:</b><br>（1）胰腺肿大及增厚，多为弥漫性，也可为局限性，轻症胰腺边缘光滑，边界清晰，重症者胰腺大多边缘不规则，边界模糊不清。\n\n（2）轻症胰腺炎内部回声减低，后方回声增强，重症者胰腺实质回声强弱不均，大部呈不规则高回声。\n\n（3）胰腺局部或周围无回声区，为假性囊肿形成或重症胰腺炎内外积液导致。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-18", "title": "18. 简述胰腺癌的主要超声表现。", "front": "", "back": "<b>参考答案:</b><br>（1）胰腺局限性肿大，边界不清，边缘呈“蟹足样”生长。\n\n（2）癌肿内部多数呈低回声，较大时有多种回声表现及后方回声衰减。肿瘤液化坏死时出现无回声区伴后方回声增强。\n\n（3）近段胰管呈均匀性或串珠样扩张、迂曲或闭塞不显示。\n\n（4）彩色多普勒示癌肿内无明显血流信号。\n\n（5）胰头癌压迫或侵犯胆总管，可引起梗阻部位以上的胆道系统扩张，较大肿块使周围脏器或血管受压，晚期可见多发圆形或椭圆形低回声肿大淋巴结及周围脏器受累征象。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-19", "title": "19. 试述脾破裂的超声造影表现。", "front": "", "back": "<b>参考答案:</b><br>注射造影剂后，脾破裂区域显示为边缘清晰的轻度增强或不增强区，尤其在增强晚期\n更为明显。而脾撕裂伤病灶表现为垂直于脾脏表面的边缘清晰的低回声带。若造影剂从脾表面溢出至脾周围，常提示有活动性出血。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-20", "title": "20. 试述脾脏肿大程度的分级及其常规超声和彩色多普勒超声表现。", "front": "", "back": "<b>参考答案:</b><br>脾大分三级，彩超表现为：\n\n（1）轻度肿大：超声的脾测值超过正常值，在仰卧位平静呼吸时，肋缘下刚可测及脾脏，深吸气时不超过肋缘下3cm。\n\n（2）中度肿大：脾脏各径线测值明显增大，仰卧位平静呼吸时可测及脾脏，深吸气时，脾下极在肋缘下可超过3cm，但不超过脐水平线。\n\n（3）重度肿大：脾脏明显肿大，失去正常形态，脾门切迹消失，周围脏器可被肿大的脾脏推挤、移位，脾下极可超过脐水平线以下。\n\n彩色多普勒显示脾内彩色血流亦可增多，可测得脾静脉最大血流速度多较正常值降低。当脾静脉内血栓形成时，彩色多普勒可示脾静脉血流消失或变细等表现。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-21", "title": "21. 简述脾淋巴管瘤的超声特征。", "front": "", "back": "<b>参考答案:</b><br>即海绵状淋巴管瘤或囊性淋巴管瘤。二维超声上与脾血管瘤表现相似，即多为稍高回声型或蜂窝状结构，边界清，内分布欠均匀。彩色多普勒较少显示彩色血流信号。超声造影常显示病灶轻度增强，并可出现树枝样逐渐填充整个病灶，其消退也较慢，与脾血管瘤相似。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-22", "title": "22. 简述脾淋巴瘤的超声鉴别诊断。", "front": "", "back": "<b>参考答案:</b><br>脾淋巴瘤的特征为脾内出现多个低或弱回声的圆形实质性肿块，内部回声分布可均匀或不均，边界清晰但无明显的肿瘤包膜，大者可相互融合或呈分叶状；彩色多普勒可显示瘤体及周边彩色血流，并可测及高速高阻动脉血流。需要与脾脏其他的占位性疾病鉴别诊断：\n\n（1）脾淋巴管瘤：多为稍高回声型或蜂窝状结构，边界清，内分布欠均匀；彩色多普勒较少显示彩色血流信号。超声造影常显示病灶轻度增强，并可出现树枝样逐渐填充整个病灶，其消退较慢。\n\n（2）脾血管瘤：二维超声显示脾内出现一个或数个圆形或椭圆形的实质团块，边界清晰规整，多为高回声，亦可呈低回声或混合回声，内部分布均匀或呈蜂窝状；彩色多普勒血流显像常未能显示瘤体内的彩色血流。超声造影可显示较大的血管瘤，表现为快速呈向心性或弥散性增强，增强持续时间较长。\n\n（3）脾转移性肿瘤：脾内肿瘤的超声表现与原发肿瘤病理结构有关，多为低回声，部分呈高回声及混合回声，内分布不均，边界可清晰，个别可出现周围晕环，可为多发，肿瘤增大可相互融合成团块状；彩色多普勒多不能显示瘤体内的彩色血流，个别可在周边显示高阻型动脉血流。", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}, {"no": "4-4-23", "title": "23. 简述胃癌的超声表现。", "front": "", "back": "<b>参考答案:</b><br>（1）早期胃癌胃壁呈局限性低回声隆起或增厚，形态不一，边界不清，一般起始于黏膜层，当侵犯黏膜下层时局部回声可出现断续现象，病变黏膜面也可呈现小“火山口”样征象。\n\n（2）进展期胃癌胃壁异常增厚隆起，形态不规则，内部回声低、不均匀，胃壁层次破\n坏，病变通常侵犯肌层或浆膜层，可表现胃壁结构紊乱、中断，浆膜回声线不完整。通常胃壁隆起最大范围大于5cm，厚度大于1.5cm，黏膜面显示多峰征与多凹征，胃腔狭窄，胃蠕动跳跃、减弱或消失。增厚的胃壁显示细条状彩色血流。胃癌可出现淋巴转移，可直接扩散至肝脏、胰腺、网膜和腹壁，可远处转移至肝、肺、骨、脑等，并可种植转移显示为腹壁结节、卵巢肿物、腹水等。\n\n（王文平 应涛 张群霞）", "tags": ["简答题", "消化"], "kind": "简答题", "page": 80, "chapter": "ch4", "static": false, "image": "", "figcap": ""}];

const container = document.getElementById('cards-container');
let activeFilter = 'all';
let searchTerm = '';

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function attrEscape(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function cardHTML(card) {
  const tags = (card.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  const searchBlob = ((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '')).toLowerCase();
  const safeSearch = attrEscape(searchBlob);
  const safeKind = attrEscape(card.kind);
  const safeTags = attrEscape((card.tags || []).join(','));
  const figHTML = card.image ? `<figure class="card-fig"><img src="${card.image}" alt="${attrEscape(card.figcap)}" loading="lazy"><figcaption>${card.figcap || ''}</figcaption></figure>` : '';
  if (card.static) {
    const isKp = card.kind === '重点';
    const icon = isKp ? '⭐' : '🔗';
    const cls = isKp ? 'static-card kp-static' : 'static-card';
    return `
    <div class="card ${cls}" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}" data-static="1">
      <div class="card-static-inner">
        <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
        <div class="card-title">${icon} ${card.title}</div>
        <div class="card-body">${card.front}</div>
        <div class="tags">${tags}</div>
      </div>
    </div>
  `;
  }
  return `
    <div class="card" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title">📌 ${card.title}</div>
          ${figHTML}
          <div class="card-body">${card.front}</div>
          <div class="tags">${tags}</div>
          <div class="flip-hint">💡 点击卡片翻面查看答案</div>
        </div>
        <div class="card-face card-back">
          <div class="card-no">卡号 ${card.no} · 答案 ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title answer-title">✅ ${card.title}</div>
          ${figHTML}
          <div class="card-body answer-body">${card.back}</div>
          <div class="tags">${tags}</div>
          <div class="card-actions"><button type="button" class="flip-back-btn">↩︎ 返回题目</button></div>
        </div>
      </div>
    </div>
  `;
}

function renderCards() {
  let html = '';
  let visibleCount = 0;
  const sections = {
    '前言': [], '目录': [], '重点': [],
    '名词解释': [], '填空题': [], '选择题': [], '共用备选答案': [], '简答题': []
  };
  const others = [];

  CARDS_DATA.forEach(card => {
    const tags = card.tags || [];
    const kind = card.kind || '';
    let placed = false;
    for (const k of Object.keys(sections)) {
      if (tags.includes(k) || kind === k) {
        sections[k].push(card); placed = true; break;
      }
    }
    if (!placed) others.push(card);
  });

  // 标题映射
  const titleMap = {
    '前言': '📖 前言',
    '目录': '📚 目录',
    '重点': '⭐ 重点难点',
    '名词解释': '📝 名词解释',
    '填空题': '✏️ 填空题',
    '选择题': '🔘 选择题',
    '共用备选答案': '🔗 共用备选答案(B型题)',
    '简答题': '📋 简答题'
  };

  let allCards = [];
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    allCards.push({type: 'title', label: titleMap[k], key: k});
    list.forEach(c => allCards.push({type: 'card', data: c, key: k}));
  }
  others.forEach(c => allCards.push({type: 'card', data: c, key: '其他'}));

  allCards.forEach(item => {
    if (item.type === 'title') {
      html += `<div class="section-title" id="section-${item.key}" data-section="${item.key}">${item.label} <span style="font-size:13px;color:#94a3b8;">(${sections[item.key]?.length || 0} 张)</span></div>`;
    } else {
      const card = item.data;
      const matchSearch = !searchTerm || (((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '') + ' ' + (card.tags || []).join(' ')).toLowerCase().includes(searchTerm));
      const matchFilter = activeFilter === 'all' ||
        (card.tags || []).some(t => t === activeFilter) ||
        card.kind === activeFilter;
      if (matchSearch && matchFilter) {
        html += cardHTML(card);
        visibleCount++;
      }
    }
  });

  if (visibleCount === 0) {
    html = '<div class="empty">🚫 没有匹配的卡片</div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('.section-title').forEach(title => {
    const next = title.nextElementSibling;
    if (!next || next.classList.contains('section-title')) title.remove();
  });
  renderNav(sections, titleMap);
  document.querySelectorAll('#section-nav a[href^="#section-"]').forEach(link => {
    const targetId = link.getAttribute('href').slice(1);
    if (!document.getElementById(targetId)) link.remove();
  });

  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
}

function renderNav(sections, titleMap) {
  const nav = document.getElementById('section-nav');
  let html = '<a href="#top">⬆️ 顶部</a>';
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    const label = titleMap[k] || k;
    const short = label.replace(/^[^一-龥A-Za-z]+/, '');
    html += `<a href="#section-${k}">${short}</a>`;
  }
  nav.innerHTML = html;
}

document.getElementById('section-nav').addEventListener('click', e => {
  const link = e.target.closest('a');
  if (!link) return;
  e.preventDefault();
  const id = link.getAttribute('href').slice(1);
  if (id === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  const target = document.getElementById(id);
  if (target) {
    const top = target.getBoundingClientRect().top + window.scrollY - 50;
    window.scrollTo({ top, behavior: 'smooth' });
  }
});

container.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card || card.classList.contains('static-card')) return;
  // 显式"返回题目"按钮:收起答案
  if (e.target.closest('.flip-back-btn')) {
    card.classList.remove('flipped');
    return;
  }
  // 已翻面时,点击不再翻回(避免误触遮住答案);仅按钮可收起
  if (card.classList.contains('flipped')) return;
  // 正在选择文字(复制)时不翻面
  const sel = window.getSelection();
  if (sel && sel.toString().trim().length > 0) return;
  // 链接/图片等交互元素不触发翻面
  if (e.target.closest('a, img, button')) return;
  card.classList.add('flipped');
});

document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

document.getElementById('flip-all').addEventListener('click', () => {
  const cards = document.querySelectorAll('.card:not(.static-card)');
  const allFlipped = Array.from(cards).every(c => c.classList.contains('flipped'));
  cards.forEach(c => c.classList.toggle('flipped', !allFlipped));
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  renderCards();
});

window.addEventListener('scroll', () => {
  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
});

// ===== 学习追踪 (艾宾浩斯遗忘曲线) =====
const EB_INTERVALS = [1, 2, 4, 7, 15, 30, 60, 90];
const LEVEL_NAMES = ['Lv.0 入门', 'Lv.1 巩固', 'Lv.2 熟练', 'Lv.3 精通', 'Lv.4 大师', 'Lv.5 宗师'];
const STORAGE_KEY = 'us_xtj_tracker_' + (CARDS_DATA[0]?.chapter || 'default');

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function formatDuration(ms) {
  const total = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return h > 0 ? `${pad2(h)}:${pad2(m)}:${pad2(s)}` : `${pad2(m)}:${pad2(s)}`;
}

function formatRemaining(ms) {
  if (ms <= 0) return '⏰ 现在该复习啦!';
  const total = Math.floor(ms / 1000);
  const d = Math.floor(total / 86400);
  const h = Math.floor((total % 86400) / 3600);
  const m = Math.floor((total % 3600) / 60);
  if (d > 0) return `还有 ${d} 天 ${h} 小时`;
  if (h > 0) return `还有 ${h} 小时 ${m} 分`;
  return `还有 ${m} 分钟`;
}

function loadTracker() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { firstOpen: Date.now(), lastOpen: Date.now(), visits: 0, level: 0, nextReviewAt: null };
}

function saveTracker(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function recomputeNextReview(state) {
  if (state.level >= EB_INTERVALS.length) {
    state.nextReviewAt = null;
    return;
  }
  const days = EB_INTERVALS[state.level];
  state.nextReviewAt = Date.now() + days * 24 * 3600 * 1000;
}

const tracker = loadTracker();
tracker.visits = (tracker.visits || 0) + 1;
tracker.lastOpen = Date.now();
if (!tracker.nextReviewAt) recomputeNextReview(tracker);
saveTracker(tracker);

const sessionStart = Date.now();
const $elapsed = document.getElementById('elapsed');
const $visit = document.getElementById('visit-count');
const $level = document.getElementById('review-level');
const $next = document.getElementById('next-review');
const $hint = document.getElementById('review-hint');

function renderTracker() {
  $elapsed.textContent = formatDuration(Date.now() - sessionStart);
  $visit.textContent = tracker.visits;
  $level.textContent = LEVEL_NAMES[Math.min(tracker.level, LEVEL_NAMES.length - 1)];
  if (tracker.level >= EB_INTERVALS.length) {
    $next.textContent = '🎉 已完全掌握';
    $hint.textContent = '你已超越艾宾浩斯曲线,知识长存!';
  } else {
    const now = Date.now();
    if (tracker.nextReviewAt && now >= tracker.nextReviewAt) {
      $next.textContent = '⏰ 现在该复习啦!';
      $hint.textContent = `按 Lv.${tracker.level} 间隔 ${EB_INTERVALS[tracker.level]} 天,已到复习点`;
    } else {
      $next.textContent = formatRemaining((tracker.nextReviewAt || 0) - now);
      const nextDays = EB_INTERVALS[tracker.level];
      $hint.textContent = `当前等级:第 ${tracker.level} 次复习 · 间隔 ${nextDays} 天`;
    }
  }
}

renderTracker();
setInterval(renderTracker, 1000);

document.getElementById('mark-reviewed').addEventListener('click', () => {
  tracker.level = Math.min(tracker.level + 1, EB_INTERVALS.length);
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
  const btn = document.getElementById('mark-reviewed');
  const orig = btn.textContent;
  btn.textContent = '🎉 已记录!';
  btn.style.background = '#10b981';
  setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1200);
});

document.getElementById('reset-tracker').addEventListener('click', () => {
  if (!confirm('确定要重置本章节的学习记录吗?')) return;
  tracker.firstOpen = Date.now();
  tracker.lastOpen = Date.now();
  tracker.visits = 1;
  tracker.level = 0;
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
});

renderCards();
</script>
