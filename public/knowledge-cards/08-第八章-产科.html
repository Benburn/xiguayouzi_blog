<style>
* { box-sizing: border-box; }

body {

.card[data-kind="共用备选答案"]:not(.static-card) .card-front { border-left-color: #0284c7; }
.opt-ref { display:inline-block; font-size:12px; color:#0369a1; background:#e0f2fe;

@keyframes cardFadeIn {

}
.kp-prompt {

}

.card-title {

.answer-title { color: #b45309; }

<script>
const CARDS_DATA = [{"no": "8-1-1", "title": "妊娠", "front": "请简述该名词的定义。", "back": "<b>妊娠</b>:<br>是指胚胎/胎儿在母体子宫内生长、发育的过程，自卵子受精开始，至胎儿及其附属物自母体排出为止，全过程平均约38周（相当于月经龄40周）。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-2", "title": "正常妊娠囊", "front": "请简述该名词的定义。", "back": "<b>正常妊娠囊</b>:<br>位于宫腔中上部，周边为一完整、厚度均匀的强回声环，厚度至少不低于2mm，这一强回声壁由正在发育的绒毛与邻近的蜕膜组成。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-3", "title": "nuchal translucency (NT)", "front": "请简述该名词的定义。", "back": "<b>nuchal translucency (NT)</b>:<br>指胎儿颈部皮下的无回声带，位于颈后皮肤高回声带与深部软组织高回声带之间。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-4", "title": "胎儿呼吸样运动（fetal breathing movement, FBM）", "front": "请简述该名词的定义。", "back": "<b>胎儿呼吸样运动（fetal breathing movement, FBM）</b>:<br>胎儿呼吸样运动（FBM）：在实时超声观察下见胎儿胸廓或腹壁节律的运动为胎儿呼吸样运动。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-5", "title": "胎动(fetal movement, FM)", "front": "请简述该名词的定义。", "back": "<b>胎动(fetal movement, FM)</b>:<br>胎动（FM）：胎动是指胎儿在宫内的活动，指躯体旋转及四肢运动。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-6", "title": "胎儿肌张力(fetal tone, FT)", "front": "请简述该名词的定义。", "back": "<b>胎儿肌张力(fetal tone, FT)</b>:<br>胎儿肌张力（FT）：正常情况下胎儿在宫内有一定张力，肌肉有一定的收缩性，肢体一般处于屈曲状态，胎体和肢体活动后又回复到原来的屈曲状态为正常的胎儿肌张力。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-7", "title": "羊水量 (amniotic fluid volume, AFV)", "front": "请简述该名词的定义。", "back": "<b>羊水量 (amniotic fluid volume, AFV)</b>:<br>羊水量（AFV）：羊水量即羊膜腔内羊水容量，最大羊水池深度 ≥ 2.0cm，并&lt;8.0cm为正常。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-8", "title": "流产", "front": "请简述该名词的定义。", "back": "<b>流产</b>:<br>流产是指妊娠不足28周、胎儿体重不足1000g而终止者，发生在妊娠12周前称早期流产，发生在妊娠12周后称晚期流产。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-9", "title": "难免流产", "front": "请简述该名词的定义。", "back": "<b>难免流产</b>:<br>宫颈内口已开，妊娠囊可部分下移至宫颈内口或宫颈管，妊娠囊变形呈葫芦状。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-10", "title": "异位妊娠", "front": "请简述该名词的定义。", "back": "<b>异位妊娠</b>:<br>孕卵在子宫腔以外着床。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-11", "title": "宫角妊娠", "front": "请简述该名词的定义。", "back": "<b>宫角妊娠</b>:<br>妊娠囊位于一侧宫角，妊娠囊与宫腔相连，子宫内膜在角部呈喇叭状，妊娠囊与内膜相连续。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-12", "title": "前置胎盘", "front": "请简述该名词的定义。", "back": "<b>前置胎盘</b>:<br>是指妊娠32周后胎盘部分或全部位于子宫下段，甚至胎盘下缘达到或覆盖宫颈内口，其位置低于胎先露部。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-13", "title": "胎盘早剥", "front": "请简述该名词的定义。", "back": "<b>胎盘早剥</b>:<br>是在妊娠20周后或分娩期胎儿娩出前，胎盘部分或全部从子宫壁分离，引起局部出血或血肿。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-14", "title": "胎盘植入", "front": "请简述该名词的定义。", "back": "<b>胎盘植入</b>:<br>是指胎盘附着异常，表现为胎盘绒毛异常植入到子宫肌层。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-15", "title": "单脐动脉", "front": "请简述该名词的定义。", "back": "<b>单脐动脉</b>:<br>正常脐带中有两条脐动脉与一条脐静脉，脐带中仅有一条脐动脉称为单脐动脉。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-16", "title": "脑膨出", "front": "请简述该名词的定义。", "back": "<b>脑膨出</b>:<br>指颅骨缺损伴脑组织和脑膜组织从缺损处膨出。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-17", "title": "脑膜膨出", "front": "请简述该名词的定义。", "back": "<b>脑膜膨出</b>:<br>指颅骨缺损并仅有脑膜组织从缺损处膨出。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-18", "title": "脑积水", "front": "请简述该名词的定义。", "back": "<b>脑积水</b>:<br>是指脑脊液过多地聚积在脑室系统内，导致脑室系统扩张和压力升高。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-20", "title": "完全性唇裂", "front": "请简述该名词的定义。", "back": "<b>完全性唇裂</b>:<br>是指唇裂从唇红一直裂到鼻底。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-21", "title": "不完全性唇裂", "front": "请简述该名词的定义。", "back": "<b>不完全性唇裂</b>:<br>是指唇裂涉及唇红或唇部皮肤，但未达鼻底。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-22", "title": "单心房", "front": "请简述该名词的定义。", "back": "<b>单心房</b>:<br>胚胎发育期，房间隔的第一隔和第二隔均未发育所致，房间隔的痕迹也不存在，有两个心耳，仅有一个共同心房腔。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-23", "title": "单心室", "front": "请简述该名词的定义。", "back": "<b>单心室</b>:<br>仅一个较大的主心腔接收来自心房血液，可以有两组房室瓣或只有一组房室瓣，房室瓣均向主心腔，可以合并附属心室腔。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-24", "title": "心内膜垫缺损", "front": "请简述该名词的定义。", "back": "<b>心内膜垫缺损</b>:<br>又称为房室间隔缺损，是一组累及房间隔、房室瓣和室间隔的复杂性先天性心脏畸形。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-25", "title": "“双泡征”", "front": "请简述该名词的定义。", "back": "<b>“双泡征”</b>:<br>在胎儿十二指肠闭锁或梗阻时，超声检查在胎儿上腹部横切面见“双泡征”，位于左侧为胃泡，右侧为扩张的十二指肠上段，两泡通过幽门相通。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-26", "title": "胎儿肾积水", "front": "请简述该名词的定义。", "back": "<b>胎儿肾积水</b>:<br>可由泌尿道梗阻或非梗阻性病变引起，临床上以肾盂前后径超过10mm为肾积水。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-27", "title": "脐膨出", "front": "请简述该名词的定义。", "back": "<b>脐膨出</b>:<br>是先天性前腹壁发育不全，在正中线处脐带周围腹壁肌肉、皮肤缺损，致使腹膜、腹腔内器官一起膨出体外，形成脐膨出。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-28", "title": "完全性海豹肢畸形", "front": "请简述该名词的定义。", "back": "<b>完全性海豹肢畸形</b>:<br>手、足直接与躯干相连称完全性海豹肢畸形。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-29", "title": "“听筒征”", "front": "请简述该名词的定义。", "back": "<b>“听筒征”</b>:<br>“听简征”：四肢长骨严重弯曲，呈听筒样改变。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-30", "title": "完全性葡萄胎的超声表现", "front": "请简述该名词的定义。", "back": "<b>完全性葡萄胎的超声表现</b>:<br>子宫大于停经时间，宫腔内充满大小不一的小囊泡回声，0.3～1cm左右，最大可达2cm，呈蜂窝状，与子宫肌层分界清晰。常合并有卵巢黄素囊肿。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-1-31", "title": "侵蚀性葡萄胎的超声特征", "front": "请简述该名词的定义。", "back": "<b>侵蚀性葡萄胎的超声特征</b>:<br>子宫轻度或明显增大，局部子宫肌层有不均质回声肿块，边界欠规整，彩色多普勒超声显示肿块血供丰富，多普勒频谱为低阻型血流，常合并动静脉瘘。", "tags": ["名词解释", "产科"], "kind": "名词解释", "page": 117, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-2-1", "title": "1. 胎儿血液循环是来自胎盘的有氧血通过___进入胎体，经肝静脉、门静脉及静脉导管后进入___，与来自胎儿下半身回流的含氧量低的血流一起回流入___。", "front": "", "back": "<b>答案:</b>脐静脉 下腔静脉 右心房", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-2-2", "title": "2. 早孕时，妊娠囊表现为子宫内膜内极小的无回声，称为___。随着妊娠囊的增大，形成特征的___或___。这一征象在妊娠囊平均内径为10mm或以上时能恒定显示。", "front": "", "back": "<b>答案:</b>蜕膜内征 双绒毛环征 双环征", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-2-3", "title": "3. 胎儿头颅主要采用横切面检查。最重要、最常用的横切面有 ___ 和 ___。", "front": "", "back": "<b>答案:</b>丘脑水平横切面 侧脑室水平横切面 小脑横切面", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-2-4", "title": "4. 胎儿心脏主要检查切面：___、___、___、___或___。", "front": "", "back": "<b>答案:</b>四腔心切面 左室流出道切面 右室流出道切面 三血管切面 三血管气管切面", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-2-5", "title": "5. 胎儿面部可通过矢状切面、横切面及冠状切面来检查，主要观察的结构有___、___、___等结构。", "front": "", "back": "<b>答案:</b>双眼眶 鼻 上唇", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-2-6", "title": "6. 流产在临床上分为___、难免流产、___、___、___。", "front": "", "back": "<b>答案:</b>先兆流产 不全流产 完全流产 稽留流产", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-2-7", "title": "7. 难免流产超声表现是宫颈内口 ___ ，妊娠囊可部分下移至 ___ 或 ___ 。", "front": "", "back": "<b>答案:</b>已开 宫颈内口 宫颈管", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-2-8", "title": "8. 先兆流产超声表现为子宫、妊娠囊、囊内胚芽或胎儿大小与停经孕周___，有胎心搏动，宫颈内口___。", "front": "", "back": "<b>答案:</b>相符 紧闭", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-2-9", "title": "9. 异位妊娠95%~98%发生在___, 其中80%发生在___, 有时也可以发生在___、___、___等。", "front": "", "back": "<b>答案:</b>输卵管 输卵管壶腹部 腹腔 卵巢 宫颈", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-2-10", "title": "10. 输卵管妊娠的共同超声表现：子宫稍___、子宫内膜___、宫内___，有时可见宫腔内积血形成___。", "front": "", "back": "<b>答案:</b>增大 明显增厚 无妊娠囊 假妊娠囊", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figca ___、___。", "front": "", "back": "<b>答案:</b>致死性侏儒 致死性软骨不发育 致死性成骨发育不良", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-2-39", "title": "39. Kay 起草的统一命名草案中，将先天性肢体缺失和截肢分为___和___两类。", "front": "", "back": "<b>答案:</b>横形肢体缺陷 纵形肢体缺陷", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-2-40", "title": "40. 妊娠滋养细胞疾病包括___、___、___、___。", "front": "", "back": "<b>答案:</b>葡萄胎 侵蚀性葡萄胎 绒毛膜癌 胎盘部位滋养细胞肿瘤", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-2-41", "title": "41. 绒毛膜癌继发于___、___、___。", "front": "", "back": "<b>答案:</b>足月产后 流产后 葡萄胎清宫后", "tags": ["填空题", "产科"], "kind": "填空题", "page": 119, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-1", "title": "1. 妊娠期间宫颈管会出现逐渐变短，但宫颈管长度应大于", "front": "A.2.5cm<br>B.3.0cm<br>C.3.5cm<br>D.4.0cm<br>E.4.5cm", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 121, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-2", "title": "2. 平时月经规则，3～5天/26～28天，妊娠囊平均直径约3mm，大约相当于妊娠", "front": "A.4 周<br>B.6 周<br>C.7 周<br>D.8 周<br>E.9 周", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 121, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-3", "title": "3. 关于胎儿血液循环特点， 不正确 的描述是", "front": "A.脐动脉是含氧高的血，脐静脉是含氧低的血<br>B.胎儿出生后脐静脉闭锁为肝圆韧带<br>C.胎儿出生后动脉导管闭锁为动脉韧带<br>D.胎儿肺动脉血液大部分经动脉导管流入主动脉供应胎儿下半身，仅约 10% 的血液经肺静脉回流入左心房<br>E.胎儿下腔静脉回流的血流 50% 以上通过开口正对下腔静脉的卵圆孔进入左心房", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 121, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-4", "title": "4. 胎儿颈项透明层检查的合适孕周是", "front": "A.6~9周<br>B.10~12周<br>C.11~13.6周<br>D.12~14.6周<br>E.20~23.6周", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 121, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-5", "title": "5. 早孕期，妊娠囊内最早观察到的结构是", "front": "A.卵黄囊<br>B.胚芽<br>C.羊膜囊<br>D.胎盘<br>E.羊水", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 122, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-6", "title": "6. 胚胎停止发育是指", "front": "A.在早孕期，胚芽长度 ≥ 2mm 时没有观察到胎心搏动<br>B.在早孕期，胚芽长度 ≥ 3mm 时没有观察到胎心搏动<br>C.在早孕期，胚芽长度 ≥ 4mm 时没有观察到胎心搏动<br>D.在早孕期，胚芽长度 ≥ 5mm 时没有观察到胎心搏动<br>E.在早孕期，胚芽长度 ≥ 7mm 时没有观察到胎心搏动", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 122, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-7", "title": "7. 关于早孕超声观察的内容， 不正确 的描述是", "front": "A.子宫内是否有妊娠囊<br>B.卵黄囊<br>C.胚芽<br>D.胎心搏动<br>E.胎儿心脏结构是否异常", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 122, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-8", "title": "8. 关于早孕期产科超声检查方法及内容， 不正确 的描述是", "front": "A.在宫底横切面上探头稍向左侧、右侧偏斜可以观察双侧附件的情况<br>B.主要超声检查切面为子宫系列纵切面和横切面<br>C.早孕期超声检查主要观察内容包括妊娠囊、卵黄囊、胚胎/胎儿数目、胎心搏动、胚长或头臀长等<br>D.早孕期超声诊断多胎妊娠时，应该确定羊膜囊数，而绒毛膜囊数在该时期不好确定<br>E.胎儿颈部透明层超声检查的最适检查时间在 11~13 +6 周", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 122, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-9", "title": "9. 下列异常的超生指标 不包括 颈项透明层增厚的是", "front": "A.胎儿唐氏综合征<br>B.胎儿先天性心脏畸形<br>C.一些遗传综合征<br>D.胎儿特纳综合征<br>E.胎儿消化道畸形", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 122, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-10", "title": "10. 关于中晚孕期产科超声检查方法及内容， 不正确 的描述是", "front": "A.中孕期最适检查时间是18~24孕周，此时期是检查胎儿解剖结构和筛查胎儿畸形的最佳时期，能对胎儿各个系统的重要解剖结构进行系统检查<br>B.中晚孕期产科超声能检查所有胎儿结构畸形<br>C.中晚孕期超声检查内容包括某些解剖结构的测量，如双顶径、头围、腹围、股骨长等，预测胎儿孕周大小<br>D.判断胎位、胎儿数目、估测羊水量、观察胎盘、脐带、孕妇子宫、宫颈等是中晚\n孕期超声检查的内容<br>E.中晚孕期可以通过测量双顶径、头围、腹围、股骨长等生长参数，间接评估胎儿的体重", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 122, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-11", "title": "11. 关于产科超声检查， 不正确 的描述是", "front": "A.产科超声检查常用腹部探头频率 3.0 ~ 6.0MHz，阴道探头频率 7.0 ~ 10.0MHz<br>B.孕妇一般取仰卧位，病人充分暴露下腹部，中晚孕期为了更好显示胎儿解剖结构，可根据胎儿体位调整孕妇体位，如左侧卧位、右侧卧位<br>C.检查前应告知孕妇产科超声检查的适应证、最适检查时间、该次检查内容、检查的风险、检查所需时间、孕妇所需准备等<br>D.产科超声检查前均无需在检查前做任何准备<br>E.经会阴、阴道超声检查需排空膀胱后进行", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 122, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-12", "title": "12. 胎儿腹部主要筛查的切面， 不包括", "front": "A.上腹部横切面<br>B.双肾横切面<br>C.脐孔横切面<br>D.膀胱切面<br>E.四腔心切面", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 122, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-13", "title": "13. 男性胎儿睾丸下降，在阴囊内可显示双侧睾丸回声，是在___后", "front": "A.24 周<br>B.28 周<br>C.32 周<br>D.36 周<br>E.39 周", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 123, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-14", "title": "14. 脐带构成正确的是", "front": "A.两条动脉，一条静脉<br>B.两条动脉，两条静脉<br>C.两条静脉，一条动脉<br>D.一条动脉，一条静脉<br>E.一条动脉，三条静脉", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 123, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-15", "title": "15. 晚孕期脐动脉多普勒 S/D 正常值", "front": "A.大于2.0<br>B.小于3.0<br>C.大于3.0<br>D.小于4.0<br>E.大于4.0", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 123, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-16", "title": "16. 诊断羊水过多的最大羊水池深度是", "front": "A.大于 5.0cm<br>B.大于 6.0cm<br>C.大于 7.0cm<br>D.大于 8.0cm<br>E.大于 9.0cm", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 123, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-17", "title": "17. 诊断羊水过少的最大羊水池深度是", "front": "A.小于 1.0cm<br>B.小于 2.0cm<br>C.小于 3.0cm<br>D.小于 4.0cm<br>E.小于 5.0cm", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 123, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-18", "title": "18. 先兆流产最早出现的症状是", "front": "A.停经<br>B.子宫停止增大<br>C.持续性腹痛<br>D.妊娠试验由阳性转为阴性<br>E.少量阴道流血", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 123, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-19", "title": "19. 关于先兆流产的表现， 不正确 的描述是", "front": "A.妊娠囊大小与停经时间相符，形态正常<br>B.阴道超声妊娠囊平均内径8mm以上，卵黄囊显示<br>C.胚芽大小与停经时间相符，胎心存在<br>D.阴道超声妊娠囊平均内径16mm以上，未显示胚芽及胎心搏动<br>E.有可能继续妊娠", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 123, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-20", "title": "20. 关于不全流产的超声表现， 不正确 的描述是", "front": "A.部分妊娠物排出宫腔<br>B.子宫腔内可见不规则团状回声<br>C.CDFI 检测子宫腔内不规则团块血流信号不明显<br>D.CDFI 检测与不规则团块相邻的子宫肌层内可见局灶性血流信号<br>E.子宫腔下段可见妊娠囊", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 123, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-21", "title": "21. 关于稽留流产， 不正确 的描述是", "front": "A.妊娠囊变形，内壁毛糙<br>B.子宫较停经时间小<br>C.卵黄囊大于6mm<br>D.胎心消失<br>E.经保胎治疗，可以继续妊娠", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 124, "chapter": "ch8", "static": false, "image": " 型题", "选择题", "产科"], "kind": "选择题", "page": 128, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-61", "title": "61. 关于致死性成骨发育不全Ⅱ型的超声特点， 不正确 的描述是", "front": "A.胎儿四肢严重短小，弯曲，且有骨折声像改变<br>B.胸部变形，但不是肋骨骨折改变造成<br>C.因胎儿颅骨骨化差，近场脑组织常可清晰显示<br>D.胎头骨化较差，加压可变形<br>E.胎儿颜面及眼眶各骨也可因骨化差，而呈低回声", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 129, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-62", "title": "62. 关于完全性葡萄胎， 不正确 的描述是", "front": "A.宫腔内充满多个大小不一的囊泡<br>B.宫腔内囊泡血供丰富<br>C.常合并卵巢黄素囊肿<br>D.子宫大于停经时间<br>E.血 β -hCG异常升高", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 129, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-63", "title": "63. 完全性葡萄胎与部分性葡萄胎的鉴别要点是", "front": "A.子宫大于停经时间<br>B.血 β -hCG 异常升高<br>C.常合并卵巢黄素囊肿<br>D.有不规则阴道出血<br>E.宫腔内除了多个小囊性结构外，见部分胎儿", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 129, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-64", "title": "64. 侵蚀性葡萄胎继发于", "front": "A.足月产后<br>B.流产后<br>C.葡萄胎清宫后<br>D.异位妊娠手术后<br>E.子宫肌瘤剥出术后", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 129, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-65", "title": "65. 关于绒毛膜癌， 不正确 的描述是", "front": "A.发生于足月分娩后<br>B.发生于流产后<br>C.不规则阴道出血<br>D.子宫肌层内局灶性回声紊乱区，血供丰富<br>E.血 β -hCG 正常", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "产科"], "kind": "选择题", "page": 129, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-1", "title": "66. 孕妇，35岁，G1P0，12周妊娠，来院超声检查，宫内妊娠，头臀长6.5cm，可见胎心 搏动，NT 厚约 0.5cm。其最可能的诊断是", "front": "A.NT 增厚<br>B.NT 正常<br>C.唐氏综合征<br>D.先天性心脏畸形<br>E.18 三体综合征", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 129, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-2", "title": "67. 孕妇，26岁，G1P0，32周妊娠，来医院行超声检查，胎儿大小相当于32周5天，臀位，羊水指数为28cm。其最可能的诊断是", "front": "A.羊水正常<br>B.羊水过少<br>C.羊水过多<br>D.胎儿过大<br>E.胎儿宫内生长受限", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 129, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-3", "title": "68. 胎盘绒毛膜板深达基底膜；胎盘实质内出现环状回声和不规则点状和团块状强回声，后方伴声影。胎盘的诊断是", "front": "A.胎盘Ⅰ级<br>B.胎盘Ⅱ级<br>C.胎盘0级<br>D.胎盘Ⅲ级<br>E.胎盘Ⅳ级", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 129, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-4", "title": "69. 女，29 岁，停经 49 天，尿 hCG (+) ，血压 110/70 mmHg，腹痛、大量阴道流血 3 天并排出不规则组织物半天到医院就诊。B 超检查：宫内未见妊娠囊；宫腔下段至宫颈内可见不规则混合性回声团，CDFI 检查未见明显血流信号；双侧附件区未见明显异常肿块声像。其最可能的诊断是", "front": "A.先兆流产<br>B.不全流产<br>C.难免流产<br>D.完全流产<br>E.稽留流产", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 130, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-5", "title": "70. 女，27岁，婚后3年，以往月经规律。现停经48天，少量阴道流血5天，伴右下腹隐痛。经检查为异位妊娠。最可能的妊娠部位是", "front": "A.输卵管间质部<br>B.输卵管峡部<br>C.子宫颈<br>D.输卵管壶腹部<br>E.卵巢", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 130, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-6", "title": "71. 35 岁，G3P0，孕 32 周，阴道少量流血 3 天，无腹痛。曾自然流产、过期流产各一次。入院检查，枕左前位，胎头浮、胎心好，耻骨联合上方可闻及胎盘杂音。其最可能的诊断是", "front": "A.胎盘早期剥离<br>B.前置胎盘<br>C.先兆流产<br>D.先兆子宫破裂<br>E.胎盘边缘血窦破裂", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 130, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-7", "title": "72. 25岁初孕妇，妊娠35周，自觉头痛眼花5日，经治疗3日未见显效。今晨7时突然出现腹痛并逐渐加重，呈持续性，经超声检查显示胎盘与子宫壁间可见不规则的无回声区，CDFI未见明显血流信号。其最可能的诊断是", "front": "A.妊娠合并急性阑尾炎<br>B.胎盘早剥<br>C.先兆子宫破裂<br>D.前置胎盘<br>E.先兆早产", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 130, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-8", "title": "73. 一产妇胎儿娩出后 1 小时，胎盘未娩出，阴道未见流血，超声检查显示胎盘位于前壁，厚 38mm，胎盘与子宫肌层间隙消失。其最可能的诊断是", "front": "A.胎盘植入<br>B.子宫卒中<br>C.胎盘剥离<br>D.低置胎盘<br>E.前置胎盘", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 130, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-9", "title": "74. 孕妇，28岁，孕5个月，来院行胎儿超声畸形筛查。超声显示左下腹见清晰的颅骨光环，双顶径：46mm，头围：18mm，脑中线居中，侧脑室未见扩张，唇线连续完整，心胸比例正常，膀胱水平横切面上显示膀胱两侧只有一条血管，横切脐带呈“吕”字形。其最可能的诊断是", "front": "A.单脐静脉<br>B.单脐动脉<br>C.边缘性脐带<br>D.脐带帆状附着<br>E.脐带缠绕", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 130, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-10", "title": "75. 孕22周，胎儿正中矢状面声像图表现如下图所示。其最可能的诊断是", "front": "A.脑积水<br>B.无脑畸形<br>C.露脑畸形<br>D.全前脑<br>E.唇腭裂", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 130, "chapter": "ch8", "static": false, "image": "image/8-75.png", "figcap": "图8-75"}, {"no": "8-3-11", "title": "76. 出现下图声像图表现时，应考虑", "front": "A.全前脑<br>B.脑膨出<br>C.无脑畸形<br>D.脊柱裂<br>E.小头畸形", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 130, "chapter": "ch8", "static": false, "image": "image/8-76.png", "figcap": "图8-76"}, {"no": "8-3-12", "title": "77. 孕22周，胎儿三维声像图表现如下图所示。其最可能的诊断是", "front": "A.左侧Ⅱ度唇裂<br>B.左侧Ⅲ度唇裂<br>C.右侧Ⅰ度唇裂<br>D.右侧Ⅱ度唇裂<br>E.右侧Ⅲ度唇裂", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 131, "chapter": "ch8", "static": false, "image": "image/8-77.png", "figcap": "图8-77"}, {"no": "8-3-13", "title": "78. 出现下图声像图表现时，应考虑", "front": "A.左侧Ⅱ度唇裂<br>B.左侧Ⅲ度唇裂<br>C.右侧Ⅰ度唇裂<br>D.右侧Ⅱ度唇裂<br>E.右侧Ⅲ度唇裂", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 131, "chapter": "ch8", "static": false, "image": "image/8-78.png", "figcap": "图8-78"}, {"no": "8-3-14", "title": "79. 25 孕周的孕妇，行胎儿超声心动图检查，初步诊断考虑单心房，需鉴别诊断的是", "front": "A.永存动脉干<br>B.单心室<br>C.巨大房间隔缺损<br>D.心内膜垫缺损<br>E.室间隔缺损", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 131, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-15", "title": "80. 26 孕周的孕妇，行胎儿超声心动图检查，表现为：心脏位置正常，心尖朝向左侧，静脉-心房连接正常，房间隔及卵圆孔显示，两组房室瓣，心房血液均流入主心腔，另可见一个较小心室腔，主心腔发出主动脉，较小心室腔发出肺动脉。其最可能的诊断是", "front": "A.巨大室间隔缺损<br>B.单心室<br>C.心内膜垫缺损<br>D.单心房<br>E.心室发育不良", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 131, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-16", "title": "81. 孕妇，24岁，孕7个月，来院行胎儿产前超声检查。超声显示右上腹完整的颅骨光环，双顶径：69mm，头围：26mm，脑中线居中，侧脑室未见扩张，唇线连续完整，心胸比例正常，胎儿四腔心切面上显示房间隔下部连续性中断。其最可能的诊断是", "front": "A.房间隔继发孔缺损<br>B.室间隔膜部缺损<br>C.完全型心内膜垫缺损<br>D.部分型心内膜垫缺损<br>E.卵圆孔未闭", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 131, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-17", "title": "82. 孕妇，30岁，妊娠26周，超声检查在胎儿腹围平面发现左上腹胃泡大小为 27mm × 18mm ，右上腹见一无回声区 26mm × 15mm ，与胃泡之间相通，最大羊水池深度85mm。其最可能的诊断是", "front": "A.十二指肠闭锁或梗阻<br>B.食管闭锁<br>C.空肠闭锁<br>D.回肠闭锁<br>E.肛门闭锁", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 131, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-18", "title": "83. 孕26周胎儿，双侧肾区未见肾脏组织回声，未见双侧腹主动脉双肾动脉分支，双侧肾上腺平躺，羊水过少。其最可能的诊断为", "front": "A.双肾萎缩<br>B.双肾缺如<br>C.双侧异位肾<br>D.左肾缺如<br>E.右肾缺如", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 131, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-19", "title": "84. 胎儿头臀径 46mm，其腹壁见 6mm×5mm 包块，可见脐血管包绕走行，以下诊断意见最合理的是", "front": "A.胎儿脐膨出<br>B.胎儿腹裂<br>C.泄殖腔外翻<br>D.畸胎瘤<br>E.胎儿生理性脐膨出", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 131, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-20", "title": "85. 孕28周，胎儿声像图表现如下图，超声诊断是", "front": "A.致死性侏儒<br>B.软骨发育不良<br>C.致死性成骨发育不良<br>D.特纳综合征<br>E.非致死性骨发育不良", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 132, "chapter": "ch8", "static": false, "image": "image/8-85.png", "figcap": "图8-85"}, {"no": "8-3-21", "title": "86. 孕18周，行产前超声检查，发现胎儿双上肢上臂、前臂均未探及，胎儿手掌直接与躯干连接。其最可能的诊断为", "front": "A.完全截肢<br>B.部分截肢<br>C.双上肢海豹肢畸形<br>D.前臂纵行缺陷<br>E.上臂纵行缺陷", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 132, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-22", "title": "87. 病人，女性。19岁，已婚，停经2个半月，少量不规则阴道出血，尿妊娠试验（+）。超声检查：子宫大小相当于妊娠3个月，宫腔内充满大小不一的囊性结构，内部未见彩色血流，未见胚胎结构。其最可能的诊断是", "front": "A.完全性葡萄胎<br>B.部分性葡萄胎<br>C.绒毛膜癌<br>D.不全流产<br>E.稽留流产", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 132, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-23", "title": "88. 病人，女性。已婚已育，足月顺产后3个月，不规则阴道出血伴咳嗽2周，血 β -hCG 40 000IU/ml，妇科检查发现阴道后壁蓝紫色结节2cm大小。超声检查：子宫大小 70mm×70mm×56mm ，宫腔内膜厚7mm，宫腔内未见异常回声。左宫底突起回声紊乱区 28mm×25mm×20mm ，彩色血流呈团块状，PI:0.40，RI:0.32。其最可能的诊断是", "front": "A.胎盘残留<br>B.再次妊娠<br>C.绒毛膜癌<br>D.葡萄胎<br>E.月经失调", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A2型题", "选择题", "产科"], "kind": "选择题", "page": 132, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-3-shared-89-90", "title": "共用备选答案 · 第 89~90 题", "front": "<b>下列第 89~90 题共用以下备选答案:</b 胎最特征性表现", "front": "<span class=\"opt-ref\">选项见上方「共用备选答案」卡</span>", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["B型题", "产科"], "kind": "共用备选答案", "page": 0, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-4-1", "title": "1. 简述胎儿血液循环特点。", "front": "", "back": "<b>参考答案:</b><br>胎儿来自胎盘的有氧血通过脐静脉进入胎体，经肝静脉、门静脉及静脉导管后进入下腔静脉，与来自胎儿下半身回流的含氧量低的血流一起回流入右心房；下腔静脉回流的血流50%以上通过开口正对下腔静脉的卵圆孔进入左心房，供应胎儿上半身；上腔静脉回流入右心房的血流及小部分下腔静脉回流血流通过三尖瓣进入右心室后流入肺动脉；肺动脉血液大部分经动脉导管流入主动脉供应胎儿下半身，仅约10%的血液经肺静脉回流入左心房；流入主动脉的血除了供应胎儿下半身，大部分通过脐动脉流向胎盘进行气血交换。", "tags": ["简答题", "产科"], "kind": "简答题", "page": 137, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-4-2", "title": "2. 超声观察胎盘的内容包括哪些方面？", "front": "", "back": "<b>参考答案:</b><br>超声观察的内容包括胎盘着床位置、大小、数目、内部回声、成熟度、与宫颈内口关系、胎盘后方回声以及胎盘内多普勒血流情况等。", "tags": ["简答题", "产科"], "kind": "简答题", "page": 137, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-4-3", "title": "3. 简述胎盘早剥的超声表现。", "front": "", "back": "<b>参考答案:</b><br>胎盘早剥的超声表现：①胎盘剥离早期：胎盘剥离时胎盘与子宫壁间见边缘粗糙、形态不规则的无回声区，随着时间的推移，胎盘后方呈不匀质团块状高回声；CDFI无明显血流信号，也可表现为胎盘异常增厚，呈不均匀高回声；凝血块突入羊膜腔，可形成羊膜腔内肿块，为重型胎盘早剥的声像。②胎盘剥离后期：胎盘剥离出血不多自行停止后，胎盘后血肿于数天后逐渐液化，内部呈无回声，与子宫壁分界清楚；血肿机化后，呈不匀质高回声团，该处胎盘明显增厚，胎盘的胎儿可向羊膜腔内膨出。③胎盘边缘血窦破裂：如果胎盘边缘与子宫壁剥离，胎盘边缘胎膜与子宫壁分离、隆起，胎膜下出血表现为不匀质低回声，不形成胎盘后血肿。", "tags": ["简答题", "产科"], "kind": "简答题", "page": 137, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-4-4", "title": "4. 简述胎儿开放性脊柱裂的脑部改变。", "front": "", "back": "<b>参考答案:</b><br>①小脑异常（香蕉形小脑，小脑发育不良甚至缺如）；②后颅窝池消失；③双侧额骨内陷，柠檬头征；④脑室扩大或脑积水。", "tags": ["简答题", "产科"], "kind": "简答题", "page": 137, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-4-5", "title": "5. 简述胎儿单纯唇裂和单纯腭裂的分度。", "front": "", "back": "<b>参考答案:</b><br>（1）单纯唇裂的分度：Ⅰ度（唇裂仅限于唇红，未达皮肤）；Ⅱ度（唇裂抵达唇部皮肤，但未达鼻底）、Ⅲ度（唇裂达鼻底）。\n\n（2）单纯腭裂的分度：Ⅰ度（指悬雍垂裂或软腭裂）；Ⅱ度（全软腭裂或部分硬腭裂，但未及牙槽突）；Ⅲ度（软腭、硬腭全部裂开且达牙槽突）。", "tags": ["简答题", "产科"], "kind": "简答题", "page": 137, "chapter": "ch8", "static": false, "image": "", "figcap": ""}, {"no": "8-4-6", "title": "6. 简述完全性葡萄胎与稽留流产的鉴别诊断。", "front": "", "back": "<b>参考答案:</b><br>（1）完全性葡萄胎病人血β-hCG异常高于正常妊娠，稽留流产病人血β-hCG低于正\n常妊娠。葡萄胎超声表现为子宫大于停经时间，宫腔内充满多个小囊泡，未见正常胎儿胎盘组织，内部彩色血流不明显。\n\n（2）稽留流产子宫略小于停经时间，宫腔内胚囊变形，未见胚芽或见胚芽但胎心消失。稽留流产也可表现为宫腔内团状实性回声与无回声混杂的回声紊乱区，子宫肌层血供较丰富。\n\n（任芸芸 李胜利 田家玮 邓学东 赵博文 栗河舟 熊奕 姚远 孙立涛 潘美）", "tags": ["简答题", "产科"], "kind": "简答题", "page": 137, "chapter": "ch8", "static": false, "image": "", "figcap": ""}];

const container = document.getElementById('cards-container');
let activeFilter = 'all';
let searchTerm = '';

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function attrEscape(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function cardHTML(card) {
  const tags = (card.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  const searchBlob = ((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '')).toLowerCase();
  const safeSearch = attrEscape(searchBlob);
  const safeKind = attrEscape(card.kind);
  const safeTags = attrEscape((card.tags || []).join(','));
  const figHTML = card.image ? `<figure class="card-fig"><img src="${card.image}" alt="${attrEscape(card.figcap)}" loading="lazy"><figcaption>${card.figcap || ''}</figcaption></figure>` : '';
  if (card.static) {
    const isKp = card.kind === '重点';
    const icon = isKp ? '⭐' : '🔗';
    const cls = isKp ? 'static-card kp-static' : 'static-card';
    return `
    <div class="card ${cls}" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}" data-static="1">
      <div class="card-static-inner">
        <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
        <div class="card-title">${icon} ${card.title}</div>
        <div class="card-body">${card.front}</div>
        <div class="tags">${tags}</div>
      </div>
    </div>
  `;
  }
  return `
    <div class="card" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title">📌 ${card.title}</div>
          ${figHTML}
          <div class="card-body">${card.front}</div>
          <div class="tags">${tags}</div>
          <div class="flip-hint">💡 点击卡片翻面查看答案</div>
        </div>
        <div class="card-face card-back">
          <div class="card-no">卡号 ${card.no} · 答案 ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title answer-title">✅ ${card.title}</div>
          ${figHTML}
          <div class="card-body answer-body">${card.back}</div>
          <div class="tags">${tags}</div>
          <div class="card-actions"><button type="button" class="flip-back-btn">↩︎ 返回题目</button></div>
        </div>
      </div>
    </div>
  `;
}

function renderCards() {
  let html = '';
  let visibleCount = 0;
  const sections = {
    '前言': [], '目录': [], '重点': [],
    '名词解释': [], '填空题': [], '选择题': [], '共用备选答案': [], '简答题': []
  };
  const others = [];

  CARDS_DATA.forEach(card => {
    const tags = card.tags || [];
    const kind = card.kind || '';
    let placed = false;
    for (const k of Object.keys(sections)) {
      if (tags.includes(k) || kind === k) {
        sections[k].push(card); placed = true; break;
      }
    }
    if (!placed) others.push(card);
  });

  // 标题映射
  const titleMap = {
    '前言': '📖 前言',
    '目录': '📚 目录',
    '重点': '⭐ 重点难点',
    '名词解释': '📝 名词解释',
    '填空题': '✏️ 填空题',
    '选择题': '🔘 选择题',
    '共用备选答案': '🔗 共用备选答案(B型题)',
    '简答题': '📋 简答题'
  };

  let allCards = [];
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    allCards.push({type: 'title', label: titleMap[k], key: k});
    list.forEach(c => allCards.push({type: 'card', data: c, key: k}));
  }
  others.forEach(c => allCards.push({type: 'card', data: c, key: '其他'}));

  allCards.forEach(item => {
    if (item.type === 'title') {
      html += `<div class="section-title" id="section-${item.key}" data-section="${item.key}">${item.label} <span style="font-size:13px;color:#94a3b8;">(${sections[item.key]?.length || 0} 张)</span></div>`;
    } else {
      const card = item.data;
      const matchSearch = !searchTerm || (((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '') + ' ' + (card.tags || []).join(' ')).toLowerCase().includes(searchTerm));
      const matchFilter = activeFilter === 'all' ||
        (card.tags || []).some(t => t === activeFilter) ||
        card.kind === activeFilter;
      if (matchSearch && matchFilter) {
        html += cardHTML(card);
        visibleCount++;
      }
    }
  });

  if (visibleCount === 0) {
    html = '<div class="empty">🚫 没有匹配的卡片</div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('.section-title').forEach(title => {
    const next = title.nextElementSibling;
    if (!next || next.classList.contains('section-title')) title.remove();
  });
  renderNav(sections, titleMap);
  document.querySelectorAll('#section-nav a[href^="#section-"]').forEach(link => {
    const targetId = link.getAttribute('href').slice(1);
    if (!document.getElementById(targetId)) link.remove();
  });

  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
}

function renderNav(sections, titleMap) {
  const nav = document.getElementById('section-nav');
  let html = '<a href="#top">⬆️ 顶部</a>';
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    const label = titleMap[k] || k;
    const short = label.replace(/^[^一-龥A-Za-z]+/, '');
    html += `<a href="#section-${k}">${short}</a>`;
  }
  nav.innerHTML = html;
}

document.getElementById('section-nav').addEventListener('click', e => {
  const link = e.target.closest('a');
  if (!link) return;
  e.preventDefault();
  const id = link.getAttribute('href').slice(1);
  if (id === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  const target = document.getElementById(id);
  if (target) {
    const top = target.getBoundingClientRect().top + window.scrollY - 50;
    window.scrollTo({ top, behavior: 'smooth' });
  }
});

container.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card || card.classList.contains('static-card')) return;
  // 显式"返回题目"按钮:收起答案
  if (e.target.closest('.flip-back-btn')) {
    card.classList.remove('flipped');
    return;
  }
  // 已翻面时,点击不再翻回(避免误触遮住答案);仅按钮可收起
  if (card.classList.contains('flipped')) return;
  // 正在选择文字(复制)时不翻面
  const sel = window.getSelection();
  if (sel && sel.toString().trim().length > 0) return;
  // 链接/图片等交互元素不触发翻面
  if (e.target.closest('a, img, button')) return;
  card.classList.add('flipped');
});

document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

document.getElementById('flip-all').addEventListener('click', () => {
  const cards = document.querySelectorAll('.card:not(.static-card)');
  const allFlipped = Array.from(cards).every(c => c.classList.contains('flipped'));
  cards.forEach(c => c.classList.toggle('flipped', !allFlipped));
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  renderCards();
});

window.addEventListener('scroll', () => {
  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
});

// ===== 学习追踪 (艾宾浩斯遗忘曲线) =====
const EB_INTERVALS = [1, 2, 4, 7, 15, 30, 60, 90];
const LEVEL_NAMES = ['Lv.0 入门', 'Lv.1 巩固', 'Lv.2 熟练', 'Lv.3 精通', 'Lv.4 大师', 'Lv.5 宗师'];
const STORAGE_KEY = 'us_xtj_tracker_' + (CARDS_DATA[0]?.chapter || 'default');

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function formatDuration(ms) {
  const total = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return h > 0 ? `${pad2(h)}:${pad2(m)}:${pad2(s)}` : `${pad2(m)}:${pad2(s)}`;
}

function formatRemaining(ms) {
  if (ms <= 0) return '⏰ 现在该复习啦!';
  const total = Math.floor(ms / 1000);
  const d = Math.floor(total / 86400);
  const h = Math.floor((total % 86400) / 3600);
  const m = Math.floor((total % 3600) / 60);
  if (d > 0) return `还有 ${d} 天 ${h} 小时`;
  if (h > 0) return `还有 ${h} 小时 ${m} 分`;
  return `还有 ${m} 分钟`;
}

function loadTracker() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { firstOpen: Date.now(), lastOpen: Date.now(), visits: 0, level: 0, nextReviewAt: null };
}

function saveTracker(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function recomputeNextReview(state) {
  if (state.level >= EB_INTERVALS.length) {
    state.nextReviewAt = null;
    return;
  }
  const days = EB_INTERVALS[state.level];
  state.nextReviewAt = Date.now() + days * 24 * 3600 * 1000;
}

const tracker = loadTracker();
tracker.visits = (tracker.visits || 0) + 1;
tracker.lastOpen = Date.now();
if (!tracker.nextReviewAt) recomputeNextReview(tracker);
saveTracker(tracker);

const sessionStart = Date.now();
const $elapsed = document.getElementById('elapsed');
const $visit = document.getElementById('visit-count');
const $level = document.getElementById('review-level');
const $next = document.getElementById('next-review');
const $hint = document.getElementById('review-hint');

function renderTracker() {
  $elapsed.textContent = formatDuration(Date.now() - sessionStart);
  $visit.textContent = tracker.visits;
  $level.textContent = LEVEL_NAMES[Math.min(tracker.level, LEVEL_NAMES.length - 1)];
  if (tracker.level >= EB_INTERVALS.length) {
    $next.textContent = '🎉 已完全掌握';
    $hint.textContent = '你已超越艾宾浩斯曲线,知识长存!';
  } else {
    const now = Date.now();
    if (tracker.nextReviewAt && now >= tracker.nextReviewAt) {
      $next.textContent = '⏰ 现在该复习啦!';
      $hint.textContent = `按 Lv.${tracker.level} 间隔 ${EB_INTERVALS[tracker.level]} 天,已到复习点`;
    } else {
      $next.textContent = formatRemaining((tracker.nextReviewAt || 0) - now);
      const nextDays = EB_INTERVALS[tracker.level];
      $hint.textContent = `当前等级:第 ${tracker.level} 次复习 · 间隔 ${nextDays} 天`;
    }
  }
}

renderTracker();
setInterval(renderTracker, 1000);

document.getElementById('mark-reviewed').addEventListener('click', () => {
  tracker.level = Math.min(tracker.level + 1, EB_INTERVALS.length);
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
  const btn = document.getElementById('mark-reviewed');
  const orig = btn.textContent;
  btn.textContent = '🎉 已记录!';
  btn.style.background = '#10b981';
  setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1200);
});

document.getElementById('reset-tracker').addEventListener('click', () => {
  if (!confirm('确定要重置本章节的学习记录吗?')) return;
  tracker.firstOpen = Date.now();
  tracker.lastOpen = Date.now();
  tracker.visits = 1;
  tracker.level = 0;
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
});

renderCards();
</script>
