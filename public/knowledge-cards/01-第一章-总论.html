<script>
const CARDS_DATA = [{"no": "1-1-1", "title": "压电效应", "front": "请简述该名词的定义。", "back": "<b>压电效应</b>:<br>在力的作用下(压力或负压力),压电材料的一对面上会产生电场,其符号(正、负)相反。外力越大,电场强度越大;反之则小。或者,在电场的作用下,压电材料的厚度会发生改变,所加电场强度越大,压电材料厚薄的变化越大。加力后产生电场的变化称<b>正压电效应</b>,加电场后发生厚度变化称<b>逆压电效应</b>。", "tags": ["名词解释", "总论", "第1题"], "kind": "名词解释", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-1-2", "title": "声学界面", "front": "请简述该名词的定义。", "back": "<b>声学界面</b>:<br>两种特性声阻抗不同的物质(组织)的接触面称声学界面。尺寸大于入射声波波长的称<b>大界面</b>,小于波长的称<b>小界面</b>。", "tags": ["名词解释", "总论", "第2题"], "kind": "名词解释", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-1-3", "title": "散射", "front": "请简述该名词的定义。", "back": "<b>散射</b>:<br>小界面对入射超声产生散射现象,使入射超声的部分能量向各个空间方向分散辐射。其返回至声源的回声能量甚低,但散射回声来自脏器内部的细小结构,其临床意义十分重要。", "tags": ["名词解释", "总论", "第3题"], "kind": "名词解释", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-1-4", "title": "Doppler效应", "front": "请简述该名词的定义。", "back": "<b>Doppler效应</b>:<br>当一定频率的超声波由声源发射并在介质中传播时,如遇到与声源做相对运动的界面,则其反射的超声波频率随界面运动的情况而发生改变,称为Doppler效应,是彩色多普勒超声成像的基础。", "tags": ["名词解释", "总论", "第4题"], "kind": "名词解释", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-1-5", "title": "旁瓣伪像", "front": "请简述该名词的定义。", "back": "<b>旁瓣伪像</b>:<br>超声束旁瓣分布于超声束主瓣旁,遇被检物体界面时也可产生反射、散射成像,但由于能量弱,常在主瓣回声的两侧有低回声延长线,模糊不清,称为旁瓣伪像。", "tags": ["名词解释", "总论", "第5题"], "kind": "名词解释", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-1-6", "title": "部分容积效应", "front": "请简述该名词的定义。", "back": "<b>部分容积效应</b>:<br>声像图上表现为一定厚度范围内体层容积中回声信息在厚度方面的叠加,扫查声束越宽则图像叠加越严重。病灶尺寸小于声束束宽,或者虽大于束宽但部分处于声束内时,病灶回声与周围正常组织回声重叠。多见于小型液性病灶。", "tags": ["名词解释", "总论", "第6题"], "kind": "名词解释", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-1-7", "title": "折射声影", "front": "请简述该名词的定义。", "back": "<b>折射声影</b>:<br>在圆弧形界面两侧,由于入射超声与界面几乎平行,超过临界角产生全反射,其后方产生声影,称为折射声影。", "tags": ["名词解释", "总论", "第7题"], "kind": "名词解释", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-1-8", "title": "尼奎斯特(Nyquist)频率极限", "front": "请简述该名词的定义。", "back": "<b>尼奎斯特(Nyquist)频率极限</b>:<br>超声探头在单位时间内发射脉冲波的次数称为脉冲重复频率(PRF)。PRF的一半即为<b>Nyquist频率极限</b>,多普勒频移值超过这一极限,脉冲多普勒所检测出的频移改变就会出现频率失真(<b>频谱混叠</b>)。", "tags": ["名词解释", "总论", "第8题"], "kind": "名词解释", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-2-1", "title": "声学界面的存在,说明该界面两侧介质的________不同。", "front": "", "back": "<b>答案:</b>声阻抗", "tags": ["填空题", "总论"], "kind": "填空题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-2-2", "title": "大界面与小界面不是从界面的绝对尺寸,而是用界面尺寸与________之间比较确定。小界面对入射声波呈________现象,大界面对入射声波呈________现象。", "front": "", "back": "<b>答案:</b>入射声波的波长、散射、反射", "tags": ["填空题", "总论"], "kind": "填空题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-2-3", "title": "若声波在病灶组织与周围正常组织中的衰减系数存在较大差异,则在二维声像图上,病灶后方回声会出现________或________。", "front": "", "back": "<b>答案:</b>增强、减弱", "tags": ["填空题", "总论"], "kind": "填空题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-2-4", "title": "超声波进入人体组织后可产生三大生物学效应,即:________、________、________。", "front": "", "back": "<b>答案:</b>空化效应、热效应、机械效应", "tags": ["填空题", "总论"], "kind": "填空题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-2-5", "title": "超声造影采用连续滴注触发式成像时,其时间-强度曲线的峰值回声强度(PI)反映________,上升斜率反映________,斜率与PI的乘积反映________。", "front": "", "back": "<b>答案:</b>毛细血管数量或横截面积、造影剂的补充速度即毛细血管平均流速、局部组织的血流量", "tags": ["填空题", "总论"], "kind": "填空题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-2-6", "title": "血液在人体心血管腔内流动的状态可分为:________、________、________。", "front": "", "back": "<b>答案:</b>层流、湍流、涡流", "tags": ["填空题", "总论"], "kind": "填空题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-1", "title": "1. 超声波指?", "front": "A.频率&gt;2Hz的声波<br>B.频率&gt;20Hz的声波<br>C.频率&gt;2000Hz的声波<br>D.频率&gt;20000Hz的声波<br>E.频率&gt;200000Hz的声波", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-2", "title": "2. 超声在人体软组织内的平均传播速度约为?", "front": "A.1054m/s<br>B.1540m/s<br>C.4510m/s<br>D.5140m/s<br>E.5410m/s", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-3", "title": "3. 声波在下列介质中传播速度最快的是?", "front": "A.空气<br>B.水<br>C.血液<br>D.骨<br>E.脂肪", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-4", "title": "4. 关于频率的描述,错误的是?", "front": "A.频率是单位时间内质点完成振动过程的次数<br>B.频率与波长的乘积等于声速<br>C.频率越高,声波穿透力越强<br>D.频率与声像图纵向分辨力相关<br>E.检查浅表器官多采用较高频率探头", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-5", "title": "5. 声阻抗为?", "front": "A.组织厚度×声速<br>B.组织密度×声速<br>C.探头频率×声速<br>D.超声波长×声速<br>E.界面间距离", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-6", "title": "6. 结石过小(&lt;2mm)时其后方可无声影,基本声学原理是?", "front": "A.反射<br>B.散射<br>C.绕射<br>D.折射<br>E.相干", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-7", "title": "7. 镜面反射时反射波强弱取决于?", "front": "A.两侧介质密度之差<br>B.两侧介质声速之差<br>C.两侧介质弹性之差<br>D.两侧介质声学阻抗之差<br>E.两侧介质蛋白含量之差", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-8", "title": "8. 反映声功率输出大小及生物学效应安全性的常用指标是?", "front": "A.机械指数(MI)<br>B.热指数(TI)<br>C.频率(f0)<br>D.阻力指数(RI)<br>E.搏动指数(PI)", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-9", "title": "9. 微泡声学造影实时检查,MI通常应设置为?", "front": "A.0.1或更低<br>B.0.1~0.5<br>C.0.5~0.8<br>D.0.8~1.0<br>E.&gt;1.0", "back": "<b>正确答案:</b> <span class=\"highlight\">A</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-10", "title": "10. 下列描述不正确的是?", "front": "A.宫内避孕环彗星尾征——多次反射伪像<br>B.结石后方暗影——声影伪像<br>C.囊肿后方回声增强——后方回声增强<br>D.乳腺纤维腺瘤侧方声影——旁瓣伪像<br>E.肝内血管瘤膈上对称——镜面伪像", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-11", "title": "11. 薄壁囊肿侧壁不能显示的可能原因是?", "front": "A.声波的反射现象<br>B.声波的散射现象<br>C.声波的绕射现象<br>D.声波发散所致<br>E.角度依赖,致回声失落", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-12", "title": "12. 关于超声衰减一般规律,不正确的是?", "front": "A.骨&gt;肝&gt;血液<br>B.组织中含水越多衰减越多<br>C.含胶原越多衰减越多<br>D.含钙越多衰减越多<br>E.液体含蛋白越多衰减越多", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-13", "title": "13. 组织回声不正确的描述是?", "front": "A.分级:强/高/等/低/弱/无回声<br>B.脂肪组织为强回声<br>C.钙化/结石为强回声伴声影<br>D.血管为无回声管状结构<br>E.回声强度:胰腺&gt;肝脏&gt;血液&gt;尿液", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-14", "title": "14. 超声检查使用耦合剂的目的是?", "front": "A.去除旁瓣效应<br>B.去除容积效应<br>C.使探头与皮肤接触良好,防止空气<br>D.提高纵向分辨力<br>E.提高横向分辨力", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-15", "title": "15. 医用超声仪器探头发射声波的基本原理是?", "front": "A.正压电效应<br>B.逆压电效应<br>C.空化效应<br>D.机械效应<br>E.热效应", "back": "<b>正确答案:</b> <span class=\"highlight\">B</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-16", "title": "16. 关于探头不正确的描述是?", "front": "A.主体是换能器<br>B.逆压电发射,正压电接收<br>C.电子凸阵用于腹部/妇产科<br>D.电子扇形用于心脏<br>E.腔内探头扫查深度大、视野开阔", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-17", "title": "17. 关于二维图像分辨力不正确的是?", "front": "A.频率越高,纵向分辨力越好<br>B.声束越细,侧向分辨力越好<br>C.A/D位数越高,灰阶级差越小<br>D.阵元数/A/D采样频率与空间分辨力无关<br>E.成像帧速率决定速度分辨力", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-18", "title": "18. 关于分辨力不正确的是?", "front": "A.分纵向/横向/侧向<br>B.纵向取决于发射频率<br>C.横向取决于声束宽度<br>D.同一探头不同深度分辨力相同<br>E.目前不能检测单细胞", "back": "<b>正确答案:</b> <span class=\"highlight\">D</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-19", "title": "19. 关于CDFI原理不正确的是?", "front": "A.颜色亮暗表示流速高低<br>B.颜色均一性表示离散度<br>C.五色镶嵌代表湍流<br>D.颜色均一表示层流<br>E.红色动脉,蓝色静脉", "back": "<b>正确答案:</b> <span class=\"highlight\">E</span>", "tags": ["A1型题", "选择题", "总论"], "kind": "选择题", "page": 7, "chapter": "ch1", "static": false, "image": "", "figcap": ""}, {"no": "1-3-20", "title": "20. 正常情况下血液在血管内为?", "front": "A.湍流<br>B.涡流<br>C.层流<br>D.反流<br>E.分流", "back": "<b>正确答案:</b> <span class=\"highlight\">C</span>", "tags": ["A1型题", "选择题", "总论"], "kin const container = document.getElementById('cards-container');
let activeFilter = 'all';
let searchTerm = '';

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function attrEscape(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function cardHTML(card) {
  const tags = (card.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  const searchBlob = ((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '')).toLowerCase();
  const safeSearch = attrEscape(searchBlob);
  const safeKind = attrEscape(card.kind);
  const safeTags = attrEscape((card.tags || []).join(','));
  const figHTML = card.image ? `<figure class="card-fig"><img src="${card.image}" alt="${attrEscape(card.figcap)}" loading="lazy"><figcaption>${card.figcap || ''}</figcaption></figure>` : '';
  if (card.static) {
    const isKp = card.kind === '重点';
    const icon = isKp ? '⭐' : '🔗';
    const cls = isKp ? 'static-card kp-static' : 'static-card';
    return `
    <div class="card ${cls}" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}" data-static="1">
      <div class="card-static-inner">
        <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
        <div class="card-title">${icon} ${card.title}</div>
        <div class="card-body">${card.front}</div>
        <div class="tags">${tags}</div>
      </div>
    </div>
  `;
  }
  return `
    <div class="card" data-tags="${safeTags}" data-search="${safeSearch}" data-kind="${safeKind}">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-no">卡号 ${card.no} ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title">📌 ${card.title}</div>
          ${figHTML}
          <div class="card-body">${card.front}</div>
          <div class="tags">${tags}</div>
          <div class="flip-hint">💡 点击卡片翻面查看答案</div>
        </div>
        <div class="card-face card-back">
          <div class="card-no">卡号 ${card.no} · 答案 ${card.page ? `<span class="page-badge">第 ${card.page} 页</span>` : ''}</div>
          <div class="card-title answer-title">✅ ${card.title}</div>
          ${figHTML}
          <div class="card-body answer-body">${card.back}</div>
          <div class="tags">${tags}</div>
          <div class="card-actions"><button type="button" class="flip-back-btn">↩︎ 返回题目</button></div>
        </div>
      </div>
    </div>
  `;
}

function renderCards() {
  let html = '';
  let visibleCount = 0;
  const sections = {
    '前言': [], '目录': [], '重点': [],
    '名词解释': [], '填空题': [], '选择题': [], '共用备选答案': [], '简答题': []
  };
  const others = [];

  CARDS_DATA.forEach(card => {
    const tags = card.tags || [];
    const kind = card.kind || '';
    let placed = false;
    for (const k of Object.keys(sections)) {
      if (tags.includes(k) || kind === k) {
        sections[k].push(card); placed = true; break;
      }
    }
    if (!placed) others.push(card);
  });

  // 标题映射
  const titleMap = {
    '前言': '📖 前言',
    '目录': '📚 目录',
    '重点': '⭐ 重点难点',
    '名词解释': '📝 名词解释',
    '填空题': '✏️ 填空题',
    '选择题': '🔘 选择题',
    '共用备选答案': '🔗 共用备选答案(B型题)',
    '简答题': '📋 简答题'
  };

  let allCards = [];
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    allCards.push({type: 'title', label: titleMap[k], key: k});
    list.forEach(c => allCards.push({type: 'card', data: c, key: k}));
  }
  others.forEach(c => allCards.push({type: 'card', data: c, key: '其他'}));

  allCards.forEach(item => {
    if (item.type === 'title') {
      html += `<div class="section-title" id="section-${item.key}" data-section="${item.key}">${item.label} <span style="font-size:13px;color:#94a3b8;">(${sections[item.key]?.length || 0} 张)</span></div>`;
    } else {
      const card = item.data;
      const matchSearch = !searchTerm || (((card.title || '') + ' ' + (card.front || '') + ' ' + (card.back || '') + ' ' + (card.tags || []).join(' ')).toLowerCase().includes(searchTerm));
      const matchFilter = activeFilter === 'all' ||
        (card.tags || []).some(t => t === activeFilter) ||
        card.kind === activeFilter;
      if (matchSearch && matchFilter) {
        html += cardHTML(card);
        visibleCount++;
      }
    }
  });

  if (visibleCount === 0) {
    html = '<div class="empty">🚫 没有匹配的卡片</div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('.section-title').forEach(title => {
    const next = title.nextElementSibling;
    if (!next || next.classList.contains('section-title')) title.remove();
  });
  renderNav(sections, titleMap);
  document.querySelectorAll('#section-nav a[href^="#section-"]').forEach(link => {
    const targetId = link.getAttribute('href').slice(1);
    if (!document.getElementById(targetId)) link.remove();
  });

  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
}

function renderNav(sections, titleMap) {
  const nav = document.getElementById('section-nav');
  let html = '<a href="#top">⬆️ 顶部</a>';
  for (const [k, list] of Object.entries(sections)) {
    if (list.length === 0) continue;
    const label = titleMap[k] || k;
    const short = label.replace(/^[^一-龥A-Za-z]+/, '');
    html += `<a href="#section-${k}">${short}</a>`;
  }
  nav.innerHTML = html;
}

document.getElementById('section-nav').addEventListener('click', e => {
  const link = e.target.closest('a');
  if (!link) return;
  e.preventDefault();
  const id = link.getAttribute('href').slice(1);
  if (id === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  const target = document.getElementById(id);
  if (target) {
    const top = target.getBoundingClientRect().top + window.scrollY - 50;
    window.scrollTo({ top, behavior: 'smooth' });
  }
});

container.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card || card.classList.contains('static-card')) return;
  // 显式"返回题目"按钮:收起答案
  if (e.target.closest('.flip-back-btn')) {
    card.classList.remove('flipped');
    return;
  }
  // 已翻面时,点击不再翻回(避免误触遮住答案);仅按钮可收起
  if (card.classList.contains('flipped')) return;
  // 正在选择文字(复制)时不翻面
  const sel = window.getSelection();
  if (sel && sel.toString().trim().length > 0) return;
  // 链接/图片等交互元素不触发翻面
  if (e.target.closest('a, img, button')) return;
  card.classList.add('flipped');
});

document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

document.getElementById('flip-all').addEventListener('click', () => {
  const cards = document.querySelectorAll('.card:not(.static-card)');
  const allFlipped = Array.from(cards).every(c => c.classList.contains('flipped'));
  cards.forEach(c => c.classList.toggle('flipped', !allFlipped));
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  renderCards();
});

window.addEventListener('scroll', () => {
  document.getElementById('progress').style.width =
    ((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100) + '%';
});

// ===== 学习追踪 (艾宾浩斯遗忘曲线) =====
const EB_INTERVALS = [1, 2, 4, 7, 15, 30, 60, 90];
const LEVEL_NAMES = ['Lv.0 入门', 'Lv.1 巩固', 'Lv.2 熟练', 'Lv.3 精通', 'Lv.4 大师', 'Lv.5 宗师'];
const STORAGE_KEY = 'us_xtj_tracker_' + (CARDS_DATA[0]?.chapter || 'default');

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function formatDuration(ms) {
  const total = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return h > 0 ? `${pad2(h)}:${pad2(m)}:${pad2(s)}` : `${pad2(m)}:${pad2(s)}`;
}

function formatRemaining(ms) {
  if (ms <= 0) return '⏰ 现在该复习啦!';
  const total = Math.floor(ms / 1000);
  const d = Math.floor(total / 86400);
  const h = Math.floor((total % 86400) / 3600);
  const m = Math.floor((total % 3600) / 60);
  if (d > 0) return `还有 ${d} 天 ${h} 小时`;
  if (h > 0) return `还有 ${h} 小时 ${m} 分`;
  return `还有 ${m} 分钟`;
}

function loadTracker() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { firstOpen: Date.now(), lastOpen: Date.now(), visits: 0, level: 0, nextReviewAt: null };
}

function saveTracker(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function recomputeNextReview(state) {
  if (state.level >= EB_INTERVALS.length) {
    state.nextReviewAt = null;
    return;
  }
  const days = EB_INTERVALS[state.level];
  state.nextReviewAt = Date.now() + days * 24 * 3600 * 1000;
}

const tracker = loadTracker();
tracker.visits = (tracker.visits || 0) + 1;
tracker.lastOpen = Date.now();
if (!tracker.nextReviewAt) recomputeNextReview(tracker);
saveTracker(tracker);

const sessionStart = Date.now();
const $elapsed = document.getElementById('elapsed');
const $visit = document.getElementById('visit-count');
const $level = document.getElementById('review-level');
const $next = document.getElementById('next-review');
const $hint = document.getElementById('review-hint');

function renderTracker() {
  $elapsed.textContent = formatDuration(Date.now() - sessionStart);
  $visit.textContent = tracker.visits;
  $level.textContent = LEVEL_NAMES[Math.min(tracker.level, LEVEL_NAMES.length - 1)];
  if (tracker.level >= EB_INTERVALS.length) {
    $next.textContent = '🎉 已完全掌握';
    $hint.textContent = '你已超越艾宾浩斯曲线,知识长存!';
  } else {
    const now = Date.now();
    if (tracker.nextReviewAt && now >= tracker.nextReviewAt) {
      $next.textContent = '⏰ 现在该复习啦!';
      $hint.textContent = `按 Lv.${tracker.level} 间隔 ${EB_INTERVALS[tracker.level]} 天,已到复习点`;
    } else {
      $next.textContent = formatRemaining((tracker.nextReviewAt || 0) - now);
      const nextDays = EB_INTERVALS[tracker.level];
      $hint.textContent = `当前等级:第 ${tracker.level} 次复习 · 间隔 ${nextDays} 天`;
    }
  }
}

renderTracker();
setInterval(renderTracker, 1000);

document.getElementById('mark-reviewed').addEventListener('click', () => {
  tracker.level = Math.min(tracker.level + 1, EB_INTERVALS.length);
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
  const btn = document.getElementById('mark-reviewed');
  const orig = btn.textContent;
  btn.textContent = '🎉 已记录!';
  btn.style.background = '#10b981';
  setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1200);
});

document.getElementById('reset-tracker').addEventListener('click', () => {
  if (!confirm('确定要重置本章节的学习记录吗?')) return;
  tracker.firstOpen = Date.now();
  tracker.lastOpen = Date.now();
  tracker.visits = 1;
  tracker.level = 0;
  recomputeNextReview(tracker);
  saveTracker(tracker);
  renderTracker();
});

renderCards();
</script>
